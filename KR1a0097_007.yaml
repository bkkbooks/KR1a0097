body:
  text: 易像鈔卷七明胡居仁撰訟不利涉大川彖曰入于淵淵坎之坎窞也小民無知而在陷上無道以拯之非擠入之于淵而何下險而好訟自入于淵者也上以健制險而成民之訟入人于淵亦自入于淵者也乾坤後屯蒙需訟四卦不先湊乎學問斷無入門之日屯蒙震艮坎合以有事屯以天地生命起念才震動都是盈滿之雷雨蒙以宇宙學脈起念才艮止都是湧出之山泉需訟乾坎合以有事需險在乾外時刻以樂天循理為事而以利涉公之於天下訟險在乾內時刻以見過自訟為事而以利涉先之於一己屯與需便是文王視民如傷事蒙與訟便是文王望道未見事堯舜兢業過一生仲尼潛心文王俱首在此君子以作事謀始乾道心也坎人心也人心才動便危原始有謀全體道心即事即心即心即天天謀為謀謀在事先歸逋竄歸二逋兼初與三逋釋為竄逋亡也逃也竄匿也藏也改易也坎為穴初三兩陰如鼠入穴遁亡自全為竄鞶帶即禮之所謂男鞶革也以為命服蓋繁纓之誤訟爭也又責也終凶訟人而忘自訟責人而忘自責如書之所謂怙終故凶初不永二四不克方訟人即自訟始訟人終自訟者三食德如為人子不見父母之非為人臣不見君上之非為人弟不見兄長之非自訟有得故曰德從舊如此不是從新如此故曰舊德五則全以大人正己物正之道率天下故元吉上乃所謂聼訟之人以威服人故不足敬需二曰小有言終吉訟初亦曰小有言終吉大有言不得小無言無不賺入鄉願路頭去也人謂寧百取譏於流俗毋一得罪於先王謂之寧取亦未妥流俗之百譏小之言無非針規藥石如需之相須而訟之自訟乃為得之訟初不永所事猶在事上醒頭訟三食舊德則已進而有得此小言與貞厲之别地險民衆有聚衆據險之亂應有統衆平險之治故一剛動於險內五柔順於坤外統衆以平定之曰師毒音篤詩亭之毒之亭謂品其形毒謂成其質一曰化育之意一曰完厚之意漢儒誤釋為害音牘便謂以義動民雖毒天下亦可為遺害不小地中有水疏曰見地包水象其為容畜不然當云地在水上或上地下水水上有地否臧凶蘇氏曰師出不可不以律否則雖臧亦凶以律正勝也不以律竒勝也能以竒勝可謂臧矣然其利近其禍逺其獲小其喪大故凶左次無咎凶事尚右惟左是次宛然長子丈人之心所謂殺人衆多以悲哀蒞之戰勝以喪禮處之皆其能事故無咎不然是樂殺人也此輿尸之所以為凶也師或輿尸凶范文正公與韓魏公為經略安撫招討副使約公進兵公曰當自謹守以觀其變未可輕兵深入韓公嘗云大凡用兵當先置勝敗於度外公曰大軍一動萬命所懸而乃置於度外某未見其可魏公舉兵入界次好水全師陷沒魏公遽還至半途陳亡父兄妻子數千人號於馬首皆持故衣紙錢招魂哀慟聲動天地魏公悲憤掩泣駐馬不能前者數刻公聞而嘆曰當是時難置勝敗於度外也李伯紀曰諸葛亮出師表親賢臣逺小人云云夫君子小人於用兵之間若不相及而亮深以為言誠以寇攘外患有可掃除之理小人在朝蠧政害本根浸長難去其患有不可勝言者是以吉甫贊周王以北伐必有孝友之張仲裴度相唐宗以東討必去姦邪之元􅍬君子小人之不兩立從古已然今宜留神照察在於攘逐戎狄之先朝廷既正君子道長則所以捍禦外患者有不難矣師上曰小人勿用小人在內既三曰小人勿用小人在外李伯紀曰君子小人若氷炭然𫝑不兩立治亂安危係其進退在人主有以察之而已在師中吉無咎師衆也即民即兵即兵衆即民衆無兩般能以衆正可以王二在師中便其人是為順治威嚴樽俎折衝有備無患有征無戰之王師彖所謂丈人之吉惟此故無咎初出以律有征無戰才失律非乘人而掩不備必殺人而尚首功輿尸兵凶戰危殺馘斬獲多所謂一將成功萬骨枯世或獻馘獻囚盛張功伐聖人以為大無功此王霸最嚴之辨四左次師不能無出出而不失師中之意故曰未失常五田禽利執止於講武不是觀兵長子帥師止於有征原來無戰戰而輿尸即全捷損人多故貞凶上大君有命曰正功全是正此師中之功小人勿用初失律三輿尸小人之所自入有此兩竇上佐命之臣操用人之柄者故特以示戒舞干苗格因壘崇降蠻荆來威淮南寢謀兵以不用為威上之所謂正功正此但如後世之斬馘為功皆首功而非正功皆後世雜霸雜夷之師而異於所謂王師四左次與三輿尸全反止是屯宿在那裏又且是箇左方何待交兵而戰即有匡王定國之功又必遜避弗居故無咎故曰未失常易筌三四皆副將三以隂居剛故躁動而有輿師之凶四以陰居柔故左次以聼主帥之令矯矯虎臣在泮獻馘淑問如臯陶在泮獻囚這還是輿尸中事與文王伐崇執訊連連攸馘安安氣象殊逺故自昔説詩以魯頌為變王三錫命或見後之為師專于討有罪而不知古之為師惟是命有德有五服五章之天命而五刑五用之天討在其中有公卿大夫之錫命而方伯連帥之錫命在其中如一邦有良牧一邦銷亂於未萌制勝於不戰而一邦安萬邦有良牧萬邦銷亂於未萌制勝於不戰而萬邦安古之王者之為師唯如此三錫命本於天惟有德是命上有命本於王終不忝厥命王惟命德君道上更防小人臣道小人勿用亂本永弭開國承家錫命之寵世世為光萬邦永懷也夫師或輿尸象曰大無功陳圖南先生詩愁聞劔戟扶危主蘇氏曰師出則嚴其律師休則正其功小人無自入焉小人之所由入常自不以律始不以律而以竒勝其人豈可與安居哉師休之日將録其一勝之功而以為諸侯大夫則亂自此始矣聖人之師其始不求苟勝故其終可以正功師上大君有命上是大國之君又衆小國之君所待命者有命總以三錫之王命為命其平日為師不在邊境在朝廷不在兵衆在紀綱不在威強在德業能以一邦之衆自歸於正推之萬邦皆然殊不以首功為尚如所謂輿尸者然象故曰以正功原筮原以髙平為象實即原泉之原五非險陷之地而為髙平之原蓋地上有水象分散而流五其從出之原耳爻言盈缶惟有原故能盈也比五原放乎四海師二出在為時雨與屯蒙需訟之二五俱同義筮比如無五原涸可立待何元永貞之與有後夫凶惟乾五有先天之能事自乾五外惟比五可與先天之能事後夫猶言後天其道指先天之道比五止為後天則先天一脈遂幾絶於天下矣故凶故曰其道窮若大有六五止是後天能事故曰順乎天而時行也乃終有慶無成有終用六永貞以大終終事是全坤之事比不但下體是坤并五爻俱全坤之體故劈初下順曰終來上逆而不順便曰無所終非但上無終并下四爻而俱無終也易筌考工記曰惟若寧侯毋或若女不寧侯古謂諸侯之不朝貢者為不寧比之世不寧之侯亦方來而不已故曰上下應晉康侯來朝諸侯也康與寧同義又坎險多憂故為不寧之象比彖言原爻言孚言首似一脈凡地上之水或為斷港或為絶流或如溝澮之涸可立待此無原者也或泛濫橫流此不歸原者也無原與不歸原皆水地無孚不成比者也以圖書言一六共宗而位北以卦言後天之坎位即先天之坤位故比初即稱有孚水地原比原有孚也曰然則水原固在地乎曰水原竅於地而生於天天一生水五其原也故從五而言既曰原筮又曰元永貞也易原始要終為質人之於首也稱元首上以五為首原與元之義俱備焉無首要終不為斷港為絶流為溝澮立涸之水即為泛濫橫流之水而已矣地上有水之水不如是故曰無所終又以井推之比五顯地內隱而水外顯也井五寒內巽夏令而外坎冬令也比上無首比天水天水下澍以滲地而無也井上有孚井地水地水上溢以升木而有也此實象亦實義也大人首繫于乾二五未有不剛健中正而可為大人君子首繫于乾三未有不日乾夕惕而可為君子小人首繫于師上則知戈矛鬬怒無不為小人矣匪人首繫于比三則知依阿淟涊無不為匪人矣古者大辟之刑身首異處比之世天下一君上不歸王化甘心做那悖逆不順之民犯的是大辟去首之刑即幸而漏網首終不可保其有故凶故曰無所終亦為險極之象王三錫命初不及於致討王用三驅必然解去一面此王之所以為王師得之而萬邦懷比得之而萬國親也比吉上坎為天險不可升尊卑上下之制截然在上這那是險都是不可犯之分義如有不輔便無主了有不順不從便都做却逆亂之民了如之何其無比故曰比吉下不可無上為之比地不可無水為之比先王建萬國親諸侯教萬國之民各親其諸侯以為之比如地上之不可無水比之匪人否之匪人天下無人道之患莫大乎下不順從莫大乎內小人而外君子孟子故曰人莫大焉無親戚君臣上下又曰不信仁賢則國空虛險中有陷曰習坎天機飛舞在此險中有順曰比萬國治安在此險中有動曰屯滿盈雷雨在此險中有入曰井盡人無渴在此險中有健曰需彌天慶雲在此險中有説曰節四時不忒在此險中有止曰蹇泰山四維在此險中有明曰既濟長夜晝旦在此師田比驅總無安意肆志可弛警備之時然師貞要終比元原始師以律臧比以缶孚師二如禹征苗湯征葛武用介俱在師中比五如禹陟位湯建中武垂拱俱履尊位故比言王惟五而師可以王惟二比三驅以簡下順之坤民欲萬國永有親輔之樂師三錫以懷上順之坤衆欲萬邦永無鋒鏑之憂比下三爻皆範王驅以相親而三以匪比為傷師上三爻皆承王命以令衆而上以用小人為亂匪人小人何在曰王之左右不可盡目為匪人而别無一君子然城社是憑狐鼠分多師之三比之上凡皆君側乘剛極險之爻也師三近銜王命而師上為應爻比上近握王章而比三為應爻師上應三有援在內或衆得為政必矯命雄行比三應上有援在外如輔車相倚亦載胥及溺師上衆為政而煩有徒干戈滋大故曰必亂邦比三非所親而失其身千古遺恨故曰不亦傷宋永亨曰易於乾坤二卦之後繼以屯蒙需訟師比六卦卦皆有坎聖人防危慮險之意深矣小畜之上稱尚德無取説腹之力爭見其異於四履初稱素不顯説乾之能事見其異於三易筌剛不能制剛而柔能之如衣冠可以化強暴是也文德正柔順之德不尚威武之謂朱氏定國曰君子大綱大節原無可議而言動之間少有滲漏小人即得以瑕摘之故檢點議論飭厲躬行正防姦之善物也徐子曰一室盡男子而無一婦人其家必不成一軍皆擐甲而無一輜重其軍必立散故畜男必以女畜衆必以財畜陽必以隂也卦中曰雨曰血曰妻曰富曰婦俱陰義俱畜陽義九卦以履為首一菴唐氏曰人當下進為只從腳踝發軔此是學者第一步這處躐等縱飛輪神駿之功枉費心力天下古今不少英雄俊傑昻首軒眉𢎞希玄覽只未得著實腳踝趨趨步步徒作一場想像話頭現弄影相耳君子以辨上下定民志明道先生十事劄子古者冠婚喪祭車服器用等差分别莫敢僭踰故財用易給而民有常心今禮制未修奢靡相尚卿大夫之家莫能中禮而商販之類或踰王公禮制不足以檢飭人情名數不足以旌别貴賤既無定分則姦詐攘奪人人求厭其欲而後已豈有止息哉此爭亂之道也吕氏祖謙曰朝不混市野不踰國人不侵官后不敢干天子之權諸侯不敢僭天子之制公卿大夫不牟商賈之利九卿九牧相屬而聼命於三公彼皆民上也而尺寸法度不敢踰一毫分守不敢易所以習民於尊卑等差階級之中消其逼上無等之心而寓其道德之意是以民服事其上而下無覬覦賤不亢貴卑不踰尊舉一世之人皆安於法度分守之內志慮不易視聼純一易直淳龎而從上之令父詔其子兄授其弟長率其屬何往而非五禮六樂三物十二教哉方位國野設官分職何往而非以為民極哉嘗讀晉國國語每歎絳之富商韋藩木楗過朝之事以為當商之饒於財使之澤其車而華其服非不足也而必易車服於過朝之際不敢與士大夫混然無别焉民志之定而中道之存成王周公之遺化固隱然在此也履初素履二坦坦先是見得上下尊卑之定分有凛然不可一毫踰越者在故率循初分而履之為素恪安二位而履之為坦坦之道即有履剛和乾能事而殊不見其能此所以為説而應乎乾此所以為履虎尾不嘻人而亨三嘻而凶只為犯一能字武人為于大君是聖人哀其志而取之三原不敢犯分只寧嘻而凶之武人異於所謂履坦之幽人耳中庸素位一章履初一爻可了崔仲鳬曰隨分而止人之大美非分而求人之大惡履道坦坦人但不安分便跬步無非荆棘小畜巽風行天之上披拂成章故象文履兌澤在天之下髙卑有等故象禮畜以隂制陽而受畜者三履以陰履陽而被履者四剛應柔而其文著柔履剛而其禮嚴文禮一原也章本清夬上乘五剛之小人履三應五剛之武人履五亦為夬決説不易入故貞剛果自遂故厲畜上尚德德莫尊於乾上能尚而巽之故成載履初素履乾原無可加飾初惟以素履之故往吉如畜四有制乾之意便反目履三以和乾為能便嘻剛柔大分之不可易固如此易筌乾為虎四乃其尾三言履虎尾謂三往履四四言履虎尾謂三來見履孔子言求志孟子言尚志天下未有無其志而有其事者易凡言志處志即士君子未見於為效天下之動之事也或乃曰爻以位為志如履三言志剛却補出才弱履四言志行又謂九雖剛而志柔似屬蛇足且聖人明言剛柔相易不可謂典要今説易者不知六爻相雜之有主而但以爻位之剛柔言當與不當止執一爻以論爻而不通六爻以論爻是一爻之變未適也何以通之三百八十四爻乎哉履道坦坦程子曰面前境路常須令寬狹隘使人難走履上旋周中規折中矩視履履頭有炯目夬履履頭有硬尖夬履貞厲三言未必中正然何莫而非五之良藥也君上而決此忠讜必日逺朋友而決此直諒必日踈處眇跛而自以為能固凶然而視實不可忽於眇也履實不可忽於跛也於眇無忽全明者固可知矣於跛無忽正行者固可知矣人以能自居則病而能無一之可廢則取人之道也此夬履所以為貞厲也擬履三為秦政項籍誠不倫或曰其志在統攝諸剛而為之君亦且不止於將矣若然是為柔乘剛豈曰柔履剛是為逆而抗乎乾豈曰説而應乎乾是當為賊為亂何止為眇為跛象曰志剛明其志在應乾而和剛此豈斧鉞之誅詞也夬履還是當夬還是不當夬若是當夬何以有貞厲之戒履五固説之以道則説説之不以道則不説視三為匪道是以直如夬之決去耳不知三説止是眇跛不是匪道眇一目小耳豈明匪其明不以道之視跛足偏廢耳豈行匪其行不以道之履象言不足以有明不足以與行因眇跛而輕忽為不足五所以夬五所以為貞厲履二與五正應五以純剛至健底性居於人上要他放教和説平易極是難事故説一個坦字不足又將一個坦字來添而特謂之履道履臨相綜看履初素二幽臨初二皆咸苐以説意上和以説意上咸耳未開説口也開口而説在三履三見能四訴五夬上考於三皆有裁而於剛説兩爻若默為之應臨三有甘四至五知上敦於三皆弗入而於剛説兩爻無弗受其臨以履三雜撰巽入上三爻皆乾剛兼有斷制臨三雜撰坤順上三爻坤柔惟謹承從耳姤包魚與瓜遁畜臣妾否離祉觀生剝得輿夬遇雨壯決藩泰包荒臨咸復無祗悔匪得數義而存之其於處小人之道未有不失者履四訴訴訴三而應初五夬三而貞二上旋三以下二初皆以三位不當之故畜初復復至五上履上旋旋至二初君子以同道為朋故如此履不處以有二剛在下人舉步聨屬不絶曰履又藉足必及地有所承藉而始得進曰履履三匪藉二初固無以行進而説應上乾也易筌視履者進步處時時著眼離視以為履者冥行耳泰之上下交以五二君臣為主若四與初上與三截然有君子小人之辨消長之分者易筌小人道消非消小人也化小人為君子也故曰舉直錯諸枉能使枉者直君子在內為主小人在外為客便是泰聖人豈不欲人盡君子無一小人顧君子小人相間世界凡有六十二純是君子若惟一乾純是小人亦若惟一坤耳泰君子道長貞乾也前乎需訟受坎磨蕩小畜履受巽兑磨蕩後乎同人大有受離磨蕩無妄大畜受艮震磨蕩乾之兼體全用六子固如此又統三十六論之前乎泰一六後乎泰五六終之視始工夫若五倍然原始為君子易而要終為君子難又如此朱氏定國曰泰內陽外隂以君心所存言理欲之分內健外順以君身所為言邪正之分內君子而外小人以君所用言賢姦之分動陷止皆以貞健入麗説皆以明順內健體立外順用行求人心無泰不可得已求世道無泰不可得已泰朋何亡合以尚五即不如娣袂之良之用心凡包荒馮河不遐遺非己之能而初與二之能故五曰帝乙歸妹以祉元吉或曰古之建官曰公孤公無私孤無朋然觀元祐諸賢不和遂為紹聖小人所乘元符建中韓曾不和遂為崇寧小人所乘紹興趙張不和遂為賊檜所乘以是知泰二之言朋亡蓋以得尚中行為朋亡如坤之言東北喪朋耳泰河凡小人諛説姦邪讒諂之言一不察便足流禍如千里之堤潰以蟻穴是以君子在有所必馮泰三艱貞無咎大有初艱則無咎噬四利艱貞吉大畜三利艱貞大壯上難則吉明夷彖利難貞艱難也根也如物根也堯已釐降二女于媯汭嬪于虞謂帝乙始制王姬下嫁之禮殊誤帝乙歸妹五處上君位二處下臣位言君臣則堂階之分猶嚴言帝妹則魚水之情至篤以祉從中而左右四上為以以陰必從陽以順必承健以小人必事君子以娣必尊君又如閽寺必統於冡宰宫中必監於丞相自內自外無一人不禔之以福是為泰五之元吉君子之於小人通可同不可不惡不絶皆通義雖泰交通耳不同也通所以亨不同所以吉故泰之彖曰小往大來吉亨朱子曰若論陰陽須二氣交感方成嵗功若論君子小人則一分陰亦須消盡盡去小人盡用君子方能成治泰四翩翩疾飛貌又往來貌急于奉公朝夕不暇啓處不遑也不富忘其家計忘其身圖也初于三陽同類一德一心以其彚也四于三陽非同類左之右之無之不見其可親以其鄰也法度明章程一君子不煩告戒小人無不委心承聼輸志説從不戒以孚也不戒以孚小人輸誠以事君子于內勿恤其孚君子推誠以任小人于外惟泰交之三四有此泰五歸妹五為震帝乙也二為兑妹也二曰尚五曰歸泰交之象也今解作帝女下嫁帝乙爻下添出一箇帝女已屬蛇足且二雖剛泰之臣也以五嫁二二為夫五為婦五尚可南面而稱帝乙否帝乙歸妹不是帝乙始制王姬下嫁之禮或是帝乙始制歸后之禮娶妻必親迎文定厥祥親迎于渭世子而親迎也韓侯迎止于蹶之里諸侯而親迎也意古者天子亦親迎至帝乙始為歸春秋桓八年冬祭公逆王后于紀九年春紀季薑歸于京師意唯天子得歸諸侯仍親迎春秋諸侯不親迎俱有刺譏政以明其僭耳泰曰朋亡解曰君子維有解此為第一然坤言得朋蹇言朋來解亦言朋至斯孚慶厯中上與執政論朋黨事范希文對曰方以類聚物以羣分自古邪正在朝未嘗不各為一黨不可禁也在聖鑒辨之耳誠使君子相朋為善其於國家何害趙閲道為殿中侍御史其言常欲朝廷别白君子小人謂小人雖小過當力排而絶之後乃無患君子不幸而有詿誤當保持愛惜以成其德傅欽之事英宗一日奏事殿中英宗問曰多士盈庭孰忠孰邪公曰大忠大佞固不可移中人之性繫上所化英宗敬納其言三言俱通易旨泰時之小人在外方消之小人願交君子之小人通君子之小人否時之小人在內方長之小人不欲交君子之小人阻抑遏塞君子之小人小人只阻抑遏塞君子不使之通便是極惡大罪了其他嫉妬傾害更不須説儉有作斂者易筌曰儉于聼可以養虛儉于視可以養神儉于言可以養氣儉于嬪嬙可以養夀命儉于心可以出生死不可榮以祿如不可得而親不可得而踈之謂非戒君子也凡草茅初進之士陽剛之必為君子固無疑其質之陰柔者方其初進亦豈遽甘心為小人故否初猶以貞望之惟兩箇隂柔合并來則小人已成又添一箇合并來則全是小人道路别無君子道路可望行走也人之為人抱陽負陰否內隂外陽便是匪人之象剝以上一爻為乾之貞初二皆有蔑之象故凶否以外三爻皆為乾之貞非內三爻所利故曰不利君子貞君子自無不貞也泰內乾三爻之為君子不待言否內坤三爻雖言小人但肯貞于從君子無不吉亨初無茹與彚之足拘蓋君子小人止于邪正上分不是陽與剛必為君子而陰與柔必為小人也易之分别君子小人于否泰見例大凡三箇陽剛正大之人合為一羣其為君子之道不問而知矣三箇隂柔私小之人合為一羣其為小人之道亦勿問而知矣包承以承為包皮膜外包包羞以羞為包心術內包聖人以小人吉立包承公案吉其承開小人遷善之門小人其包醒君子鑒人之目否初拔茅無以異于泰初小人之初人人君子也傾否上之時當傾九之剛能傾傾謂倒而向下也大人否亨象曰不亂羣這羣是亂不得底休否大人吉休之義與忿疾憎惡反但有忿疾憎惡便是自稔亂自速亡之道當否而有苞桑之繫全從休上植根休天包之量惟天有休命惟大人有休否惟君子日休惟一個臣休休薛文清言忮心一生而天地否良心一發而天地泰凡陰肯麗陽便都是福之所止故泰五以歸妹言祉否四以疇離言祉大人否亨曰不亂羣君子不與小人為羣乎曰有羣之時無亂之日且物以羣分人但知同之為羣而不知分之為羣也位不當履三嘻臨三甘暌三曵兌三來孚三鼓罷否三羞豫三盱噬三遇毒震三蘇蘇未三征晉四碩鼠萃四大吉豐四蔀小過四遇之大壯五喪羊以三言不當者十以四言不當者四以五言不當者一大抵兑震二體為多言行君子所以動天地言動不當無一當矣若小人則不消做出别樣罪惡然後為不當但安處于內竊據髙位恬然不動便要將一箇乾坤都闔殺了也泰否分别君子小人王巖叟字彥霖大名人舉明經事宋哲宗言用人之際邪正難辨辨之少差治亂所係又曰陛下今日進聖學者正欲理會邪正兩字正人在朝則朝廷安人君無過舉天下平治邪人一進則朝廷便有不安之象非謂一人便能如此乃其類應之者衆上下蒙蔽人主無由得知不覺養成禍患耳又曰或聞有以君子小人參用之説告陛下者不知有之否此乃深誤陛下也自古君子小人無參用之理聖人唯説君子在內小人在外則成泰小人在內君子在外則成否君子既進小人不能與君子同事自然不得親近小人既進君子不肯與小人爭進自然稍稍引去君子與小人競進則危亂之機也此最不可不察劉元城先生安世字器之大名人事神宗哲宗遍歷言路正色立朝知無不言言無不盡每以辨是非邪正為先進君子退小人為急嘗言微仲堯夫不知君子小人𫝑不兩立如氷炭故開幸門延入李鄧排去正人易若反掌調停之説果何益乎世以公為知言否五其亡其亡合三剛君子教戒之繫于苞桑危安其位亡保其存亂有其治也張魏公浚入見宋髙宗親書否泰二卦以賜浚浚奏自古小人傾陷君子莫不以朋黨為言夫君子引其類而進志在天下國家而已其道同故其趨向亦同曽何朋黨之有惟小人則不然更相推引本圖利祿詭詐之蹤莫可迹究故或為小異以彌縫其事或內外符合以信實其口人主于此何所決擇而可哉則亦在夫原其用心而已又曰臣觀否泰之理起決人君一心之微而利害及于天下百姓方其一念之正其畫為陽泰自是而起矣一念不正其畫為隂否自是而起矣當今時適艱難民墜塗炭陛下若能日新其德正厥心于上臣知其將可以為泰矣異時天道悔禍幸而康寧則願常思其否云朱子序潘義榮集天地之化包括無外運行無窮然其所以為實不越乎一陰一陽兩端而已其動靜屈伸往來闔闢升降浮沈之性雖未嘗一日不相反然亦不可一日而相無也聖人作易以通神明之德類萬物之情其所以為説者亦若是焉耳矣然及其推之人事而擬諸形容常以陽為君子而引翼扶持惟恐其不盛隂為小人而排擯黜抑惟恐其不衰何哉蓋陽之德剛陰之德柔剛者常公而柔者常私剛者常明而柔者常暗剛者未常不正而柔者未常不邪剛者未常不大而柔者未常不小公明正大之人用于世則天下蒙其福私暗邪僻之人得其志則天下受其禍此理之必然也易筌轉移世道只有聨屬善類一著泰否之初俱象拔茅因泥包匭菁茅包茅不入又大過之初藉用白茅茅之為物薄而用可重諸語自昔相沿俱以用人彚征並進為説似與泰否初旨無干泰初之茅拔人對外三隂言否初之茅自拔就內三陰言泰之世萬物通矣然不虞為間不用則茅塞之乎諺去草不去根終當復生須是連根而拔又須是連類而拔治地而使土無不開由是治人而使人有可用由是是為泰初首義二乃際天所覆為包極地所載為荒初拔茅如分畫而治之事二包荒如統均而治之事又恐襟帶包終不周壅決梗圮時作須用馮邇固不可泄逺尤不可忘須不遺坤朋可得可喪乾主在應首出須用亡至于三益不敢易視土宇之平治而謂無陂無復既艱又貞是為泰三爻乾道大來之作用否之世萬物不通矣然得無茅塞之患不在人在己不在身在心乎急須自剃其根又盡芟其類以坤初氷霜之志自勵乃不失其貞而得亨是為否初首義二當天地不交之中一味以地承天當上下不交之中一味以下承上以臣惟知有君不敢不承以婦惟知有夫不敢不承以小人惟知有君子不敢不承這是小人吉底道路若以坤二直方大之道論天施而後地生夫先而後婦從天氣不下降地氣自須收斂而不上升夫男不下女婦女定須貞固而無妄從男小大不並立承則小而吉否乃大而亨出乎小人入乎大人守得徹骨寒豈無撲鼻香是之謂亨三時位當閉塞之極無章可含惟有疾可藏汚可納垢可含辱可受曰包羞如此與初貞二否亦同凡皆君子路不則便如歐陽公責髙若訥謂其不復知有人間羞恥事乃為徹底小人是為否三爻坤道小來之作用以乾坤陰陽分內外泰內皆君子否內皆小人聖人已為分别明白如何可混然小人回頭便是君子小人惟否非其否而不知有君子儉德之否大人不亂羣之否遂卒為小人耳若知得小大惟人自取乾道坤道分量不論否泰一般可為君子遇泰則泰而有泰之吉亨遇否則否而有否之吉亨天地度量自寬聖賢門戶亦寬終不過為分别而忍棄一人于小人之歸也否儉德儉約也節也制也初拔茅便是兜根厚自芟柞約己節己制己真工夫如此身世任他閉塞方寸却自開通此即大人否之根基故曰貞吉而首與其亨孰為否初之茅曰無如榮祿蓋富貴利達之毒入人心髓久矣榮祿根直截拔得又推類而無不盡此心更有何物可入若有一絲榮祿根未盡榮祿類未充或不自拔而為人拔根株終在終喚做茅塞萬物自通爾却自塞世道盡泰爾心獨否人自不察耳泰亨豈非大人事惟到否亨其大尤見故否二即係以大人既示君子處否之道尤以開萬世小人出小入大克念作聖之門陽長至五然後決陰長至二便遁陽不為陰用剛不為柔用君子不為小人用夫主不為臣妾用中國不為外藩用乃天地之常經冠履之定分古今之正義于此無失方存劄得一箇君子住四曰好遁反乎好必歹矣五曰嘉遁反乎嘉必慝矣上曰肥遁反乎肥必瘠矣于君子宜何居聖賢每言無道則隱默容舍藏卷懷獨善皆遁義二陰君子小人二四分分已遁三陰君子小人遂至相半于德且儉難敢不避祿即為辱何祿可榮否五休亦略如休官休致之為休連世道責任也須放下君子非忍忘天下天下自不用君子君子固無如之何矣在遁而嘉在否而休非純乎天德全體乾剛恢乎有大度者不能若四陰成觀而曰我生五陰成剝而曰得輿巽與止之德視之乾健不逮故遁嘉否休亦若非其所優為耳泰小往大來吉亨否大往小來爻曰大人吉大人否亨可見君子之為君子進有泰之吉亨退有否之吉亨否吉無異于泰吉否亨無異于泰亨而世或有以出處進退生二見亦不勝其自待之小矣否彖明言大往小來二爾來為主之爻也既已名為小人何又以大人與之如乾二五革五以剛爻名大人然蹇上柔爻也亦名大人如訟蹇以剛卦稱大人然離萃升困巽皆柔卦也亦名大人至于坤二曰直方大坤三曰知光大臨五曰大君師上亦曰大君見大人分量人人具足人卒自安于小人耳位正當如履五否五兑五中孚五以噬渙例之噬五曰得當渙五曰正位則有正而不當有當而不正又有但得當不言位者正當係之位是就位言正言當如比五隨五巽五曰位正中又就位言正言中正同而當與中有别則當不可以混中中不可以混當不言位但言中正如姤五井五又如訟五豫二晉二艮五言中正加一以又不同言位曰正中既正又中不言位曰中正中先于正中重于正履五兑五中孚五以道非道之説混雜甚否五小人閉塞甚非正不足以消其邪邵子詩請觀風急天寒夜誰是當門定腳人非如當門當關之為當不足以當正與當不是馮虛形容得令人望之而若有儼然植立者在故特言位位正中中義渾成位正當當有力量此正當與正中之辨不言位則以德論矣凡地上一日無人闢治必草荒如莨莠不去嘉穀必不可得而樹故泰否之初俱以拔茅為第一義泰通一通百通征正行也以正道行也泰初是無欲真脈一切染不得直頭正行無之不吉否不通須漸次為通其分量與泰初不同惟貞然後吉天下大務唯田與桑天下大患唯凍與餒泰三陽生長之卦屬春夏泰內乾若先男教二曰包荒三曰于食若棲𤱔被野朝饔夕飱使民無餒之事否三陰生長之卦屬秋冬否內坤若先女教五曰包桑四亦曰疇麻田為疇若以麻以桑可績可𧖟使民無凍之事桑麻都是寒具耐道非道之説混雜甚否五小人閉塞甚非正不足以消其邪邵子詩請觀風急天寒夜誰是當門定腳人非如當門當關之為當不足以當正與當不是馮虛形容得令人望之而若有儼然植立者在故特言位位正中中義渾成位正當當有力量此正當與正中之辨不言位則以德論矣凡地上一日無人闢治必草荒如莨莠不去嘉穀必不可得而樹故泰否之初俱以拔茅為第一義泰通一通百通征正行也以正道行也泰初是無欲真脈一切染不得直頭正行無之不吉否不通須漸次為通其分量與泰初不同惟貞然後吉天下大務唯田與桑天下大患唯凍與餒泰三陽生長之卦屬春夏泰內乾若先男教二曰包荒三曰于食若棲𤱔被野朝饔夕飱使民無餒之事否三陰生長之卦屬秋冬否內坤若先女教五曰包桑四亦曰疇麻田為疇若以麻以桑可績可𧖟使民無凍之事桑麻都是寒具耐得寒守得暖耐得否守得泰此便是在否吉亨之義否中有巽為柔木即桑象彖易聖人一字都是實象實義否初拔而貞茅根都去了茅類都盡了尚須貞不貞始于拔中于承極于羞如王安石榮祿官爵都不入其心却附會周禮以利承君引用凶邪塞盡賢人君子之路天下人無不切齒怨惡猶傲然自賢自智迹其節槩寒于氷霜總不謂貞總是承羞一路人宋祚之否卒以是人致小來之戒其嚴如此楚辭寧誅鋤草茅以力耕乎將從容富貴以偷生乎又荃蕙化而為茅孟郊死辱片時痛生辱長年羞此皆拔茅包羞可證之義象承與羞是從古來小人一線氣脈只世間生出此等人便將賢人君子否塞盡便將世道否塞盡否之匪人總罪在小人之辭不利君子貞君子小人總不相能總不相為用之辭凡尊君卑臣之世都是否世上有驕下無諂上有陵下無援秉道執義不少回徇便是皎然大人風範曰否亨隨否淺深俱斡旋出通路惜乎三代以下人臣俱不足以語此承意沾滯未盡可羞面目終在小人窠臼終跳不出否亨事業殆幾絶響以道事君不可則止這便是否亨大人第一義然則一無承乎曰坤承天蠱承德承以天與德何害于承若否之包承所包惟承萬分善承皆小人于己無失之事于世道何賴以致否塞沈痼曽無通路便在此故小人之吉便是君子之否便是世道之不幸有大人者舉世承大人否決不亂于小人之羣天經賴以不墜地維賴以不裂存劄得一箇君子鼎立乾坤路住便喚做否亨不是身否道亨亦不是惟否乃亨童觀小人無咎君子弗為包承小人吉大人弗為否是小人道長小人成羣之世于外君子中做得箇休否大人猶易于內小人中做得箇否亨大人更難觀五曰位正當二曰不亂羣便見位正當有四不亂羣惟一從古難其人唐之狄文惠梁公似之問君子否亨乎曰君子否貞否貞外君子一路分青理白君子做得徹若置身小人羣中獨能不亂做得否亨事業此非大人未易與也易像鈔卷七
