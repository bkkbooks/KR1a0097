body:
  text: 易像鈔卷十八明胡居仁撰詩先後天圖雜咏十六首坤乾夾兌夜歸坎艮巽扶雷晨向離識得坎離升降義幽明何事不通知乾坤南北有常位離坎東西亦定之不是希夷𫝊絶學四偏妙用少人窺巽兌依乾日麗東山雷親地月華西羲皇聖訣歸丹訣千古人心盡自迷龍虎鼎中調日月山河架上定坤乾世人不解先天㫖妄謂堯夫有别傳乾坤性命千年正日月光華萬古明山澤風雷函變化此身端不㑹虛生離往乾中坎就坤兌開坎户震離門生生化化無窮了只為隂陽自互根巽兌相反艮震通巽坤乾艮亦相同隂陽變易終何易應識從來有主翁坤虛坎到中方實乾實離來中乃虛自是誠明千聖脉寧容異教妄加淤念菴羲皇去我久惟有卦畫存先天果何在南北分乾坤沈冥測要渺隂陽互吐吞當其往來間逆者為天根太極本無極沿流豈無源如何大易內有圖不盡言翻令伯陽輩窺竊稱專門四正隂陽互搆精四隅根窟各分明安排謂屬羲文手天地文章豈撰成翻倒先天與後天東南東北只依然乾坤密意流行處莫是羲文亦慎傳二判鴻蒙八已成更于四六要分明四如無𧰼六無位千古人心總是肓十不平分何謂然九南一北露真詮更將三七後頭看全體時中義盡傳一六源流未實研後先消息總茫然虞廷明指危微訣更藉圗書以𧰼傳先天乾一坎六後天坎一乾六八德原超形器論如無變易亦空尊時時處處盡翻轉方有工夫許入門天分於乾一力擔地功坤外别無堪都來六十還餘二兼兩兼參故號三全體乾坤唯當念周流妙作六虛環僅從畫後窺精意混闢源頭尚一間先天八卦吟六十四首乾一八首太極何形寧有𧰼三竒知是極傳神分三遂作三才位成位乎中止一人不探儀𧰼卦爻先乾畫將來止作天見到羣龍盡無首方知乘御有人乾人乾要識統天乾天不違人人在先若以地論單是順難容翻立到人前一息之微是一元敢於方寸不知尊但教弗失司南意便任從頭論到坤物物之生首在先其生也直是人乾橫斯禽獸倒草木太極應無偏與全四千九十六分之一義何曽有動移首出自來尊莫對言無都屬後天時為問何為無極真七俱隂雜一陽純仙流且竊成冲舉聖學難容獨腐陳認之為天盡在心認之為命修在身庸言庸行只斯今斯今不了俱無人兌二八首浩渺東南直接天澤天一氣共洄漩略為分出澤頭面遂作天工二義傳時物行生誰與言不言為說有來原人人口伏天為兌最忌貪天作口恩坎水陽施兌以隂兌隂說物義深沉從肌闕祗了無言一片心離在陽儀已結精震來更若有聞聲獨濡湛湛彌天澤默與天行一樣精對宫有艮方通氣後列為離到即晞妙悟太虛雲一㸃不應名遂始西歸乾陽自上忽交隂祿施無窮已上淋非待决之然後决决之斯作後天吟圖書于二行稱火𧰼立東南以澤論澤火分形相息滅誰曽一體反探原八原如輻貫一轂二更天南近至尊有喜同人盡歡忭欣欣草木亦俱蕃離三八首陽明曽不自為光認照為明更渺茫知有精凝懸𧰼外求明安得但東方太陽盡道屬人心心性微分索細吟不向性天求旦旦自東雖出總􅙨霃􅙨音音霃音沈夜晦晝明為日麗通乎晝夜是人離若非卯酉天門見那得三才配兩儀天三是木離何屬火體無形麗始成人不麗行憑獨見天根月窟總難明三生萬物一生三萬古文明盡此函不到後天方易位日躔原只在天南兌始陽消次即離於乾全體總無虧自非虛極中如洞安取東方獨出寅寅以夷翼真二切水火既稱相不射水何有燠火無寒世人不悟陽尊理先合從東一醒看未三之前麗何形有三之後然一星然之遂足照今古不然不足照一􅎉震四八首由來天載寂無聲子半聲聞已後庚肯向不聞先恐懼往來應謝洊為驚極隂之下一陽起謂是天根舊在誰若欲按圗尋起處恐于初畫已傳枝少隂三四屬同根震不先離妙義存明未東方先有震轟天盡恐作驚魂行天風起金為母奮地雷來木作公長木首司翁媪事滿函生氣已先東隂非陽迅錮難開陽不隂蒙鋭易推識得先聲隱東北動幾眇忽敢輕來盡道艮翻才出震誰知雷轉化山靈暫來東北分先後動屬先聲止後形凡聲聲必自無聲東北何聲輒有驚未徹聲俱從寂發空煩揣料發前情一分至四俱為動悔吝凶災俱動生為有震要全動體四無傾後八俱貞巽五八首一氣隂陽神不測無心寂感妙隨時塵氛自不來天宇也合先幾為一吹有竅生情輒怒號化工原不著絲毫相逄莫漫分根窟來往雖間密有操坤未來時定倚乾天教噓拂我何權坤來遷出東南去一切吹揚更對天陽儀終震慎出往巽始隂儀逆入探入義不成安有出先天一逆在西南隂初曽不異陽初一闔專來斂一舒面目况從中五出不東南也總春噓五惟中數巽當之入不于中義盡漓有欲先風知所自一無偏倚是颸颸風雷相薄俱神氣風比雷聲更逺徴千百世懸分上下前如有作後俱興後乃為雲先則雷雲飛雷厲每俱來須臾雷雨齊收􅐈景與清寧一樣開坎六八首陽函隂魄三通偶隂孕陽精六亦竒三六看來俱互體東西不射更何疑人言兌决成流水那識原通澤始鍾水派莫詳流自出焉能江漢識朝宗乾居一位坎為六六以乾居坎一之一六後先更互見渾淪淵浩少人窺有物渾成萬理宗先天何陷可形容只看陽在隂中象便是層層險萬重五前不作上巽水七後仍非下出川五七同根方靜翕欲窺發象竟淵淵萬折流來必自東沿流誰㑹泝西宫從西逆數知居六方識源頭處處通體原陽水數居隂空水雲時淵更沈向北有遷陽得數子前依舊是希音本體從初有習占原非文手為加添洊來都是源頭水才習無波不是恬艮七八首動靜互生原不易隂陽迭運更非遷應知止義從頭定七未分來象已全論形真是一卷少得數將無七亦多最惜當前無爾卓空於萬仞嘆嵯峨少男那是偏慈母嚴父常令事四方陟屺自增遊子感母前安忍不傍徨積氣曽聞一笠輕巃嵸那得是山情後人侈說艮成義那識崑崙天柱擎天不遇山方有遁有山天不在山巔少男一握先天掌更不山中又覓天乾坤重擔在人承小子從初便欲勝恃却光明少停待轉頭不覺是翁稱造化有流應有峙七如為六砥中流到頭與八相函附更欲同銷巖險憂睇望二情方忌滿回思七義復憂傾同擕五六歸坤靜一靜能教萬動貞坤八八首承天應地始名坤地道光時天更尊擬向後先尋牝義尚疑終未徹坤元乾陽盡隱坤隂見坤是全乾隱象身謬執坤消是虛體世間何物不空淪天然定位列尊卑一義無為八有司由八逆行要到二盡頭都為一捐糜竒偶才分輒八論要令六子盡承尊從初便是無成義不待元黃入語言南北有經樞在北圗書俱以北為原但迎自北來南氣地軸天維萬古存裳衣上下總綱維治極黃虞只正垂又欲西南問行往黃裳更作萬年儀鴂飛曽不到差池定分如何可一移試看兩儀終至八是中主宰默相持方圎相倚無綦重定得圎來每屬方先向北方求定義一九倣佛已中央後天九章吟八十三首坎一九章物命要歸盡有根人生安得弄精魂若知竅妙天山裡第一源頭怎自渾從坤立命歸乾始自坎翻身亦九還坎不離坤為性命淵淵根柢在人間外隂任裏千重險不蝕中陽一㸃光萬古人心盡如此北窗何事夢羲皇一墜斯須便八層到頭猶喜是淵氷若非寒極氷為骨淵底如何有一升一線微陽伏九淵發來雷雨便彌天世人未識坤藏㫖蟻穴針芒處處穿精在重淵已媾成不緣出地始稱明大明若向中天覓依舊沈沈是黑坑一物如何八物分八分仍是一為君淵潜具足天飛量即不興時也自雲坎窞人人故自投也緣坤坎不相求若教履險如平地步步光明到盡頭地在天中似易知天居地內索沈思能於晝夜通為一方是劈頭相見時坤二九章老退西南事合休如何與坎緊相求兩間男女俱無恙尚抱遑遑陷溺憂恆言重濁凝為地亦謂惟坤乃地名偏局西南既非義輕清分得怎資生翁因西北媪西南離坎遷來自互參少長一時咸速肖入俱成七動成三媪烏皓切音與拗同原位先天正北中西南一去萬源通洗天浴日歸滄海到底無踰平土功未論厚載合無疆一撮之多盡有當人不失當根一念天冠地屨萬年康屨九遇切音與據同發散自來非獲己始終翕聚乃其常只司時物初秋令便綰一元無盡藏水木順來常逆克火金逆去順相生平持地緯為中轂六百三千盡受成物宜何事推牛馬子母相隨牝順承人道若無含括意恐無尺土不崚嶒誰向虛空立得身盡由方寸地為人人如不敢虧方寸六合何生不我娠震三九章一索為男長莫先出三義在未三前以時出入皆依二恐有歸藏意未傳雷出人皆謂自東那知子半已霻霳不論發半復收半莫擬開天第一功焦火凝水苦一生常愁晦塞未晶瑩只由人耳自堅塞造物何曾不大聲雊雉未雷先有覺人生安得不知微時常淵默雷聲者動未占祥已吉幾欲問雷聲何處起由來起處不容思動幾不自無方出掣地轟天總不竒錮蔽何由得復開一聲應道自天回聞聲莫向黔神㑹呼蹴當前俱洊來戰兢一脉古來傳真正英雄敢自便夜半人人有消息無如酣夢日安眠天意由來重絶人震躬不及必於鄰欲將惕厲憂勤意散作千門萬户春先四今三以近遷為催旭日到中天動生明矣明生動每旦東窗思爽然巽四九章陽愆隂伏總為災三動應須四散來不獨清明司正令八俱從律曰時哉母來遂出位東南此意誰知為長男但一動時隨一撓要終何動可生慙撓敕教切音與間同擾也屈也不潔從初便已迷不齊更自墜塗泥天工付物令自入才入微來便潔齊雨𤾉寒燠具徴休每抱無端撓屈憂瞬息盡含消息理如何恆益不相求聲從西北多愁慘解凍由來必自東古有虞皇稱妙手時時更轉入南宫虎嘯何為頃刻生凡求同氣應同聲泛蘭轉蕙流芳聞安得人生無令名恆言地不滿東南抑滿為聲義甚暗雷出不驚離化日一天膏雨更同甘何者為幾近自微滿園春色縱芳菲即如萬㸃愁人處也屬生成造化機四時默運為神道宇宙交流是太和噓古吸今惟一息莫教一息到偏頗中五九章二三一四互相參生氣從中已滿函成即是生都此數原無一宅八為龕欲將十數兩平分兩莫能推便盡棼從一遞乘分至九竒行方顯宅中君降即是水升即火或左或右木金神居中不定為專氣竒偶分來作八純不道從中推出去不從八外輳將來纎毫置待推移力心目猶然抉未開虛實俱從有主論虛何空寂實何痕只常喚得惺然在天地翻來也自存竒數分竒歸正列偶分成偶以偏居兩端妙義依稀具泥五為中義復踈一疑未盡又求中中又何庸效八功即八即中無兩義用中不是八歸空四隅為窟全圖坎四正為君全象離離坎之中即中五乾坤全力并于斯九麗為陽一陷隂三生七斂五中妊更將四偶來參伍才識平分造化心乾六九章尊體何曽西北傾要從離九發天精况分艮出歸東北始始終終更有成六以六乘三十六六十四義遂無餘始知後六即先一獨運周天為帝車先一後六種一粒孚甲生來粒盡消一粒消成無限粒一原非乏六無饒首出何緣又貴無凡爻有六盡乾符試占潜義原乾始到用從初便足虞六用為坤那屬乾須知地外别無天天飛田見神不測定位由來自不遷三六合來原是九六驚三震即乾乾人人乾體自不息只不能强便不圎四以七終分地户六原三始列天門天行全體要終始西北如何不宅尊莫認偏居西北隅紫垣原屬帝尊樞幾人到此純無愧風虎雲龍在合符為何倚蓋從旁轉時令須歸四正行獨抱嚴凝為戰主大生原自不生生兌七九章母顧前兮父後貞相看少女喜如嬰人心感到和平極恰恰嬰兒孩笑情出三物物發生元入七都將肅殺論不到西成遂無實秋門那得異春門戚戚真為迷自心若求極樂亦邪淫異流竊向西方去梵夾流傳直到今水瀦自地咸歸澤露湛從天莫戴恩知是神功歸不宰蒼蒼正色更何言恆言口舌是凶場半語如非亦作狂朋友相求如澤麗不容聲處盡輝光易戒何為示喪羊外柔內狠甚非祥體剛用順為貞說到處羣行寧有妨木落泉枯華盡斂纍纍萬寶告秋成相逄講習緣何事金不洪罏永不精先原屬火後成金誰物能移百錬心但遇火來仍百錬無言至說此中尋澤水如何滙七西漫流到此盡歸隄自從與坎相還返一檐乾坤入手提艮八九章少男莫把少來看驚震翻身到此安竪立人寰作天柱橫空無不是龍盤八七相反義不遷一周天運始終旋光明直上通巔頂不到全乾已號圎徹底深淵徹頂山密重重是護天關凡思不出艮思位迅電驚雷不得間初中兩索到三成動不能驚陷亦平人有此身俱泰岱如何東仆又西傾役役營營莫肯休為無歸宿地堪求夜來深藉山靈力指我層層最上頭尺寸從初不蹈空培塿無不到巃嵸祗憂九仞垂成候還缺要終一簣功橫看為嶺竪為峰山亦何曽有定蹤不指山中笑山外一源河洛盡來宗始終萬物成為盛行止兼來又妙時若懼當門無定腳急回東北細尋思百尺竿頭思進步即來絶頂未安身如知究九南歸意儘有工夫與日新離九九章大明南面要終始東出西沈見量然明眼都無方滯礙時時應道是中天驕陽燥性莫禁持東燼西流北涸之物物南方可相見化工知到極和時世人多謂天明暗明暗由來不屬天求旦且知昏曉義人心何得遂茫然五行生性俱偏發惟火尤為不易平從一深潜要到八一星都是一天明九在先天本太陽一如為首九何光須知離晝非中時無首羣龍盡此藏燧皇作燧有深慈每為圖書祕玉匙新火四時無一改有生盡喚突焚尸乾位由來以六成若論乾德盡離精和雲和雨同行施無日中天不大明水中生物恆無盡曽不聞從火裏生為是有光都外發不根內暗不成明九於龜洛為離位原在龍圖屬坎宫始識流形雲雨後都歸終始大明功隨吟六首隨道唯時係亦膠丈夫功在出門交有如只作閉門事縱善難辭小子嘲四方上下盡吾廬門內如何是定居係子係夫皆婦道兒男安得婦襟𥚑及時婚媾稱嘉禮惟善為隨孚更嘉牛馬服乘寧憚逺為窮天地善無涯下得柔來惟是剛更於晦處有深藏轟天一息根淵底湛露何由到隕霜盡人能下為隨動淵默雷聲入息時王度自來惟正己但令人喜便成私一日晨東暮必西自東有出入何齎㑹家天下人中國亨到西山始不迷蠱吟六首無人不有乾坤事巽艮尤司重擔因巽入艮成方是幹休將六甲問丁辛艮荷全乾巽負坤蠱稱父母恐離根根深幹乃參天長到底難酬罔極恩百病盡堪憂父母若淫惑疾更憂深須知標治皆枝葉風必從東是幹心平地無時不大川一絲惑溺况滔天二人為此煎成病利涉如何勿直前莫將子病稱親病親病由來盡子愈三日後先都是甲回生起死在須臾王侯事任有時卸子分終身無日寬身不自卑親更尚高山矗矗到頭看剝復吟幾年剝復循環讀注腳盤旋總隔膚剝宅到安方碩果復關無閉盡迷途朋來自不通商旅民載誰曽蔑足趺爛義更教先入手反生直闖後天圖井鼎吟井鼎何緣並上身坎離南北媾姻親井無泥谷是除舊鼎到聰明為取新改邑有瓶皆足繘鉉金無實不稱珍細于水火求精義寸臠涓流盡入神屯蒙吟屯雨蒙泉莫外求盡于心坎覓因由但聲便有一天潤才應俱澄萬頃湫女子是貞終乃字金夫無瀆也回頭馬班三轉成三順雨意泉情一樣流需訟吟無人不共此心天與坎為交盡大川需在血中應蚤出訟于淵底怎長眠三來客意無相負三禠人心亦自平得到終身是平水誰教天體有虧圎次于元時論易四首求明須用折豐肱正得還羞有或承太極一圈為父祖四千九十屬元曽肝腸盡顯方成象手足無交亦遜蠅直向犧皇心地騁相磨何處不孚朋漫于理窟索精微子夜聲來見活機共惜刪餘詩不作那知翼後易無揮一圜羡爾窩中是百衲慙于漢上非得到洗心無事事只今三兩盡春沂孤立無羣義不成一爻一應鳥鳴嚶解非澍兩安孚甲革用黃牛才有庚旋斡乾坤為妙手正安離坎不心睛頻年摸去重門錮頃刻開來洊震行盡言良不足為書言到無言意有餘有健不粘乾是馬入微却以巽為魚虛談浪說無庸象實種看來要力鋤爾我心期忘老至勝教空裏覓真如先後卦圖雜吟十二首從先論後猶形影由後求先在逆掄下實上虛南北正左升右降坎離勻山雷轉處流增順風澤旋時麗更新欲得羲圖真㑹面應於文序密潜神日不于天為失麗水非歸地是空流天光有竅從離發地脉無涯遡坎求悟徹離來俱地載習知坎至盡天謀但將坤坎立下腳定取乾離到上頭八物相求數盡參震離才得㑹三三是明必震應無察凡動俱離寧有􅨹震為半聲來艮北離因全照到天南三三入手終要六每日東窗夢亦酣一念何為分八貞羲文恐亦自難名乾坤混闢才無我日月升沉始有明息息風雷函變化時時山澤定平成這般那是支離事略放寬鬆便罔生心象如何獨坎名人心多少陷難平但無密地終歸漏才未盈科總不行原始屯蒙深莫極要終渙節奧俱傾斯文千古兹常在四聖心傳誰與盟文聖潜心盡伏羲試看序義更無為求端定自屯盈始要極應終未曵時不向坎中疏地脉怎于離內透乾知分明先後如符合易簡工夫那有支根窟相函有定論也應通變一翻掀掣天風入探何窟奮地雷來躡孰根畜密是乾皆姤遇豫冥無復不坤元往來間得亦忙得著得間忙恐弄魂休將井邑妄疑猜泰上曽從告命來泰初五兩爻變成井初泥不教窮底汨五泉怎得正中回大端氣質皆應變任有功能未足材若向此中求禔福便應脫換舊胚胎屯女何為待十笄天行癸甲每相禔頥終勿用緣誰拂復上無征祗自迷象在眼前呈妙義數於日用露天倪自從象數經揮斥明顯俱驅入晦溪渙機何為必用奔水中那得是人村到如魚鱉方無問既具鬚眉怎許渾巨浪莫搖盤地石疾風只拔自椔根淋漓上血終期出况有從初馬壯存漸陸要終即是逵陸于南北有分岐南來人世盡羅網北去雲霄在羽儀小子且知防冦患征夫那忍遂安危但令勿失于磐意任有狂風倒地吹汔濟何為病未狐任令善涉尾終濡只從半武不真處便作終身大惑途靈變入神都是媚頭顱到白不成夫至人象示心綦苦無奈臨岐盡泣朱先後卦圖雜吟二十首掘泉在西北西北翕靜方泉必自山出先後先函藏始雖涓涓微終成溟渤章泉源自湮塞桔橰頭白忙知坎始知心知心亦知坎心地自到手性天誰復暗九見根一歸一以入元覽逆順先後間朝聞夕無欿言意傳較淺象義示以深雖勿病言涊還虞受象瘖或欲專忘象空無禍又侵羲文不可作迷罔到于今人物莫非心何緣獨坎諶中光微一線外暗密千林子半已難識西原誰更尋有能醒陷義可免到頭隂巽必乾離輔艮惟坤坎親但流俱有砥無照不成春出入東西户轉旋南北身一隅微彳亍八義盡湮淪乾稱健者施施以實隂虛上施膏澤零下施和風噓中施遲日麗物物有陽舒所以巽兌離尊乾俱南畬坤稱順者受受以斂陽實上受兼山止下受洊雷出中受習坎陷物物無隂恤所以震艮坎親坤俱北隲後離反先乾離乾不相奪乾陽但中虛離光遂外發虛自上下始巽兌交相窟全虛便成坤坤虛盡乾逆後坎反先坤坎坤不相陵坤隂自內實坎精逐中凝實之徹上下艮震交相憑全實便成乾乾實俱坤興隂陽分兩端允執惟一理乾旋坤必轉坎降離自起巽艮一反身震兌東西倚兩化一故神分明用中㫖少壯兼六子男女惟一我老去兼翁嫗父母總亦汝乾坤兩岐稱藐焉謂中處仍恐一膜隔肝膽亦齟齬嫗衣遇切乾坤為首腹坎離為耳目震巽足股隨艮兌手口掬俱吾一身物如何向外逐百姓病不知君子寧無恧相見是午正難求在子中後乾仍有戰先艮未遑躬謂勞誰曽出云歸自故宫龜書湮塞後千古理長蒙震惟動出端巽乃逆入始動出多透外逆入多向裏庸愚喜順呼明哲珍逆揆忽然夜半風妙悟等雷起順往十一易逆來千百難往來皆震厲逆順盡隨官濟首應終沒屯桓必始盤祗憂到敦艮尚恐作窺觀方知掛于八圎義章則九方必以圎行圎亦藉方守馬或縶其足龜故厄其首韋編即三絶一隙曽何有天根不易躡月窟慎所遇靜翕全體天動闢大始路思㫖淵未發易數渺逆泝飄風久零亂驚雷但葸懼形生神發後無竅不外漏閉關動成復貞柅靜亦姤往來重逆數婚媾戒匪冦蒙扄自不啓屯泣誰可救聰明非二物坎離根互之曷謂聰不明坎陽自中椔聞言不勝逆至道何由知雙瞳任炯炯只可喚盲兒天意重絶人人心滋不忍夬羊牽以和遁牛執亦愍姤喜首包魚解悲終射隼孔聖有微言諸儒毋域畛易像鈔卷十八
