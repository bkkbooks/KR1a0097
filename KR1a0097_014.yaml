body:
  text: 易像鈔卷十四明胡居仁撰張行成謂乾三竒震坎艮各得其一巽離兌各得其二則十二畫也坤三偶巽離兌各得其一震坎艮各得其二則二十四畫也隂陽之畫共三十六以此不知坤偶止是一畫合之為二十四畫當一嵗二十四氣之數正易心法如羲皇易道包括萬象須知落處方有實用卦象示人本無文字使人消息吉凶默㑹易道不傳乃有周孔周孔不行易道復晦六十四卦無窮妙義盡在畫中合為自然爻數三百八十有四以閏求之其數吻合凡物之數有進有退進以此數退以此數皆粹語如六子則是乾坤破體偏陂反側不平之名六子重卦乾坤雜氣悉是假合無有定實便俱亂道易有九六無七八大衍之數亦止有九六動靜之别無九六七八之異謂九變則八六變則七添出七八以言九六之變由未知夫隂陽對待隂陽相求之義耳蓋隂陽畫畫相為對待卦爻止有此數陽必求隂故陽動則交易以隂初非變陽而為隂變九而為八也隂必求陽故隂動則交易以陽初非變隂而為陽變六而為七也易占非如世人禍福之占乃聖人理義至命毫忽不敢悖理之占占得天理爛熟真是腳輕手快行得順便故曰鼓之舞之以盡神易中兩言幾一言于豫以雷出地奮為象一言于復以雷在地中為象出幾吉之先見即幾即善故能知微知彰知柔知剛伏幾嘗知不善非以有不善為幾蓋以嘗知不善為幾非徒以嘗知不善為幾蓋以未嘗復行不善為幾幾是人之夜半雷聲能開萬户千門者吕叔簡曰易道渾身都是滿眼都是盈六合都是三百八十四爻聖人特拈起三百八十四事來做題目易是箇活的學者看做死底易是箇無方體底學者看做有方體底又曰使千聖作易人人另有三百八十四說都不外那隂陽道理朱子曰這箇道理雖人所固有若非聖人如何得如此光明盛大你不曉得底我說在這裏教你曉得你不㑹做底我做下樣子在此與你做只是要扶持這箇道理教他常立在世間上拄天下拄地常如此端正才一日無人維持便傾倒了少間腳拄天頭拄地顛倒錯亂便都壞了服牛乘馬引重致逺以利天下蓋取諸隨隨以震兌成體震動也兌說也亦隨其物性之動而說者服且乘之耳若强物性以不能而不堪安得為之隨每一卦皆可變為六十三卦自是每一卦便與六十三卦俱合俱通天地萬物本吾一體之義若謂某變自某卦來滯而不達執而不通莫甚不通古今為一息終不是成性凡卦畫陽質剛連亘中實隂質柔分斷中虛不可以一為一畫一為二畫入算數象㫖自上而視下所見為險自下而升上所見為阻乾在上下交于坤而成艮坎震非特坎陷為險艮震亦皆險也坤在下上交于乾而成巽離兌非特離麗為阻巽兌亦皆阻也乾坤之知險阻蓋凡下交便知險不敢容易行而下凡上交便知阻不敢容易進而上此所以為易簡此所以為恆易恆簡恆易故恆知險恆簡故恆知阻未有易簡而不知險阻者未有知險阻而不本于易簡者六十四卦一彖六爻之辭字字皆象皆實有著落不可推移非可以己意懸空凌駕而語旁引强索而證聖人以六十四卦為一身三百八十四爻盡作身上事六爻人人有用用此一卦六位兩卦十二位而其交變則周流于十二位之間程子謂易中只有反覆往來上下于此可見此周易所以作羲畫以生成自然次第為象文序以正反往來為象故一闔一闢謂之變往來不窮謂之通退藏于密退藏謂向裏密謂不可見聞直是盛水不漏無一息不充實無一處不充塞變通者趨時者也剛柔互變而為往來不窮之通者趨乎六爻所為之時者也一氣流行兩物對待原不缺一河圖易之渾淪太極也洛書便是析河圖而為八卦析一六為乾坎析三八為震艮析二七為坤兌析四九為巽離繫傳河出圖洛出書聖人則之九六天地相交之度參伍日月相交之數昔程叔子座下有學者來問六十四卦旁一人曰皆不須得只乾坤足矣程叔子曰要去誰分上使其人曰聖人分上使程叔子曰聖人分上一字也不須得易知有親章本清曰乾始含融洞徹與天地萬物瑩然一體無所間隔方其幼也孩提之童無不知愛其親此易知有親無所減也及其長也大人之學在明明德親民此易知有親無所增也易于八卦言天地言雷風言水火言山澤分之為八物所謂一物各具一太極也其曰兼三才而兩之故六六者非他三才之道専以人道言也二篇之䇿萬有一千五百二十凡陽爻百九十二得六千九百一十二䇿凡隂爻百九十二得四千六百八䇿合之得此數以當天地間萬物之數此亦是取象之辭後世言天文者亦以微星萬有一千五百二十為萬物繫命于天之數蓋有所自也聖人畫卦已自脫了數今欲以數配卦俱不得質雖以氣而成然其體則一定而不可易氣雖行于質之內然其用實循環而不可窮二者相須以成造化有必不可混而為一者蓍占百姓與能卦占聖人君子寡過之學有不可一日而逺者易以神明之理設教初不以鬼神能為禍福設教趙汝梅輯聞云聖人立象倚數使人因有象以悟無形之妙即變易以求不易之方易雅云人心未動則為吉為凶未可必動則吉凶斷矣君子恐懼不睹不聞致詳于喜怒哀樂之未發使此心凝然湛然此聖人心筮之妙是為筮蓍本㫖焦京以緯亂易何王以𤣥亂易文序三十六卦上下分之兩儀之象三分之三才與三極之象由乾坤至噬嗑賁二十二卦正反止十二卦如卦之有初二兩爻以乾坤為主乾坤合為泰否前小畜履後同人大有合三女以有事于乾前師比後謙豫合三男以有事于坤屯蒙震艮合坎以從乾噬嗑賁震艮合離以從坤需訟坎合乾同人大有離合乾師比坎合坤謙豫艮震合坤小畜履巽兌合乾臨觀兌巽合坤隨蠱兌震艮巽初交泰否之變與噬嗑賁俱三隂三陽乾坤之分由剝復至損益二十卦正反止十二卦如卦之有三四兩爻以乾陽一爻為主用事先坤後乾艮震為交若以保泰是故剝復艮震于坤無妄大畜震艮于乾坎離分居于中前頥大過艮震兌巽之合後咸恆兌艮巽震再交咸恆損益之中前遁大壯後蹇解主乾巽坎而艮震為合前晉明夷後家人暌主坤與離而巽兌為合咸損相反恆益相反俱三隂三陽乾坤之分由夬姤至既未濟二十二卦正反止十二卦如卦之有五上兩爻以坤隂一爻為主用事先乾後坤兑巽為交若以傾否是故夬姤兌巽于乾萃升兌巽于坤困井革鼎兌巽于坎于離震艮巽兌分居于中漸歸妹巽艮震兌三交豐旅震艮于離渙節巽兌于坎中孚巽兌合而要終小過震艮合而要終既未濟坎離合而要終俱三隂三陽乾坤之分合天地雷風水火山澤諸卦爻而命之曰人此外别無所以為人聖人亦可謂明白懇惻之至而人猶區區以六尺之形骸為人生不知所以來死不知所以往真謂大迷蓍之德圓而神七七為陽為竒故為圓隂陽不測故為神卦之德方以知八八為隂為偶故為方吉凶有定故為知易有大極是生兩儀這有字是字最要體認到手不然總生不得兩儀而何有于四象八卦無有不為儀象卦爻之所役使者未分而一在五十之中已分而一又在四十九之中善學者于此悟入焦贛易林衛元嵩元包敢于棄置文王彖辭而自支離其說不勝杜撰不勝畫蛇添足即坐舞文之誅何過無中爻離撰則上下判為兩截全在三四處置聨合得是此所以有貴于人道淮南子猩猩知往而不知來以能知誘者為知往不知被禍為不知來然則易之所謂神以知來豈非吉凶與民同患惟義命之安毋利欲之急固亦在于尋常日用之不可缺歟知大始無一念不天無一念不生作成物無一念自能無一念自功或曰天地始判之初未有人也忽焉而人生其間因分前為氣化後為形化又如既以大極分隂陽生五行而行四時又以真精妙合成男女而化生人物此等下語似失孔子繫易之㫖源頭如何得明人分如何得盡易傳先言生生之謂易而後曰成象之謂乾效法之謂坤又曰易有大極是生兩儀此等去處學者未明如何謂之見道顯諸仁藏諸用物物皆然譬一株果樹生許多枝葉開許多花結許多果子果中各各有仁此便是顯諸仁其仁又完完全全各各藏一株果樹在裏靣此便是藏諸用揲法竒䇿初必五再與三必四五一個四并掛一也四一個四也偶䇿初必九再與三必八九兩個四并掛一也八兩個四也後人不明其義遂以五四為少為竒九八為多為偶三少為老陽三多為老隂兩多一少為少陽兩少一多為少隂殊謬寂然不動感而遂通天下之故龜山先生曰正心到寂然不動處方是極致人言乾坤退處不用之地非也致役乎坤戰乎乾豈曰退亦豈不用之地乎只是乾道全要顯出一箇離明為中而巽兑為輔坤道全要顯出一箇坎陷為中而震艮為輔非離巽兑不足以成乾道非坎震艮不足以成坤道天地之用莫大乎水火風雷山澤無水火風雷山澤將不成其為天地云爾楊子安問伊川易從甚處起時方揮扇先生以扇柄畫地一下曰從這裏起子安無語後子安舉以告尹彥明且曰當時悔不問此畫從甚處起彥明以告先生曰待他問時只與默然得似箇子安更喜歡也子安聞之遂服顧叔時曰伊川若肯參禪何必在大慧中峯諸人之下所謂能之而能不為者也夫易者交易也變易也兩相與而後交而後變伊川居子安侍師弟子相與相求易即從此起矣畫地一下存乎人存乎德行腳跟㸃地而後為踏實不然是徒問也得似箇子安儀成儀象成象爻成爻卦成卦真是到手更何待騎驢覔驢易有太極千斤萬兩在有字人此身都是易一日間有許多變易與交易最怕無定主若是有了太極兩分之有儀四分之有象八分之有卦有到八卦吉必趨凶必避復有混淆不定者無之故曰八卦定吉凶吉凶生大業凡言明多連分字說凡言混多連互字說如大學首明明德亦須心意知物四字分疏明白正誠致格四字分貼明白或混而不分不明其于明明德乎何有因二以濟民行或曰二即一正一反因即一先一後二相竝之謂因相次之謂陽極于九全用隂中于六半用亦陽全隂半之義謂隂極于六者非大衍之數五十其用四十有九五十數中無一䇿不可為虛一之一無一策不可為掛一之一合五十而為虛一掛一之一非有餘分五十而為虛一掛一之一非不足一之外無復有四十九而四十九之外無復有一然而既已四十九其虛一者自立于四十九之先而初不雜于四十九之中雖不雜于四十九之中而未嘗不流行于四十九之中其不雜于四十九之中者虛一之一其流行于四十九之中者掛一之一即掛一之一為虛一之一其失混離掛一之一求虛一之一其失支若其日用于四十九之中而不知有虛一掛一之一是為凡民又或遺其四十有九之用幻妄乎掛一之一而髙妙乎虛一之一并所謂一者而亦虛之以蕩之于空以滅之于無而更謂我有獨尊者存是謂異端雜終于夬雖云君子道長小人道憂實是君子之澤永世不斬事業文王出震成艮純亦不已孔子戰乾說兑太和元氣流行四時與天地參而四時同九卦首履雜卦終夬仲尼濳心文王一脉易開卷教人便做乾坤做得乾坤乾坤成列而後有易可學故曰易行乎其中乾以君之以統臨謂之君先天所主在乾乾以全體言帝出乎震以主宰謂之帝後天所主在震震以下畫一陽為主言數往者順知來者逆如啓蒙卦變以一卦為主各具六十四卦順變將去自初而終自上而下由乾以至于坤逆變將來自終而初自下而上由坤以至于乾陽全隂半乾全坤半陽兼隂以為道乾兼坤以為道曰六位時乘者兼三才以成乾道非専以天為乾道也坎離正對既未匹配坤艮斜倚謙剝迤邐震東兌西歸妹隨兮巽四乾六姤反小畜要歸五中八八俱通强名太極大極無極盈天地皆人道所以謂之三才又謂之三極生人道之來而伸出幽而入明者死人道之往而屈出明而入幽者太極全體如環無端只從闢處說起闢便喚做動動便喚做生陽總全體皆陽皆動分半體有隂有靜隂不與陽對靜不與動對如邵子復姤根窟詠姤亦不與復對窟亦不與根對坎是心精離是心神若以離言心坎言腎直養生家之小術謬說耳聖人曾有是哉上經只有小畜履臨觀大過五卦是巽兌為主然聖人彖小畜曰剛中而志行彖履曰剛中正彖臨曰剛浸而長彖觀曰大觀在上中正以觀天下彖大過曰剛過而中且以大名凡以剛為主居中得位之卦皆居上經其餘皆居下經此剛柔尊卑之大分也萬事不離乎隂陽只術人不識大義以小用之耳問通乎晝夜之道而知方達卿曰非知晝夜也明隂陽之道也人心之體即是一隂一陽心常惺惺流行不息便是知隂陽知隂陽便是通晝夜龔深之曰流行于天地之間者無不受命于隂陽而從役于晝夜其微有消息其著有盈虛其分有幽明其數有生死隨流轉徙未嘗知其為晝夜也故成然止冥然行惟晝夜之所驅耳通乎晝夜之道者則異此雖與之來而有所謂不來雖與之往而有所謂不往故其體為神其用為易方類定是聚或是其類而故渙之物羣定是分或非其羣而故合之無有不失聚所當聚分所當分無有不得故曰吉凶生剛柔相摩八卦相蕩五行相生相克乃有造化單生單克無造化矣如木生火而不生于火則焚金生水而不生于水則燥如金克木而不克于木則厲水克火而不克于火則寒皆可見範圍天地之化而不過雖天地之化亦不能無過範圍之而不過者聖人也人生于寅不是到寅㑹方生人寅是天地交泰之㑹人得天地正交之氣以生惟人配得天地一般長大所以謂之三才若萬物則皆天地之餘氣偏氣所生耳易與天地凖又曰與天地相似故不違人而不與天地凖不與天地相似皆失其所以為人者耳安土敦乎仁稍有自擇便安之意便只知有巳不知有人豈不于仁為日薄了繼之者善也如金方在鎔成之者性也如金已成器金只是一箇金無兩箇金但就金器言之盤盂叉釧大小巨細大成其大小成其小各各不同所以有箇聖人有箇仁有箇智有箇百姓聖人仁智百姓本來同此善同此性只是所見不同有見其全底有見半邊底有全不見底易筌天人相接處為繼人所禀賦處為成百姓于仁智性非有兩只是仁智常立在明亮處做世界百姓常立在黑暗處做世界若一成而不可變耳一故神橫渠云譬之人身四體皆一物故觸之而無不覺所謂感而遂通不行而至不疾而速最㫖成性存存道義之門成性稍有虧失其于道義便是閉殺了門也易筌德崇于知聖人之知日游于髙明而進進不已故知崇而德與之俱崇業廣于禮聖人之禮日就于平易而步步著實故禮卑而業以之益廣又曰存存本原之功也擬議言動之功也存存則擬議者自明擬議則存存者益熟非擬議則所謂觀玩者亦空言耳神以知來知以藏往聖人之所謂知來藏往惟蓍德之圓神卦德之方知耳舍此言知言藏言來言往便都是野狐精之妖見聖人所不道中爻雜物撰德聖人明白言之于繫傳漢儒妄以為互體耳邵子手探足躡可謂帖地之甚唯曰弄丸餘暇間往間來稍似戲侮不恭先天圖坤復之際以卦言即豫萬以忠曰此知幾之學也坤無之盡也震有之初也羲圖于有無交接處略示其意令人自神解耳蓋造化既有發育生長必斂到極坤處此幾方見斡旋吾人既有視聽思慮亦必斂到極靜處此幾方露端倪白沙詩云亥子中間得最真是也是謂坤復之際然此幾貫徹宇宙無一處不到非必在坤復之際過乎晝夜無一息不運非必在亥子中間特借後天象數交接空隙處指示令人于此尋求耳朱子曰頃年見汪端明說沈元用問知靖伊川易傳何處是切要尹云體用一原顯微無間此是切要處後舉似李先生先生曰尹說固好然須是看得六十四卦三百八十四爻都有下落方始說得此話若學者未曾仔細理㑹便與他如此說豈不誤他某聞之悚然始知前日空言無實不濟事也卦爻四則應而合四象之義三則撰而合三才之義明道先生欲著洛書有志未就文王之心已自不如伏羲寬濶急要說出來孔子之心又不如文王寬濶又急要說出道理來所以本意寖失都不顧元初聖人畫易之㫖只認各人自說一的當道理此本義所以作東坡注易畢謂人曰自有易以來無此書朱子亦援以為言東坡禪學宜有狂語朱子未宜至此乾南坤北離東坎西是一說離南坎北震東兌西是一說姤南復北壯東觀西又是一說此亦所謂不可為典要之義之一易何嘗不是卜筮伏羲畫卦首要天下萬世之人俱卜俱筮然後方成得一箇人何嘗不是卜筮只聖人之說易有聖人之道四執一廢三遂成儒者之偏見并聖人所謂卜筮而俱失之耳後兩變不掛則不得朱子已明辨之矣所以實見與影見不啻千里天地設位易行其中明道先生曰何不言人行其中蓋人亦物也若言人行其中則人只子鬼神上求矣若言理言誠亦可而特言易者欲使人默識而自得之也按此數語最精二氏只于鬼神上求以為神行其中也人不皆易人直一物與禽獸草木等耳人乎易乎易乎人乎人其易易其人天地之位其無虛設矣乎雷從地出風自天行從地出宜有收斂之時故雷有時自天行無不運旋之時故風無時天無體只二十八宿便是體此生成四七之數四營成易本此或曰易中利字多為占者設蓋是活人方有利不利若是卦畫何利不利之有此只認卦畫為死畫畫自畫人自人故其言如此但說以陽居隂以隂居陽故其象占如此此則止是一爻死殺的道理豈六爻相雜惟其時物之謂哉隂半陽全隂靜只見得一半陽動乃見得全體如人立時是隂靜只見靣前一半覆轉身來是陽動便前後都無不見也人不到與天地合德日月合明四時合序鬼神合吉凶原初仍是屯要終仍是未濟神也者妙萬物而為言者也以雷風火水山澤言神耳豈渺茫不可知之神乎班固孔子晚而好易此非知孔子者孔子祖伏羲信而好古自志學時己然豈待晚而後好胡雲峰曰履以兑一隂躡于乾三陽之後履之為禮也謙以艮一陽抑于坤三隂之下謙之所以制禮也隂為小說而應乾安其為小也所以履繼小畜之後陽為大勞而能謙忘其為大也所以謙繼大有之後小則安大則忘九卦言處憂患之道首履謙以此易筌聖人諭道極其要妙至于踐履處不過一禮後人才見到𤣥妙處便流蕩而不法通乎晝夜之道而知所知者通晝夜之道耳過此以往未之或知窮神知化德之盛須自到那神化地位方知不然總是臆見推測濟甚事損損己益益人胡雲峰曰古者富厚之資寧使在民而不在己儉薄之用寧使在己而不在人釋氏驚天動地說許多神化直吾聖人之家常茶飯耳且夫不測不可知之之謂神可測可知則豈謂之神乎甚矣其言神化之誕也不節之嗟履尾之凶一人之損滅頂之涉齎咨之涕洟嗚呼非深于說者亦安能為其所為乎項平甫以天道人事易象三者合言易不知易象是甚天道人事是甚毫釐雖小積而不已命數乘之單有一片陽氣發生而無一片隂氣收斂但開花不結果便亦不成其為太極周子主靜立極之意蓋如此于主靜下注無欲二字此必後人不得其意為之畫蛇添足也果以剝碩極以靜立靜是剝功剝是靜功滿眼是畫如何說無畫易言義言命義命竝言陳思獻曰一聽于命而放誕不知反亦可謂不知義之甚矣程子曰自孔子贊易之後更無人㑹讀易先儒不見于書者有則不可知見于書者皆未盡如王輔嗣韓康伯只以老莊解之是何道理卦有六十四反對止于三十六乾卦一爻之䇿數也爻有三百八十四反對止于二百一十有六全乾六爻之䇿數也坎于艮震屯蒙在上經蹇解在下經離于艮震噬嗑賁在上經豐旅在下經學者俱要思得之動自初至上則止故震反為艮艮反為震動只一理入自初至上則說故入反為說說反為入說入一理復出入無疾剛動于內無妄之疾勿藥有喜亦以剛動于內豫五貞疾不死亦以震體積善之家合一家纍世之人而無不善然後謂之積善之家以其善一家者善一世然後謂之善世乾坤隂陽剛柔之正管領十二卦剝復陽剛消長之際管領十二卦夬姤隂柔消長之際管領十二卦是為合六十四卦而成三畫統體之卦易始屯終未濟是以聖人戰兢惕厲沒身未已一偶一竒變化無窮而一竒常為之主此誠意所以必先致知一竒常恐與一偶截然分而為二此致知所以必在格物陽動動隂以生隂靜靜陽以成陽自為動孤陽不生之動耳隂自為靜孤隂不成之靜耳世儒之言動靜有不為孤陽孤隂之動靜者鮮矣豫言知幾之早復言省過之速上下經皆列不相反對之卦二而後以坎離終明四卦之變畢而後坎離之用終震艮與巽兌相合于上經者一相合于下經者三乾坤與坎離相合于上經者三相合于下經者一乾坤坎離為上經之主震巽艮兌為下經之主也大過小過震艮巽兌之肖坎者頥中孚震艮巽兑之肖離者明震艮巽兌之體亦未嘗外于坎離故上下經之終各以二卦附坎離震起東方反為艮止于東北巽起東南反為兌止于西陽全隂半此造化不易之定體也既出震後都是坤隂用事于外乃乾陽則全體為主于內者才動則坤之用行才靜則乾之體立震兌動靜之門也無極易也無極而太極易有太極也大極本無極故曰大哉易也斯其至矣三百八十四爻不過剛柔兩畫繫辭之稱乾坤凡易之剛爻皆乾也凡易之柔爻皆坤也四月純陽而曰小滿十月純隂而曰陽生隂陽互根原非絶而後生者易何古今易只在畫自皇羲以來原未曾動何待改正夏商以前占惟觀象想與龜卜相似鍾氏芳曰日烜以克濕雨潤以制亢雷奮而隂慝解風鼓而陽鬱宣皆至神之用也說者乃謂隂囚陽則奮而為雷陽薄隂則旋而為風是則皆戻氣矣雷以震隂故有時風以達陽故無時憂悔吝者存乎介天下萬事俱始自纎介劈頭從太極分來便有動靜兩端便有乾坤兩元便是三才非既動而後靜先乾而後坤亦非先有天地而後有人太極生兩儀兩言儀從人為義劈頭就從人說齊小大者存乎卦卦有大小義無小大智配貞而曰事之幹如冬之藏乃知聰明外炫者皆非智而多足以殺身亦如冬令而不蟄藏之故大衍之數五十其用四十有九四十有九之用無非一也最可以明格物之㫖末有萬本惟一一亡而萬盡隳矣又何物之可言乎故聖人要終而特揭之曰此謂知本此謂知之至合之一格虛一之一分之萬格掛一之一分隂陽用剛柔者仁義也以人而分天用地也家人暌巽兌于離蹇解震艮于坎皆咸恆二體分于離坎之交家人俱變為解暌俱變為蹇尹焞語録明道先生云聖人用意深處全在繫辭許書乃皆格言觀易須識時然後見逐爻之間嘗包涵數意聖人嘗取其重者為之辭亦有易中言之己多取其未嘗言者亦不必重事又有且言其時不及其爻之材皆臨時參考須先看卦乃看得繫辭學者全要識時若不識時不足以言學地載神氣神氣風霆風霆流行庶物露生此說坤二震三巽四接連一假學問萬以忠曰一部易隨時隨事剛柔莫為典要然總是中和中者知也中節也和又只是中中在何處討豈是卦爻中間一畫又只在喜怒哀樂之未發耳是一部易全在我故程門以看喜怒哀樂未發為相傳㫖訣此伊川先生解易之隨也王氏曰閏天之餘數也其法以日為度日行十二月中不匝十二度故置閏以歸其餘日陽也陽有餘物也不盡用而歸之于終故常餘閏陽之餘也夫惟有餘為不可窮故厯家以置閏成嵗物以之生而大衍歸竒象閏耳扐成卦通于其說者則知有餘之不可窮為天道矣易像鈔卷十四
