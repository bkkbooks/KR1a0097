body:
  text: 易像鈔易類提要臣等謹案易像鈔十八卷明胡居仁撰居仁字叔心餘干人絶意仕進以布衣終其身後追諡文敬事迹具明史儒林傳是書前有居仁自序稱讀易二十年有所得輒抄積之手訂成帙又取先儒圖書論説合于心得者録之三卷以下則皆與人論易往復劄記及自記所學復為櫽括歌辭以舉其要居仁之學其源雖出吳與弼而篤實則逺過其師故在明代與曹端薛瑄俱號醇儒所著居業録至今稱道學正宗其説易亦簡明確切不涉支離元渺之談考萬厯乙酉御史李頥請以居仁從祀孔子廟庭疏稱居仁所著有易傳春秋傳今頗散佚失次朱彝尊經義考載有居仁易通解注曰未見而不載此書豈此書一名易通解歟然李頥時已稱散佚失次何以此本獨完疑後人裒其緒言重為編次非居仁所手著也乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀易像鈔原序余自遊吳聘君之門始知句誦詞章為不足學當以斯道自任絶意仕進得暇讀易幾二十年稍有所得隨讀隨鈔積之既久不忍棄去復手自訂成帙名曰易像鈔先儒有言易之為書窮神知化非天下之至精其孰能與于此世之注解殆皆妄也此蓋不特針弼之失云然余雖不任注解其應鈔不鈔非所鈔而鈔亦自知妄無所逃罪或曰窮年兀兀在書册中作活計嘻此蠧魚也余曰書册安能蠧魚人人自蠧魚耳余又見蠧魚一生活計作于書册中然似頗為書册居守初不甚為書册蠧蓋有蠧名無蠧實者蠧魚也依書册則生離書册則死生死以書册猶書册也若蜉蝣焉朝生暮死于泥沙汚濁中矣與其泥沙而蜉蝣而生死毋寧書册而蠧魚而生死姤之言包也有魚無咎無魚起凶蠧雖微亦魚也人有家無書有書無蠧始包無姤魚蔀為豐屋不懼窺其户閴其無人乎余尚恐不得比數于蠧魚卒為蜉蝣之朝夕若曰無事書册余曷敢昧心餘干胡居仁識易像鈔原序
