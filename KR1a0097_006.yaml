body:
  text: 易像鈔卷六明胡居仁撰乾元亨三才合一利貞專言南靣大明人道坤元亨乾坤合德利牝馬之貞專言北靣應地人道乾坤雖無二元然乾以陽為元坤以隂為元其判天壤隨乾元所施之處而無不至故曰至哉坤元如乾有施而坤不至即不為順不為承而物無由生矣玩資始資生二資字萬物自始自生自性自命乾元坤元亦特為資之已耳人固可不自竪立而成位天地之中乎坤隂以乾陽為主無敢耦之為朋故東北喪朋明有主也若西南無朋隂之於隂柔之於柔臣之於臣子之於子婦之於婦更不可與合又成甚學問安貞不擇地而安得朋以代乾也失朋以從乾也以隂必從陽離喪朋類乃能成化育之功是專以東北為利也以坤常减乾之半必反之西南乃終有慶又專以西南為利也試觀地之四方果有一方不利不資生者否君子有攸往往坤道也婦事夫臣事君俱往故坤三言地道妻道臣道而不及子道子雖父在來者耳來曰知曰察往曰數曰彰已有辨小往大來泰大往小來否更不容混凡剛本在上者在下則上凡柔本在下者在上則下乾剛自下而上為大為元亨利貞坤柔自上而下為元亨利牝馬之貞屯自下而上蒙自上而下皆倣此坤舉西南東北以離坎為正中西南恰得本位東北所當止之地不言西北東南避乾并及巽也坤道君子之慎於攸往如此西南三女屬焉合之為朋不為母東北三男在焉尊之為主不敢朋西南得無不盡之分矣東北喪無不安所止矣如是而更有失腳之事貽千古之恨者無之矣專言乾坤自在其中專言坤不以乾為主又成甚義理以故坤六爻之隂劈初來定須因霜而堅凝極上來定須稱龍以血戰二直方五黃裳三含章四括囊真若天威不違顔咫尺然此坤道所以為順也乾重元坤重貞乾元原其始而亨利貞為之終坤貞要其終而元亨利為之始程先生詩道通天地有形外乾元通乎氣外坤元通乎形外天以神用言行地以質用言𫝑九即天行以奇六即地𫝑以耦才耦便有高下尊卑才有高下尊卑便不可不順故地言𫝑而名坤隂始凝凝成也定也冰堅也隂所患惟不凝到堅冰才凝子孝臣忠才成才定而永無亂賊之患故言順始初金柅之繫即坤初堅冰之至故曰貞吉春雨至而發生秋霜至而堅凝一般是承天之順然春生邊屬陽不屬隂故乾全體以雲雨明健坤原始以冰霜明順隕霜不殺菽無冰春秋皆為記異然則時霜而霜時冰而冰應嚴凝而嚴凝應寒沍而寒沍在天為正令在人為正道故曰雨露霜雪無非教霜天之教履初之順堅冰至滴水㸃凍至於腹堅馴伏而致極其順也爻言堅冰至𧰼言至堅冰以堅冰為至而至之自初也隂承陽如是始謂之凝始謂之順若履霜而堅冰不至仍不為順此孫聞斯說實前所未發堅冰至原始有終無成從中有終以大終要終有終尹伯竒履霜中野幾有坤初之順只自沈便不是堅冰之至六二之動直以方若說六二之靜便不是直以方了又如或從王事若說必從王事便不是知了又安得為光大履霜堅冰句至句觀𧰼解甚明霜上加冰斯之謂馴致其道斯之謂至凡女待男士待君劈初來俱先不可無此操履陽濡則露隂結則霜隂沍斯冰陽解斯泮喜不忘勞不怨用則行舍則藏子事父臣事君能如是斯免於為賊為亂故聖人訓人早辨處女寒士不春溫霜不解肅不東風冰不解堅原始履霜從中括囊四隱是已用復隱總無改於冰霜之素陽不舒千年有凍色時未至沒世無榮意未夫是謂女貞已夫是謂婦順君終無代父在子專俱不霜不冰而逆莫甚初不待操創然後名為亂賊曹彬事周世祖為引進使典茶酒宋太祖嘗從求酒彬曰此官酒不可相與自沽酒以飲太祖及即位語羣臣曰世宗吏不欺其主者獨曹彬耳余行之曰陳橋之變甘心北靣不欺於酒而不能不二於周也兹所謂履霜而堅冰不至者唐穆宗詔蕭俯撰成德王士真碑俯曰王承宗無可書又撰進之後例得貺遺若黽勉受之則非平生之志裴均之子持萬縑詣韋貫之求銘貫之曰吾寧饑死豈忍為此哉此亦履霜一義范文正公為舉子時讀書南都學舍留守有子居學見公食粥歸告其父以公厨食饋公公不下筯留守子曰大人聞公清苦故遺以食物而不下筯得非以相凂為罪乎公謝曰非不感厚意蓋食粥安之已久今遽享盛饌後日豈能啖此粥乎石徂徠讀書南都時侍郎王濟聞其困窮因餉客授以盤餐却不受曰今日固好明日何如二公之操又履霜一義王文正公為相退食必召諸子使之席地聚食乃語左右曰剩與菜羮此輩生長公相家已驕矣不可使不知淡薄之味公嘗陪祀東封有子侍行家信至公發之見所寄衣帶以紅為之公怒曰我在爾已好華如此欲壞清風我死望汝輩純素難也亟令送還易之余行之曰美珠之受無乃與剩菜之味異乎銀器之易無乃與還帶之風殊乎以文正之賢而晚節猶若是與冦平仲能决澶征而弱於天書胡邦衡敢攻奸檜而不能忍於黎渦兹皆所謂履霜而堅冰不至者范質仕周為宰相及太祖受禪不改其任嘗謂同列曰人能吸得三斗釅醋可為宰相冦準年三十餘太宗欲大用之尚難其少準知之遽服地黃兼餌蘆蔔以反之未幾髭髮盡白準已不霜質更亂霜龜山先生曰人人有易不知自求只於文字上用功要作何用又曰敬義立而德不孤德不孤乃所謂大德不孤則四海之內皆兄弟之意夫能使四海之內皆兄弟此所以為大也梁伯鸞少孤嘗獨居而不與人同食比舍先炊已呼伯鸞及熱釡炊伯鸞曰童子鴻不受人熱者也腳下無霜有是乎嫌疑不處稍有嫌疑必戰必血嫌疑之事且無况其實有悖逆之事乎夫如是以子方可謂無一念不在親而免於賊以臣方可謂無一念不在君而免於亂諺刀刀見血又有言一摑一掌血我這裏是鼎鑊刀鋸學問皆坤上之戰之血說卦傳帝出乎震戰乎乾月令仲夏之月日長至隂陽爭仲冬之月日短至隂陽爭月令言爭如陽至而隂不為伏則陽爭隂至而陽復為愆則隂爭此隂陽無辨之爭漢儒之言也易言出震戰乾既為標出帝字又以震陽起於全陽之後為出以乾陽要於全隂之終為戰此隂陽有辨之戰聖人之言也公將不利於孺子此周公之疑之嫌我之弗辟無以告我先王此周公之戰東征此周公之于野天動威破斧缺斨此周公𤣥黃之血王出郊天雨反風此周公之天𤣥而地黃略有嫌疑必戰必血非大賢以上不能此所以為坤上坤初凝必冰所以堅其始坤上戰必血所以厚其終三章必含無成有終有成必無終矣四囊必括無咎無譽有譽必有咎矣譽稱美過實聲聞過情君子所恥况在隱閉時位豈不為害無譽暗修之至其行有常之至𧰼故言謹不害坤彖言含𢎞光大二言直方大三言知光大用六曰以大終此坤之德合之大耳坤之稱大稱元猶妻以大稱配以元名相似朱子以克己復禮為乾道主敬行恕為坤道克己復禮禮卑如地惟卑法地健雖在已盡忘其已此羣龍無首之見無非取諸人而盡舍其己者故曰乾道主敬行恕以乾為主以己為承無敢不敬而强恕以行此利永貞以大終得所依歸能不失己者故曰坤道乾無首坤不可無首乾不為首坤不可莫為之首乾見無首然後能通天下之至變盡天下之至精坤知有首然後能立天下之大本成天下之大務易用九六以圖書生數言九天數一三五之積六地數二四之積以圖書成數言除十不用陽主進九陽進之極數隂主退六隂退之極數以蓍策言乾用九九者三竒之變四九之分坤用六六者三耦之變四六之分圖有十書虛十用九虛一圖書之中之一乾竒宅中之體用六虛四圖書之中之四坤耦四隅之體以圖書分體用九六用圖中之十五體即用不用原為用一四不用書中之五用即體用原有不用以參兩言九參天之數六兩地之數用九以參天用六以兩地九六用而天地位易之所謂成位乎中者此乾元即太極坤元即乾坤上稱龍即乾龍馬貞曰牝龍戰曰血不言牝以血見也彖曰馬爻曰龍馬八尺以上亦龍也龍神物民咸用之之謂神初為霜為冰二為直為方三為章為含四為囊為括五為裳為黃能大能小能幽能明龍之能事皆坤所自有非至上然後稱龍士窮而節見坤窮而龍見窮則變變則通通則久所以為永貞之利也總言龍六原通一陽性無疑隂性有疑動直無疑動闢有疑疑潛疑見疑惕疑躍疑飛疑亢皆有戰也不稱龍似無主不稱血猶無戰也乾初稱氣坤上稱血一原始一要終互見也坤以乾行隂以陽行血以氣行乾初藏坤初凝氣凝與凝也乾自二見至五飛坤自二動至五黃氣行與行也上處乾坤之窮亢似氣鬱疑似血滯稱龍稱戰稱血似氣血兼治實則陽先隂後氣主血從陽氣震蕩隂血必隨以通流故龍戰而曰于野陽饒而氣遍布四支也其血而曰𤣥黃隂乏而血震動流行也震為𤣥黃是也潛藏以原乾始𤣥黃以厚坤終人身血氣得理之時其即九六成用乾坤成位之日乎坤初履霜脉絡從乾上來陽極而亢定是淒之以隂君父有亢定是臣子之霜雪而非臣子之雨露坤初順始不從春生處起腳惟從秋肅處起腳肅之以隂而無敢不肅寒之以霜而益其為寒直從腳底著實踐履從霜上更加凛冽寒至骨徹凍至腹堅夫是之謂堅冰至爻言堅冰至若天時自至𧰼言至堅冰乃由人必至之劈初頭有此霜嚴至持冰堅大節何歲寒不可涉何窮冬有足虞原始堅冰真是霜雪無非教要終血戰雖於疑嫌亦不處是為臣子忠孝之極致然於臣子分義曽無毫末加也所由與亂賊有辨唯此坤道之所為順唯此乾用九六在其中坤用六用九之二耳其一六不得而用亦非六所能用用九直透乾元故乾元稱大用六但可至乾故坤元稱至後天乾六坤所至之乾耳與乾一之元微有先後一層之隔坤德定是方不可員定是有常不可無常舍方覬員舍有常覬無常無不立敗腳跟無霜不秋而雕靣孔無血見敵輒走乾初潛藏坤初堅凝此兩爻非止乾坤六爻乃三百八十四爻全體根基禮决嫌疑嫌疑之際君子不處隂疑于陽必戰决不處其疑為其嫌於無陽故稱龍决不處其嫌猶未離其類也故稱血决要血决要離其類有西南之得不可無東北之喪夫𤣥黃者天地之雜物相雜故曰文此坤之所以為文天𤣥而地黃天地又原是分清理白此坤上終極於順之能事直在乾方在坤直正之義方之猶形影敬以直內直是原來本體敬是合本體工夫禮哀公問弗敬不正不習無不利通習坎之習坤二習不直坎不習無大終之日首出無首乾道得朋喪朋坤道乾不首出與庶物為伍矣乾有首全體非乾矣西南不得朋乾坤不列矣東北不喪朋坤不承乾矣得朋而曰乃與類行喪朋而曰乃終有慶何乾以竒立坤以耦行巽離兌皆坤朋也何以西南言得得兌與行所以承艮得離與行所以承坎得巽與行所以承震合之皆為坤承乾何以東北欲喪巽喪成歸於震而巽乃終離喪成歸於坎而離乃終兌喪成歸於艮而兌乃終合之皆為成歸于乾而坤乃終譬之順妻事夫以宫人逮媵娣和妯娌事非一端皆得朋而謂之與類行無攸遂在中饋一無其功惟夫之功而夫功是終一無其能惟夫之能而夫能是終皆喪朋而謂之乃終上當無成有終之終如朋猶未喪是以必戰必血易筌坤二曰不習不與其類相習也乾二言學坤二言習欲明論語學習之義者考此周氏𢎞禴曰用上九非十分之聖神不能用上六非幾聖之大賢不能以極隂對極陽處極隂猶難為力也管登之曰乾坤本無二元而兩儀既分則坤非受乾元之元為元而生六子故坤牝馬也亦牝龍也又曰吾人德性有小疵氣質有微濘便是血又曰本德性猛鍊氣質豈非戰乎化形色渾成天性豈非戰勝乎故曰用六永貞以大終大指乾元以大終謂以乾元之大終也又曰坤用六以卦變言可言小始大終以卦德言直是以大始以大終蓋無極之先上有一箇太極之虛𧰼而已一生二二生三而後可以始萬物故乾以三竒成卦其最初一畫即乾元也坤之六畫即開乾之三竒而耦之若分乾元之半以為元者元可分乎哉既列三才之𧰼即分矣坤元即乾元所以坤龍即乾龍不害兩元兩龍之稱也此中含有二義一指無物之先一指有物之後一在三才之表一在三極之中也是坤原以大始亦以大終而中間雜有隂邪許多變態非戰不能還元故曰大終亦權辭也何哉乾坤可分大小而乾元坤元何可以分小大用九冠以乾元用六不冠以坤元以此又曰坤對乾雖有淑慝而坤元之得統於乾元自始至終永無慝故曰夫乾天下之至健夫坤天下之至順健順之用顯則淑慝之用藏而顯藏亦互相為用也直方以直故方不直無方徐用中曰敬以直內渾是一團天理無私欲芥蒂其中而有倚著橫邪去處則內外自然昭融如影隨形視聽言動人倫事物因時制義即物裁成左右逢原觸處皆合故謂外方是即合外內之道效法之謂坤六二所謂直直之謂正正之謂敬雖重復解說總是形容坤二自然效法成順之象故曰不習無不利坤二含章可貞朱子曰學者須常收斂不可恁地放蕩只看外靣如此便見裏靣意思才高須著實用工收斂少間許多才都為我使都濟事若不細心用工收斂則其才愈高而其為害愈大也隂雖有美含之以從王事弗敢成錢肇陽曰人臣事君只有一個不敢之心先束縛於名分而後漸可與明代終之義敬者德之聚夫坤其靜也翕便是敬也朱子曰敬只是收斂來又曰只收斂身心整齊純一不恁地放縱便是敬又曰敬只是此心自做主宰處又曰持敬之說不必多言但熟味整齊嚴肅嚴威儼恪動容貌整思慮正衣冠尊瞻視此等數語而實加功焉則所謂直內所謂主一自然不費安排而身心肅然表裏如一矣又曰敬只是去了許多怠慢又曰敬莫把做一件事看只是收拾自家精神專一在此又曰敬有死敬有活敬若只守著主一之敬遇事不濟之以義辨其是非則不活若熟後敬便有義義便有敬又曰敬義只是一事如兩腳立定是敬才行是義合目是敬開眼見物便是義又曰敬者守於此而不易之謂義者施於彼而合宜之謂又曰敬要回頭看義要向前看按坤二之所謂直方便如此隂以凝為道不凝便不喚做順如草木之實箇箇結得堅凝聚那全陽生意在其中方始是活種㑹發生凝稍不堅無有不做敗種去隂始凝凝又要到堅苐如薄冰猶未凝也臣事君子事父妻事夫徹骨髓為忠為孝為節此不是容易俱有那冰心在乾初曰陽在下坤初曰隂始凝只下與凝兩字便是乾坤合德全體工夫朱子論凝道云這凝字最緊若不能凝則更沒些子屬自家須是凝方得隂凝之凝亦此凡父道君道夫道一下足以盡之子道臣道妻道一凝足以盡之只有天道完全是下所以成其高明地道完全是凝所以成其博厚若一息不下便都上浮去了如何成得個天一息不凝便都下墊去了如何成得個地陽惟下然後能發生隂惟凝然後能收斂發生收斂原只是一氣乾初潛不成乎名坤四括無咎無譽皆非人所易幾之事或止以沉晦目括囊殊失易㫖坤言囊與為腹同義章見全坤化光之美囊具全坤承載之量初非淺小包舉事業坤三曰含章重柔而處剛位之𧰼若但以柔居剛而謂之含初與五皆然矣四曰括囊重柔而處柔位之𧰼若但以柔居柔而謂之括二與上皆然矣日乾夕惕繫於乾三其實通乾六爻而皆有事無成有終繫於坤三其實通坤六爻而皆有事此人道成位乎中之義也括囊無咎無譽劉氏曰有咎非括囊也有譽亦非括囊也世之避咎而趨譽者衆矣不知譽且為咎譽成而咎滋多無咎之道其無譽乎又曰括囊之道順天地之閉而然時閉則閉無毫髮之私知光大順臣順妻人有乾知以為之主故光故大坤道之學用則含章有成非含無終非含含則括囊有咎非括有譽非括舍含括二端之外無以自立於世坤五黃裳曰文在中離二黃離曰得中道文明暗然在中總不絲毫外炫君子敬以直內義以方外龜山先生曰盡其誠心而無僞焉所謂直也若施之於事則厚薄隆殺一定而不可易為有方矣敬與義本無二所主者敬而義則自此出故有內外之辨其實義亦敬也又曰人之生也直是以君子無所往而不用直直則心得其正矣直言其正以此或不敢自决之辭從不敢造始之意無成不敢有所專成有終有偶之於先必畢之於後可貞貞臣之理莫敢於此矣坤道其順矣乎凡地道臣道妻道子道弟道稍不順無有不做成大惡去只看乾坤後屯蒙諸卦六二之難曰乘剛勿用取女曰行不順童蒙之吉曰順以巽利用禦冦曰上下順需于血曰順以聽食舊德曰從上吉比吉曰下順從即一向背之間猶不可有毫釐之差他可知矣舜禹之攝原不曾南靣原是相堯相舜是為坤五黃裳之事孤疑嫌三義皆於坤爻發之地道承天妻道承夫臣道承君孤不可疑不可嫌不可乾為馬乾卦不言而諸卦皆言之坤為牛坤卦不言而諸卦皆言之六子皆乾坤之分也震為龍震卦不言獨於乾卦言之乾之首出惟震震之首出即乾又獨於坤上言之震為𤣥黃龍戰而曰其血𤣥黃政明其為震龍耳疑惑為疑鈞敵亦為疑天地二體地承天原一而不二疑乃二二乃不一此坤上所以必戰龜山先生曰乾之六爻有臣位坤之六爻無君位坤六爻備極臣道初履霜堅冰節槩始事二直方三含章四括囊五黃裳隨時位以為顯晦上龍戰節槩終事戰乎乾龍戰於野戰無兩義只是戰乎乾冠之以帝以八卦之主宰言如儀𧰼之太極龍戰乃以六隂爻之主宰言坤之乾也于野何曰坤德方戰稱龍不可以方拘皆野矣其血何曰聖人明言猶未離其類故稱血西南得朋乃與類行類不當離也東北喪朋乃終有慶類當離矣至上而猶未離何云得主何云承天時行以嫌於無陽故稱龍所以别嫌以未離其類故稱血所以離喪朋類𤣥黃何曰聖人明言天地之雜天𤣥而地黃乾坤成列天地各正初未有雜其雜六爻相雜雜物撰德從𤣥黃始也此乾坤以後入屯之𧰼也屯曰剛柔始交而難生震為龍為𤣥黃坎為血卦屯上又曰泣血其脉絡可見如此微獨屯嗣此六十二卦卦卦相雜物相雜故曰文皆𤣥黃成文之𧰼也坤上曰龍戰忠臣孝子之極致若說戰龍便是亂臣賊子之大惡乾坤之上皆曰窮乾上不是陽盡坤上不是隂盡坤上龍戰更不是隂將盡而陽來戰乾坤成列兩儀並運不能一息相無乾不可變坤如夫不可為婦坤不可變乾如婦不可為夫乾坤之上之窮乃其極處究竟處之時位乾窮亢而悔坤窮戰而血乃其極處究竟處之成能若剝復之交則陽窮於上而生於下夫姤之交則隂窮於上而生於下剝而姤則為陽盡而隂來夬而復則為隂盡而陽來此兩物對待一氣流行隂陽之辨也八卦原屬一體乾離坤坎尤為同位乾離一故乾曰大明終始明以離象坤坎一故坤初曰氷坤上曰血明以坎象雲雷屯君子以經綸人處心若無雷雨天下之心即有經綸盡屬縱橫又何經綸之與有至誠經綸天下之大經無非雲雷之能事險在下震從上動動之易故解險在上震從下動動之難故屯以震一索而得男為剛柔始交巽一索而得女獨不為剛柔始交乎因而重之爻在其中凡爻皆以重卦論遍六十四卦曾無有單指小成卦體論爻義者萬物歸乎坎非震不出初震主坎四柔震初剛象交之始故曰剛柔始交坎五險中與初未合尚為坎險所難故曰難生萬物始生必冒險難而出如草木之生必有甲有核如胎卵之生必有包有殼甲核包殼皆險中也孚甲穿核破包蛻殼皆動乎險中也初利居貞四求婚媾此屯所以治伊川先生云某一日與韓持國范夷叟泛舟於潁昌西湖須臾客將去有一官員上書謁見大資頥將謂有甚急切公事乃是求知已頥云大資居位郤不求人乃使人倒來求已是甚道理夷叟云只為正叔大執求薦章常事也頥曰不然只為曾有不求者不與來求者與之遂致人如此持國便服按後世人才風俗盡不逮古無他只為上不下求而下倒求上習為故然耳平常底道理便是長久底道理女子貞不字十年乃字不字似過竒象故以乃字為反常民以鹿喻杜號山無定鹿君子幾不如舍知微知彰知柔知剛皆謂之幾望屯三以知幾待時之事初利居貞二貞不字陳無已名師道一字履常苦節厲志自其少時傅公欽之初為吏部侍郎聞師道游京師欲與相見先以問秦觀觀曰師道非持刺字俯理色伺候乎公卿之門者殆難致也公曰非所望也吾將見之懼其不吾見也子能介於陳君乎公知其貧甚因懷金餽之反覩其貌聽其議論竟不敢以出口後山集答秦少游書辱書諭以章公降屈年德以禮見招不佞何以得此豈侯嘗欺之耶公卿不下士久矣乃特見於今而親於其身幸孰大焉愚雖不足以齒士猶當從侯之後順下風以成公之名然先王之制士不傳贄為臣則不見於王公夫相見所以成禮而其弊必至於自鬻故先王謹其始而為之防而為士者世守焉師道於公前有貴賤之嫌後無平生之舊公雖可見禮可去乎且公之見招蓋以能守區區之禮也若冒昧法義聞命走門則失其所以見招公又何取焉雖然有一於此幸公之他日成功謝事幅巾東歸師道當御欵段乘下澤候公於上東門外尚未晚也屯其膏如雲方合之𧰼雲須解為雨不可貞雲貞則雨必吝須是大解大澍小貞恐止於為沾沾之數㸃而無以語於普天率土之濊澤故吉小而凶大蹇上應三而曰來碩吉三止險之主來三來以止五之險上有求於三非三有求於上屯四應初而曰求婚媾初動險之主四求初往往以動五之險其象與義亦甚分明說者多謂初求四四往初何居女子貞君子幾這兩樣時務非震體俱未易識得男不下女而女從之斷非貞女君不下士而士從之斷非貞士屯二屯如邅如邅􅔨也俗作趂自後及之也初動主初能先二能後言二之分量亦能自後及初君子幾不如舍舍亦三之功屯難未解誠以轟雷澍雨為功然雷雨不成日日作還須是止霽時節多五有解險為雨之象又有以險撰止之象以險撰止便是雷雨既霽寧平無事之日屯三舍五為止以輔佐太平為任豈非君子之幾人大怕强其所不能轟雷澍雨是初之分量是初之能事二三則體剛而爻柔戡亂禦侮非其所長而寧平佐理亦其所優為耳屯勿往貞其為動蒙勿瀆貞其為止屯之中為成羣驚走之民曰鹿屯之上為窮棲叢棘之民曰禽聖人目比上為前禽屯上同禽微之矣屯初盤桓按山石之安為磐龍伏而未升為蟠通作盤桓威也辟土服逺曰桓當天造草昧之初辟五服逺威震域中惟屯初之能事以方伏而未動故象盤桓恐其不求而往故繫之利居貞恐上不知求有求又未必往如女子貞之不字故繫之利建侯貞曰居徹裏由衷存主安固之辭驚逺懼邇霹靂震動事業從𥪡砥橫砫山嶽鎮定心術流出斯謂之利居貞斯謂之志行正即鹿無虞周禮山虞掌山林之政令物為之厲而為之守禁無虞無典守之野鹿如無統御之亂民泣血漣如漣風動水相連成文漣即連也與蹇四來連之義同亦有連合於初而相須濟屯之意初建侯上泣血前人詩勸君莫話封侯事一將成功萬骨枯屯爻三言乘馬孫聞斯曰物之健行不息者無如馬動而險亦無如馬馬言乘即剛柔合併而乘載之精神無刻可停女子之貞婚媾之求泣血之漣其精神全於此貫屬者四婚媾上泣血亨屯拯險恐無二心迅雷轟霆淵底震動解之澍瀰天之雨四所媾也觸之流成川之血上所泣也雷霆所至無不為雨亦當防血若但為血民且何辜象言何可長若不免於血雖出震何能長得人可與長久此屯上為生民立命一腔血心也剛柔始交而難生謂難生可謂以難而生可孟子言生於憂患死於安樂最深此意天所以厚人之生全在一難字若曰富貴福澤將以厚吾之生猶似失聖人之意者屯五屯膏之心即坎五不盈之心聖人雲行雨施之心遍天下及後世曾不自以為足而况其動險之初乎以動駕險危其險未易亨故十年不字以險乘動危其動或失正故泣血漣如乾坤以剛柔分故曰乾剛坤柔餘六十二卦俱以剛柔為貞勝為分合屯蒙原始屯曰剛柔始交而難生蒙曰剛柔接既未要終既濟曰剛柔正而位當未濟曰雖不當位剛柔應俱可考見乾剛坤柔一而二二而一息息相推相蕩交流竝運方成列方不毁屯於二四上俱言乘馬便其義馬無乘牡先而牝不後牝承而牡無倡匪孤陽即孤隂匪偏陽即偏隂譬之草木孚甲且無日夭喬復何有震坎相望之卦動免乎險曰解動乎險中曰屯屯二四上之斑視坦途皆荆棘而况非坦途視軌道皆險阻而况其險阻常凛朽索之懼常懷泛駕之虞長慮却顧震動竦懼時刻是箇盤桓居貞之心此所以為險中之動屯初以動主遇險利居貞貞其動思以拯險也屯五以險主遇動五而貞貞其險不思善動矣膏澤何時得下於民小貞吉大貞凶得其小必失其大如堯舜而無揖遜雷雨何以滿盈乎唐虞如湯武而無征誅雷雨何以滿盈乎商周凡為拘常襲故之動而不為警世之震為一方一隅之雨而不為稽天之浸俱吉小凶大之貞未光之施而屯五之所不取三已不為女子之貞五更無取小貞之吉三五同功之義即於此可見時雨無霈而桔橰抗抗日月無出而爝火熒熒屯五大亨貞之主也决不其然故曰小貞吉大貞凶或曰小貞雷不驚人雨不破塊故吉大貞初為疾雷五乃暴雨止為不崇朝之事而惡乎有滿盈之量且屯物之始生亦不勝疾雷暴雨故凶泣血漣如劈頭難到底不易人心惟危首發於虞廷自古真正英雄俱從戰兢中來也屯上之泣便其真血脉孫聞斯曰泣血漣如繫之屯上所以承乾坤之情意而通六十四卦之脉絡者全在乎此故戒慎恐懼是中庸徹底學問又孟子所謂生於憂患而死於安樂也凡人生一難心即險途無非亨途生一易心則亨途無非險途剛柔始交而難生劈頭難到底且不敢易矣故屯上之能事以泣血要終象曰何可長便是思其可長之善動屯婚媾蒙納婦屯反為解曰朋至蒙反為蹇曰朋來就一身求之乾坤合德而剛柔有體皆婚媾之事而得朋之道謂與人婚媾而得人為朋亦天下原一家中國原一人耳屯初四二五之為乘為婚媾也皆剛柔原始動險之交也三震終爻上坎終爻上乘馬三即鹿上泣血三無虞此兩爻未交是以止謂之始交然合四柔爻而皆備震坎之剛德是以於三特明曰君子幾言幾見三雖即鹿應終不處乘馬下三雖無虞應終不處泣血下乘馬班如雲雷合而齊驅竝駕回翔遍歷周旋審視二四上俱同心一德之人故其象竝同惟二對五則貞不字不如是不由其道不足與有為也四對初則求見宜舉舉宜先上臣事君惟以人也上對三則泣血雲勢之一開一闔雷聲之一疾一緩皆赤衷所注皆血心所流夫是以雷雨有不動動必滿盈而屯所以大亨貞皆此屯行正正在五中行以震動蒙養正正在二中養以艮止程子曰極須為天下之中天地之中理必相直坎之中不止為地中乃是天中故君天下之德澤師天下之道脉皆以坎中為正劉彥冲蒙齊記三代而下易學廢矣六國之士為談說所蒙兩漢之士為章句所蒙晉魏之士為虛無所蒙隋唐之士為辭藻所蒙皆處偏滯而不反如波滚沙反以自渾如谷騰霧反以自瞑初不知其豁然者常存也山下出泉蒙章本清曰山者泉之源也蒙亨彖曰以亨行時中言二先知先覺亨先在已因以其亨時行剛中以亨一卦之蒙蒙所以亨亨以二之得時得中以其亨使人亨以其昭昭使人昭昭渟水曰汙今作汚濁也蒙之再三瀆不論大小總是不流之水不流必汚必濁其何以告人其人何可告山下出泉凡水皆下流惟山泉是向上湧出二震動湧出五與正應故曰順以巽三乘二遏止其出故曰行不順上應三導之使行疏之使通故曰利禦寇故曰上下順不然以止而益三之乘便為冦蒙三勿用取女萬以忠曰心源不淨一切皆浮即如讀書㑹友近世儒者多靠此豈非好事但自無確實見處終屬流浪所謂見金夫不有躬無攸利者也玩屯卦要看個窮字三上不相為動終無雨也玩蒙卦要看個實字四初不相為止終成瀆也利用刑人以正法楊敬仲曰用正法以刑之也以其昏昏使人昭昭世以邪法刑人益人之桎梏者多矣又曰地中有水師君子以容民畜衆水行地中有以容之則聚無以容之無由而聚也又曰觀我生進退未失道也未失道以退而生文㫖不因乎進蓋觀三猶未可進以五所貴尚不在三也又曰漸曰進得位往有功人臣之位皆君之所命人臣之功亦君之所用使君不用之其何能為故臣之功皆君之功也臣無功臣之位皆君之位也臣無位聖人慮斯義之未白繼曰其位剛得中明乎非人臣之位也又曰豐其屋自高大也蔀其家自藏蔽其家使人不得至也窺其户閴其無人雖三歲之久亦不得見明其自藏之深固也為人上不能謙虛禮賢自大自足至於此禍可勝言哉屯二柔不字之女子蒙二剛克家之男子此剛柔男女之别後世舉業之師與凡有名位而好為人師皆金夫也凡務舉業而從師與依附名位而從之以為師皆見金夫之女也爻義論近論應隔一位幾以千里觀蒙四獨逺實可見見金夫不有躬全身倒入功利上去了如何站立得住然僅曰無攸利但論其見如是遂無攸利耳若是歸了金夫又何足齒而論利不利擊蒙不利為冦就擊人者說利禦冦就受擊者說人無刑擊益友鮮有不墮坑落塹而淪于險陷之歸者蒙三頑冥不靈而必不可發然後寇視之然曰利禦冦猶然包之心也包不足而擊有餘是先冦而先以冦令耳故直謂之為冦蒙四困不特自困直欲困初大抵四與三皆彖之所謂瀆蒙爾雅水注澮曰瀆與泉蒙反五童泉蒙也爾雅泉源水濫泉正出沃泉縣出汍泉側出蒙亨二以亨行合一卦而為通流之泉五二正應五泉正出三四側出初垂出人人之初皆泉而人人之筮不初再三瀆筮不克初人之故耳周子山下出泉靜而清也汨則亂亂不决也靜山體清泉體蒙初曰利用刑人二有包有納有克專以儀刑感化為事此所以為剛柔接此所以為時中上以擊為事即利禦冦而不為冦與二去以千里小子始達之愛敬蒙之山泉也瀆不得逆行不得三言順欲利導而放之四海成人既充之仁義屯之雷雨也宜滿盈宜光大其施三言班欲分布而沛之彌天易筌初六之蒙自二發之內障也見少有著即性之牿必說之而天乃不鑿六三之蒙自上擊之外障也見有可欲即躬之賊必禦之而人乃不侵需于酒食貞吉這彌天之雲都是酒而盡天下之人可以飲而醉都是食而盡天下之人可以食而飽四出方為行雲上入將為收雲收所宜收猶不自為主而惟客是敬是為要終不陷不困窮之義需上不速之客三人世人未易有其一須險精神到透頂徹底方可與幾耳天降時雨山川出雲屯雲似山出需雲似川出自山出陽舒而多雨自川出隂斂而少雨小畜與小過之五皆曰密雲不雨自我西郊雲出西行東大抵多無雨諺雲行東日色紅雲上于天水與天並運也天與水違行雲下于天矣故需之酒食即雲行雨施之膏澤而訟之歸逋亦雲開見日之光華需有孚天宇自如而外坎為上天之雲則外險化盡訟有孚天行自如而內坎為下流之水則內險瀉盡君子以飲食晏樂范文正公曰只如安樂人忽有憂事便喫食不下矧有病更憂生死更憂身後是在大怖中飲食安得可下也隂凝上結則合以成雲陽散下流則注而為雨雲上于天雲須天而後興天須雲而後雨君子以飲食宴樂水禽有信天公需四出自穴歐陽公與梅聖俞老夫當避路放他出一頭地需須乾坎相須以成德下三爻惟微防有惟危上三爻惟危透出惟微在禮速客之辭曰主人須矣需須之義最分明五曰需于酒食五為需主之義最分明需有三解而義亦一需須也乾坎相須以成德也物稚不可不養故受之以需需者飲食之道人須險以成德之健如須飲食以養物之稚也需不進即言其不陷也于郊用恆郊亦交也于險有交但是遠耳遠非常理不恆將凡事避難何所不至于沙便在沙中于泥便在泥中沙猶砥礪之資泥乃汚淖之物故小言終吉而致冦可虞三泥疾垢初非陷穽四血憂患盡屬生機自穴坎險何能穴人乃人自為穴便𧰼做却一箇安身窠座四無需血力量亦無望其能出上在需極能如四之自出可知入于穴以能出自不為穴故不妨于入能于險極中透出剛健來做得主人故乾三陽亦稱客不速而來必敬之方未大失親仁就道尊賢敬士如伐木之速諸父速諸舅見弟無遠方是客固不可一日而忘速也五酒食貞吉一切險陷都是所須所養酒食穴之出入又不足言矣龜山先生詩人生無艱危君子竟何别天地一穽中逼仄身亦孤人生觸處有萬險豈必此地多風濤皆險在前之說君子雖自嚴至潔宜若污昭昭揭日月所向將蝟如則于泥之說願言夷險不須問莫負對酒持霜螯則酒食貞吉之說易像鈔卷六
