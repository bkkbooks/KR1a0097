body:
  text: 易像鈔卷五明胡居仁撰九卦履德之基和而至以和行德之柄尊而光以制禮復德之本小而辨于物以自知恆德之固雜而不厭以一德損德之修先難而後易以遠害益德之裕長裕而不設以興利困德之辨窮而通以寡怨井德之地居其所而遷以辨義巽德之制稱而隱以行權九卦之序復是本心先之以履謙履之為卦上天下澤人生斯世須先辨得俯仰乎天地而有此身以達其素履履有得有失又繫於謙與不謙之分謙則精神渾收聚於內不謙則精神渾流散於外惟能辨得吾一身所以在天地間舉措動作之由而斂藏其精神使之在內而不在外則此心斯可得而復矣次之以恆又次之以損益又次之以困蓋本心既復謹始克終曾不少廢以得其恆而至於堅固私欲日以消磨而為損天理日以澄瑩而為益雖涉危蹈險所遭多困而此心卓然不動然後於道有得左右逢其原如鑿井取泉處處皆足蓋至於此則順理而行無纎毫透漏如巽風之散無往不入雖密房奧室自一縫一罅即能入之矣象山陸子九卦在上經者三在下經者六反對者四不反對者五為乾者一尊乾也為坤坎艮者二為兑震者三為巽者五巽入也重巽貴其深入之也其有坎坎者陷也其無離不用離也蒙大難者晦其明故終於隱隱至明之極也憂患人之所時有即上聖大賢未有能自解免者乃其所以處憂患惟德非以憂患故修德而防危也豫之至也潛谷鄧氏復德之本與基相似基所行本所存井德之地與固相似固所得而守之地歸宿處九卦首履劈頭便是發文王天王聖明上天下澤之分凛然不易惟履其素至義章本清曰九卦首履繼謙履象一隂明上下之分説而應乾履虎尾而不嘻用六永貞以大終於履三一爻見之謙象一陽得遜順之宜內止外柔為君子之有終用九天德不可為首於謙三一爻見之履德之基朱子曰如起屋須有基址許多梁柱方有頓處瞿九思曰文王由履至謙純然以一敬緝熙無間以至於巽此所以為亹亹之文王由履和而至謙尊而光以馴至於巽稱而隱渾然不露而人莫有知此所以為穆穆之文王履謙乾坤人位之交人道之立一齊來底坤之三交於乾之三為履乾之三交坤之三為謙俱一隂一陽為主履首明上下尊卑之分謙盡忘功勞矜伐之心至於謙之三下而為初以止翻動時時處處無用不謙又時時處處無有不自知之時又無非夜半雷聲戒謹恐懼之流行是之謂復次恆損益困井五卦俱三隂三陽之分無用不平終以巽無之非柔巽謙抑之為完結謙字一案以明天澤之分此作易聖人所以處憂患之道憂患人所時有也聖人處憂患且如此餘可知矣邵子曰三才真數三而已參天者三三而九兩地者倍三而六珓之二十七三三而九也約之十八倍三而六也珓易之交以交故名珓也陽與陽交為太陽為乾兌之卦十六為珓九隂與隂交為太隂為艮坤之卦十六為珓九陽與隂交隂與陽交為少隂少陽為離震巽坎之卦三十二為珓九二十七通乎六十四六十四而三之即二十七易有真數三一隂一陽之列與一隂一陽之交天地人之至妙至妙也太陽九少隂少陽七八太隂六占法七八不變隂陽交於中也九六必變陽主進九進之極隂主退六退之極隂陽太於上下故遇九必退而用八以交隂初非變九而為八變陽而為隂遇六必進而用七以交陽初非變六而為七變隂而為陽易窮則變變則通九六之變蓋以通隂陽之交之窮而常會合於隂陽之交之中也珓去聲效韻居效切音與酵同杯珓古者以玉為之雲行雨施電發雷震隂陽二少無曰不合交於二太中此二太所以分為二而二少所以合為一俗占用少不用老此乃所謂日用不知之百姓已耳張行成曰天地自然之理無出乎四象者孔子混四者闕太極也故億萬世不可易朱子闕以四起數自易以後無人做得一物如此整齊包括得盡又曰想他看見天下事才上手來便成四截了羲皇初畫分兩兩交成四四者兩之分兩者四之合天地萬物之理兩對待四流行便無所不盡羲畫原來如此初不是康節撰得出生數則一二三四分隂陽太少以成數則六七八九分隂陽太少一二三四生數屬陽順數九八七六成數屬隂逆數謂九餘一八餘二七餘三六餘四謂一函九二函八三函七四函六俱無不可四象不言五皆自五來四象不言十未嘗無十至於二三居一四之中二三合為五一四亦合為五七八居九六之中七八合為十五九六亦合為十五五洛書之中數十五河圖之中數中無往而不在十五無往而不在固如此一二三四四象之位順布六七八九四象之數逆布九用八為退數一用二即進位九一成十二八成十未嘗不是此位此數六用七為進數四用三即退位六四成十三七成十未嘗不是此位此數進何進退何退總以義命為權衡方謂之進退不失其正而深於消息存亡之理太陽變化十六象以乾兌為主少隂變化十六象以離震為主少陽變化十六象以巽坎為主太隂變化十六象以艮坤為主邵子曰十六而天地之道畢陽珓九即四象之太陽通乾兌之卦十六隂珓九即四象之太隂通艮坤之卦十六二太隂陽之純分參天兩地而得之之象隂陽貞勝之珓九即四象少隂少陽之合通離震巽坎之卦三十二二少隂陽之雜合參天兩地而得之之象朱子曰四象之數乃天地之間自然之理其在河圖洛書各有定位珓法者四象之數自四而八而十六而三十二而六十四俱括乎其中邵子本一氣也生則為陽消則為隂二者一而已矣四者二而已矣六者三而已矣八者四而已矣此珓法也二十七反履之止成十八十有八變而成卦即此前河洛先後合圖以先天八卦竪列自乾至坤為順數為消體以後天八卦竪列自坎至離為逆數為息體天地盈虛與時消息君子尚消息盈虛天行也此出孫聞斯説後見瞿氏九思重定先天一方圖其言曰舊圖以乾起西北坤終東南惟正月之寅位當泰七月之申位當否其餘俱與月卦不合今以乾始東南坤終西北然後十一月之復果在子十二月之臨果在丑正月之泰果在寅二月之大壯果在卯三月之夬果在辰四月之乾果在巳五月之姤果在午六月之遁果在未七月之否果在申八月之觀果在酉九月之剝果在戌十月之坤果在亥始與方位毫髮不爽此與竪列先天八卦自上至下不期符合因為更布後天重卦一方圖則先坤後坎同位西北先乾後離同位東南凡離內外十六體列東與南為春為夏凡坎內外十六體列西與北為秋為冬乾坤退處坎離中天地以交而用事陰陽調寒暑時亦與竪列後天八卦自下至上不期符合舊止有先天方圓二圖别無後天今先後方圓俱備重復更定總無撰造而天地人物之理愈玩而愈無窮云繫傳曰神而明之存乎其人又曰茍非其人道不虛行後天卦圖家人同人並列正南其人乎非其人乎學者首宜醒目先天圖震巽恆益為中心震巽皆木木屬仁孟子曰仁人心也於先天一圖見之後天圖乾巽小畜姤為中心乾為天巽為木孟子曰盡其心者知其性知其性則知天於後天一圖見之先天全體體即用後天大用用即體先天後天原無二圖道心人心亦無二心道心曰微雷風方寂而涵於靜無人心曰危乾巽相遇而形於動有世有不知仁為人心或知心而不知性復不知天者宜於此詳考焉易以卦象發揮人道乾之彖曰元亨利貞明人道之乾也今輒以元亨利貞歸諸天劈頭誤起元亨利貞四字缺一便不成其為乾道四字全大假已是一部易了元亨利貞是四象始而亨利于貞便是二象合之為乾道又只是一象聖人從資始處就説統天始之統之皆人也如父母受人育養恩生來子孫方受氣成形已是其人育養之所及矣單謂為父母所生可乎又如五穀豈不是天施地生然收藏之者人播種之者人人蓋要天地施生之終而又原天地施生之始矣統得來故御得來統御得來故終始得來終始得來故統御得來此所以為三才之道雲行雨施品物流行三才合一統天之雲雨雲行雨施天下平此却單是聖人御天之雲雨大明終始從資始處巳有人道故不至此才露出人來大明終始有乾元為之始匪大明莫為之終其始人有精深大明者有粗淺小明者到大明便是與天地合德之大人大明大人小明小人不明日用不知庶民去之名人與禽獸無異者耳乾元從頭説起乾道則原始要終以為質者資始流形何嘗不是乾道變化只到得聖人乘龍御天後變化方全故性命由是各正太和由是保合元亨合言三才之分量故曰統利貞專言人道之能事故曰御利貞者性情也原始要終有聖人以為之正合性情而無不得其正故從初無失謂之乾始乾始能以美利利天下即聖人即乾始故曰大也潛龍一爻聖人反覆推明至五變其説龜山先生謂他卦爻皆當如是推明若不能爾則一爻之義只可用之一事也非天下之至健者不能潛潛龍不易乎世於世道何賴然是兜根真種子與徒隱之士霄壤不同正世道之所深賴也六位各為一位六龍原是一龍或曰不易世不成名遁世不見是而無悶古今無一述者方是潛龍此以潛言潛也既曰潛時所乘乘秋冬而潛為時乘春夏而潛夫豈得為時乃以一通六則有潛之潛有見之潛有惕之潛有躍之潛有飛之潛有亢之潛有潛而潛有潛而見有潛而惕有潛而躍有潛而飛有潛而亢或謂以潛為道者和光混俗而不以可法可則之迹示諸人又謂非混迹於凡流則寄情於物外名教之所不能束如此則豈所謂龍德而隱者乎無有不賺入異流去乾即之象只一奇已象乾然必三畫而後三才之道備必六畫而後兼兩之道全非於一畫有加大明乾之體終始乾之運即天即人更不分别終日乾乾行事也全在行事上徵驗元城劉公歲晚間居或問先生何以遣日公正色曰君子進德修業惟日不足而可遣乎君子以成德為行如天行決定不缺一時缺一時不成其為天缺一德不成其為德不成其為行不成其為君子乾卦中爻天田人淵俱著箇在字最重君子依乎中庸全在人字得力遁世不見知而不悔唯聖者能之聖人勉人而思潛也不君不師不相而以人稱龍此便是宇宙間第一等事業槩言人人可與能也特言人三才之道也乾九三知至又知終乾上九知進不知退上三時位不同至當不易之理自然如此必欲上之知進又知退且謂至上唯宜靜不宜動此豈所以語上之為龍乎或躍在淵乾道乃革以為有窮通易轍之象近之以伊尹出入於湯桀之間武王逡巡於孟津之會為應此象乾六爻孰為桀孰為紂又謂天與不取亦是進修失時更似躍出淵外去重剛而不中解曰孔子上無天子下無方伯而所如多竊國之姦重剛而不中也文王上有商辛下有昆夷而所起僅百里之地亦重剛而不中也三重二四重五故謂之重剛不中二五其竊國之姦否抑五其商辛二其昆夷否上出五飛之上故象亢解曰比干以宗臣剖心張仲以國老飲鴆傷哉乎窮之災也五聖作物睹之大人固有如此無道之象否飛龍外又添出一神龍以推尊異教此漢唐以來所無蓋由不知潛見惕躍飛亢盡六龍皆神無一龍不神耳龍言乘九言用皆有意味故羣龍而見有首亦是偏陽強陽惟用九而見無首乃吉又曰乾元用九深體味之真所謂太和元氣流行也見龍正中飛龍中正俱已造位大人又俱曰利見大人闕是中未大與天德不為首之義見龍在田玩學聚問辨寬居仁行之釋田字大有工夫蓋治土為田之田不止以凡地皆為田也在天亦然能合德合明合序合吉凶方是在天分量君子有龍德合天下而佃治之為在田合天下而覆幬之為在天合天下之人為人而使人盡其為人為在人以其深心極天下之深使人人研幾以極深為在淵乾坤用九用六之繫若如六爻皆變剛而能柔説陽變隂是九變則八宜云用八隂變陽是六變則七宜云用七若云九變則六六變則九占法又從無此例以六爻皆變為羣龍無首之象又遺却見字萬以忠曰文王演易首提乾元呌醒人道人道立天地方有主提得人道明學問方有頭腦夫子贊乾元曰體仁足以長人又曰仁者人也而以時乘保合首出咸寧歸之人道將人道盡情呌破更無三才之别又曰人雖與物同生天一付精神命脈全體在人許多裁成輔相參贊彌綸事業惟人道為能是人即天地之心故三才全是人道大明終始始即元終即貞終始即貞元不終即無始不始即無以為元故不曰始終而曰終始文序一正一反即天地貞元之理而每卦具有終始之義以大明以下為聖人體乾事一膜之隔幾以千里言大明首出不言聖人或曰大明首出非聖人而何近之而終未得不露出人微意蓋聖人贊乾合三才言乾道不單以天言乾道見乾道無非人道也用九見羣龍無首吉是乾總頭學問用六利永貞是坤總頭學問亦頗不難明只九用而非用九便見羣龍俱有首矣六用而非用六便永貞有不利矣用六六上有一層乾也用九九上有一層所謂易有太極也用六之人坤道即乾道用九之人立太極之腳開太極之眼天下一人人人龍也盡一百九十二陽爻皆能潛能見能惕能躍能飛能亢之羣龍安見乾爻之六龍獨可為首也見有一龍可為首堯舜不與人同人不皆可以為堯舜矣存有首之見棄一人於度外非天度非龍德矣君子有終身之憂終身不忍以禽獸待一人即此無首之見也故曰慮以下人故曰欲並生哉蓋無首之見乃全體太極用事之見品物流形龜山先生曰天地之間一氣而萬形大哉乾元萬物資始言萬物先己提出人道今雜人生闕類又謂乃統天天亦在乾元資始中皆説易相沿不通之論品物流形之後若無箇御天之人道以性命言則不得各正以太和言則不得保合性命不正情何由正利貞者性情也性命正而情無一之不正合性情而歸於正也六爻發揮旁通情也合六爻以效天下之動天地萬物並無不正之情也朱子謂龍水物也其出而與陽氣薰蒸故能成雨但尋常自是隂陽氣蒸鬱而成非必龍為之由是言之雲行雨施品物流形自是隂陽氣蒸鬱而成非必龍為之雲行雨施天下平則奚啻龍為之亦乘龍者之為之矣聖人贊易資始統天御天等事屬之大哉乾元資生承天應地等事屬之至哉坤元所謂乾元坤元果乾坤儱統之虛稱乎抑三極造位之實稱乎學者要思得之六十四卦大象皆曰以以用也如自強不息君子之健君子之天行也若云健行在天而君子以之於己何時湊泊張闕一日奏事上問天對曰不可以蒼蒼者便為天須求諸視聼言動之間一念才是便是上帝鑒觀上帝臨汝簡在帝心一念才不是便是上帝震怒今按一念才是便為健為強而不息一念才不是便為不健不強而息更無别理元者善之長等非解法乃言善之長為人之元嘉之會為人之亨義之和為人之利事之幹為人之貞元以始萬物亨以通萬物利以遂萬物貞以正萬物目前常有此四象心天乃見乾道在我亨者嘉之會兩美相接之謂嘉聚而為一之謂會亨已美至利上又言美利利天下不言所利利更美雖是種之美必開得花又必結得果方成其為美種耳利貞者性情也人不到性其情總為不果之花利者義之和利萬物也利天下也天道以利成物聖人以美利利天下總不以私其身後世但知一身一家之利是乃所謂害而非所謂利是乃利之惡而何可謂利之美是乃義之害而何可謂義之和貞者事之幹木旁生者為枝正出者為幹通作幹潛谷鄧氏曰木冬惟幹華葉盡剝一實而已智之藏用也亦然又曰君子體仁非故體之仁實其體方達卿曰能不自利而以利天下無論急人而周之宰制有方圖畫有等遠近上下內外親疏各得其所此以義利之也故曰利物足以和義易筌君子之乾無所見以四德而見其為乾朱子曰忠信是根有此根便能發生枝葉又曰人多是將言語做沒緊要容易説出來若一一要實這工夫自是大朱子曰乾卦分明是先見得這箇透徹便一直做將去如忠信所以進德至可與存義也都是徑前做去有勇猛嚴厲斬截剛果之意須是見得方能恁地又如樂則行之憂則違之確乎其不可拔亦是這般剛決意思所以生知者分明是合下便見得透故其健自然如此更著力不得坤卦則未到這地位敬以直內義以方外未免緊帖把捉有持守底意不似乾卦見得來透徹朱子曰忠信只是實若無實如何會進如播種相似須是實有種子下在泥中方會日日發生若把箇空殼下在裏靣如何會發生朱子曰破釡甑燒廬舍持三日糧示士卒必死無還心如此方會厮殺忠信便是有這心如此方會進德列貴賤者存乎位朱子曰因他這貴賤之位隨緊慢説有那難處有那易處乾九三處一卦之盡所以説得如此九二位正中便不恁地聖人全體天德不以上在天為至下要有箇田中要有箇人又要有箇淵無田萬物無生處無人幾與鳥獸同羣無淵將至淺陋而於物無以容故必在田在人在淵而後在天為全體天德之學萬以忠曰九三乾學也業者日用功行之據身心棲泊之所故曰居九三君子乾乾惕若思進德以大其用必有所居之業亦惟在修辭立其誠辭庸言也立誠言有物也惟子臣弟友家庭事使應酬唯諾之常修省言辭體當自已誠意令有物而已蓋誠本人理人理所見惟是言行言常易放故立誠須在修辭且如接對尋常偶爾發辭不覺失謬如昔人云泥濘五寸須説一尺意氣動浮出其本位便已非誠而况其他故必片言半辭皆令當體從見在自心流出乃為真修真立何者修非為辭為立誠耳誠非在外即見在本分心通天地徹幽明貫古今隨處平滿總只是當前一念毫髮增損便為欠缺更復何論故思不出位言行皆庸乃所謂誠亦曰忠信知至至此知終終此自此默會誠源無論語默前後渾然一致則大人之造也君子所以危而惕也大戴禮女及日乎閨門之內及日猶言終日九三君子終日乾乾及日也夕惕若及夜也四與三同其乾惕進修無日夕之間曰及時日夕之互文也修辭立誠人於辭説間心即是口口即是心並無一言不真不實别無依違遷就以為諧俗自便之計其乾乾而自強為何如大抵人不忠信先已害了心怯症言辭不實又重犯却口虛病君子先無此二病然後於健字有少分可望魏莊渠先生曰忠信所以進德若無真實心早自與理背了修辭立其誠所以居業人有實心必須做實事句句都是實話若容易出言不檢點便散了這實心吕叔簡曰君子進德修業業刻木如鋸齒古無文字用以紀日行之事數也一事畢則去一刻事俱畢則盡去之謂之修業古人未有一日不修業者故古人身修事理而無怠惰荒寧之時常有憂勤惕厲之意一日無事則一日不安懼業之不修而曠日之不可也今人昏昏蕩蕩四肢不可收拾窮年終日無一猷為放逸而入於禽獸者無業故也人生兩間無一事可見無一善可稱資衣藉食於人而偷安惰行以死可羞也已與時偕行天必行天之生物皆於行見之天時之行無已天行之時無已君子之行事與天俱無已亢龍在六龍之世而做到底者也然已謂之有悔謂之不可久若非此時定不到亢故緊足其義曰知進退存亡而不失其正後世臣子居乾上而不龍或卒於為蛇虺只是有位有民有輔亢龍無位無民無輔雖欲退亡喪五龍不容其退亡喪然既無是三者雖不退亡喪其實是退亡喪此所以終不失正而為聖人居高貴而無位差易辨才見有恩澤自已出即有民矣才欲網羅賢人君子出其門下而為之用即有輔矣有是二者即有位矣後世龍德卒亡於公孤保傅之位只是未易到得那三無或躍在淵淵隨躍有可上可下可進可退到處有淵至於上惟有上更下不得惟有進更退不得亦到處是亢徒以悔為災而疑聖人之無亢不知龍惡知易乾初藏凡以主隂坤初凝凡以承陽即此亦可體認乾坤之元之意乾必有初潛而後有二見坤必有初凝而後有二動乾必專一而後直遂坤必翕聚而後發散周子所謂主靜立人極主此立此剛健中正純粹精此統論乾德若云爻爻皆然聖人何以於三四皆曰重剛而不中於上又曰知進退存亡而不失其正何待又言六爻發揮旁通情又如乾六爻皆君德皆天位此亦是槩論不成六箇君可做一處就乾六爻明之君位獨在五餘五爻皆從龍從虎聲應氣求之水火風雲臣民事物耳乾元者始而亨者也程子曰始初發生大槩一例亨通也利貞者性情也程子曰分在性與情只性為本情為性之動處情又幾時惡故者以利為本只是順利處為性若情則須是正也君子以成德為行萬以忠曰古人有以篤實剛方亷潔恬退寬厚名者皆可謂成行不可謂成德德則在自已心性上理會銷鎔氣質之偏以復還性情之正形神渾然融歸中和乃為成德未有德成而行不備者也虞書九德洪範三德皆就氣質偏處涵養克治使歸中和唐虞三代之盛上以此教下以此學並無他説然其説德又只在事上見曰載采采世間虛浮一種精神毫無著處利貞者性情也君子涵養性情以成其德到利貞德才成性情才理到至處乾先天而天不違學問坤後天而奉天時學問震坎艮皆屬乾斯須不健不得巽離兌皆屬坤斯須不順不得乾知大始故能先天而天弗違太極圖主靜立極西銘繼志述事存順沒寧皆後天時奉之能事耳大人先天而天弗違誠未易言大人後天而奉天時亦非君子所可幾及但能後天未能先天惟能先天乃能後天乾上兩言其唯聖人坤四曰天地閉賢人隱此乾道坤道之别亦聖賢分量之别乾上亢龍有悔亢龍非聖人不能非聖人不能為亢龍而猥以有悔為疵疑聖人之無亢誤甚易中有兩高有乾上無民之高有蠱上不事之高蠱上君子可能乾上非聖人不與乾三惕二前固未易安乾上悔五上更不易處羣龍無首爾雅龍有三停九似謂自首至膊膊至腰腰至尾皆相停九似角似鹿頭似駝眼似鬼項似蛇腹似蜃鱗似魚瓜似鷹掌似虎耳似牛頭上有物名尺木龍無尺木不能升天其噓氣成雲因雲以蔽其身故不可見今江湖間時有見其一瓜一尾唯頭不可得見用九見羣龍無首是實象又龍之亢有逆鱗一尺不可犯亢龍升而不能下為逆故有悔亦是實象易像鈔卷五
