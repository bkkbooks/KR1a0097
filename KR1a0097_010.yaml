body:
  text: 易像鈔卷十明胡居仁撰聖人以窮神知化繫於咸止而說咸也自震動而要於艮止為能全體乾道自巽入而要於兌說為能全體坤道故以止說之咸體明聖人盛德之極致與大明終始之分量為合一問感人不動何如錢洪甫曰才說感人便不是了聖學只是正已而物正文王名卦曰咸取其無心也若著一毫感人意思便是有心便是憧憧往來咸感也非以感釋咸惟無心於感然後物來無所不應無所不遍乃所以為感也舒氏曰感謂虗而通邵氏曰雷風氣也故曰相與山澤形也而其間相通者亦氣故曰二氣感應以相與君子以虗受人書無逸篇厥或告之曰小人怨汝詈汝則皇自敬德厥愆曰朕之愆古人聞小人怨詈之言不止不怒而且自修恭德矧其為君子忠讜直諒之言乎故上滕口說聖人不繫以凶咎為君子虗無不受口說亦在所不棄也徐氏曰人心惟至虗故至靈若著一物便窒而不能應又曰聖人之心未嘗有物以為之蔽故其體常虗今按山澤象虗艮少男兌少女艮內體兌外體所謂孩提赤子之心虗體尤可見也咸反損曰君子以懲忿窒欲亦以從幼虗體未失故能懲能窒山以虗能受澤心以虗能受人山所謂虗以篤實艮止實所以為虗也朱子曰今人大抵逼塞滿胸有許多伎倆如何便得他虗此則實非其實故虗非其虗耳獨遠實當位實合坎艮言實鼎有實中以為實合離巽言實剛健篤實合乾艮言實自求口實合震艮言實虗受人合澤山言虗亦其實而能虗者耳咸止主感說主應外有說而內無止便喚做感害凡一切善言滲得八方為咸之虗受王子植曰人必有所不受而後能受咸下體艮艮體篤實光明其於種種世味自然一切不受不受乃虗咸之以虗受人者此虗是立人道之首事不虗咸道於是為絶無以受一人感一人而况天下山居地下為謙山居澤下為咸虗凡謙必虗凡虗亦謙自高自滿之人無有不日就於汚下淪陷顛溺而不自知者咸四貞天下祗有一個感應止貞感說貞應貞感常止不論應之可否而遷轉為隨貞應常說不論感之可否而憧憧不定咸四貞吉貞三以止如女從男近而相得可貞恆三不恆其德迫四以動如婦持夫近不相得故吝恆𥘉浚入人之深心咸上頰舌說人之苦口特艮震二主無為要終原始皆不足以當之耳咸𥘉拇二腓俱非止之主止主在三以中爻雜物撰德論易失其止且在下體故於身但為股惟四居乾君之中可稱心位為一身感應之主三在四下既為股五在四上亦止為脢上則口憧憧往來朋從爾思乾為君心者天君朋聫合乾三爻為言心官惟思四以思睿首出為貞以雜撰於少男少女中若其未免有童心便不貞便為憧憧憧憧如兒女昵昵娓娓惟𥘉是思由是五惟二思三惟上思一切往來皆相率而為憧憧之思四貞是為思不出位由是三五皆從爾四之思便合乾三爻而皆貞為君主又安有不光大憧憧便私小從爾思便光大也以卦言止而說男下女以爻言剛宜主柔不得役役於柔是咸四之所謂貞耳蹇朋來以大蹇在五復朋來以剛反在𥘉解朋至以解拇在四豫朋盍以勿疑在四咸朋從亦以貞思在四咸主有定故朋為輔佐如天主有定則日月寒暑之往來便無一而非其神化之妙用故繫辭極發同歸致一之義或曰乾九二無學問寬仁之義咸九四無嵗時代謝之義聖人不過借易以明理𥘉不拘於說易也不知此正不可移掇得若移在他爻他卦說便全無意義朱子答門人胡伯量不可有厭煩好靜之心人在世上無無事底時節要無事時除是死也隨事來便著應他若事至面前而自家却自主靜頑然不應便是心死矣近多以此為志末注腳朱子又曰定性者存飬之功至而得性之本然也性定而天下之動一矣所謂貞也夫豈急於外誘之除而反為是憧憧哉以惡外物為心而求照於無物之地亦見其用力愈勞而燭理愈昧益以憧憧而不自知耳夫內外兩忘非忘也一循於理不是內而非外也不是內而非外則大公而順應尚何事物之為纍哉象之所謂未感害者此憧憧往來曰未光大貞則天為徒憧憧則人為偶此天人之别聖人論二氣之感應唯咸於恆止曰剛柔相應於師臨無妄萃升止曰剛中而應於小畜曰柔得位而上下應之又必曰剛中而志行於大有曰柔得尊位大中而上下應之又必曰應乎天而時行蓋以應徴感而感以主應欲人詳觀於應而致慎於感有如此上天下澤履上火下澤暌履分上下不得少混宜辨暌分上下不得茍同宜異至於澤上有雷歸妹澤上有風中孚澤上有水節澤上有地臨皆主澤而言上有澤上於天夬澤上於地萃皆主澤而言上於澤中有火革澤中有雷隨皆主澤而言中有澤滅木大過澤無水困亦主澤而言滅言無惟山上有澤咸山下有澤損皆主山而不主澤咸天地感而萬物化生損天地絪緼萬物化醇雖二氣交相應與男女尊卑大義儼然常在終不失正與天澤火澤上下之辨同咸拇從腳指發端當無不㸃地之患咸輔從面上徴應夫寧病徒口之多故皆不著吉凶之占止主感不宜後故以咸腓為凶說主應不宜先故以咸脢為無悔象言志末木上曰末如子於父如臣於君如婦於夫本末昭然有辨二宜居而居五宜末而末亦皆咸貞之義咸上頰舌曰滕口說或曰滕即傳播之義天下固有不容不口不容不說者所謂播告之修也亦是感應正理但專情口說則不可耳艮背即不愧屋漏之止咸脢即不言而信之說陸佃曰脢在口下心上即喉中之梅核今謂之三思臺旁注云脢居喉中動而迎飲食以咽最是兑為口舌能言說脢則不言而亦若能作聲者故以為象腓聫股足既下又後人所易失故凶然能知天下不可上而故下之又知天下不可先而更後之如有定居豈不吉脢聫心口居四上之中職喉舌之司而以不言為感故自無失而致悔謙山在地中咸山在澤下拇腓股皆以高山而居澤下亦如謙之山在地中殊不自有其高故謙則萬民服而咸則天下和平惟和其在已而後天下無不和惟平其在已而後天下無不平君子反身而誠其身正而天下歸之百體中但舉其一體從拇而下自舌而上無不與天下感應相與無有不通天下之故咸艮皆以身取象以天下原是一身耳咸以止為內主止三爻皆當下說三爻說三爻皆當應止三爻匪止是主而說是主皆凶恆以動為外主巽三爻皆當順動三爻動三爻皆當制巽三爻匪動是主而巽是主皆凶聖人示人剛柔男女內外之辨嚴矣恆外震內巽任其外之震動而內常自巽順此所以為德之固此所以為一德責人太甚其情反暌恆初之浚之凶以此咸四恆三皆撰乾中爻咸四可望其貞四合三五為乾上視夬之象下視遁之象一柔上决二柔下遁三止正感四說正應故貞恆三無望其恆三合四二為乾下視姤之象上視壯之象一柔下姤二柔上壯四動既隳三巽復躁故不恆恆三曰不恆其德或承之羞貞吝三上應爻不恆其德猶言不常其巽於上無所入於上無所助也上以震體要終或從而承順之三唯與唯三諾與諾如此妝成何名男子故足羞或承之萬一承之便足羞以見男之不可不制義而惟婦是從是承也下經貴兌巽咸宜貞止或從說以動恆宜貞動或從巽以入便皆凶恆四田無禽憂患則生安樂則死此生民日用之恆道四震主恐懼修省即其四時講武之田事也無禽出乎憂患入乎安樂所恆者皆死地耳故特明之曰非其位咸從上視下五爻有遁之象恆從初視上五爻有大壯之象故咸恆後即受之以遁大壯咸上頰舌聒三居之不克中恆初浚恆憎四動之非其位下經隂有兌巽為主之意艮不要終而兌終之震不原始而巽始之故咸恆遂若無完爻也振恆說振矜之振原通巽而動恆五動唯巽巽愞從婦唯婦言是聽之紂也上動不巽柔危是逞又婦言不聽之豪耳恆四田無禽趙簡子出田鄭龍為右有一野人簡子曰龍下射彼使無驚吾馬三命鄭龍不對簡子怒龍曰昔吾先君伐衛免曹退為踐土之盟不戮一人今吾一朝田而曰必為我殺人是虎狼殺人故將救之簡子愀焉曰不愛其身以活人者可無從乎還車輟田曰人之田也得獸今吾田也得士又梁君出獵事人獵皆得禽獸吾獵獨得善言而歸四以𥘉浚或不克受其無禽也宜矣恆內體巽宜巽順入伏於內却雜乾撰健只𬋩要向外行去便不恆外體震宜用利大作於外却雜兌撰毁只管要退縮回來便大無功乾象曰各正性命性命合言訟四即命師二錫命師上有命泰上告命否四有命大有大象順天休命臨二未順命無妄象大亨以正天之命姤大象施命姤五志不舍命萃彖順天命困大象致命革四改命鼎大象凝命旅五譽命巽彖象申命單言命命似可隨時隨事致力不及性性未易言性命合一更未易言也至於性情亦惟乾之利貞合言之餘於咸恆萃止以情言矣易筌雷風相與雷動則風發未嘗相離故曰恆若言交助其𫝑則為益矣巽而動不可作順動順動則為豫矣巽入而在內震出而在外各居其所故曰立不易方咸恆與損益相反咸秋冬之氣隂乏之體故以虗受人恆春夏之氣陽饒之體故立不易方遁剛當位而應隂生至二與五為應五便立腳不住了故與時行而遁遁以隱然違去為義易傳曰豈必江海山林然後為遁哉大遁於朝小遁於野舜遁共歡不於歷山旦遁管蔡不於曲阜孔子與陽貨同國孟子與王歡同事亦剛遁之意遁𥘉為尾蜂蠆之尾也謝氏曰獸馴則尾帖猛則尾奮𥘉居剛有恃強必進前害四剛之象故為尾易筌𥘉與二非遁者驅陽以遁者也往而迫陽聖人所惡故戒以勿往遁上以成三遁為肥天下有山從山看天天在山頂暨上山一步天高一步愈上愈髙迥不相及從天視山以上覆下不惡乎下以大包小不惡乎小此象所謂逺與不惡之一義薛文清公曰如治小人寬平自在從容以處之事已即絶口不言則小人無所聞以發其怒絶口不言天下之山也此又象所謂嚴之一義小人亦極欲羅網天下之賢人君子以為巳用執之用黃牛之革莫之勝說以此只君子斷不為其所網而用一為其用無有不失足耳夬𥘉壯於前趾四其應爻姤上姤其角三其應爻夬四亦名君子而將為喜於鬬狼之羊者也姤三亦名君子而將為方孚蹢躅之豕者也至於壯𥘉征而曰其孚窮惟恐亦成四藩遁上肥而曰無所疑幸其逺於三憊聖人與陽剛之類雖與其為君子而常恐或墜為小人其成人美而不成人惡固如此肥遁無不利白居易感興魚能深入寧憂釣鳥解高飛豈觸羅朱子富貴有餘樂貧賤不堪憂誰知天路幽險倚伏互相酬請看東門黃犬更聽華亭清唳千古恨難收何似鴟夷子散髮弄扁舟鴟夷子成霸業有餘謀收身千乘卿相歸把釣魚鈎春晝五湖煙浪秋夜一天雲月此外儘悠悠永棄人間事喜道付滄洲君子以逺小人或曰如不仁者逺矣之逺不惡而嚴不止嚴毅嚴威良是嚴敬嚴憚此君子之天包度量山立根基盡人而欲使之去其為小人歸其為君子盡人而欲貽之以安爻故言好言嘉與肥此又象所謂逺與嚴之一義雷在天上大壯君子以非禮弗履懼有非禮逢天震怒大壯之𥘉以征凶豫𥘉以鳴凶皆不能不為雷所震動也震雷轟天而天不為動是為大壯之貞震雷奮地而地不為動是為豫石之介小人用壯君子用罔君子小人不相為用者也大壯利貞壯之所利者貞尤不可假小人以為用者也有如三以上為應爻或假之事權俾得以用其壯則君子遂入小人之罔無有不反為小人所用了真如羊頭伸在闕甲裡欲進不得欲退不得君子小人滚做一團聖人示君子貞厲之戒如此三指上曰藩上指三亦曰藩俱以兌象四貞為震不為兌便是藩决不羸之象小人之小人易辨君子之小人難辨小人之小人如夬上之柔說如姤𥘉之柔巽皆小人中之小人也君子之小人如壯五上皆以剛動儘奮發有為如遁𥘉一皆以剛止儘鎮靜無擾皆君子中之小人也壯三即遁四反體遁曰君子好遁小人否惜小人之詞壯曰小人用壯君子罔危君子之詞三曰羝羊觸藩三為羊而上為藩上曰羝羊觸藩上為羊而三為藩四曰藩决不羸謂四藩而𥘉亦羊可五曰喪羊於易謂五亦指二為羊可朱子曰卦體似兌俱有羊象大壯之反為遁遁體似巽壯而胥為羝羊之觸便失其貞遁而執用黃牛之革便無不亨皆實象實義易中言公侯屯豫解益小過皆屬震唯晉侯屬坤大有公屬乾其言君言王言帝言大君言國君言天子則諸卦皆備自昭明夷用晦以出地之明自昭以入地之晦涖衆彼有明於察人而暗於反己其何以為君子坤至柔而動也剛坤𥘉堅氷豫二介石剝三剝之晉三衆允之都所謂動剛要都為人所轉不得受兹介福於其王母兹藉草之名二坤順中正原藉合三爻以成順亦藉合三爻以受福有不徒介諸一己而已者晉名進上所進惟順麗三爻下所進合同順三爻故侯以康名為安為樂為和為五逹之道諸義俱備離上出征曰王用四突之侵迫者重明之五故本五命而特繫之王繫之征晉上伐邑曰維用四鼫之摧抑者衆康侯之進故本衆心而共謂之維謂之伐王用征折首獲醜正以天下維用伐罪止邑之為鼫者離上唯明威寅奉曰出晉上唯國是總持曰維姤無上角無以柅方孚之羸豕晉無上角無以清已進之社鼫君子皆出於不得已而然故姤上為吝無咎而晉上雖厲為吉也晉明君在上下以坤順麗其明為康侯之用明夷明侯在下上以坤順晦其明為箕子之貞文王箕子從後視之有商周之異自當時視之一體商之臣子耳北宫子曰紂囚文王七年諸侯皆從之囚紂於是懼而歸之史乃謂閎夭之徒求有莘之美女以獻紂謬甚此必齊東野人因范蠡進西施事而附㑹之耳不然聖人彖易何云六二之吉順以則也地澤知臨地天歸妹地水任帥地山利侵伐地雷敦復地風升階惟地火為明夷乃知君如惡直臣如嫉正未有不為亡紂之續而甘心與惡來飛亷同其誅滅者明夷夷於左股坤三爻乘於三上上三應爻夷三左之為二股也左股夷二不能行二無所麗故為明夷箕子之明夷利貞自靖人自獻於先王我不顧行遁箕子以决不可去為正也主人有言二言不可疾貞二不可正文明柔順以蒙大難事明夷上六初登於天或曰上在出震之上之象後入於地則下有坎陷之象龜山先生曰三仁未去紂非獨夫也三仁去則天下不以為君矣四遁五奴坤順全體毁裂止存上一爻有獨夫之象當日命絶則為獨夫是入地也用九見羣龍無首吉羣龍未嘗無首未嘗不貴首出只不可有首見但見無首非無首也既上濡其首厲非首之患患濡也離上折首天德不可為首離亦不可為首也明夷之三得其大首離上出征則患有首明夷之三南狩又貴得其大首也比上比之無首凶比亦貴有首也明夷言大首與晉言大明相發明出地曰大明明入地但曰大首明方在晦之義家人利女貞王應麟曰男正易女正難二南之詩以化行閨門為極致風自火出家人自火出之風解愠阜財長養萬物自南八風以南為景祥之也人非此無家故為家人益自東中孚自西渙自北家人益之風宜順遡中孚渙之風宜逆求不然死無緩無地匪涸流廟無立是水皆堅氷富家大吉象曰順在位順謂義理也陸子曰人家之興替在義理不在富貴假令貴為公相富等崇愷而人無義理正為家替若簞食瓢飲肘見纓絶而人有義理正為家興天與火同人人雖同一天若不與之火黑窣窣地各不相見惡乎同風自火出家人人非火不生活火便如人之有家有如止作飄風不自火出不有烹飪於何生養亂蓬蓬地於何歸宿名為人皆飄流蕩析而無家者耳故風惟自火出一噓一拂一生一養一言一動必南而必嚮明出有自入有歸不愧於人豈曰無家有家為歸豈不成人故為家人倒為鼎享上帝養聖賢巽而耳目聰明總是家成其為家人成其為人亦無二義諺亦每言門風家風如可風定自明出家成箇家人成箇人如不可風定自暗出家不成箇家人不成箇人女史針䖍恭中饋謂祭祀飲食之務易筌九三重剛無嘻笑理如禮嘻其甚矣之嘻謂為歎意言九三之剛使家人嗃嗃雖厲而吉又甚焉使婦子不能容而歎斯不免於吝矣亦㫖十三卦中有重門擊柝以待暴客弧矢以威天下二義聖人思患預防其憂天下後世無所不至固如此楊誠齊謂見惡人如子見南子陳實弔張讓子與南子實與讓夫豈合德之爻相睽而惡之人乎君臣朋友原睽能相成下以說麗上上以明應下便是合睽也遇主於巷睽二剛說得中三之五撰坎象巷主在巷原欲下求二有遇豈其枉已象故特明未失道凡君臣朋友性格不同如上火下澤志趨不同如二女同居皆睽之義爻言惡言疑乃其甚者儒行同弗與異弗非與其所可與不必同乎已非其所可非不必異乎已君子以同而異似之古以孤設官孤鷙無朋睽四上之孤以剛明獨立於成物之表孤所宜孤無孤不成其為睽無遇亦不成其為孤同人於宗吝厥宗噬膚往何咎鄧氏曰同人之時開以畛域之塗是離析之萌也暌之時獨存維繫之誼則洽比之餼羊也睽三無初有終暌上往遇雨則吉史記曹參初與蕭何有隙何且死所推賢惟參參代何為相國舉事無所變更一遵用何法龜山先生曰二人者苟無體國之誠心忘一已之私忿則排陷紛更將無所不至推之以為賢守之而弗失尚何有哉其卒為一代宗臣蓋有以也先張之弧後說之弧楊誠齊曰下卦初為弧二為弦而相附者也上卦上之弦不附於四之弧者也五與三乃二矢象鑿甚且只說張弧說弧何時說有弦無弦有矢無矢但從上視三先看是坎有張弧之象後知說體遂有說弧之象耳弧矢之利以威天下蓋取諸睽种世衡初至青澗城逼近敵境守備單弱芻糧俱乏世衡以宫錢貸商旅使致之不問所出入未幾倉廪皆實又教民吏習射雖僧道婦人亦習之以銀為射的中者輒與之既而中益多其銀重輕如故而的漸厚且小或爭徭役優重者使之射射中者優處或有過失亦使之射射中者則釋之由是人人皆能射比數年青澗城遂成富強於延州諸塞中獨不求益兵運芻糧此亦威天下之利之一義睽上載鬼一車坎為狐狐執心不定妖獸鬼所乘也震翻身止於艮陽全體也巽翻身止於兌隂半體也蠱曰終則有始震始而艮終蠱終於艮翻身即為震也巽五曰無初有終無初巽非震之初也有終兌要巽之終也睽三曰無初有終無初柔三不可為初也有終剛上為能要終也睽上載鬼一車既三未四皆曰伐鬼方火以水滅出明入幽出人入鬼矣睽遇雨既克之未有賞這兩足方站得住不上鬼車不墮鬼方去遇雨之吉羣疑亡祝氏曰天下惟疑根最難破疑者事之賊也吾蓄疑將復啓天下之疑舉天下成疑境而天下事不知所終矣遲之悔往之吝每從疑處諄諄作易者其有憂患乎屯初居貞蹇三來反亦一義屯初須四為求蹇三須四為連如不待其招而往未有不失己者屯五動乎險中之君二貞不字蹇五止乎險中之君二為蹇蹇匪躬屯動主方居於初二宜合初居貞蹇止主已進於三二宜隨三上進且天下事理動以止貞止以動善無事常如有事時隄防有事常如無事時鎮靜類如此蹇諸爻四言往來蹇足艱不能行進之義往來不窮謂之通言往來則便不窮而通又須從往蹇中來初方譽三方反四方連上方碩譽反連碩皆所謂西南之利若不自往蹇中來無不立有東北之窮蓋止不徒止以往為止素險難行乎險難無入不得故無往不利不則以止為止畏險避難於何不至䆒竟險難終不可幸免真是死殺窮底道路故曰不利東北其道窮也屯險中有動原始蹇險中有止要終人一日無屯便不生無望亨貞一日無蹇便要召辱便多不克轉頭將無處不與人拆開或有一得非土田即培塿譽反連碩四字無望凑手坤利西南自北而西南蹇解利西南自西而北自北而西南坤利西南得朋蹇曰朋來解曰朋至得義同坤利東北喪朋蹇則不利東北解則又有來復之吉喪義異云何坤東北之喪要終獨有所止也所謂安貞者也蹇利東北將終止於險矣解無來復將險猶未免不成其為動矣解利西南坎而坤坤而震次序而動動險易故西南東北來往皆吉蹇利西南坎而坤坤而艮躐等而止止險難故東北竟為不利也坤利西南以坤重坤一轉手工夫蹇解利西南以艮止險以震動險未已更須以坤平坎兩轉手工夫險以震動動原始宜初而在四險以艮止止要終宜上而在三非西南將有所弗利先天坤後天坎其位一也蹇解利西南蹇外坎內艮艮東北以艮坤遙對為西南解外震內坎震東坎北以自坎北滂沱及於離南自震東霮䨴及於兌西為西南或曰先天坤定位於北後天坤往西南則坎遂得坤位蹇解之坎從其得坤位說在蹇則高山之上層級無非平地在解則震雷之下遍地無非甘雨故皆曰利西南以中節易筌不先不後恰當機宜之謂節公用射隼於髙墉之上獲之無不利和魯公有觀畫鷹獵詩雖是丹青物沈吟亦可傷君誇鷹眼疾我憫兔心忙豈動騷人興惟增獵客狂鮫綃百餘尺爭似製衣裳范文正觀之歎曰真仁人之言也畫鷹猶然其真為高墉之隼固可知矣大學惟仁人放流之屏諸四夷不與同中國剛柔以位言止爻義一端大體大要全論卦不然解二四皆不正不當何以獨有解小人之能事然於五曰君子維有解爻意亦自可見初非以君子維定須解君子朋定須亡也于泰言朋亡於解言維解皆以合用五中為至耳豈謂君子而顧可以無朋可以無維乎哉公用射隼以解悖來矣鮮曰以下叛上謂之悖三乘二負四應上乘之惡顯負與應之惡隱其名負四其實是慢四其外應上其中實反叛而欲搏噬乎上故符以悖字定三之罪案蹇解利西南坎得母坤之位者也坎來而坤遂往於西南或母道不存於坎中其坎也乃為險為陷而已矣故蹇以止險於上止之而成至順高山之峻如母斯恃而不見為險曰往得中解以動險於下動之而成至順迅雷之轟如母斯親而不見為險曰往得衆艮震二男之遇坎震原始艮要終行父道艮內止震外動行母道若坤之利西南得朋東北喪朋有乾之西北以率先三男斯有坤之西南以要束三女西南得朋以母道貞女教以身為凖東北喪朋以父道彰男教至艮而終其義各别崔仲鳬曰詩桑柔狀小人之惡三凉言刻薄盜言貪黷競言強禦易解狀小人之情四狐言媚惑乘言僣竊拇言依附隼言悍鷙易筌方其蹇也惟是反身修德及其解也又惟赦過宥罪律已嚴待人恕君子之道可知矣易像鈔卷十
