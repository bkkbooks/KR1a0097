body:
  text: 易像鈔卷十六明胡居仁撰書答陳蒙山先生易義精微一艮可了華嚴一部周子非欺我也如革言已日解言甲拆天地生成消息明炳指掌一陽生子中坎中爻也一隂生午中離中爻也離言已坎為戊可以三隅反矣離中一隂遇兌而言已言革坎中一陽遇震而為戊為解亦可以三隅反矣造化坎陽遇震而解離隂遇兌而革此等消息時時呈露於吾前呼之吸之生之成之無一息不與天地通一呼為解為生為出吾出而有生一吸為革為成為入吾入而有死謂生不知所以來死不知所以往求之釋佛死生之超而不求吾孔易生死之盡得乎吾儒生死消息是陽是戊而遇春令之至未有不解而生者是隂是已而遇秋令之至未有不革而成者又種子是戊無所不生生固生死亦生種子是已無所不殺死固殺生亦殺是故種下生根生氣感未有不生者種下殺根殺氣感未有不殺者殺氣不能殺生根生氣不能生殺根然則造化何能生死人亦人自生自死耳生死事釋氏詫以為驚天動地之大而吾聖人明白指示於易則易知之易也有如此不審吾翁其以為何如答顧季時天地定位四句隂陽老少對待成列自是定體至出震章盡易其位乃為相錯竊疑天地定位六子行乎其中如天地之上爻相錯便是山澤通氣天地之下爻相錯便是雷風相薄天地之中爻相錯便是水火不相射有六子便已盡易天地之位似不待至出震章然後為盡易其位天定位於上而錯於下交地定位於下而錯於上交便已不相順而相逆故以言其逆乾逆坤為震動為坎陷為艮止坤逆乾為巽入為離麗為兌説雷動風散雨潤日暄艮止兌説莫非乾為之君坤為之藏錯者未嘗不定逆者原成其順單就八卦言之已是相錯已都為逆數已是一部全易了也一隂陽互根陽則生隂隂則生陽自隂儀中生者先陽後隂自陽儀中生者先隂後陽竊疑先後之説亦微未融易曰一隂一陽之謂道一言道盡逆數大義以八卦次序橫圗玩之一隂一陽以六十四卦方圗玩之一隂一陽太極生兩儀一隂一陽兩生四一隂一陽四生八一隂一陽一齊都到無分先後若欲判兩儀而言所生之始謂隂儀所生始於坤陽儀所生始於震可如此者謂之地逄雷由坤逆而至乾亦逆則俱逆之説也謂陽儀所生始於乾隂儀所生始於巽可如此者謂之乾遇巽由乾順而至坤亦順則俱順之説也二顔子庶幾謂為後天之學以知在有後為順數為發然後禁竊詳夫子稱顔子語意有不善未嘗不知謂其更無不知之時也分明是嘗知朱子亦稱克已復禮為乾道言乾則先知矣聖人知幾顔子庶幾只未達一間無先後截然之判夫復以自知聖人以復之初爻許顔子透底真陽震動瑩為真明炳為先幾無論三千即七十子亦莫能與顔子之知果在有不善之先耶抑在有不善之後耶其發然後禁者耶抑禁於未發者耶到念頭上校勘家數與未嘗不知公案相去千里顔子嘗知故不二過吾輩嘗不知是以二過三過以至於千過萬過通身坐在過中度日子猶不覺其為過而陷於長傲遂非之歸者多矣三先天後天無二圗亦無二説易有太極其先天乎兩儀四象八卦六十四卦三百八十四爻或圓而圗之或方而圗之其皆後天影樣乎天地山澤雷風水火八物皆帝皆神俱後太極而為言依舊要完全還他一太極先乎由是後乎由是往乎由是來乎由是有先無後有往無來乾坤毁人類滅矣此易所以作故凡圗之方圓橫直都是後天只有一箇太極便是先天先天不可圗人生而靜以上不可説四性純乎理太極也得之心雜乎氣隂陽也亦微要分别陽儀道心也一無雜隂儀人心也拆而為二則有雜矣聖人懼人一而二教人二而一故曰窮理盡性以至於命其在孟子亦曰仁義禮智根於心孔孟教人只要心上尋得根出逆流上水尋出源頭來蓋人自形生神發以後都是順流水愈趨愈下易有三百八十四爻爻爻都撑逆水船一篙不得放緩故以逆而成順可以順而成逆又别論五雷出地上曰陽分隂雷在地中曰隂含陽只是要主張知幾庶幾之所以異故有此見解苐平平理會聖人言語其曰雷出地奮曰雷在地中俱提掇一箇雷字為頭面不曰雷出地上又必曰雷出地奮此處還分得不成其為豫矣姑為俚解聖人雷出而地奮故無不善顔子雷欲出而地未奮故有不善雷孔顔之所同地孔顔之微異幾孔顔之所同曰知而神曰殆而庶孔顔之微異豫固孔之樂在其中復亦顔之不改其樂知幾者道心純然十分庶幾者道心己是九分九釐九毫九絲苐有一絲髮未化之人心故言其殆而庶耳六先天之學至矣以顔子猶然庶幾夫執塗之人而求其初人人先天也而況顔子謂其非先天之學可乎不以先天為學日用間尚别有第一親切工夫否七賢如堯夫尚且學先天而失之語殊未穩程子謂其根本不帖帖地夫根本太極也先天也不帖帖地此豈未達一間而已正謂其未能踏實先天腳跟遂有不點地去處耳惡有學先天而反失之之理八認心為性認人心為道心夫能認心是猶知有心者也今有一種議論謂六經無心學連心都不認帳矣夫易有太極是生兩儀兩儀人合而為心者也陽儀曰乾乾以易知隂儀曰坤坤以簡能言知則從乾上論矣言能則從坤上論矣從乾論則道心矣從坤論則人心矣道心一人心拆而二不拆為二而合為一人心即道心道心即性即太極也心與性竟究有兩否乎人心道心竟究有兩否乎是故太極生兩儀心有兩兩儀一太極心惟一道心無兩人心有兩兩原是一人多拆而二之父子二則無親君臣二則無義夫婦二則無别長幼二則無序朋友二則無信推之萬事萬物莫不皆然故二之不可不求一坤之不可不承乾也乾知大始是人家始初開頭一箇太祖公子子孫孫皆其一體所分認得太祖公的人其於宗支圗條條款款決然畫得分明決然不會混帳也九兩儀未生以前自屬於來原不言往來往二字亦甚活如人端坐在家原不曽往何須説來聖人要人知來只為他一向往外喚他來家耳十惟不拘拘於上下東西之往來而一以造化主宰乎其間則有交而不測其交此神之所以為妙云云竊疑八卦之外似無另有一箇造化主宰乎八卦之間只舉天地定位一句説謂天地非造化可乎謂定位非主宰可乎夫太極生兩儀太極便在兩儀中兩儀之外又去另尋一箇太極為兩儀主宰以是為帝為神尚不能無疑或者天地定位章指示人心一箇太極全體出震章指示人心一箇出頭道路耳乾兌離震巽坎艮坤或方而順數之或圎而順數之自乾一順至坤從天墜到地上矣易逆數便要從地仍舊上天其在坤震之交乎兜根雷從地起言坤便該逆至巽言震便該逆至乾故以言其帝出蓋逆數之起當從此出非其易天地之位實乃定天地之所定而位天地之所位者也又曰齊巽一出復一入一逆又一順自下而上為地逄雷自上而下為乾遇巽出入逆順截然不亂是之謂齊至于見離役坤説兌又齊巽的自然次序戰乾勞坎成艮又出震的自然次序謂不拘拘於上下往來誰能動得他一動也十一與友人昨辱賜教則己身承法門昭然受發蒙之益矣何幸如教旨蒙義一章敢以臆請山下出泉蒙人人有此山下初出之泉兄所謂渾是聖人胚胎是也雖則渾是聖人胚胎却被隂柔氣質包裹了一包裹如一陽陷於二隂之中上靣又止了一止故曰險而止蒙童蒙而能求我出乎險而不止去蒙而成聖童蒙而不求我止乎險而不出蒙日以蔽而去聖日以逺是故蒙之亨非以止以行也非以再三而失時以初筮而及時也及時慎行以窮山下之泉原以立天下之大本淵淵其淵取之左右逄其原行中之功時中之聖也能無亨乎蒙亨則聖蒙困則昧困然後昧蒙無昧也亨之自我困之自我我求求我皆非人也三軍可奪帥匹夫不可奪志志在我其應乎其不應乎可自筮也我蒙我亨我求我筮我學不厭而教不倦謂我不學而能教人謂我未能不厭而能不倦者無之故曰誠者非自成已而已所以成物也若但發人而不自發擊人而不自擊或不可與發擊直絶之於教外則天地有棄物聖人有絶人陽貨可見公山佛肸之欲往取瑟之歌豫不屑之教誨何為乎於初筮告之義荒矣禮聞來學不聞往教來我而學所以教人往人而教非以為學兄謂本末始終四字把定入道之樞此處落腳不愁不實夫飬正謂之聖功謂把得樞定落得腳實也以道自重不至往教告之有節施於可受而不強其所不受為時中其得為把得樞定落得腳實否耶喜怒哀樂之未發謂之中孔子聖之時山下之泉之所自出未發之中也十五志學孔子之時也求此筮此行此得此樞無不定而腳無不實聖功也惟孔子有之故曰時中之聖人也蒙蓋以時中示人入道之樞而以初筮求我示人落腳實地矣幸惟批教乃紉包收茹納發我擊我之度答于元時來教屯有馬而無乾離有牛而無坤云云馬之取象原不單指乎乾屯之上坎下震皆馬象也又牛順物也但有巽順之德即成牛象無妄或繫之牛巽也離之畜牝牛巽也乾馬坤牛煞定取象聖人無是也一來教比後受之以畜蠱後受之以臨復後受之以無妄頥後受之以大過等處於義未連意亦不貫云云此在序卦傳中略備而宋王申子甚不取謂以一字相連其於卦義頗無交涉也合六十四卦以立人譬之合四肢百骸為一身今謂目後受之以鼻手後受之以足皮後受之以毛人其有不一團笑之乎當時聖人指點人不以百骸四肢全體備具為人身只以天地雷風水火山澤八物相摩相蕩為人身如俯察而見水之行地則既指之曰此人道之比也仰觀而見風之行天則又指之曰此人道之小畜矣覩山下之有風則曰此人道之蠱也覩澤上之有地則又曰此人道之臨矣天下無一處與我無相干天下無一處非我做學問處直是做得一箇天地之大方始成得一箇人道肢肢節節原無不相連止於逐肢逐節搜尋而不見吾身全體之大血脈原自無不貫通此非所以為易學也二來教洗心藏密元妙未易形容云云心何洗密何藏世人皆籠統顢頇而泛以為言耳聖人實指之曰以此此者何蓍德也卦德也爻義也人知百骸四肢人身無一可缺漏不知六十四卦三百八十四爻人身尤無一可缺漏但有一缺漏則踈矣但無一缺漏則密矣日日易默成象語成爻得此者也心能洗者也密能藏者也有一日不易默不成象語不成爻失此者也心不洗者也密不藏者也此處著不得言語著不得訓解弟故後之耳三答陳曰仁承問數往者順知來者逆易逆數也此本天地定位山澤通氣雷風相薄水火不相射八卦相錯而言後人訓解順逆多不得其義為脫了八卦相錯一語但據八卦次序之圖為説又或據六十四卦陳列之圖為説而曰自震至乾順也自巽至坤逆也是半順而半逆也或曰由乾至坤順也由坤至乾逆也是全順而全逆也全順全逆比之半順半逆其義差優然皆似據八卦圗次序陳列為説非據八卦相錯為説乃聖人所謂順逆則本八卦相錯而言以乾坤六子論乾錯坤而有震坎艮坤錯乾而有巽離兌自乾錯坤而生三男順也合三男而成其為全乾逆也自坤錯乾而生三女順也合三女而成其為全坤逆也譬之父母生育男女有貨財分於男女順也男女奉飬父母有貨財奉於父母逆也易逆數全是教人立人道為順易而逆難順多而逆少也以六十四卦論凡一卦必上下相錯而成十六卦如以乾為主而上錯下錯皆八卦順也上錯下錯之八卦無一不以乾為主逆也餘七卦皆可例推矣舉要言之往水之流也來水之原也數往沿流之順也知來窮原之逆也由太極而隂陽五行數往之順也五行隂陽隂陽太極知來之逆也易曰形而上者謂之道形而下者謂之器聖人作易全是教人由形而下之器悟形而上之道人生斯世有順無逆但使順水船只管向下流日流日下必撑逆水篙方是向上流日撑日上凡皆往順來逆之義又如少而壯壯而老老而死是順彌髙彌邵血氣有衰之時志氣無懈之日令此七尺軀交得還天地是逆交得還天地如人到家為來交不得還天地如喪人如亡子客死於外為不來聖人重知來以易為逆數或如此答友人戰乎乾龍戰于野戰無兩義只是戰乎乾冠之以帝戰主在帝乾其戰之方也若坤上則稱龍戰不可稱戰龍又言戰于野亦異於戰乎乾帝似以八卦之主宰言如儀象之太極龍似以六隂爻之主宰言乃坤之乾也戰乎乾曰隂陽相薄其義平戰于野曰隂疑于陽必戰其義軒輊隂陽相薄之戰隂陽不可相無如月令仲夏日長至曰隂陽爭陽將盡而隂來爭也仲冬日短至亦曰隂陽爭隂將盡而陽來爭也月令之所謂爭隂陽相薄之戰也隂疑于陽必戰又曰為其嫌于無陽故稱龍禮決嫌疑嫌疑之際君子不處此似以疑故必戰不使其有疑也以嫌故稱龍不使其有嫌也譬之極順之妻無疑於夫何必戰不嫌於無夫何必稱夫坤極於上處窮之位疑於夫故必戰嫌於無夫故必稱夫必戰稱夫此似坤上終極於順之能事二不疑其所行至上之窮不能無疑疑故必戰也于野何曰坤德方戰稱龍不可以方拘皆野矣其血何曰聖人明言猶未離其類故稱血西南得朋乃與類行類不當離也東北喪朋乃終有慶類當離矣至上而猶未離何云得主何云承天時行以嫌于無陽故稱龍所以别嫌以未離其類故稱血所以離喪朋類元黃何曰聖人明言天地之雜天元而地黃乾坤成列天地各正初未有雜其雜六爻相雜雜物撰德從元黃始也此乾坤以後入屯之象也屯曰剛柔始交而難生震為龍為元黃坎為血卦屯上又曰泣血其脈絡可見如此微獨屯嗣此六十二卦卦卦相雜物相雜故曰文皆元黃成文之象也一乾不為首無非乾也六十四卦皆乾之全體皆以乾為首也坤上曰龍戰不必向乾卦索龍只坤之主宰自為出頭便是乾便是龍坤極於上主宰出頭震動恐懼便是龍戰龍戰忠臣孝子之極致若説戰龍便是亂臣賊子弒逆之大惡二行陷用陷皆坎德皆陷功行險不失其信能陷者也君子也行險僥幸為陷者也小人也虞廷危人心以為陷也微道心以能陷也孔子以相近言性先天首乾純乎理純無陷也以相逺言習後天首坎兼乎氣質兼有陷也形既生陷既成矣欲不為陷定須能陷為陷終身燕溺之小人能陷終身憂勞之君子一息尚存不容少懈一息不勞不得一息無功不得故曰行有尚故曰勞乎坎以其用得功勞多故坎為勞卦以其為刺血見血學問故坎又為血卦天險不可升只是不可升便喚做天險天何險之有地險山川丘陵只是山川丘陵髙卑界限儼然截然便唤做地險地何險之有王公所以守國者此士庶所以守身可知是為險之時用之大時時有此險用是為坎之成德是為習與性成聖賢同歸坎二曰有險方在能陷坎五曰既平陷已成功既平盡平也即險為易矣故君子未嘗不行險不用險只喚做居易水流不盈此人人固有之坎體才盈便橫流泛濫懷山襄陵甚之滔天五爻曰不盈象曰未大坎五謂之大水可以中故不侈然自大未大明其所以不盈詩曰民之靡盈誰夙知而莫成二求小得小亦原來坎體故詩之咏文王曰小心翼翼只怕失故言求言得四約亦然子曰以約失之者鮮前賢言心欲小又言大其心則能體天下之物小心坎一原後天之始事大心乾一返先天之終事小心入手工夫大心了手能事惟乾為可大乾豈人之所易言哉夫乾天下之至健也德行恆易以知險坎二五乾體之知險者也餘非所望矣惟四在下坎之上可望其能知故繫之自牖而明其終無咎終義繫於自牖後應有要終能事在此亦盡心而後可望知性知天知天而後天可與事命可與立説民無信不立無信雖生無以自立如手足癱瘓如大筋舒緩小筋弛長通身雖有脈絡不相維繫如何立得起惟行險不失其信脈絡才聫屬而心得亨血脈才流貫而行有尚心與行皆以孚致孚以坎致三震之億喪貝義亦與坤之喪朋同蓋以二隂乘初剛則喪矣竊疑隂虛陽實故噬嗑之五以隂居陽故言得小畜之五以陽爻故言富乃家人之六四以隂亦曰富謂四能以隂虛而成一家之陽實象故明曰順在位也坤於朋西南利得東北利喪此有喪有得喪不宜得得不宜喪者若震二於貝方言喪旋言得此即喪即得喪其所得得其所喪者朋乃同類貝似即己義已不同又坤以往言得喪主不在坤震以來言得喪主自在震義更不同震二爻柔體剛又最邇初故來與初同震是夜半雷聲天理迅發首出端倪故於人稱貝猶諺言寶貝之貝無盡藏之藏其言喪義不係於來而係於厲來厲應是不及掩耳迅雷如人有巨萬金玉寶貝猝逢疾雷一震這所有若盡失之連這身子霎時間也如在九霄雲裡少間依然故吾原無喪也二有得喪之間以初震之危厲五無得喪之間直言無喪有事以洊震之危厲險阻艱難二初嘗五備嘗故分量不同如此貝海介蟲螺之大者離為螺為龜頥象離故曰靈龜損益中爻亦象離故皆曰十朋之龜震中爻亦有離象故曰貝易者象也並不懸空鑿空説此所以有意味如離上折首以四突獲匪其醜以三昃四何嘗突三何嘗昃兩離相重中爻雜撰遂生突昃之象出來昨所云假病者如此去其雜撰之病還其本體之明此離上之所謂征以正邦也至於陽貴無首隂貴喪朋微近於執用九見羣龍無首吉又曰用九天德不可為首羣龍非無首見其無首也天德非無首不可為首也似還要體貼見字與不可為字若隂而單貴喪朋西南利得云何西南利得與東北利喪此似兩股板門文章也或躍在淵而曰或之者疑之也似與居之不疑疑義相反不疑自以為是非龍并非躍矣又如卦有貞悔上而無悔非龍并非亢矣四乾剛坤柔一而二二而一息息相推相蕩交流並運方成列方不毁屯於二四上俱言乘馬便其義馬無乘牡先而牝不後牝承而牡無倡匪孤陽即孤隂匪偏陽即偏隂譬之草木孚甲且無日夭喬復何有震坎相重之卦動免乎險曰解動乎險中曰屯屯二四上之班視坦途皆荆棘而况非坦途視軌道皆險阻而况其險阻當凛朽索之懼常懷覂駕之虞長慮却顧震動竦懼時刻是箇盤桓居貞之心此所以為險中之動屯之四柔爻三乘馬一即鹿何以異曰二四上爻位俱正三則異矣以故二四上象在間而三則在野二四上象就駕而三則野馳無虞無所主掌更見其在野而難即之象又轉過念來入于林中無非躁動妄動之象幾而舍亦便有班如之能事則以終為震體其究為健之故五不逺復無祗悔元吉向來但作不二過解尊教謂亦即不遷怒解最旨聞之先輩云不遷怒主人常定不二過主人常一故總在心體上論亦即程明道定性書之戒怒乎情易發難制莫如怒或一時有怒必戒必懲以期於平並無有怒做得主之時而此心隨之以移動曰不遷知過難改過尤難或一時有過必喜聞必樂受必速改以復於無過並無有過做得主之時而此心反為之副二曰不二易曰有不善未嘗不知知之未嘗復行政如此過為不善不待言七情中惟怒易發難制并謂之不善亦不可未嘗不知言常知主人常精常明常定常一有怒霎時平得如何遷有過當下改得如何二不遷不二斯謂之不逺復才遷則逺才二則逺無以語於常知之復體矣復初地中雷厲之微體也雷厲之體直截迅疾故有怒與過當下便能消融克治得真如紅爐點雪跕腳不住若使爐不甚紅或如雪片投來但須臾不消化便須臾作懘礙但頃刻不消化便頃刻作懘礙此之為遷為二已多若不學雖學不好者流乃知以雪塊滅紅爐者耳遷二字樣怎生便説得做到不遷不二惟顔子地位才説得故曰好學人有怒廓然便能平霽得人有過翻然便能改圗得此非自知主人十分得力殊未易到略略主人不得力逐怒便喚做心移故曰遷憚改便不是主一故曰二考之字義遷登也人怒則心便髙難於遏捺得下二副也相禆益也人有過或拒不克受或惡不喜聞或文或飾每每多添却一層顔子心境到常平地分任風有吹而浪無湧曰不遷顔子心境到常見過地分如煙斯消而澌向泯並不增添加益曰不二大教復者復之於虛明平正也語意本圓昨又僣下商量一語蓋為世多執見者發以執見觀曰復之於虛明必且以為先有不虛明之時而後復之於虛明復之於平正必且以為先有不平正之時而後復之於平正如是則如前人所云失而後復斷而後續而非易之剝復循環之復故云然微獨剝復夬姤亦然天地混闢之真消息於剝復夬姤皆可見此全體之微幾也然聖人贊易言幾獨於豫於復兩言之豫已動之幾復方動未動之幾已動之幾即豫體方動未動之幾即復體大教云不幾不足以言復正謂復與幾無兩義耳若云復之於虛明平正微似復之於幾似以幾為主而復之似以虛明平正為體而復之恐即復是幾即復是虛明平正之體不可以虛活字樣看做復故雖本無可疑尊見亦自瞭然而僣求商量如此六泰否𥘉茅皆曰茹皆乾坤之𥘉之根泰𥘉是至健之根否初亦至順之根有如是之根又合乾坤三爻為彚􅪮初征以經營外三隂自無不吉否初貞以君主外三陽既吉亦亨泰征健之能事否貞德亦合乾能勿失其初也泰二有全乾力量全坤轉在其手泰三若以一身獨承外三隂之任矣艱貞艱難也根也如物根也初茹為三陽之根三艱亦若聫三隂而為之根然艱以為貞根盤孔固平不得陂往不得復三隂外順成孚三陽內健勿恤豈不合外內而並禔其福乃四五孚而上卒復則泰極之不可久耳否二差弗失順意故曰包承包承以坤二直方反之小大自别順意亦别否三若以一身獨出外三陽之下矣包羞以坤三含章反之淑慝更别二承厚意之來君子或弗忍却稍與為通不生出調停之病必且抱失腳之恨安得亨惟大人正已無失人有承吾獨否故亨承不足以悅君子羞不足以愠君子四循理樂天所知惟命所有惟命故無咎五秉道執中於君子中如參天喬木之為植立為息止君子有羣德不患孤小人相安亦若隂藉其休故既亨又吉至於上則傾亦否極之不可長耳泰上猶望其用師坤象非乾君莫與統猶教之君乾惟君子所帥也否上猶曰先否君子小人終為不可合之物君子終不可內交於小人失身於小人耳否彖言不利君子貞爻兩言大人亨與吉儉德避難不可榮以祿君子貞也否貞也否貞守身常法君子可與否亨與吉體道大權幾與泰吉亨之分量同非大人未易與似進君子一層否五休與姤五含章遁五嘉觀五生剝上得輿諸義俱相發否五視內三隂蓋如天容如地略無忿疾已甚之為等有不忍如傷之視君子自無勞拙之患小人亦獲免其鬪怒之惡與君子相安於無事故曰休非真有大度量不能故曰大人吉易於小人惟隂險而又有乘陵之惡如師與既濟皆嚴勿用之戒如解之必田必射以其邪媚如狐而鷙毒如隼其他則如隂陽晝夜之不能相無韓魏公云三家村裡也有一箇但知其小人處之而已甚不可有忿􅍚之心此深明易旨者以復臨泰壯夬剝觀否遁姤十卦消息觀之惟復於五隂曰朋復同在震體但有戒謹恐懼心不論隂陽皆同門之交同方之士故喜其來泰三隂雖外順明曰小人不與為朋故曰朋亡民雖小人等吾同胞故泰曰左右民臨曰容保民剝曰民所載觀尚觀民姤病逺民君子於民曰親曰仁無所不厚曽以小人不得與民等視而故忿疾之棄絶之故臨咸泰包荒壯利貞夬遇雨雖柄在君子惟有感與包而無取乎觸尚乎戎若剝與觀生否休遁嘉姤含章柄已不在君子徒與小人為讐豈非自輸其載自不並生自不肯休自耦怨自醖釀惡毒而莫之救以死乎君子成人之美不成人之惡尤在處小人上得力處得小人妥帖小人不得稔其惡肆其毒以貽害於宗社生靈此皆姤章遁嘉觀生剝與之能事而否五之休其成小人尤大故曰大人吉也泰中爻之用為兌震以震為重否中爻之用為巽艮以艮為重泰是治平之世人心易溺於晏安二為震恐竦懼常如雷動域中故曰用馮河不遐遺否是閉塞之世人心易至於淆亂五為鎮定砥砫不啻萬仞壁立故曰休泰以君子原始匪震無出至歸妹而震兌合德有東有西有生有成舉一世而躋之男女以正婚姻以時之域帝乙甲剛乙柔乾甲坤乙五以坤行震若不敢為天下首也以祉福所止曰祉上自為帝下逮庶人而止也故特稱元吉否以君子要終匪艮無成五止而若遺之休二巽而承之以吉止而巽動不窮於德既儉何難不避無祿可榮身安為榮泰亨進而道行之亨否亨退而道尊之亨自古君子進退皆有餘裕在內內重在外外重否亨不讓於泰亨故於二特曰大人否亨於五又曰大人吉易為君子謀不為小人謀以泰否觀之尤分明七姤陽中之隂動中之靜復隂中之陽靜中之動邵子詩天根月窟間來往三十六宫都是春曰都是春便知根窟來往滿盤都是生幾矣乃姤不言幾而復言幾以造化平分看則有隂陽動靜之分以造化合一看陽兼隂動該靜復統姤故如主靜説猶似以姤起義從腰説起如慎動説乃是以復起義從頭説起從頭説起故復可言幾以全體該貫姤不可言幾以隂無直遂之義不可並陽以為主耳且不但不於姤言幾亦不於剝言幾以剝剛上碩其體方寂就如一粟粒一木果完實堅固就下地也不即生須待時至後生若是收藏得好便隔却一兩年三四年也不壞也依然會生然必到下地微萌時方謂之動之微方謂之幾若未下地時總無端倪可言故不謂幾言幾欲人知劈頭慎動一脈不言幾但言碩又欲人知感通前蚤有一步寂然不動安止欽止聖功也如乾劈頭往西北仍是剝之果到艮反震方是復之仁謂剝果復仁有兩般不得然剛止言碩是大哉乾元之全體剛動言微則全體發動之端倪雖曰剛動之端倪其實只是剛止之全體故聖人於復止曰剛反若如後儒説十月純坤陽氣消盡隂極回陽逐日漸生積到一月方始成其為復恐非聖人於復一驀直能見天地之心之義耳八分隂分陽迭用剛柔此通乎六十四者乃夫子彖易止於噬賁節三卦言分噬節俱言剛柔分噬又言合節言剛得中噬言柔得中又言上行賁言分剛上柔不言分亦不言得中云何天向一中分造化天地節而四時成二分二至皆中春秋言分冬夏言至以冬之至為日南至短極隂極夏之至為日北至長極陽極惟如二分乃日晷黃道隂陽之中即天腰赤道之中天惟此一中春秋分分此節惟此一中剛柔分分此故節之剛柔分乃春秋分之分一中分造化之分節無不中所以為分分無不中所以為節若噬之剛柔分剛下震而動柔上行而明可分可合故言分又言合柔中非可自為中原麗乎剛中以為中非上行則無貴故又言上行賁柔在下非如噬柔上行賁剛上止亦異於噬剛下動故柔來文剛不言分亦不言得中明其主不在柔剛上文柔言分明賁剛之上止無異於節剛之得中而主在上其餘隨蠱咸恆損益漸歸妹則無離坎剛柔之中困井豐旅渙既未濟雖得離坎剛柔之中然於分義皆無取即如渙者節之倒體節言分澤止之體有限制有分假渙不言分風散之體無限制無分假耳九易象鈔卷十六
