body:
  text: 易像鈔卷十七明胡居仁撰書答友人來教天地人之動無端六爻之動亦無端天地人之動不已六爻之動亦不已似若天地人之動與六爻之動分為兩截便非羲文周孔之易亦即有板定移動不得之處鄙意直謂易外無我我外無易乾坤成列而易行乎其中者我也爻也者效天下之動我此身無一息而不動一息不動即死即來教云一息不動則人道缺是也既無一息不動便是無一息之動而非三極之道茍非其人道不虚行直妄動耳無所謂道也聖人敎人學易不止求諸書全是求諸我一息之動而得便成吉𧰼一息之動而失便成凶𧰼故曰吉凶者得失之𧰼也一息之動而能憂能虞便成悔𧰼一息之動而弗憂弗虞便成吝𧰼故曰悔吝者憂虞之𧰼也一息之動而進以禮退以義進救民退修己日就月将日新月盛便成變象乆而熟焉利而安焉不知所以然而然焉便成化象故曰變化者進退之象也一息之動而為晝之旦便成剛象一息之動而為夜之晦便成柔象故曰剛柔者晝夜之象也無息而無動動即是爻無動而非三極之道爻即是道君子居而安樂而玩者如此而已矣來敎列吾身之之貴賤云云此實獲我心者又云以易書之易為吾心之易以吾心之易㑹易書之易則程子云易不止是一部書似無兩様見觧此處體說未至終是易自易而我自我來敎晝有晝之道乾為動直坤為動闢於人為感通夜有夜之道乾為静專坤為静翕於人為晏息晝非自晝而為夜之根夜非自夜而為晝之根與夫子逝者如斯夫不舍晝夜之云㣲有未合不舍晝夜曰逝通乎晝夜曰道此處間不容髪一息而舍即非逝一息不通即非道人之感通宴息無截然晝夜之分如人睡去惟氣極昏濁之人纔有不覺不知處稍清明烱烱靈明便瑩然自在有夢無夢夢吉夢凶一一記得此通乎晝夜之道而知時有晝夜而此知無晝夜念有動静翕闢而此知無動静翕闢神无方而易无體便是此箇道理陽明先生喫𦂳為後學提醒良知即此通晝夜之知亦即乾知大始之知細細體認日間念起念滅一一能知夜間有夢無夢一一能知大學欲誠其意先致其知亦以意猶形而下日之念夜之夢皆意所變化知乃形而上超乎念而下視乎念超乎夢而下視乎夢今人念慮紛飛中一覺即無魂夢擾亂中一醒即無以門下高明諒必有以覺此醒此矣一承教鬼神不可分經内有况于人况于鬼神以鬼神對人豈以兩而對一乎最是但此以幽明生死鬼神竝舉幽明無二故死生無二說鬼神無二情狀岐而二之者支幽有鬼神明有禮樂生為人死為鬼聖人以神道百姓與鬼謀強而一之者混苐以鬼神分邪正直是不通之論耳可一筆抹殺也今湏密切反諸人身而求之尋常怨詈人則曰鬼稱許人則曰神詩書記載之所及曰生而神靈曰乃聖乃神此㫁不可移神而為鬼者也曰某為鬼躁某為鬼幽曰為鬼為蜮則不可得此㫁不可移鬼而為神者也即如經内曰天生神物曰神而明之神而化之曰隂陽不測之謂神曰非天下之至神其孰能與于此曰唯神也故不疾而速不行而至曰神以知來曰神明其德曰民咸用之謂之神曰鼔之舞之以盡神曰精義入神曰窮神知化曰知幾其神曰幽賛神明此處似添不得一鬼字曰人謀鬼謀曰載鬼一車曰高宗伐鬼方曰震用伐鬼方此處似添不得一神字竊意鬼神為德之盛質諸鬼神而無疑與鬼神合其吉凶此鬼神乃與人相對竝舉之鬼神不可分言之鬼神也其他則言神言鬼各有攸當猶之幽自幽而明自明生自生而死自死神有神之情状鬼有鬼之情状似若㣲有分辨又如中庸言鬼神之為德似不是直言鬼神德者得也言其質鬼神而無疑與鬼神合其吉凶有得於鬼神之德故以言其盛也其曰視之而弗見聼之而弗聞體物而不可道此鬼神為德之盛非鬼神之盛也使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右此當下與鬼神合吉凶當下質鬼神而無疑者也進於神之格思思與神格不容測度不容厭怠此齊明無乆暫之渝盛服無離合之間時時承祭祀時時洋洋如在德至此然後為德之盛也故曰夫㣲之顯誠之不可揜如此夫也若脫去為德字様直言鬼神之盛便不成文理矣易言鬼神之情状只是情状鬼神與質而無疑合其吉凶亦似㣲有分辨二承教示心得又近日多暇云云凡人此理不到手恁從舒暢瀟灑􅄣謂之碌碌營營去聖賢名敎樂處霄壤此理到手日日暇時時暇也論語中言君子之泰君子之和君子之坦蕩蕩此暇境也子貢方人子曰夫我則不暇暇在我也發憤忘食樂以忘憂不知老之将至憂食兩忘老矣不覺暇之至也善吾生即善吾死生固暇死亦暇也且夫死者形骸軀殻有時而壊如花之必謝葉之必落者耳我之所以為我者固與之而俱死否乎夜者晝之驗死者生之驗旦晝不清夢魂必濁生如無得死必無歸子之發憤憤義從心從賁賁明也不憤不啟憤斯啟矣忽然夜半一聲雷萬户千門次第開憤而啟也時時憤時時樂終身憤終身樂不憤即不樂不樂即不暇衆囂囂而雜處咸嘆老而嗟卑衆咸嘆老子獨不知老則暇與不暇之究竟也來教云變化之成即鬼神之為鄙愚竊亦有合看乾卦乾道變化各正性命政自分明即以吾身觀之九竅百骸六腑五臟何處不是相得有合若有一之不相得不有合便是病病甚即死此相得有合處即是成變化即是行鬼神􅄣在人迷悟之間耳來教云揲蓍之法只是一箇變化知變化則知神儒者有云信手拈來頭頭是道揲蓍之揲即信手之拈也拈來皆是此理所以謂之行鬼神不特拈來行住坐卧磕著撞著都是此理來教云易之為書非聖人思為之所及而其全體不過寂然不動則是易也從聖人之極深研幾出來也至通志成務此所謂感而遂通也鄙愚尚未能無疑謂幾深即是聖心中不動本體則可謂聖心不動非思為之所能窺測則不可竊疑惟无思无為所以謂之寂然不動也所以謂之深與幾也所以謂之感而遂通天下之故而至神也且夫寂之與感不可判然分為兩截請以鏡喻鏡體光明何思與為常寂常照何時有動何時無照不是隨物妍􅎀之故寂照之中天地皆涵何等深㣲若是鏡中留些形影就如心中著些思為寂者動而感者窒矣聖人極深研幾完其夲體之謂也无思思之故也无為為之故也感而遂通天下之故即所謂故吾也來教云徃來是吾人所不容無所病者憧憧及造化徃來物理屈伸皆自然而然正為吾人學問張本竊疑本義亦原如此但順理著意之間工夫細密卒難到手又致用崇德以尺蠖龍蛇求之􅄣是人之屈而能信蟄而能存處龍蛇之蟄以存身君子之蟄以致用以崇德似皆是同歸殊塗一致百慮之學問來教云知險知阻非知事之險阻知吾心之險阻理本至易而出乎易則險理本至􅂤而出乎􅂤則阻云云至矣但心之與事即異教家亦有金獅子章之說以金作獅看做獅子渾身是獅子而獅子之外無金看做金渾身是金而金之外無獅子若要獅子之外覓金物外尋一箇理事外尋一箇心心事切開兩片如何謂之合外内之道也三答耿庭懐恭惟文學書院之修舉實東南千古創見盛美某雖不肖已有神遊鄙願矧重之以召命之臨古易前已領敎㑹語急讀一過執事真精神真學脉已若溢出而莫可遏於前矣内與元質夜話六義中有人各一見之云此真實體驗語也像𧰼蕪刻原不足塵台目中間甲庚自是不易惟已日出不肖之臆而執事更以乙辛丙丁壬癸窮之實是茫然不知所措雖然舉十干而盡𧰼之于辭謂某卦納某干則後世術家之論耳恐文周不然只謂五行是天地間正當道理出震為甲入兌為庚坎中一陽為生信為戊離中一隂為成信為已不妨實指以示人然文周于戊義猶含于解卦中則正不欲𤨏𤨏定指如世間隂陽五行之術耳若究而言之易中兩處稱帝乙實即是甲乙之乙商家原有帝甲乃不稱帝甲而獨稱帝乙謂泰之五歸妹之五皆出震之柔爻故獨以乙為𧰼而不稱甲以混也以甲庚乙己之例反以三隅言文明處為丙丁言洊水處為壬癸震之剛爻為甲柔爻為乙則兌之剛爻為庚柔爻為辛亦彰彰明矣一伏承教示言言心得不惟某之􅦓陋蕪穢之病一一為之照破而執事之獨立物表遐觀域外之深思亦畧得使瞽愚闚覘彷彿其一二矣感謝感謝内中精義容細細紬繹以請未敢漫以臆對以上負提命至意惟是食子肉進淫女禍君國褒姒之淫慝文王實市之而以亂亡尤物溷其君等語頗覺駭人明夷之六二曰明夷夷于左股用拯馬壮吉象曰六二之吉順以則也如來教云云文王之不順不則莫甚矣此恐干係世教人心不小也昔人有言易竒而法今似單以竒言矣天地人物不敢多為支離即如今日百姓有以偽來執事惟以誠應一人由是千百人由是此所以為虞山之賢父母也此所以為善用易也此所謂易有太極也謂執事有誠外之應理外之應恐執事又自不肯招認矣二來教以易㫁然為知來之書知來必兼數徃世未有知來數徃而不假借於甲子者如云後此㡬月㡬日或㡬年㡬月㡬日必自今日某甲子至後來某甲子方有的據上古聖人作易即作甲子易包羅天地人物而甲子實經緯於其間文王繋易獨露甲庚已三言餘皆不露此必有不傳之秘在故以為鑰也即伏羲當時亦八卦甲厯並興云夫原初聖人畫卦止是畫出乾竒坤偶兩畫示人俾天下盡行曉得人之所以為人底道理只有此兩畫定要掛得到身子上如掛得到身子上便喚做人如掛不到身子上便不喚做人其曰八卦定吉凶掛得到身子上人也吉之定定此也掛不到身子上非人也凶之定定此也聖人非欲預知人後來之吉凶而謂之定也其曰神以知來知以藏徃徃古吉凶之理即今來吉凶之理今來吉凶之理生于蓍徃古吉凶之理具于卦卦爻缺一而徃無以藏矣蓍數缺一而來無以知矣藏徃體天地之撰知來通神明之德類萬物之情藏徃先天地之始而無其始知來後天地之終而無其終藏徃无極而太極知來太極本无極藏徃考三王而不謬知來俟後聖而不惑藏徃曰知以卦為知而卦外無知初非世之伎術之知知來曰神以蓍為神而蓍外無神初非世之神通之神兹義自孔翼外己盡湮晦無有不賺入京焦伎術去若甲子又似縁卦畫而起今以甲子為易之鑰則隂陽厯日視之易詎不為尤要歟恐治厯明時止是六十四中一卦之義耳夫易逆數也謂知來之書詎曰不然顧聖人之言知來也以吉凶之前定為來乎以吉凶之貞勝為來乎如吉凶皆前定中和位育盡性參贊祈天永命等又安所用之行險僥倖将無所不至矣如吉凶皆貞勝則遇災而懼反災為祥矣恃祥而忽反祥為災矣易占義理之占徴往詔來之大業伎占禍福之占揣摩推測之小數自秦漢以來盡以伎占為易占蓋大儒而猶未免矣來教乾坤二卦為諸卦門戸闔闢徃來六十四卦盡在其中有個闗捩子麽既謂之乾坤自然一闔一闢闢戸謂之乾乾則自闢闢故為乾非乾之外又有關捩子以為之闢也闔戸謂之坤坤則自闔闔故為坤非坤之外又有闗捩子以為之闔也來教升謙泰艮臨損節師渙蒙大畜中孚諸卦中爻各含震何俱不繋以甲云云蠱言甲以震為𧰼此不易無疑如升謙等卦亦復繋以甲聖人而為此重􅃨文字則非所以為聖筆矣雖然升之三曰虚邑四曰亨岐震為大塗故虚故亨也謙四撝五侵伐上征震動上行故无不利也泰五曰帝乙歸妹兌為妹震為歸也艮四曰艮其身下止為屈上動為伸艮止而震行也臨三曰既憂之反說以為憂懼者震體也損二戒征懼妄動節二戒不出懼非所止而止皆震也師貞丈人吉長子渙奔機蒙筮初大畜逐良馬中孚鳴和之鶴皆震象皆甲義也不重􅃨繋甲而與甲相通者也來教瞽瞍殺舜紂囚文王為理外之變浚井而出與夫食子肉進淫女為理外之應云云據史記舜穿井為匿空旁出若然瞽以非理加舜變也舜之應之有空可以匿又可以出初不失其常矣紂以非理囚文王變也文之應之據子之翼易曰順以則初不失其常矣食子肉進淫女之云似當入齊東語類中且惟極天下之至變而初不失天下之至常故言不可為典要而即足其義曰既有典常夫是以謂之易有太極也若云稍變尋常莫非理外翻倒太極矣來教象數失傳謂用象用數之孔竅如言象雷以動之一叚與天地定位一叚卦位因何不同帝出乎震一叚與雷以動之一叚卦位因何又不同神也者一叚因何單言六子此等處謂孔子不傳象學不可若謂今人能傳孔子之象學吾必以為未當期之日與萬物之數必非徒為模擬四營十八變豈是揲蓍小法此等處謂孔子不傳數學不可謂今人能傳孔子之數學吾必以為未當惟邵子得象數孔竅邵子曰天數二十五合之為五十地數三十合之為六十及存一去四云云及孔子即象數中賛出許多理趨後人遂單認為言理之書為誤云云夫象數失傳謂言象言數者溺四聖人之意則可若徑謂孔子不傳象學數學然則易翼中所言又何物乎謂今人不能傳孔子之象學數學可若謂又有用象用數之孔竅在象數之外然則象數又何物乎邵子曰易大衍聖人之倚數也天數二十有五合之為五十地數三十合之為六十故曰五位相得而各有合夫聖人明言天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神今却云天數二十有五合之為五十是兩個二十有五矣此從何來地數三十合之為六十是兩個三十矣此又從何來天數二十有五外劈空加一倍地數三十外又劈空加一倍是天地之數凡一百有十矣何以云凡天地之數五十有五也此邵子之倚數而非聖人之倚數一邵子曰五十者蓍數也六十者卦數也五者蓍之小衍也故五十為大衍也夫卦從蓍立蓍以求卦非蓍自蓍而卦自卦也以五十為蓍數單是天數而地無與矣以六十爲卦數單是地數而天無與矣􅄣天地之數為五十有五虚五不用故曰大衍之數五十如曰五者蓍之小衍彼五十者單是天數乎抑兼地數而為言乎抑就天數二十有五而衍其五乎抑就地數三十而衍其五乎如以五十止是天數天數無兩倍也如以五十專為蓍數六十專為卦數以蓍則不通於卦以卦則不通於蓍卦專屬地不應有乾坎艮震等䇿矣蓍專屬天不應有巽離坤兌等卦矣此邵子之衍而非聖人之衍二邵子曰蓍德圓以况天之數故七七四十九也五十者存一而言之也卦德方以况地之數故八八六十四也六十者去四而言之也夫蓍之德圎而神謂卦未立而以蓍言如天體之圓而無方所故曰神耳非蓍單屬天數而不兼乎地也卦之德方以知謂蓍既揲而以卦言如地體之方而有定位故曰知耳非卦單屬地數而不兼乎天也大衍之數五十合天地之數而衍之虚其一以為太極故用四十有九謂四十有九適合七七之數可謂五十為存一而并言之亦可乃謂卦數六十四六十者去四而言之豈如六十為節去中孚以下四卦之說乎吾誠不知何故而去去且欲何之矣其曰蓍用數卦體數用以體為基故存一體以用為本故去四豈天為用數而地為體數乎抑陽專属用而隂專屬體乎圎者本一故蓍存一已不相通方者本四故卦去四尤無去處其曰蓍之用數七并其餘分亦存一之義掛其一亦去一之義與分二掛一歸竒之義不勝剌謬且既謂之自開一門戸自成一體裁又何能為文孔之註䟽也易以象為像數為衍今人不得邵子之意其於皇極經世之言象也象而已像何在乎于其言數也數而已衍何有乎易之言象數也以定天下之吉凶今人之言象數也欲預知人未來之吉凶二程夫子與邵子同里閈數十年絶口不言盖預稽邵子之流弊耳來教以後人單認易為言理之書為誤遂因病某始終認理為易云云易之為易繋辭中已有明訓之用多為葛藤約言之乾坤兩畫一闔一闢而已試駁此兩畫凑手乎未乎如其凑手言數即數言象即象言理即理如未凑手言理非理言數非數言象非象來教云知易即知幾造化之妙隐於無而不能不露於幾以邵子聞天津杜鵑而知二十年後南相之禍以致亂豈無他人而獨曰相年數豈無逺近而必曰二十此非易不能此處謂非易易之為道百物不廢也此處謂足以盡易恐羲文周孔之大㫖不如是之𤨏細矣且夫京郭管李等先知之術果羲文周孔之大㫖乎果與邵子可以例論否乎以京郭管李等例邵子不知邵子者也以邵子例羲文周孔謂之知羲文周孔或未矣尹和靖曰康節之學本是經世之學今人但知其明易數知未來事却小了他朱子曰康節能盡得事物之變却於大體上有未瑩處或問朱子曰先生湏得邵堯夫之術朱子曰吾之所知者惠廸吉從逆凶滿招損謙受益若是明日晴後日雨吾又安能知耶此足以知康節之于羲文周孔不可以例論矣抑邵子之自言曰物理之學或有所不通不可以強通強通則有我有我則失理而入于術來教以認理言易為謬誤得無為邵子之所未許乎又考邵子之言循理則為常理之外則為異矣初未以理之外為易也三古易質疑六條易猶鎻也鎻必有鑰而或者不明其鑰又舉而投之汶汶之地俾天下馳而不返則學易者之過也竊疑易既爲鎻未知何者爲鑰抑未知以鎻爲象乎抑言其鎻而不開必待鑰而後開乎闔户謂之坤闢户謂之乾一闔一闢謂之變易也非其常鎻而不開常闔而不闢又有一物可名爲鑰用以開易之爲鎻者如謂另自有鑰以爲開鎻之具未審即在易内歟抑在易外歟不肖正投之汶汶之地者敢請發鑰武王滅紂實爲丁丑之年武之出兵厥日癸已受命踐祚厥日己卯三言於斯悉符云云竊疑易有甲日庚日己日之象並無丁日癸日之象言丁言癸訓詁家添出之辭耳今援以爲丁癸之符又甲日繋於蠱庚日繋於巽與革義似不相蒙或丁癸已三言與武革命之事符矣彖易聖人謂湯武革命順乎天而應乎人武適有符而湯則何徴蠱言甲亂則有治終則有始之義巽言庚巽為進退不果庚乃㫁制之義丁癸雖或有符而義象則似無取又如革之為義乃徹骨徹髓盡為翻轉透底變化之大學問大人虎變未占有孚龍興而雲從虎嘯而風烈天下莫不風從之象亦非定指征伐為革命為虎變大人君子有透底變化之學問尤為革命之大虎變之大者􅄣之要自黄離已日中流出兌離合而成革離即已兌即庚已而庚庚因己有徹底變化之象庚己大義似不過如此一邵子循理爲常理之外為易故易也者變也變也者權也及唯變是適不論常理云云竊疑不可為典要唯變所適詳其上下語意猶云不可以上下剛柔為典要也唯變所適謂上下无常剛柔相易變之所適無適而非典要非其無典要也後結言既有典常謂以典要爲常原始謹初率其辭之所指揆其方之所向出以度外入以度内卦卦所適之變盡以典要為常而有其常爻爻所適之變盡以典要爲常而有其常如是則得其人而道行故曰茍非其人道不虚行也昔者聖人之作易將以順性命之理一部易皆性命之理也以理之外爲易則謂易爲變將變在理外謂變為權在理外豈常為理而變非理乎豈經為理而權非理乎若謂有理外之變理外之權是以有理外之易常理在所勿論之云亦邵子之易非羲文周孔四聖人之易也一象數失傳無從討究雖幸有邵子之皇極在而汗漫難尋機闗尚隠云云竊疑易有卦爻卦卦象卦卦數爻爻象爻爻數也易在而象數在如以乾言之六畫皆竒乾之象也六畫皆乾竒之數也潛見惕躍飛亢皆象也初二三四五上爻各三十六䇿合之二百一十有六䇿皆數也舉一卦而卦卦之象數可推舉一爻而爻爻之象數可推不知何以謂之失傳若邵子之皇極自是邵子之象數與易之象數似若夐不相蒙然􅄣不出易之象數中元亨利貞易之四變也仁義禮智人之四應也假令當體仁而嘉㑹當和義而貞固已失其所以應變云云竊疑元亨利貞四字已該盡一部易理􅄣之一體分作四截一氣分爲四叚故有此四字名目假令當體仁而嘉㑹如春行夏令也當和義而貞固如秋行冬令也正以失其常理故至此聖人言易有太極常也周子翻之曰无極而太極太極本无極无極易也太極不易也至易而不易不易而至易至變而不失其常至常而未嘗不變此所以為易謂易不論常而專論變應變為易而拘常非易此足以破世人拘常之固而於易有太極之義似屬未圎又仁義禮智雖名性之四德其實只是一德時出一德者乾坤之元也元德􅃜欠易失全體遂有應用反背之處耳用易之道有三有無心之用有有心之用有引証之用凡無心中忽有變動或身或物卦象自呈則幾來矣則用易之候矣故曰㡬者動之㣲吉之先見云云竊疑人外無易易外無人俟㡬來而後用易則易有逺人之時矣且所云㡬者謂何㡬者動之㣲天理迅動之端倪也聖人於復言㡬於豫言㡬復雷在地中豫雷出地上執事所云邵子雷起之問雷起者帝出乎震之㫖也寂而感晦而朔亥而子皆雷起之義𧰼執事無心中忽動其謂是與顧無心之變動義亦㣲有不同寂而感之變動或雷在天上或雷行天下此乾道無心之變動也晦而朔亥而子之變動或雷在地中或雷出地上此坤道無心之變動也聖人不于乾道之變動言幾而特于坤道之變動言幾此其義㣲之㣲矣是故雷自天行起之自天乾道也聖人分上事也雷從地出起之自地坤道也賢人君子分上事也夫易聖人所以極深而研幾堯舜兢兢業業一日二日萬幾俟幾來方為用易之候踈漏似屬太甚矣如何如何古易題辭易有今古之異乎羲畫文彖周爻孔翼皆古也無今也今古之分漢有費直本初畫全卦再畫本卦又畫覆卦繋以彖爻與用九用六之辭後以一傳字加彖傳之首鄭𤣥本於費本有省移初九至用九爻位之文加爻辭之上合彖傳於經於彖傳加彖曰字於𧰼傳加𧰼曰字王弼本移文言附乾坤二卦之後加文言曰字以孔子贊爻之辭本以釋經乃各附當爻毎爻加𧰼曰字歴代因之是為今易漢藝文志云易經十二篇吕大防定為經二卷傳十卷晁說之釐為八卷吕祖謙復定為十二卷一以古為㫁是為古易瀛海耿侯之述古易其自彖𧰼以下有所更置序正者易辭也其于易畫上下二篇以今文上篇三十卦一百八十爻下篇三十四卦二百有四爻通為六十四卦三百八十四爻古文上篇一十八卦一百有八爻下篇一十八卦一百有八爻通為三十六卦二百一十六爻變之即六十四卦三百八十四爻侯之言曰六十四卦三百八十四爻易之體也三十六卦二百一十六爻易之用也文王泄天地鬼神之秘於指掌其用至妙而難言故寓不言之意于譜卦之中使學者得意而忘言嗚呼得意忘言兹侯之述古之遐思乎本至愚極陋原不能言而竊逆以意卦有六十四之上合彖傳於經於彖傳加彖曰字於𧰼傳加𧰼曰字王弼本移文言附乾坤二卦之後加文言曰字以孔子贊爻之辭本以釋經乃各附當爻毎爻加𧰼曰字歴代因之是為今易漢藝文志云易經十二篇吕大防定為經二卷傳十卷晁說之釐為八卷吕祖謙復定為十二卷一以古為㫁是為古易瀛海耿侯之述古易其自彖𧰼以下有所更置序正者易辭也其于易畫上下二篇以今文上篇三十卦一百八十爻下篇三十四卦二百有四爻通為六十四卦三百八十四爻古文上篇一十八卦一百有八爻下篇一十八卦一百有八爻通為三十六卦二百一十六爻變之即六十四卦三百八十四爻侯之言曰六十四卦三百八十四爻易之體也三十六卦二百一十六爻易之用也文王泄天地鬼神之秘於指掌其用至妙而難言故寓不言之意于譜卦之中使學者得意而忘言嗚呼得意忘言兹侯之述古之遐思乎本至愚極陋原不能言而竊逆以意卦有六十四而侯譜之止於三十六乾卦一爻之䇿數也爻有三百八十四而侯譜之止於二百一十有六全乾六爻之䇿數也侯嘗憂𧰼數難明而謂𧰼數立則天地鬼神未來之秘如指諸掌舉全易之𧰼而統之於乾𧰼舉全易之數而統之於乾數乾𧰼立天下其有遺𧰼乎乾數立天下其有遺數乎本又反覆以研侯意反對三十六卦其實又只是六大卦如卦之有六爻自乾坤至畜履合六卦為一大卦自泰否至噬嗑賁自剝復至坎離皆然此上篇三大卦也自咸恒至損益合六卦為一大卦自夬姤至漸歸妹自豐旅至既未濟皆然此下篇三大卦也乾坤隂陽剛柔之所自始管領二大卦如卦之􅀄二兩爻剥復陽剛消長之際管領二大卦如三四兩爻夬姤隂柔消長之際管領二大卦如五上兩爻是又合三十六而止成一卦六爻云爾此正所謂易簡而天下之理得𧰼豈逺乎哉數豈多乎哉豈凡今學易者之所易窺乎哉昔者堯舜稽古精而一孔子好古博而約侯懼人之多言無當而曰學易者用易之謂也古易之譜譜此或曰文之序無改於羲畫也侯之譜無改於文序也余曰文雖無改於羲然不曰易興於中古乎侯兹無改於文而譜之意則逺矣思挽今而進之古者至矣視世之窮年屹屹殫精註觧以言求易而卒無得者相去逺矣萬厯丙午秋季之吉易像鈔卷十七
