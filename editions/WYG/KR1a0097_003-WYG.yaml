body:
  text: 易像鈔卷三明胡居仁撰卦圖始生自乾一至坤八六十四卦皆用一倍法兩兩生去雖未生出數可逆加故曰易逆數潛室陳氏隂陽各居本方則陽自下而上隂自上而下皆為順隂陽互居其方則陽自上而下隂自下而上皆為逆此自然之𫝑固有真至之理也朱子乾一兌二離三震四巽五坎六艮七坤八大分小分内分外分横分直分左分右分正分斜分不差毫􅁵无徃不合朱子圓圖左陽右隂左三十二卦陽始于復之初九歴十六變而二陽臨又八變而三陽泰又三變而四陽大壯又一變而五陽夬而乾以君之陽之進也始緩而終速其進也以漸所謂陽在陽中順也陽主升自下而升亦順也復至无妄二十陽明夷至同人二十八陽臨至履亦二十八陽泰至乾三十六陽二十陽之微二十八陽之著三十六陽之盛陽在北則微在東則著在南則盛亦順也陽順而隂逆不言可知矣隂在右方三十二卦則反是思齋翁氏乾兌離震在天為陽在地為剛在天則居東南在地則居西北巽坎艮坤在天為隂在地為柔在天則居西北在地則居東南隂陽相錯天文也剛柔相交地理也邵伯温所謂圓圖其實即横圖䂓而圓之耳横圖震巽復姤正在中間先自震復而却行以至于乾乃自巽姤而順行以至于坤便成圓圖而春夏秋冬晦朔弦望晝夜昬旦皆有次第莫不由乎其中矣玉齋胡氏先天圖八卦各自為一節不論月氣先後不然臨本為十二月之卦何以為春分卯中遯本為六月之卦何以為秋分酉中玉齋胡氏六十四卦圓布者乾盡午中坤盡子中離盡卯中坎盡酉中陽生于子中極于午中隂生于午中極于子中其陽在南其隂在北方布者乾始于西北坤盡于東南其陽在北其隂在南此二者隂陽對待之數圓于外者為陽方于中者為隂圓者動而為天方者静而為地者也西山蔡氏復至乾凡百一十有二陽姤至坤凡八十陽姤至坤凡百一十有二隂復至乾凡八十隂詩自從㑹得環中意閑氣胸中一㸃无邵子邵子之學全在先天圖上更不拈起文王周公易辭一生用力多在卦圖上西山蔡氏古易六十四卦只是横圖與圓圖方圖而已後世聖人繫辭時遂不容不逐卦拆出㸔虚齋蔡氏圖之左邊起乾夬歴八卦而至暌歸妹又歴八卦而至家人既濟又歴八卦而至頥復圖之右邊起姤大過歴八卦而至未濟解又歴八卦而至漸蹇又歴八卦而至剝坤左右各二卦互一卦合六十四卦互體只成十六卦又合十六卦互體只成四卦乾坤既濟未濟也周易始乾坤終既濟未濟以此草廬吳氏復至乾陽自少而多極于乾則一變為姤姤至坤隂自少而多極于坤則一變為復六十四卦兩兩相對皆歴三十二位而變而真機則在坤復乾姤之間楊氏一氣循環復至乾生物之始故震兑隂上陽下為交泰之義主動言太極之用以行姤至坤成物之終故巽艮陽上隂下為尊卑之位主静言太極之體以立徐氏陽在隂中陽逆行隂在陽中隂逆行陽在陽中隂在隂中皆順行邵子圓圖左屬陽右屬隂坤无陽艮坎一陽巽二陽為陽在隂中逆行乾无隂兑離一隂震二隂為隂在陽中逆行震一陽離兑二陽乾三陽為陽在陽中順行巽一隂坎艮二隂坤三隂為隂在隂中順行此皆以内八卦三畫隂陽言若以外八卦推之隂陽逆順行亦然易是互相博易之義觀先天圖便可見東邊一畫隂便對西邊一畫陽蓋東一邊本皆是陽西一邊本皆是隂東邊隂畫都是西邊來西邊陽畫都是東邊來姤在西是東邊五畫陽過復在東是西邊五畫隂過互相博易而成易之變雖多般然此是第一變朱子冬至子之半冬至一陽胚于觀之半自觀之半合比剝復頥至屯之半五卦皆屬子坤為子中子半後半也子初為前半子半為後半朱子叙二十四氣有言初言半言中毎月二氣前十五日為初初即前半厯家之所謂節後十五日為中中即後半厯家之所謂中惟至分四節曰中以其為子午卯酉之中圖之乾坤坎離當上下左右之中也楊止菴圖夬姤夾乾剝復夾坤由姤至夬乾透體以坤道摩盪一過矣由復至剝坤透體以乾道摩盪一過矣八卦之互相摩盪也亦然序以乾坤剝復夬姤立三才之義是為羲文相授守一道伏羲之易當以圖觀浚儀王應麟邵子觀物外篇天地之氣運北而南則治南而北則亂張文饒謂先天圖自泰歴蠱而至否自否歴随而至泰即南北之運數泰南歴蠱凡十五卦至否共三十二卦否北歴随凡十五卦至泰共三十二卦六十四卦圓為天无不虚方為地无不實人有圓之虚方之實天下之能事備矣夬極而乾反為姤剝極而坤反為復夬姤夾乾乾君定于南剝復夾坤坤藏定于北同人與師對待同人春之分師秋之分同人反大有師反比亦對待履與謙對待履夏之立謙冬之立履反小畜謙反豫亦對待同人大有小畜履皆主乾以開泰師比謙豫皆主坤以傾否文序以此十卦合為首一局便盡皇羲先天一圖之義六十四卦分配節氣二至二分四立總為八節每節各兩卦外十六氣毎氣各三卦合之為六十四章本清曰自乾之純陽歴離兑以至一陽之震而其原則為純隂自坤之純隂歴艮坎以至一隂之巽而其原則為純陽非數往之順乎自震之一陽歴離兑以至乾之純陽而隂又將姤自巽之一隂歴坎艮以至坤之純隂而陽又將復非知來之逆乎可見全圖一也由左觀之隂陽皆逆由右觀之隂陽皆順左旋則總為知來右旋則總為數往不必從中半分為數往之順半分為知來之逆也易數皆未生總以知來為主由一竒以推極乎數之陽由一偶以推極乎數之隂自震至乾自巽至坤按圖象與卦位皆逆數也况數其巳往知其將來理本一致而隂陽消息盈虚循環无端惡可截然分之為二哉又曰造化之理非逆則无順使皆順窮矣聖人作易叅贊之深㫖全在於逆故曰易逆數也金氏曰伏羲之畫卦也有圖而无書有占而无文時未有文字此六十四卦者即六十四大字也是六十四字者天地人事時義物理之常變悉管乎是矣六十四卦内三隂三陽分二十卦六子内俱三震坎艮内合巽離兑巽離兑内合震坎艮乾坤内唯一乾内合坤坤内合乾其一五分十二卦乾坤内各三乾内合巽離兑坤内合震坎艮六子内唯一震坎艮内合坤巽離兑内合乾二四分三十卦乾坤内各三乾内合震坎艮坤内合巽離兑六子内各四震坎艮内合震坎艮乾巽離兌内合巽離兑坤三三分一五分為竒皆隂陽配合共三十二二四分合乾坤為偶皆偏陽偏隂共三十二六十四蓋半交而半不交此冬夏所以至而春秋所以分孟子言天下之生乆一治而一亂也天地原是平分而運乾坤内三分者一一五分者三純者一二四分者三六子内一五分者一三分者三二四分者四竒分半交偶分半不交卦卦皆然是之謂平无如人之不平何矣作易聖人之有憂患憂此患此乾不變對坤盡變一變對五變共十二卦二變對四變共三十卦三變首尾共二十卦居中六變坤坤變即反此即乾坤而六子可知合之為六十四可知其无不對待處便都是天地之平處也先天圓圖卦氣或見與月卦不合欲有改為此非可以人為智巧與也間嘗考之坤復之交合十二畫止一陽爻其為冬至子半一陽生之象无疑自冬至至大小寒八卦二十陽陽始生也自立春至雨水驚蟄八卦自春分至清明榖雨八卦俱二十八陽陽漸長也自立夏至小滿芒種八卦則三十六陽陽極盛矣此與自復而臨而泰而大壯而夬而乾夫何以異乾姤之交合十二畫止一隂爻其為夏至午中一隂生之象无疑自夏至至大小暑八卦二十隂隂始生也自立秋至處暑白露八卦自秋分至寒露霜降八卦俱二十八隂隂漸長也自立冬至小雪大雪八卦則三十六隂隂極盛矣此與自姤而遯而否而觀而剝而坤又何以異而必區區以月卦為拘夫乃非六十四縱横曲直反覆相生自然之造化也耶天地一歲之運即天地一元之運説卦氣者以復臨泰大壯夬乾姤遯否觀剝坤十二卦配十二月自无不合但以先天圓圖六十四卦為配除復稱至日復為陽至為十一月一陽生之卦則姤為隂至為五月一隂生之卦勿問可知乃臨十二月卦而屬春分泰正月卦大壯二月卦夬三月卦而俱屬立夏遯六月卦而屬秋分否七月卦觀八月卦剝九月卦而俱屬立冬竝係舛牾且隂陽生長進退之序又復踈密不同是以有改為一圖又竊推之聖人贊易既于復卦可考合二至二分四立之消息亦原有帝出乎震一章見于大傳似當有後天六十四卦一圓圖以明之蓋先天體也綂明隂陽之至後天用也分四分八分十二詳見時令之全故又為補添一圖如右俟知者詳考或曰子之謂先天似矣如後天所屬復多不𩔖何曰冬至坎中立春艮中春分震中立夏巽中夏至離中立秋坤中秋分兌中立冬乾中此則四時八節十二月无一不正且與出震齊巽見離役坤説兌戰乾勞坎成艮无一而不脗合初非私意小智有所强為安排布置于其間先天坤復之交為冬至子中後天既濟坎之交為冬至子中先天乾巽之交為夏至午中後天未濟離之交為夏至午中先天坤隂窮而震陽始生後天坎得坤位一陽正孕于坤中且與離互精而聯合既濟為火隂根乎水陽先天乾陽窮而巽隂始生後天離得乾位一隂正孕于乾中且與坎互精而聯合未濟為水陽根乎火隂先天見天地定位之全體後天見火水不相射之大用離坎之中南北之正中天地之大中也左分為陽為生右分為隂為成故坎起既濟為火隂極而水陽生為冬日長至至未濟而水陽復極離起未濟為水陽極而火隂生為夏日短至至既濟而火隂復極以一歲分隂陽既濟半未濟半未濟邊三十二卦坎陽為主為始終生數二十卦成數十二卦既濟邊三十二卦離隂為主為始終成數二十卦生數十二卦綂隂陽觀歲運邵子所謂水火相逮既濟未濟于此可考唐傅仁均曰理厯之本必推上元之歲日月如合璧五星如連珠夜半甲子朔旦冬至自此以後既行度不同七曜分散不知何年更得餘分普盡還復總㑹之時惟日分氣分得有可盡之理因其得盡即有三端之元故造經立法者小餘盡即為元首此乃紀其日數之元不關合璧之事矣今圖冬至起既濟即古法上元連珠合璧夜半甲子朔旦冬至一九相因定象俱在此每歲日行黄道一週天月行月道二十七日有餘一週天月道交絡黄道每行黄道内十三日有竒而出又行黄道外十三日有竒而入終而復始亦俱在此坎主冬至而既濟内體離為極南故曰南至離主夏至而未濟内體坎為極北故曰北至又皆實理實象竝非牽合乾坤易之門乾變六一變姤同人履小畜大有夬變五二變遯訟巽鼎大過无妄家人離革中孚暌兌大畜需大變壯四三變否漸旅咸渙未濟困蠱井恒益噬嗑随賁既濟豐損節歸妹泰變三四變觀晉萃艮蹇小過蒙坎解升頥屯震明夷臨變二五變剝比豫謙師復變一六變坤一爻變六五爻變六二爻變十五四爻變十五三爻變二十六文變一合乾坤不變為六十四所謂天地設位而易行乎其中乾坤成列而易立乎其中乾坤為易之門皆如此蓋六十二卦皆乾坤之變而坤偶又皆乾竒之變故曰天下之動貞夫一故曰吾道一以貫之朱子易學啓蒙列為三十二圖其實只是一圖也羲畫六十四卦文序反覆合之止成三十六乾坤屯䝉字位過密無法显示需訟師比小畜履泰否同人有大謙豫随蠱字位過密無法显示臨觀噬嗑賁㤗否二變否變噬嗑泰變賁剥復无妄畜大旋乾轉坤傾否開㤗胥自複姤之幾始頥大過坎字位過密無法显示離之家隂陽之府咸恒震艮巽兌二合咸㤗變恒㤗否三變否變遯壯大晉夷明家人暌蹇解損益字位過密無法显示夬姤萃升夬姤乾合巽兌而乾不復見萃升坤合巽兌而坤不復見困井泰否五變否變困泰變井革鼎字位過密無法显示震艮漸妹歸豐旅泰否七變㤗變豐否變旅巽兌渙節屯䝉震艮合坎之始渙節巽兌合坎之終泰否八變否變渙泰變節中孚字位過密無法显示小過合之終也既濟濟未泰交義象望天下後世開之于无窮耳乾坤坎離在上為主各六在下各二自相合為卦八互相合為卦八震艮巽兌在下為主各六在上各二自相合為卦八互相合為卦八乾合震艮巽兌四在上四在下坤合震艮巽兌六在上二在下坎離合震艮巽兌二在上六在下乾坤十六體十二在上四在下巽兌十六體十二在下四在上震艮十六體上七下九坎離十六體坎上八下八離上六下十震兌陽畫在下上皆下卦以合陽下皆上卦以合隂艮巽陽畫在上上皆上卦以合陽下皆下卦以合隂上坎不合離離不合坤震不交巽艮不交兌下震艮不合坤離不合乾羲畫對待之體文序流行之用以文序乾坤等八卦對屯蒙等五十六卦八卦對待之體五十六卦流行之用八卦乾坤配天地坎離配日月震艮巽兌合為頥大過中孚小過配四時天地日月四時萬古如一故不變上序陽以屯始也貞為震即出震之義下序隂以咸始咸悔為兌即入兌之義陽長自下隂消自上陽長自東隂消自西朱子曰長處便是陽消處便是隂進處便是陽退處便是隂聖人尊陽抑隂之義即此可以槩見蔡氏曰爻之竒偶就該得消息卦之消息就當個竒偶也上乾坤正交為泰否父母之象六子不交男女之象下六子正交為咸損恒益既未濟夫婦之象每卦必有對兩卦為一對一直具十二畫畫卦此法重卦此法序雜卦亦此法如首合乾坤兩卦而觀乾六畫在上坤六畫在下便見乾為主坤為從天尊地卑乾坤定之象又為黄帝堯舜垂衣裳而天下治之象乾坤相綜為變化而否泰居中坎離相綜為變化而既未濟居終艮巽相綜為變化而損益居中震兑相綜為變化而恒咸居中此泰否所以為首局既未濟所以為終局咸恒損益所以為中局三隂三陽之卦泰正交否定位正交全定位半随蠱噬嗑賁咸恒困井漸歸妹渙節十二卦皆先随後蠱等皆交泰之正交損益豐旅既濟未濟六卦皆先損後益等皆位否之定位无徃非陽全隂半之義乾坤屯蒙需訟合為首一局十八畫剛爻十八畫柔爻雖若剛柔平分實則純體陽剛屯蒙主震艮合坎屯雷雨上動為膏澤天下有君道蒙山泉下出為源脉天下有師道需訟主乾合坎以不陷外險為需以有孚内險為訟需向外一歩即防失脚訟向裏一歩即察非心四卦首序于乾坤成列後在文王為臨保緝熈在堯舜則危微精一萬古聖學真血脉真工夫便于是可見乾坤交而成泰否序先泰後否乾居中為主坤居上下為客泰固藉君子在内否亦藉君子在外此從古以來之世道雜先否後泰則君子竝生小人并包兼容之天度也坎一剛居坤二五用事成師比于泰先離一柔居乾二五用事成同人大有于否後巽兑一柔居乾三四用事成畜履于泰先艮震一剛居坤三四用事成謙豫于否後一剛一柔為主之卦各六主坎震艮者親地主離巽兑者尊天四居泰先四居否後皆以夾輔乾坤是為乾坤交而旁生六子之象二為剝復即謙豫之倒體又為中十二卦主人二為夬姤即小畜履之倒體又為後十二卦主人乾坤至謙豫凡十六卦屯蒙合三男以有事于坤屯蒙中爻皆坤需訟合三女以有事于乾需中爻為離兑訟中爻為離巽師比合三男以有事于坤師中爻為震比中爻為艮小畜履合三女以有事于乾小畜中爻為離兌履中爻為離巽同人大有合三女以有事于乾同人中爻為離巽大有中爻為離兑謙豫合三男以有事于坤謙中爻為坎震豫中爻為坎艮殆若邵子所謂十六而天地之道畢然反覆合之止成九卦又太陽數九之義象震艮首用事合坎為屯蒙合離為噬嗑賁巽兌首用事合乾為小畜履合坤為臨觀震艮巽兌互合為随蠱泰之先有六坎皆震艮乾坤之合否之後有四離則震艮與乾之合泰之先四乾二坤否之後四坤二乾皆適相等泰否合既象乾内坤外泰前小畜履再前為師比否後同人大有再後為謙豫亦象乾内坤外是為序卦首局内外賔主之辨邵子自古國家其興也未始不由君道盛父道盛夫道盛君子之道盛中國之道盛其亡也未始不由臣道盛子道盛妻道盛小人之道盛夷狄之道盛咸于泰否象之矣乾開坤闢後首序六坎實象有三十六重險要出屯與蒙為一對合十二畫觀之坎之六畫包震艮于中屯蒙无亨上下十二重循環逼塞為險要動无出之處要止无入之處需重以坎包乾需訟无孚上下十二重循環逼塞為險但有入淵之凶竝无渉川之利師比以坤包坎師比无貞上下十二重從中結塞為險无師不為天下之毒无比不成匪人之傷自同人至大畜十四卦反覆止成七卦又若合為一局泰否合乾居中上下皆坤臨觀合雖純體隂柔亦乾居中上下皆坤臨觀前随蠱後噬嗑賁皆三隂三陽再前謙豫再後剝復謙倒為剝剝倒為謙豫倒為復復倒為豫皆一陽五隂再前為同人大有乾離之合五陽一隂再後為无妄大畜乾與艮震之合四陽二隂其先後夾輔臨觀亦如其夾輔泰否縁泰否中已含臨觀二象臨觀中復含泰否二象之故泰否合先師比後謙豫共十卦為一局臨觀合先同人大有後无妄大畜共十四卦為一局剝復亦先随蠱後坎離共十四卦為一局屯蒙需訟四卦剛柔各十二畫合乾坤為三十六居前頥大過坎離剛柔各十二畫合乾坤亦三十六居後亦適相等咸恒至損益十二卦合為一局咸恒兑巽包艮震于中損益艮震包兌巽于中咸損相反恒益相反遯大壯二柔四剛乾居艮震外晉明夷二剛四柔坤離之合家人暌二柔四剛離與巽兌之合蹇解二剛四柔坎居艮震外爻各三十六剛柔相等乾坤坎離俱備于中夬姤至革鼎八卦合為一局夬姤兌巽合乾萃升兌巽合坤困井兌巽合坎革鼎兌巽合離震艮至渙節十卦合為一局豐旅震艮合離渙節巽兌合坎漸歸妹巽艮震兑之合震艮至既未濟十四卦合為一局震艮居前巽兌居後分隂分陽多自為對此震艮巽兌之分體漸歸妹中孚小過震艮巽兌之合體豐旅渙節震艮巽兌之互體合中孚小過既未濟居終與上經頥大過坎離同坎離居中前頥大過後咸恒咸恒即頥大過之交合前无妄大畜後遯大壯遯大壯即无妄大畜之交合无妄大畜頥大過坎離咸恒遯大壯十卦又若聯合為中一局泰否合中分之乾六爻居中坤六爻居上下臨觀合三分之乾四爻居中坤四爻居上四爻居下遯大壯合三分之坤四爻居中乾四爻居上四爻居下遯大壯亦臨觀之反體臨觀純體坤柔遯大壯純體乾剛遯大壯前十卦始剥復後十卦終夬姤剝復中爻純坤无妄大畜上下皆乾咸恒中爻亦乾頥大過坎離四卦居中頥坎即蹇解之合大過離即家人暌之合夬姤中爻純乾損益中爻皆坤晉明夷上下亦坤家人暌蹇解四卦居中巽兌合離為家人暌即大過離之合艮震合坎為蹇解即頥坎之合剝復至夬姤二十二卦聯合于中又為一大局震原初始艮要上終自合為頥含剝復二象反而中合即為小過肖坎巽原初始兌要上終自合為大過含夬姤二象反而中合即為中孚肖離泰否居中前後四卦剛柔俱十二爻合乾坤為三十六剝復居中前六卦自随至賁剛十六爻柔二十爻後六卦自无妄至離柔十六爻剛二十爻合之三十六夬姤居中前六卦自家人至益後六卦自萃至鼎剛柔皆十八爻合之三十六序卦聖人之心之極其整密于此亦畧可窺其萬一乾坤合為泰否重乾在中坎離合為既未濟重離在中參伍至此危微精一聖功无餘藴矣泰否後由随蠱至既未濟凡十八變皆乾坤三隂三陽之交合无非保泰傾否之時用随蠱否泰初上變邵子泰到盛時須入蠱否當極處却成随噬嗑賁困井否泰二五初上變咸恒損益否泰三四初上變漸歸妹否泰三四變豐旅渙節否泰二五三四變既未濟否泰二五變自剝復至損益剛爻原始要終之卦多自夬姤至既未濟柔爻原始要終之卦多以剝復反覆十二卦又象成一坤道之故乾坤列震艮首用事乃重震重艮至革鼎後方見以屯盡變為鼎蒙盡變為革震艮能事至此而方備也重巽重兌序于豐旅渙節間亦豐盡變為渙旅盡變為節以重巽合坎而天下之險有不下渙者无之以重兌合坎而天下之險有不上節者无之巽兑能事亦至此而始畢耳震艮巽兌四卦之合隨蠱咸恒損益漸歸妹皆長少之交随長男下少女之始歸妹少女歸長男之終蠱長女事少男之始漸長女歸少男之終咸損則二少相與恒益則二長相與皆交頥小過長少皆男大過中孚長少皆女雖頥反小過大過反中孚皆不言交噬嗑賁震艮合離困井兌巽合坎噬嗑盡變為井賁盡變為困豐旅震艮合離渙節巽兌合坎豐盡變為渙旅盡變為節噬嗑賁列随蠱咸恒間困井列損益漸歸妹間豐旅渙節列漸歸妹既未濟間以皆三隂三陽由泰否變泰否父母之合原始既未濟中男中女之合要終中則皆少長男女之合也坤坎乾離四正卦之合為師比同人大有巽兌合乾艮震合坤為小畜履謙豫小畜履中爻亦乾合離謙豫中爻亦坤合坎居泰否先後為乾坤全局畜履反夬姤謙豫反剝復乾坤又若分為兩局是為三才三極之道乾坤但列而不交即象有否而无泰人知屯蒙需訟師比畜履八卦開于泰先不知實亦闢之否後也臨觀遯壯皆泰否消長之際剝復夬姤皆泰否消長之初與極序卦聖人尢致謹焉故以泰否居中為首局之主次則臨觀為主次則剝復為主次則遯壯為主次則夬姤為主以之領袖諸卦剝復遯壯則震艮與乾坤合臨觀夬姤則巽兌與乾坤合故以重震艮重巽兌居後要終坎中爻為震艮震艮中爻為坎離中爻為巽兌巽兌中爻為離體常不易隂陽之正性也中孚巽兌二隂之合也而中爻為震艮小過震艮二陽之合也而中爻為巽兌頥震艮二陽之合也而中爻為坤大過巽兌二隂之合也而中爻為乾變乃雜居隂陽之互根也乾坤坎離為四正卦震艮巽兌為四偏卦此亦相沿説震以動始艮以止終巽以入始兌以説終震以動隂巽以入陽艮以止隂兌以説陽非震无動非艮无止非巽无入非兌无説以徳以體原无不正不得言偏特四可反易而為二故五十六亦遂可反易而為二十八耳羲畫正卦生成不易之易文序反卦變通變易之易不易者常易常易者未始或易善窺伏羲之精意以畫善窺文王之精意兼序邵子謂天地之氣運北而南則治南而北則亂坤與坎皆在北乾與離皆在南坤居乾上為泰坎居離上為既濟皆北而南之象反之則為否為未濟皆南而北之象也乾坤十卦後為泰否泰否天地之中也泰乾坤之交不交即否随蠱至既未濟十八卦亦若十有八變而成一卦總欲乾坤常交有泰无否之義劉氏曰非乾无始非坤无生非泰无物隂陽剛柔徤順動静不交則二儀息屈伸徃來浮沈升降不錯則四時泯雌雄牝牡吸嘘唱和不比則物不育方圓動静翕張受施不具則噐不立語黙作止應感取予不備則事不形内外上下要詳令共不合則治不興本末始終表裏大小不貫則學不成故非泰无二儀非泰无四序非泰无物非泰无噐非泰无治非泰无學仰以觀乎天俯以察乎地遠以稽乎物近以取乎身无適非泰也文序泰居乾坤十卦後前師比小畜履後同人大有謙豫六子先後夾輔之深矣上易之陽體也外也乾坤交而六子受職六子則男女也綂于尊而從陽下易之隂體也内也六子交而乾坤不用六子則夫婦也成于交而貴隂上乾合坎離坎離合震艮不合巽兌正位乎外以齊外下乾合四偏卦坤合三女離二體合坤不合乾正位乎内以肅内終既未濟則水火之交不交人道之終始夭夀之原死生之分善敗禍福之所從起也鄧元錫邵子八卦用六爻乾坤主之六爻用四位坎離主之坎離生物之數也天有四時故天地之體數皆四而生物者必四離四陽坎四隂由乾坤至坎離屯蒙需訟四卦居先屯蒙四隂地之體數需訟四陽天之體數臨觀无妄大畜頥大過六卦居後臨觀頥四隂无妄大畜大過四陽由咸恒至既未濟遯大壯晉明夷家人暌蹇解八卦居先萃升革鼎震艮巽兌中孚小過十卦居後皆四隂四陽皆坎離生物之體數體數四用數三如時有四而月惟三故以屯蒙需訟原乾坤交之始以頥大過合坎離而為之中以中孚小過合既未而要之終體數偶如地主生物用數竒如天主運行乾坤二四隂四陽之卦三十皆體數偶數一隂一陽之卦十二三隂三陽之卦二十皆用數竒數上序乾坤始坎離終皆有體含用之象邵子所謂无極之前隂含陽下序咸恒始既未濟終皆有用含體之象邵子所謂有象之後陽分隂屯蒙随蠱噬嗑賁无妄大畜皆震原始艮要終而合之則為頥頥盡變則為大過震艮皆陽大以自下進長為義故序先震後艮大者過只是過乎中故要于坎離之中而止咸恒夬姤萃升困井革鼎皆兌要終巽原始而合之則為中孚中孚盡變則為小過兌巽皆隂小以自上退消為義故序先兌後巽小者過亦只是過乎中故要于坎離之濟而止邵子自下而上謂之升升者生也自上而下謂之降降者消也故陽生于下而隂生于上也出震為生而入兌為消也自姤至剝逆序姤恒下體剝咸下體始至剝皆坤用事不必剝盡而後為坤自復至夬順序復恒上體夬咸上體復至夬皆乾用事不必夬終而後為乾由復而臨而泰近由姤而遯而否逺皆逆序于泰否後喜君子之進而易之憂小人之進而難之也由泰而壯而夬逺由否而觀而剝近皆順序于泰否後見君子之去小人常寛而小人之去君子常迫也復盡變為姤剝盡變為夬剝復艮震于坤夬姤兌巽于乾復姤震巽為初剝夬艮兌為終始終條理之交也剝而復明治生于亂見天地之心夬而姤明亂生于治嚴天人之介是為易之大綱康節問伊川雷從何處起伊川答起處起乾坤列後雷起于坎天造草昧雷雨滿盈為屯坎子中坎逢雷朱子謂之夜半雷聲人无夜半雷聲雷聲不于坎起茫茫宇宙萬古長夜别無開闢之日天地設位易行乎中乾坤成列易立乎中須知乾坤後六十二无非乾與坤易坤與乾易以定天地之位以成乾坤之列易之立人之立易之行人之行人外无易易外无人一有未立未行乾坤之列无不毁天地之位无不虛皆仰愧俯怍徒具人形醉生夢死之行屍已耳可懼也夫可懼也夫章本清曰天地者隂陽之綂㑹水火者隂陽之流行雷風山澤者隂陽之節宣是以乾坤坎離為經之終始而艮兌震巽交于下經之首又曰觀水火既濟見乾坤之體為不易觀水火未濟見乾坤之用為不窮妙矣哉一隂一陽之道哉瞿九思曰用大衍之數五十以成序卦次第之圖第自乾數起歴五十卦至鼎而止為第一周又自震數起周而復始歴五十卦至明夷而止為第二周自家人以後莫不皆然第循序挨次排去不假一毫安排布置乃恰好至第三十二周凡二十五轉以終于未濟而十有八變成卦之象自見此亦所謂彌綸天下之道之所不廢也易像鈔卷三
