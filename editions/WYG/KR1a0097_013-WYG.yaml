  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1a0097_WYG_013-1a, image: WYG0031/WYG0031-0340c.png}
body:
  text: 易像鈔卷十三明胡居仁撰今人開口咎人輙曰不濟看來全要一箇濟字凑手既濟火升水降泰也未濟火炎水流否也聖人言造次顛沛必于是程子曰天下之事歸于一是朱子曰學者只求一箇是未濟以有孚失是終有能成就得一箇是而天下之能事有不僃者无之李仲魯曰是即國是在書為執中在詩為羙刺在春秋為褒貶執中者一世之是褒貶者萬世之是羙刺者一人一事之是于寳曰鬼方北方國也四夷傳北狄之類夏曰薰粥殷曰鬼方周曰獫狁漢曰匈奴堯命和叔宅朔方曰幽都履否暌未濟九四俱曰志行陳錫𤣥説儲狄梁公性閑醫藥尤妙鍼術應制入關時有富室兒鼻端生贅大如拳石根蒂綴鼻纔如食筯或觸之酸痛刻骨兩眼為贅所繩目睜翻白楚甚垂絶其家掲巨牌求療之者許酬絹千疋公一見惻然曰吾能為也即於腦後下鍼寸許仍詢病者知鍼氣已達病處遽抽鍼贅應手落目瞪如初其家且泣且拜致所酬絹公笑曰吾急病行志耳急病謂急人之病出左傳不顧而去後世徒以事女主為公咎而公急病行志之心晦矣張敬夫説伊川在涪方論易有􅀈桶人以未濟男之窮也問伊川不能答其人云三陽俱失位朱子曰此語火珠林上已有盖伊川未曾看雜書所以被他説動了夫歸妹女之終以兌女得所歸故曰終未濟男之窮以坎男阨於險故曰窮歸妹兌女震男女待男行此常理也未濟坎男離女男待女行可乎聖人於卦終惻然傷之故特謂之窮耳亦豈如三陽失位之說哉本義卦變說如升南征解云巽坤二卦撰得箇南如看命人虚拱底説話未濟六三云占者可以水浮而不可以陸走是將一掃聖人翼易之義理而直以焦戅易林為宗其失甚不小也易於離體皆言明而於未濟之五獨言光不惟以五位陽而爻隂且見水火互根外光必本内明之故旣終必濡首未終方飲酒旋懼濡首得斯義也方不為小人無忌憚之中庸而庶㡬戒慎恐懼君子之中庸人一片隠微心術滿盤托出常如大明中天之日然後為君子之光之有孚有不孚如朱子所云未過誠意關七分是小人在易筌人君之光非一人所能獨成乃因與賢臣有孚以致其光故其光也吉管輅曰日中為光朝日為暉中則日在上朝則日在下在上之光以在下之暉而獲吉五以二而獲吉也先儒以暉為光之散者非旣未濟之上皆曰濡其首只一旣字也要沒頭沒却了人只一未字也要沒頭浸却了人旣未濟之三四皆取象於伐鬼方世人或在水窟中作活計或在火􅆋中作活計都是鬼趣未是人理旣初曵輪則火􅆋中能囘車者未二曵輪則水窞中能囘車者婦䘮其茀勿逐婦主夫以順為正无一可有攸遂之事旣二天下成家之婦也䘮茀勿逐進退惟夫存亡惟夫得䘮惟夫一无遂心諺燄裏寒氷結虞舜䕫䕫之孝周公几几之忠俱如此旣下三爻以明體不為坎陷為濟初尾无濡劈頭就不是兠根徹底家數二茀无䘮恐終渉於影響疑似而无覿面日子三鬼方无伐神州斷亦陸沈而終身於鬼窟裏作生計者上三爻以坎體透露離明為濟亦猶下三爻之用心初濡尾欲水之浸漬徹底上濡首恐明又為不首出濟如是原始要終方為徹首徹尾之旣旣二䘮茀夫夫婦婦夫正位乎外婦正位乎内極其好合非意中或夫倡而婦不隨或婦行而夫故阻夫車為前婦車不後安知相反非以相成故勿逐凡日枝自一歴七皆正對日幹自一歴七皆正克坎子離午二五合七允為正對正克之日此日不得便千百日也不得此日得一得永得故曰七日得易言七日凡三復言於卦一六之反震旣濟言於爻俱二五之合旣三曰髙宗伐鬼方此日中之光守成之令圖亦似反之之聖之事未四曰震用伐鬼方此日出之陽開創之大業亦似性之之聖之事聖人擬人心之陷于血于宼于隼于狐于蒺藜于徽纆于叢棘已不勝其懇惻至於擬以鬼方則其情益至如是而猶迷焉莫醒終其身以鬼方為安宅日用云為都是鬼趣抑何不思之甚也諺之詈人也曰見鬼曰活鬼纔開眼莫不見鬼否纔乘車莫不載鬼否未到死而為鬼莫不一生都做了活鬼否未濟小狐汔濟易主通天下之志定天下之業斷天下之疑疑不必大只有絲髪未化便為通身陷溺病根更无出頭日子如何得濟或言老狐善渉水夫小之為言猶閔惜之詞聖人肯以老狐待人乎泰五言帝妹旣五言東西隣泰否天地之位經正南北旣未水火之交緯具東西天地經而日月緯也泰言歸旣言不如經主南旣必有下乎北緯主東亦必有取乎西此世所以常泰與旣不然亦立否與未之道也既濟要歸先天之元故曰東西隣未濟仍起後天之用故曰震用常存泰五歸妹之心天下无否之患矣常存旣五不如之心天下无未之患矣乾龍无飛革虎无變而以濟狐汔令人有不勝終身望洋之嘅旣未伐鬼方是原始要終直窮險陷之窟穴而為之掃蕩廓清如除草薙根之法必曰三年學无速效速效終不入算數暫時削平竊發隨至不足道也聖人彖乾于乾元資始後曰雲行雨施曰大明終始无非水火交濟之大用成終資始之能事旣戒終止未戒不續終坤以終乾之事六子以離坎為中又皆以終乾坤之事坎中一陽即乾之全體資始以是終始亦以是黄氏澤曰文王據羲皇之圖以為後天卦序采夏商之易以成一代之經大象六在大有火在天上大壯雷在天上復雷在地中大畜天在山中其二則水火交在卦象坤牝馬離牝牛猶有利與畜之義履虎尾中孚豚魚小過飛鳥未濟小狐直是即象即義旅小亨以離柔言小巽小亨以巽柔言小旣濟亨小雖亦以離柔言小然與小亨意義差異小亨義别于大亨亨小小者離柔亨之者坎剛也是旣濟之所以亨也是為聖人要終分剛柔之大義解田獲三狐未濟小狐汔濟人之渉世无之而不為坎人心之疑稍有未斷亦无之而不為狐惟夜半一聲為首出故解二雖亦水中不曰濟而曰田于狐不僅言汔而竟言獲以未濟視解以明徹暗與以動免險分量尚不可同年語于是可見内坎匀離㡬有原一究九能事方原初始故于狐曰小㡬于究九故于濟曰汔只病在尾末一弱能不為强弩之末方利與茫无邊際畔岸者不同故止曰无攸利柔尾雖濡剛首自若續而終之猶有可望故彖亦止曰不續終坎求小得曰未出中未濟小狐汔濟亦曰未出中這中語君子造位應无不出語君子存心恐終身亦是未出故曰堯舜猶病故曰文王望道未見故曰一息尚存此志不容稍懈旣初曵輪如棄甲曵兵之曵雖若退敗劣著无非利濟宏施濡尾汚辱在所不辭形跡更非所避二䘮茀或㡬于出頭露面而原非攸遂或隣于有倡不隨而初无不順三于鬼方必伐必克何止中國即極幽極逺之方无不欲躋之于冠裳禮義文明成化之域而不忍棄一人于遐荒絶徼魑魅魍魎之歸濟如是其于旣也是為思過半四衣袽五禴祭上濡首不視治為治而視治甚于亂不視安為安而視安甚于危不視旣為旣而視旣甚于未此所為亨小此所以為旣之亨繻有衣袽羙繒曰繻敝絮曰袽旣繻必轉為袽故新繒不如舊袽殺牛不如禴祭列鼎不如菲食華衮不如惡衣瓊宫不如卑宫皆實理實事以中昃盈蝕時所以必至濡其首厲君子思患豫防常未雨徹土矧于旣雨常先盛戒衰而矧于將衰乾上亢曰盈不可乆旣上濡曰何可乆俱髙危滿覆之深心君子之所必有事也旣五正當乾五南靣而聽嚮明而治尊位乾坤正位于南北離坎歸元于東西五自南復東如水倒溢如日再中是為盈不可乆五自南而西如水流惟下如日中必昃是為承天時行盖殺牛似止春華禴祭乃成秋實有發散无翕聚便不成箇天時了有發散有翕聚方来无窮矣故曰實受其福故曰吉大來旣初曵輪當極治極安而故退故亡未二曵輪當未治未安而持重鎮静旣初濡尾是入世本以經世或逺或近或去或不去歸于潔身故曰義无咎未初濡尾是枉尺不可以直尋辱已何以正天下故曰亦不知極旣上濡首恐終溺于盈成之塹故曰何可乆未上濡首又旋入于將濟之淵故曰亦不知節旣多功虧一簣之止未多方覆一簣之進存一旣心唯聖罔念作狂存一未心唯狂克念作聖人通體光明而有絲髪之疑結為中心黑暗根便終身沒溺于洪流巨濤中非不恍見有岸時常隠隠在前而卒無以自濟為邪為僻為妖為媚皆所必至此未之所以取象于汔濟之小狐人處陽明鬼行幽暗凡人處心積慮舉意動念有一毫不可與天知有一毫不可與人知皆名為鬼不名為人皆與鬼為偶不與人為偶旣未三四示人區别人鬼之關至為明切但以治人論曰克之曰震用曰三年不遽闔之為鬼闗而徐開之以人路又自有條理未濡尾曰不續終水火相濟不啻如頭足之相續有水无火有首無尾是為中絶曰不續明其遂无其生理終于沒溺也易首乾繫以龍終未濟繫以狐張行成曰狐之妖媚變態萬狀㡬與神龍同然終不能遯其尾也故曰濡其尾无攸利不續終論語人焉廋哉人焉廋哉人雖情偽萬端察其所安究其歸宿處則質性終自見耳夫人人之初龍也而忍竟以狐終可乎占易者宜深省焉易像鈔卷十三
