body:
  text: 易像鈔卷一明胡居仁撰天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也易大傳河圖上下左右皆九層中具十五外包十五縱横皆為十五中央四方分為五位皆以生數統成數而同處其方徹上下三奇即為乾三耦即為坤二在五與七之間即為離一在六與十之間即為坎自五而一而六兩奇一耦反覆之即為巽兑自十而二而七兩耦一竒反覆之即為震艮貫左右皆然即圖即卦伏羲原不曾費手為畫七八木火之數九六金水之數鄭氏曰木火用事而物生故曰精氣為物金水用事而物變故曰遊魂為變遊魂謂之鬼物終所歸精氣謂之神物生所信木火之神生物東南金水之鬼終物西北二者之情之􅃺與春夏生物秋冬終物相似河圖中五圈便是五行本體中一圈便是土體萬物皆生于土生此河圖為龍馬所負之圖圖圈内凡五様古今无異議特黑白之文為旋毛則古今未言之惟鄭氏通志始有之至宋廬陵朱公升臨川吳公澄皆謂其然近日靈寳許公亦云然即今馬可以例見特今馬惟有旋毛无此陰陽順逆生成象數耳又曰凡天陽數必在左順而往凡地陰數必在右逆而來至于陽在陰中亦左順而往陰在陽中亦右逆而來皆定體也楊止菴陽自後而生往前為順一三入而為主六八環于外而從之陰自前而生來後為逆二四入而為主七九環于外而從之一三自後而生往前為順者陽中之陽七九自前而生來後為逆者陽中之陰二四自前而生來後為逆者陰中之陰六八自後而生往前為順者隂中之陽一奇一耦從先至後各順其序如兄弟然一生一成從内至外各有其别如夫婦然諺咎人轍云无四六圖以生數言北與東一三共四南與西二四共六以成數言北與東六八共十四南與西七九共十六有四六則已全體造化矣易言哉易言哉數者祗是氣之分限節度處朱子河圖許多圈子皆天地氣數痕迹蔡元定河圖陽生于正北長于正東盛于正南極于正西陰生于正南長于正西極于正北終于正東縱觀則陽生陰中陰生陽中横觀則一九太陽居西北二八少陰居東南以西則九分為二七以南則二七合為九此河圖之相生而未始不相克也章本清造化不出五行一六水即坎二七火即離三八木即震巽四九金即兑乾五十土即艮坤此圖書之所同似不必析某為某卦補某為某卦一一穿鑿以强合之章本清易曰參伍以變圖之中五與一四合五二三合五為三五圖之中五與十為三五七八合為十五九六合為十五亦皆三五三个五為十五五个三為十五參以三伍以五三其五伍通為參五其三參通為伍圖與書无往不合洛書上下左右皆五層皆以奇數統耦數而各居其所玉齊胡氏曰一得五成六而合九四得五成九而合六二得五成七而合八三得五成八而合七又如二四成六而九居中一八成九而六在旁二六成八而七處内三四成七而八在下書之九六七八无適而不遇其合也河圖自一至十五十五㸃之在馬背者其旋毛之圈有如星象故謂之圖非五十五數之外别有所謂圖洛書自一至九四十五畫之在龜背者其背文之坼有如字畫故謂之書非四十五數之外别有所謂書纂言一十五河圖之中數三其一十五為洛書之全數洛書三其九為二十七三其六為一十八以成四十有五而乾遂得其九以為九坤遂得其六以為六此洛書所以為天道圖書之數自北而東同自南而西異物物生所同成所異物而无以自成者豈生數之固然蓋成數之不足耳故名之為人而无以自成皆物乎物之數者也易逆數不論生底造化全論成底造化河圖洛書皆木數居東伏羲畫卦皆自下而上即木之自根而􅆬􅆬而枝也其畫三木之生數其卦八木之成數重卦則亦兩其三八其八耳胡廷芳下天一之象進中五西北六之所由生左天三之象進中五東北八之所由生右天七之象退中五西南二之所由生上天九之象退中五東南四之所由生又六退中五成北之一八退中五成東之三二進中五成西之七四進中五成南之九圖書三同二異或曰陽不可易而陰可易陽不可易謂一三五陰可易謂二七四九劉氏曰北東陽始生之方四南陽極盛之方陽主進數又必于進極而後變胡雲峰曰相生則有不易之體相克故有變易之用水木不變而金火通變蓋金入于火不别于火火能煉金乃别其金金火固有通變之妙也縱上下共十横東西共十右斜西南東北共十左斜東南西北共十同河圖之十縱上中下共十五横左中右共十五右斜西南中東北共十五左斜東南中西北共十五又縱東四三八西二七六横南四九二北八一六皆相乘十五同河圖之十五圖對待為流行書流行為對待圖生數居中成數附于五生數之外中為主外為客書奇數居正耦數附于四奇數之側正為君側為臣造化貴陽賤陰假圖書以顯其理出于自然之妙非可容一毫智力抑揚于其間天五居中地十合歸四隅既為以陽統陰之象又若純陽用事而陰氣盡歛无一用事之象縱横合之成十既為天地陰陽之大數四方合之各十五象日月朔望之分上下合之成三十左右合之亦成三十象日月晦朔之辨又為日月陰陽之大數圖明天地生成之體貴得偶書表陰陽消息之行主尊陽鄧潛谷圖二七在南書九在南陽究于九圖書不易在天為明命在人為明徳中天而生為天下至聖之固聰明睿知逹天徳稟受之初毫􅁵不容有偏纔偏便去知入愚偏甚則為下愚乃圖書全體則人人原自具足不少虧欠洛書陽生于正北長于正東極于正南消于正西陰生于西南長于東南盛于東北終于西北九退為七八退為六火金易位為相克以南九分為二七以西二七合為九亦未始不相生也章本清圖書生克不同而一之在下者无不同一萬化之根也天一生水凡物之初生其形皆水水乃有生之最先也一歲十二月一日十二時皆肇于子子水位也水生于陽成于陰氣始動則陽生氣聚而靜則成水故曰天一生水地六成之以生水之初屬一至成水則六矣章本清河出圖洛出書聖人則之圖書固是卦畫之原然易傳明言仰以觀于天文俯以察于地理觀鳥獸之文與地之宜近取諸身逺取諸物于是始作八卦以通神明之徳以𩔖萬物之情則俯仰逺近无之非則无之非畫程子謂見兎亦可起卦政如此奇數南北一九分分東西三七分分耦數西南東北二八分分東南西北四六分分學者皆當思其所以然水火互根水一而火九水陽内景始于一火陽外光究于九也一而三為進數為發散為木九而七為退數為收歛為金俱有至理吕叔簡曰學問工夫只在箇定火火定則百物兼照萬事得理水明而火昬靜屬水動屬火故病人火動則燥擾狂越及其甦定渾不能記甦定者水澄清而火熄也故人非火不生非火不死事非火不濟非火不敗惟君子善處火身安而徳滋圖與書俱出伏羲之世天乃錫禹洪範九疇或至禹時又因洛書之傳而衍其義為九章大法耳非至禹時而洛書始出也或曰圭與龜通用禹時又有𤣥圭之瑞因衍為疇故曰天乃錫禹洪範九疇又曰禹錫𤣥圭告厥成功云瞿九思曰河圖洛書是合作一箇看底不是分作兩箇看底書之一九二八三七四六總是圖中一箇地十分開來王子植曰圖書皆一在下一者止之歸宿之地也止于一者逆數也此圖本來无一字邵子若問先天一字无馬明衡吾在鴻濛未判中蘇伯厚欲求象外无窮意都在先天未畫中王伯安始信心非明鏡臺湏知明鏡亦塵埃人人有箇圓圈在不向蒲團坐死􅁅孔子曰易有太極周子曰无極而太極邵子曰道為太極又曰心為太極又曰能造萬物者天地能造天地者太極朱子曰太極者象數未形而其理已具之稱形器已具而其理无眹之目西山蔡氏曰邵子所謂一動一靜之間者非動非靜而主乎動靜是為太極天道此立地道此立人道此立不特人物物亦有此一圖故曰一物各具一太極萬物統體一太極只人是直生動物則横生植物乃倒生直生為正横生倒生皆偏正者理通偏者理塞遂有靈蠢之異耳君子修之吉不失其直故曰人之生也直小人悖之凶便或横或倒了故曰罔之生也幸而免太極只消一圖可以圓亦可以方合内外徹上下貫左右而无不通周子圖而為五然无極此圖分二此圖分五此圖成男女此圖化生萬物此圖得意者總可以一圖而了也因其以无極畨易遂謂无極與易有兩般因其以五行畨八卦遂謂五行與八卦有兩般已无以得周子之意或又不達易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶之大義而故盤旋于真精妙合二氣交感化生无窮之物𩔖中苐以最靈自厚幸則又何時可望立脚太極之上而能生兩生四生八以成大業于天下乎間嘗互證朱子之言其曰太極非有以離乎陰陽也即陰陽而指其本體不雜乎陰陽而為言耳然則陰靜陽動上加一圈只是明其不雜之意不然是離陰陽而言太極也又曰今人説是陰陽上别有一箇无形无影底是太極非也然則陰陽上别有一圈全要得意于圈外又曰理不外乎氣若説截然在陰陽五行之先及在陰陽五行之中便是理與氣判為二物知此則分作五圈不特判為二且似判為五也又曰非太極之後别生二五而二五之上先有太極㑹五圏為一圈便可无先後之疑又問自太極以至萬物化生只是一箇圈子何嘗有異曰人物本同氣稟有異故不同如此却因氣稟之異圈而為五也北溪陳氏謂分而為五非有欠合而為一非有餘得意于五而㑹歸于一由周子進孔子因孔子及周子神明黙成俱存乎人矣易有太極是生兩儀四象八卦要思這不是説箇天地虚懸道理元初聖人畫卦若是畫一畫象天畫一畫象地又畫一畫象人便是揚子雲之太𤣥了知此圖之圈而為五似以一圈為人而又以一圈為物學者湏是㑹五于一始為得之太極者在天地之先而不為先在天地之後而不為後終天地而未嘗終始天地而未嘗始與天地萬物圓融和㑹而未嘗有先後始終者也有太極則兩儀四象八卦以至于天地萬物固已備矣非謂今日有太極而明日方有兩儀後日乃有四象八卦也雖謂之曰太極生兩儀兩儀生四象四象生八卦其實一時具足如有形則有影有一則有二有三以至于无窮皆然是故太極者无物之先本已混成有物之後未嘗虧損自古及今无時不存无時不在萬物无所不稟則謂之曰命萬物无所不本則謂之曰性萬物无所不主則謂之曰天萬物无所不生則謂之曰心其實一也古之聖人窮理盡性以至于命盡心知性以知天存心養性以事天皆本乎此也邵伯温泉南陳布衣真晟言心言敬而以心字中之一㸃規而大之為太極以不失此一㸃為敬意味殊是親切湏知心之乚一腔也方寸也横列三㸃三才也三才統體一太極太極統體為一心君子戒慎恐懼全體而勿失此之謂敬耳若指中一㸃為太極左右二㸃為動靜似為未圓之見朱子答何叔京性者三才五行萬物之理而已矣非有一物先立乎未生之前而獨存乎既没之後也其曰執曰用曰建亦體此理以修己治人而已矣非有一物可以握持運用而建立之也朱子答楊子直謂太極含動靜可以本體而言也謂太極有動靜可以流行而言也若謂太極便是動靜則是形而上下者不可分而易有太極之言亦贅矣夫既以太極為形而上矣其解无極又謂所以著夫无聲无臭之妙却似有兩層形而上也能知周子以无極二字畨易字則自不為兩層之解矣朱子婺源學藏書閣記天理民􅂜自然之物則其大倫大法之所在固有不依文字而立者然古之聖人欲明是道于天下而􅂷之萬世則其精微曲折之際非托于文字亦不能以自傳也故自伏羲以降列聖繼作至于孔子然後所以􅂷世立教之具粲然大備天下後世之人自非生知之聖則必由是以窮其理然後知有所至而力行以終之固未有飽食安坐无所猷為而忽然知之兀然得之者天地萬物晝夜寒暑彌滿六合流行今古皆易也主之者太極止菴楊氏太極渾然一理其大无外其小无内人物各得一理似乎分矣合而言之又渾是一理實未嘗分正如天地間總是一月光萬川雖各得一月光總是一月光敬軒薛先生朱子之言太極象數未形而其理已具玉齊胡氏謂此不雜乎陰陽之太極形器已具而其理无朕玉齊胡氏謂此不離乎陰陽之太極不雜之太極虚一之一不離之太極掛一之一不雜之太極不可圖不離之太極可圖具如右薛文清先生曰心所具之理為太極心之動靜為陰陽太極理雖至妙而其實不外乎身心動靜五常百行之間後人論太極即作高逺不可究詰之理求之去道逺矣房審權曰太極在天地之先而不為先在天地之後而不為後易有太極先要理㑹易字又要體貼有字蓋有易而无太極者易无太極兩儀四象八卦吉凶大業一齊都无説處蠡測各具一太極本來自具非分而與之之謂統體一太極千燈一光非還而合之之謂明道先生曰萬物皆備于我不獨人爾物皆然都自這裏出去只是物不能推人則能推之雖能推之幾時添得一分不能推之幾時减得一分百理具在平鋪放着幾時道堯盡君道添得些君道多舜盡子道添得些孝道多元來依舊太極者兩儀未判之真元乾元者乾儀先立之太極太極在乾儀中即名乾元太極在坤儀中即名坤元實非二物又曰乾儀立太極全體在乾元故大坤儀立太極全體在坤元故至天根乾元之端月窟坤元之端為物亦一而已又曰太極一圈即乾坤二元之統㑹也管登之極之為言始于箕子申于孔子其為物不貳而生二生四至百千萬億以迹觀之渾无一物以理求之樞紐萬物聖人見其理故曰太極昧者惑于迹故設為太清太虚太空之號而于太極之理无睹焉學術邪正所由判也方達􅀸太極者造化之根底未有天地由此生天地故曰先天既有天地由此生人生物故曰後天非先天之外又有一後天先天之體即後天之用也非太極之外又有先天後天天地之體用即太極之體用也章本清問論性者或以理言或以氣言或兼理氣言何如顧叔時曰厥初一氣也孰主宰是理也所謂性蓋自其主宰言之也曰如此得无遺氣曰既曰自其主宰言便是就氣上㸃出理來曷嘗遺氣吾儕要識性湏從主宰處認取方有下落雖曰性不離于氣亦必知其有不墮于氣者存而後性之真面目始見耳若向氣上認取他這箇紛紛紜紜清濁純駁千態萬狀將指何者為性曰然則理與氣二乎曰識得理是氣之主宰如何分而為二曰然則理與氣一乎曰識得理是氣之主宰如何混而為一又曰大哉乾元萬物資始至哉坤元萬物資生人與禽獸都從那裏來有何差殊其不同者只是這些子靈處耳曰何以有這些子不同曰理同而氣異也曰這些子恐亦是理之發竅曰誠然第謂之發竅便已落于氣矣這箇竅在禽獸僅通一隅在人可周萬變自禽獸用之只成得箇禽獸自人用之便成得箇人至于為聖為賢與天地竝其究判然懸絶而其分岐之初不過是這些子故曰幾希自從源頭上看也又曰庶民去之君子存之存之則人矣去之則禽獸矣存與去兩者其間不能一寸故曰幾希此從念頭上看也從源頭上看便知人絶无可自恃處從念頭上看便知人畧无可自肆處由叔時之言觀之此一圖以乾南為統體則誠明之性乃人之源頭以離東為發竅則明誠之教乃人之念頭從源頭上看不通便塞絶无少可自恃處從念頭上看不存便去畧无少可自肆處此一圖方始到手張心虞曰學者謂太極多説得高逺令人難尋如薛敬軒之言極是切近其言曰只于身心口鼻耳目手足動靜應事接物至近至小處看太極尤分明不必專論于千古之上六合之外也然近者小者既盡則逺者大者可黙識而一以貫之矣或問易有太極何處見得龍岡賀氏曰吾心渾然一太極也吾心本來无一物也而萬物皆備反觀之謂知來順應之謂數往无時而不反觀隨時而為順應蓋无所不用其極也又曰隨時制變者易也而廓然大公之體无不具廓然大公者太極也知易者渾身都是易都是極今人言太極多似懸空撈摸不根易説王子植曰易變易也此體常運謂之生孔子言天地之大徳曰生生生之謂易一陰一陽之謂道若指其呈露徧滿者而言自一息一念一舉動一語黙一刻一時一日一月一年一紀以至元㑹運世之始終皆生生也皆變易也故舉易之一字而道無餘藴矣學者要先知易然後可與言太極易筌立天之道曰陰與陽陰陽天之極也立地之道曰柔與剛剛柔地之極也立人之道曰仁與義仁義人之極也天非陰陽不立地非剛柔不立人非仁義不立猶屋之有極而立為屋三極者參而三合而一極之為言至也太極者至之又至非尋常之極故曰太極乾坤縱而六子横易之本震兑横而六卦縱易之用乾坤定南北之經對待以立本震兑當春秋之分流行以致用立本者以陰陽交合為義致用者以四時進退為序體則陰陽相含用則陰陽有别邵子先天易之體也先致其用後天易之用也先立其體先天卦位以三女從乾三男從坤後天卦位以三男從乾三女從坤通變卯為日門太陽所生酉為月門太陰所生不但日月出入于此大而天地之開物雖始于寅至卯而門彌闢閉物雖始于戌至酉而門已闔一歲而春夏秋冬一月而晦朔弦望一日而晝夜行度莫不由乎左右之門也思齊翁氏出震而晝全用坤道坤西南居巽離兑之中入兑而夜全用乾道乾西北居坎艮震之首母親而父尊用和而體嚴也潛谷鄧氏曰巽離坤皆陰卦而致用于南乾坎艮皆陽卦而藏用于北生徳必柔徳成必剛聖人秉剛徳以自克自復致和柔以竝生率育乎民物也念菴先生曰發育之功天地所固有然天地不常有其功一氣歛閉而成冬風露之撼薄霜霰之嚴凝隕穫摧敗生意蕭然其可謂寂寞而枯槁矣鬱極而軋雷霆奮焉百蟄啟羣卉茁氤氲動盪于宇宙之間則向之風霰為之也是故藏不深則化不速蓄不固則致不逺天地且不能違而况人乎易逆數或以自震而乾為往而順自巽而坤為來而逆如此却是半順半逆念菴先生曰以其變易不窮終不離于主宰而言故謂之逆又曰易有太極逆也生兩儀是順今看來出震見離夾之巽坤之間入兑歸坎夾之艮乾之間亦是逆數纔動則坤之用行纔靜則乾之體立震兑動靜之門也自出震以後匪坤列于西南萬物无以成自入兑以後匪艮列于東北萬物无以生夏易首艮商易首坤疑此異教有以心鼻相對為息愈把捉愈不定硬坐久將虚靈活潑天機盡窒殺羲文傳人方居則先天首定于上身定于下天地定位象口止手恭鼻息口通山澤通氣象足交而出股交而入雷風相薄象離目外照坎耳内聽水火不相射象是為太極對待之全體動則後天東方明震出巽齊離見以坤役為終西方晦兑説乾戰坎歸以艮成為止是為太極流行之大用離坎分晝夜言震之出至離而中兑之説至坎而中離晝之明居巽坤之中欲其巽而順又常欲如坤之晦坎夜之勞居乾艮之中欲其戰而惕又常欲如艮之止離心明竅于目前乎坤冕旒以蔽之象坎心聰竅于耳前乎艮黈纊以塞之象乾兑離震同根陽儀乾兑同根太陽離震同根少陰巽坎艮坤同根陰儀巽坎同根少陽艮坤同根太陰天宇夜靜必零露電發必雷隨風雨常交致山地相函附皆以同根之故有震出然後有離明明體剛高明柔克是以列離于巽坤之間有兑入然後有坎陷陷力柔沉潛剛克是以列坎于乾艮之間坎尚行以震出要艮而止彊弗友剛克離畜牝以巽入要兑而終夑友柔克夏而秋火克金者也火金之間有坤土焉火生土土生金克者又順以相生冬而春水生木者也水木之間有艮土焉木克土土克水生者又逆以相克土金順以相生所以為秋之克木土逆以相克所以為春之生生生克克變化无極孰主宰之曰帝雲峰胡氏離南坎北天地中正之交震東兑西時令出入之序艮東北巽東南輔震以出生坤西南乾西北輔兑以收入聖人布置八卦方位其精如此或猶謂其多不可曉殆未之深考耳一而二乾與坤勢若平分而坤必以乾為主二而四四而八乾坤與六子亦若平分而六子必以乾坤為主如卦圖次第坤乾夾兑而列于西蓋出震半邊屬陽屬生且長男長女用事便已做得父母入兑半邊屬陰屬殺不得父母為主就便不成造化了也坎離乃乾坤交之中故乾坤全副家當交與坎離震兑乃造化出入門户震出邊長男動而前少男止而後之長男出而作長女入而助之凡以見離而全用其出入兑邊坤母以藏之之道先其入乾父以君之之道後其入凡以歸坎而全體其入全體其入正所以全用其出蓋乾坤不自用而以六子為用乾坤主乎六子而妙用六子固如此乾坤夾兑而西列夏秋之交為歛秋冬之交為藏皆老之義兑入正當成功而去之時允為老者宜居之位此天道也而人事反此必辱且殆又何疑乎乾坤六子初為氣中為精末為形雷風氣也山澤形也水火精也乾坤坎離反不轉陰陽之對待震艮巽兑反得轉一氣之流行以方位論易乾南坤北天位乎上地位乎下之象耳離南坎北日升而晝火明于空月沈而夜水積于淵之象耳神无方易无體易未可以方位論也天地雷風水火山澤聖人合八物以象人異教第以四大言身漏缺一半天體圓轉動而无窮何處放置得八卦只有地上可以陳列八卦或謂文王八卦嘗以卦畫求之縱横反覆竟不得其所以安排之意竊疑以畫求之終竟難通且不成文王以前便无如此次第只而今要移動一位終移動不得此便是聖人天地自然之文章也八卦者河圖四正四隅之位洛書四實四虚之數聖人原兼圖書以作卦故曰河出圖洛出書聖人則之易不可為典要如以乾南坤北等為先天易以乾西北坤西南等為後天易皆典要之死殺易非所以為易湏知八卦皆乾為君乾非先天之定于南又豈後天之定于西北乎聖人説天地定位章只是明八卦對待之體原未折做兩截圓而為圖説帝出乎震章則是陳列地上明箇方位次第之理自然如此已耳先天乾尊于南陽畫多于上陰畫多于下後天震用于東陽卦降而下陰卦升而上先天定位為尊卑貴賤之體故卦之純氣中氣居四正偏雜居四隅後天交易為升降往來之用故卦之交者居四正不交者居四隅夏秋之交火金相克坤立居中以為之生冬春之交水木相生艮土居中以為之克周子曰五氣順布四時行于夏秋之交之土見之易曰天地節而四時成于冬春之交之土見之出震動以用其靜齊巽見離役坤皆善動之則入兑靜以體其動戰乾勞坎成艮皆主靜之功如謂動有而靜无隳无以求靜去羲文出震入兑之㫖殊逺皇明大統厯日載有嫁娶圖以乾為翁坤為姑夫居離婦居震本之郊特牲舅姑降自西階婦降自阼階授之室也後人以陰陽家視之皇祖治厯明時大義之蝕晦亦非朝夕之故矣日月􅂷天成八卦象三日暮震象月出庚八日兑象月見下十五日乾象月盈甲壬十六日旦巽象月退辛二十三日艮象月消丙三十日坤象月滅乙癸晦夕朔旦坎象水流戊日中離象火就已虞翻纔出震即翕以坤土纔入兑又止以艮土出震无坤動處既多分散入兑无艮靜處又何歸宿謂易簡理得而成位乎中謂圖從中起謂易為逆數皆此乾全體陽明而發竅在離乾曰大明離亦曰大明秉乾之大明以為明者離也乾離皆正南面之位惟人正生故為萬物之靈而人人具足虚靈不昧之明徳物横生倒生便多暗塞不明人之正必明而邪必暗所從來矣帝出乎震總在明處出匪明以動即動而明相見乎離大明中天矣特言相見不言獨見便可以識大學明親合一明明徳于天下之義㫖圖書一皆居下故坤坎之位不易坤乾之藏也坎火之伏也乾之下不極火之伏不深萬物未有能生者凡坤復晦朔亥子之際乃天下之極深處是之謂淵章本清木金土各二以形王水火各一以氣王坤陰土故在陰地艮陽土故在陽地震陽木故正東巽陰木故近南而接乎陰兑陰金故正西乾陽金故近北而接乎陽坤土王于季夏義在中央故言地不言方兑以成物為説故言秋不言西項平甫後天八卦坎離震兑居四方之正乾坤艮巽居四隅之偏説卦傳曰帝出乎震至成言乎艮以此證後天之方位一一脗合固不必推原其畫于何人何時也如謂先天畫于伏羲後天改于文王進六子退乾坤則伏羲仰觀俯察徒知先天而不知後天流傳數千載未嘗无易何為不知流行變動直待文王而後改哉且伏羲之時帝不出震而文王之時天地定位曾得而易之哉六子必非聖人所能進乾坤必非聖人所能退也章本清離居乾位陽中含陰坎居坤位陰中含陽震居離陽之升于下者起于東也兑居坎陰之見于上者盡于西也艮居乎震陽有始而有終巽居乎兑陰雖終而復始乾居艮者陽極于上至此為純陽也坤居巽者陰萌于下至此為純陰也陰陽奇耦其變動不測如此何必以先後天圖而拘泥之哉章本清瞿九思曰先天乾在南方是天地造化已付託于乾後天離在南方以離代乾是天地造化又已付託于離孔子始作八卦章後明明提出離來以為千古綱領見千古有徳位底聖人俱得統于離而離之一卦具為千古學脈无疑矣又曰離是天地心法庖犧此箇心法從天地傳得下來王子植曰若謂别有先天在形氣之外不知此理安頓何處又曰後天有為功課皆是先天无為妙理未可岐而二之先天為八卦定位全體後天即重卦流行大用後天謂更定自文王以周易首乾而論耳不知夏易首艮商易首坤乾一下西北坤即往西南滿局變動而還復遂成六十四故首艮者原尊乾首坤者即承乾首乾者乃下艮三代聖人授守一道其為易首皆原重卦之所自始初非至文王而始有更定之謂也易像鈔卷一
