body:
  text: 易像鈔卷二明胡居仁撰卦在有象之後皆屬後天然圖之卦位皆體之立書之卦位皆用之行故就後天中又權分先後如自昔相沿説先天乾不已之天命後天坎惟危之人心乾即坎之全體降至坤而𠂻于民則陷成坎坎即乾之中體起其陷而䴡于天則返為乾先天乾一陽明全體兑二一陰上生離三一陰中生震四二陰上中生巽五一陰下生坎六二陰上下生艮七二陰下中生坤八則全體為陰乾一頭面全然不見陽明幾于消盡而陰陽互精有消即息此坎一所以原後天之始自以陰函陽言則坎為孕息之象自陽在陰中言則坎為險陷之象次坤二次震三次巽四以全坤之順平坎險又統二長動之入之于其下徹始以要于五中次乾六次兑七次艮八以全乾之健拯坎險又統二少説之止之于其上徹終以要于五中以五中即乾一全體而坎一得之以為中二長以先之先此中二少以後之後此中坎一盡翻遂為離九坎一頭面陶鎔變化到離九亦全然不見故曰乾元用九乃見天則文序首乾坤中坎離終既未濟皆此先天乾坤為主六子為用後天坎離為主合乾坤震巽艮兑皆坎離之用以乾坤中天地交而後有坎離之中用坎離之中必合乾坤全力統二長二少盡要于五中然後坎離之大用復歸乾坤之全體是為體用一原先後无間千古危微精一聖功總于坎上有事二順三動四入大分屬靜與生邊六健七説八止大分屬動與成邊三七合始東終西四六合始東南終西北二八合始西南終東北八終東北成之事止矣由是一九合始北終南即坎暗成離明長夜盡旦故曰相見乎離萬古中天故曰大明終始先天一二七八位數俱合三四五六位數交錯後天一二三四位數俱合六七八九位數交錯先天不言中全體无非中也後天言中即中皆全體也先天方似不易後天圓似易不易太極易无極易有不易不易本易故孔子曰易有太極周子翻之曰无極而太極太極本无極乾南坤北從中一交便成離坎離非自東而之南坎非自西而之北也乾離禪代離進居乾乾若退西北而居艮天尊而上艮以陽上止即天尊定位乾无退也乾既來艮艮又若出東北而居震震因正位離東矣坤坎禪代坎進居坤坤若退西南而居巽地卑而下巽以陰下入即地卑定位坤无退也坤既來巽巽又若出東南而居兑兑因反位坎西矣自乾坤一易為離坎後天八卦方位一時天然齊易而竝列絶不容絲毫人力安排布置陰陽消息大義消自上息自下消為陰息為陽以先天言之乾陽坤陰相為消息則泰不則否以後天言之坎陽離陰相為消息則濟不則未合先後言之先天之乾陽超陰上陰不為消且為不生之孤陽後天之坎陽孕陰中有坎之息方為成列之乾坤列為坤坤道成女坤靜下處而二長一動一入于其下皆坎之祇平之義列為乾乾道成男乾動上運而二少一説一止于其上皆坎之尚行之義蓋乾主施施即消不消不虚中虚為離故乾之離即陰消自上之象消盡成坤而坎即息于坤中坤主受受即息不息不盈中盈為坎故坤之坎即陽息自下之象息極成乾而離即消于乾中君子尚消息盈虚而曰天行皆此先天八卦主一乾邵子曰道為太極者是後天八卦主一坎邵子曰心為太極者是先天乾體純陽一畫上消為兑中消為離下消為巽二畫上消為震上下消為坎下消為艮三畫全消為坤是為有消而後有山澤雷風水火之變化有先之消斯有後之息故恒言謂之消息有先之消即有後之息故消息間不容息先天乾陽分陰若有象之後後天坎陰含陽又无極之前陰含陽以陽之施成陰之受以乾之消成坤之息以離之虚成坎之實全體乾坤盡含之于一坎中如乾男坤女盡孕之于母腹中文王繫心獨于坎邵子所謂天向一中分造化人于心上起經綸皆此乾用九而九乃為離所居則六可以識大明終始天徳不為首之義焉坤用六而六乃為乾可以識大終之義焉人心發用皆坤坎而乾離无為乾无為故首出庶物離无為故大明終始心知乾離之象意物坤坎之象乾中虚則離乾離无兩體心知可知矣坤中實則坎坤坎无兩體意物可知矣乾但虚為離坤即實為坎虚實无兩體心知意物可知矣一陰一陽之謂道兩儀一陰一陽四象陰儀之上一陰一陽陽儀之上一陰一陽八卦二太之上一陰一陽一少之上一陰一陽八之上各重以八第四畫兩儀第五畫四象第六畫八卦卦位各以一陰一陽而立卦數各以一陰一陽而對俱一陰一陽盤澗董氏曰自兩儀生四象太陽太陰不動而少陰少陽則交自四象生八卦乾坤震巽不動而兑離坎艮則交陰陽兩端再參得甚物來作三天地生物只一陰一陽交變錯綜生千生萬无窮无盡更不可限以數目故曰一陰一陽之謂道胡叔心一陰一陽之謂道就是形而上者謂之道若單是一陰謂之孤陰既偏于陰矣若單是一陽謂之孤陽又偏于陽矣繼之者善這一陰一陽不接續而惡且滋何善之繼之有成之者性這一陰一陽不完全而情且肆何性之成之有一陰一陽如環无端謂陰陽只是一箇可謂陰陽却是千變萬化而无窮亦可一死一生固一陰一陽之道耳聖人明言原始反終故知死生之説非原始而知所以生必不能反終而知所以死死生之説亦終何自而知乎初生之一奇一耦則兩儀兩之上各生一奇一耦為四象四之上又各生一奇一耦為八卦是皆自然而生瀵湧而出不假智力不犯手勢而天地之文萬事之理莫不畢具乃不謂之畫前之易謂之何哉其曰畫前之易乃謂未畫之前已有此理而特假手于聰明神武之人以發其秘非謂畫前已有此圖畫後方有八卦也若不識此而欲言易何異舉无綱之網舉无領之裘直是无着力處朱子答袁機仲程子曰開闢便是陰陽不可道今日有陰明日有陽有便齊有離了陰陽便无道又曰陰陽亦形而下者而曰道惟此語截得上下最分明元來只此是道朱子曰若只言陰陽之謂道則陰陽是道今曰一陰一陽則是所以循環者乃道也一闔一闢謂之變亦然天地之造化萬𩔖陰陽二者而已龜山過黄亭詹季魯問易龜山取紙畫箇圈子用墨塗其半云這便是易朱子謂此説極好易只是一陰一陽做出許多般様一陰一陽對待為質交錯而成一定不易做兩箇看亦得流行為氣循環不已變化无窮做一箇看亦得陰陽之質具于地升發于天為氣陰陽之氣行于天凝聚于地為質陰陽之理妙于人心合天道地道而為人道太極纔動便是陽纔靜便是陰不是動後方生陽靜後方生陰截然為兩段先有此後有彼盈天地之間所以為造化者陰陽二氣之始終盛衰而已陽生于北長于東而盛于南陰始于南中于西而終于北故陽常居左而以生育長養為功其𩔖則為剛為明為公為義而凡君子之道屬焉陰常居右而以夷傷慘刻為事其類則為柔為暗為私為利而凡小人之道屬焉聖人作易畫卦繫辭其進退消長之際所以示乎人者亦深矣朱子一陰一陽之謂道原循環不已故言繼原完全无缺故言成繼之者成之者繼與成都屬人分道如是人若不繼何善之有人若不成何性之有四端在人仁義一陰一陽禮智一陰一陽仁義禮智隨處發見善之繼也仁義禮智渾全具足性之成也如乍見惻生惻善端也若善端斷滅接續不來將乍見而惻不生其惡不可勝言不得名為人矣然非知皆擴充火然泉達到充之足保四海亦不謂之成故繼惟言善而成乃言性一陰一陽即氣即理一息不來不繼一念非理不繼然非息息俱來念念皆理亦不言成八總之四四總之兩兩歸之一道盡之一也令􅅀􅄲不足以象極待圜中焉象之是立象不足以盡意剛柔不足以立本而一陰一陽不足以盡道也潛谷鄧氏分陰分陽兩儀立焉兩而四四而八八而六十四總是分陰陽而成兩儀如文序乾坤陰陽平分泰否平而互分隨蠱至既未十八卦平而雜分其餘二陰四陽二陽四陰共三十卦一陰五陽一陽五陰共十二卦俱以貞勝分人之學與不學世之治與不治總在兩儀分不分上辨楊敬仲曰􅅀吾之􅅀也􅄲吾之􅄲也可畫而不可言也可以黙識而不可以知知也􅅀者吾之全也􅄲者吾之分也全即分也分即全也􅅀者吾性中之象􅄲者吾性中之形故曰在天成象在地成形章本清曰乾體本實而離為之用坤體本虚而坎為之用所以坎離得陰陽之中震動艮止即坎中一陽之上下巽入兑説即離中一陰之上下可見天地間只是一陰一陽乾兑離震全體巽坎艮坤半體天包地外地在天中之象乾兑同根太陽兑為澤澤潤流于天上從天而降艮坤同根太陰艮為山山根發于地中從地而止天精惟日故日䴡天中地脉惟水故水由地中雷出地行天由内而動于外常與離電俱至以離震同根少陰之故風起天行地由外而入于内常與坎雨交發以巽坎同根少陽之故崔氏曰地中有山與水猶人身中有骨與血若地下則虚空也然則或謂天包水水浮地者妄矣若水而可以浮地則日亦豈載天者乎十二月卦或謂出于京房非也復至日臨八月易固言之矣皇極經世以一歲之月一日之辰配一元之㑹一運之世皆十二也亥子之交混沌始判己午之交升降攸分一日十二時如此一歲十二月如此一元十二㑹如此乾坤俯仰之消息上下古今之盛衰觀此十二卦亦可見矣十二月三十六旬分之則七十二候十二卦三十六陽分之則七十二畫三十六陽貫乎三十六陰之中天地間无非一陽氣之運而已息于復盈于乾消于姤虚于坤消息盈虚天行也易獨于剝卦言之其意微矣雲峰胡氏方圖分為二右半陽左半隂兩之義分為四右半下截陽之陽上截陽之陰左半下截陰之陽上截陰之陰四之義分為八自乾至歸妹為一八自同人至震為二八自姤至解為三八自遯至豫為四八自小畜至臨為五八自家人至復為六八自巽至師為七八自漸至坤為八八八之義卦爻二分之陽爻一百九十二陰爻一百九十二四分之陰陽各九十六就卦圖四分之陽之陽陽爻六十四陰爻三十二陰之陰陰爻六十四陽爻三十二陽之陰陽爻四十八陰爻四十八陰之陽陽爻四十八陰爻四十八陰陽之在宇宙其平分而運固如此自古帝王之治天下期于平而止亦以此有此一圖精神方謂之成位乎中方謂之全生全歸原始反終而知死生之説分方圖而觀西北十六卦天卦自相交東南十六卦地卦自相交其斜行則乾兑離震巽坎艮坤自西北而東南皆陰陽之純卦也不能生物西南十六卦天去交地天卦皆在上而生氣在首故能生動物而首向上東北十六卦地去交天天卦皆在下而生氣在根故能生植物而頭向下其斜行則泰損既濟益恒未濟咸否自東北而西南皆陰陽得耦之合也所以能生物也圓圖主運行之事方圖主生物之事邵子天地定位否泰反𩔖山澤通氣損咸見義雷風相薄恒益起意水火相射既濟未濟四象相交成十六事八卦相盪為六十四邵子方圖貞悔相當四象乾坤否泰夬剝大畜萃大有比需晉大壯觀小畜豫震巽􅁪益噬嗑井屯鼎隨蠱頤大過无妄升復姤坎離既未蒙革困賁師同人訟明夷渙豐解家人艮兑咸損蹇暌旅節漸歸妹小過中孚謙履遯臨八卦重而為六十四卦一卦之上各有八卦也實則自八而十六自十六而三十二自三十二而六十四也大傳曰因而重之爻在其中矣者是也此陰陽流行之數前三十二卦為陽後三十二卦為陰古往今來者也西山蔡氏方圖自中起有震巽之一陰一陽然後有坎離艮兑之二陰二陽又然後成乾坤之三陰三陽其序皆自内而外内四卦四震四巽相配而近有雷風相薄之象震巽之外十二卦縱横有坎離有水火不相射之象坎離之外二十卦縱横有艮兑有山澤通氣之象艮兑之外二十八卦縱横有乾坤有天地定位之象四而十二十二而二十二十而二十八皆有隔八相生之妙以四隅言自外而内則乾坤否泰第一層之四隅兑艮咸損第二層之四隅坎離既未濟第三層之四隅震巽恒益第四層之四隅止菴楊氏方圖乾復坤姤之中為乾坤天地之中臨同人遯師之中為坎離日月之中乾坤震巽上下正交兑艮坎離左右對交方圖震巽居中巽居左而向于東南震居右而向于西北是乾坤初畫之交易動則物萌其生意散則物發其鬱結二者言生物之功次巽者坎次震者離是乾坤中畫之交易潤則物以滋通晅則物以舒榮二者言長物之功次坎者艮次離者兑是乾坤三畫之交易止則物以成歛説則物以欣裕二者言收物之功次艮而位極于東南者坤次兑而位極于西北者乾乾于萬物无所不統是君之也坤于萬物无所不容是藏之也言君震離兑之陽得乾而皆有所君主言藏巽坎艮之陰得坤而皆有所歸宿也西山蔡氏八卦相錯以一卦為主錯綜合來皆十五三五十五五三十五是為參伍以變錯綜其數而皆不出河圖之中數震巽恒益四卦從中孕育為一小方坎離既未一氣潤晅十六卦為次方兑艮咸損止説通氣三十六卦為又次方乾坤否泰升降君藏六十四卦乃成一大方徹内外有四層原來都是十六卦四四十六四箇十六天地持衡震巽中萌山澤形用水火神行无往非四營成易之義章本清曰圖從中出震巽為之中心蓋震巽屬木木主仁也兹可以見天地生物之心矣又曰先天圓圖即天地之運而循環无端方圖即天地之交而化生莫測蓋運主乎順陽極陰生由姤而坤陰極陽生由復而乾此所以惟順則行也交主乎逆震巽中起陰上陽下坤乾外包水上火下此所以惟逆則生也天四象自交成十六重卦乾夬大有大壯履兑暌歸妹同人革離豐无妄隨噬嗑震地四象自交成十六重卦坤剝比觀謙艮蹇漸師蒙坎渙升蠱井巽天四象交地得十六重卦否萃晉豫遯咸旅小過訟困未濟解姤大過鼎恒地四象交天得十六重卦泰大畜需小畜臨損節中孚明夷賁既濟家人復頤屯益張行成曰天統乎體體必分兩故圓圖各分四位地分乎用用必合一故方圖合為一中又曰先天方圖衍乾坤之兩儀而八之也故八而八之極于六十四又曰圓圖當兩用方圖當一用者陽一而用二陰二而用一也又曰陽之進數自一一而起至八八而終陰之退數自八八而起至一一而終迭相倡和各得六十四之六十四則四千九十六是為重易之全數南北水火之正東西水火之交南北一九二八三七四六對待之正東西一九二八三七四六參伍之交易像鈔卷二
