body:
  text: 易像鈔卷八明胡居仁撰同人于門武王門銘敬遇賔客貴賤无二易筌二五同心同徳物猶間之則知父子君臣間以間而離者多矣故師莫大于君心而兵革為小克莫難于小人而敵國為易瞿氏九思曰乾之大象當用乾字而用健字六十四卦竝无應乎坤應乎離應乎坎應乎震應乎巽應乎艮應乎兑而獨同人􅂂曰應乎乾亦竝无坤行也離行也坎行也震行也巽行也艮行也兑行也而獨同人曰乾行也然考震六三爻亦曰震行以先天乾兑離震俱屬陽儀故惟離兑于乾可曰應乾亦惟同人震可曰乾行震行若天行但曰健不曰乾六十四卦无一非乾之分體莫尊于乾而不言乾是為乾以君之之大義大有初无交害不以有交五上自天祐之以五惟信是􅂂惟順是思又惟賢是尚是以特有自天之祐亦初不以有為五之有无此初所以无咎而上所以為上吉同人之初惟恐二專麗乎初以為同與之為出門之同大有之上惟恐五專麗乎上以為有祐之以自天之有自天凡頭上目下四旁方寸中盡皆天此之謂自天彖言應乎天而時行亦自己所居天位之天五與天應得來故上尊五如天以天祐五晉稱王母離稱王公大有稱天子此尊威親慈與出地行天之别比初言孚承地融液周遍之孚大有之初言交天日交初交中之交有孚盈缶比初地之邊下水之窪下或如潮汐之水循環得轉或如泉源之水瀵湧得上原原委委溪溪曲曲流衍洋溢无不周徧充滿斯謂之盈无交害日道交初謂之天首交中謂之天尾初原始可謂之首在下又可謂之尾凡日行交道或自内而外或自外而内正當其交處則有陵揜之害而初不當内外之交故曰无交害惟三正當内外之交陰亢陽月揜日毎在此春秋記日食之變或外藩侵中國或妾婦乗其夫或小人陵君子三有小人之道將雜撰兑毁以虧蔽體故曰小人弗克小人害易筌六五為卦主四陽在下无不應之矣上一陽在上天之位也而亦應五是天之祐五也繫辭傳云􅂂信思乎順又以尚賢蓋陽在君上其象為天賢在君上其象為師傅六五在本爻但見其􅂂信思順而已至上九而後見其為尚賢蓋當大有之世羣心皆應未足為大羣心已集而又能尊賢如武王天下大定必得箕子為師而後為大有故大𫝊以此為六五之全徳而象辭亦曰大有上吉明事關全卦非止上爻而已猶師之上六論師之事至此而終其言大君蓋指六五非謂上六為大君小畜上九論畜之道至此而成稱月與婦亦指六四非謂上九為婦也有所收歛向内不自滿亢曰謙有而不居曰謙功徳在外不自髙亢矜伐曰謙屈己下物曰謙貶己從人曰謙纂言艮山之髙而在地下是貶抑其尊甘處物下坤地之卑而在山上是推遜卑者使居己上易傳以山降于地地藴夫山合言謙義亦此意姚崇執秤誡云衡天下之􅊭也君子執之以平其心夫衡在天以齊七政在人以均萬物稱物平施為政以公毫􅁵不差輕重必得是執秤衡之理也聖人為衡四方取則志守公平體兼正直存信去詐以公滅私无偏无黨君子似之今按謙言平謙君子之衡也謙不要于君子之正即柔懦即小人即坎陷此謙初所以用涉大川誠齋楊氏曰徳厚者无盈色徳薄者无卑辭如鐘磬焉六五非謂上六為大君小畜上九論畜之道至此而成稱月與婦亦指六四非謂上九為婦也有所收歛向内不自滿亢曰謙有而不居曰謙功徳在外不自髙亢矜伐曰謙屈己下物曰謙貶己從人曰謙纂言艮山之髙而在地下是貶抑其尊甘處物下坤地之卑而在山上是推遜卑者使居己上易傳以山降于地地藴夫山合言謙義亦此意姚崇執秤誡云衡天下之􅊭也君子執之以平其心夫衡在天以齊七政在人以均萬物稱物平施為政以公毫􅁵不差輕重必得是執秤衡之理也聖人為衡四方取則志守公平體兼正直存信去詐以公滅私无偏无黨君子似之今按謙言平謙君子之衡也謙不要于君子之正即柔懦即小人即坎陷此謙初所以用涉大川誠齋楊氏曰徳厚者无盈色徳薄者无卑辭如鐘磬焉愈厚者聲愈緩薄者反是故有功有勞而不伐不徳惟至厚者能之謙言天道地道人到勞謙亦分明天地氣象謙五不言謙而言侵伐或曰君道不可專尚謙柔已非本㫖或又改侵伐為征伐拘曲莫甚謙四撝定指乎三之止故无不利豫三盱張目乎四之動故悔宋氏曰易之利行師也以豫其征邑國也以謙不豫不謙謂之悁忿之師近之坤為衆非主一之剛莫統豫行師合坤衆有震雷之驚謙行師合坤衆有泰山之安故皆利耳謙三以功下人是為下際光明是為尊而光謙之四五上又能下三是為卑而上行是為卑而不可踰謝顯道良佐與伊川先生相别一年徃見之先生曰相别有一年做得甚工夫良佐曰也只是去箇矜字曰何故曰仔細㸃檢得來病痛盡在這裏若按伏得這箇罪過方有向進處或問矜字罪過何故恁地大良佐曰今人做事只管要誇耀别人耳目渾不關自家受用事有底人食前方丈便向人前喫只蔬食菜羮却去房裏喫為甚恁地謙五之利用侵伐謙上之利用行師征邑國天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙若非盡去其滿假之盈心與矜功炫能之勝心妬功嫉能之忮心惟天下之賢人君子是下是後是歸是服謙義終有未盡終不凑手故有當潛師掠境而侵有當聲罪致討而伐有當以上伐下正其不正以歸于正而征皆此記曰聖人作樂以應天制禮以配地雷天氣出地奮為豫應天之象澤地形下天下為􅂂配地之象又曰樂者為同禮者為異雷地天地之交統同之象天澤天地之判辨異之象又曰樂由天作禮以地制樂者敦和率神而從天禮者别宜居鬼而從地豫悔震陽五陰一陽一陽為主樂由陽來之象􅂂貞兑陰五陽一陰一陰為主禮自陰作之象又曰樂至則无怨豫之刑罰清之象禮至則不爭􅂂之民志定之象禮先樂後故􅂂先豫後介于石不終日朱氏定國曰人心之天養之以静則明累之以欲則昏是以心无物而後能觀物心无事而後能見事也上交不諂下交不瀆以下交上无卑屈心以上交下无汚慢心夫是之謂順動順動順天理之動也夫子以是言幾則知周子幾善惡非穩當語朱子為圖以釋之謂幾之正出者為善幾之旁出者為惡更未穩書一日二日萬幾幾者動之微猶言萬感萬應无動而弗微也非幾乃是惡故曰爾毋以釗冒貢于非幾豫五貞疾與介石同義復雷主初正出入无疾豫雷主四不正出恐不能无迅疾恒不死猶言恒不殺二中正介之于下五中貞之于上以貞故恒化疾為和反乗為應隨地奮出无非生幾震動非暫无疾而不死乃常无疾而不死彖謂刑清民服傳言神武不殺朱子曰學者常喚令此心不死則日有進皆此家語地載神氣吐納雷霆流形庶物豫與復其所謂吐納雷霆者歟豫象之大者不害于物又借為樂則作樂薦帝之義借為先則擊柝待暴之義澤中有雷隨君子以嚮晦入宴息唐一菴曰造化機微出入有度宴以休其應息以存其動莫呈寤先則莫考寐後不收寐功則不致寤效雷澤歸妹澤雷隨澤之于雷必歸必隨陰從陽靜根動之義也同人于門初欲二盡同乎以上之四剛隨初出門初欲二以應隨五三以近隨四又欲二三與上合隨以君五同人出門凡同皆君子矣隨出門凡隨皆君子矣門内之同之隨父子惟文周夫婦惟任姒兄弟惟二程二陸諸先生門外有剛健之君子同人之初不出與同于同人乎何有門外有剛説之君子隨初不出與交何隨之有隨五孚于嘉二係子三係夫上係君凡柔必以剛為係惟剛所下皆可嘉二更專于門内小子之從而弗兼與門外丈夫之事令他日震出有功之子光顯得兑説丈夫之門戸尤可嘉五位正中合以成孚柔无遺善剛不待言故吉隨二曰係小子三曰失小子二三皆震出長人之體也止為澤中之藏便如止為門内之婦又震先艮後相反不為震出之長子便是艮止之小子故以為戒隨五孚于嘉剛中説體出震長世聲音顔色悉足以來天下之善以天下之善為善惟人之善是隨而不自有其善蓋與革五虎變事業同革五從烈火千煅百煉鑄成隨五從迅雷夜半一聲迸透王用亨于岐山天下无不南征之賢人王用亨于西山天下无不西歸之民必人君為天下之歸往舎二端之外无之矣嚮晦入宴息陳圖南先生示金礪詩常人无所重惟睡乃為重舉世以為息魂離形不動覺來无所知貪求心愈動堪笑塵地中不知身是夢一日有一客訪先生適值其睡傍有一人諦聼其息聲則以筆墨烏塗于紙如是數次滿紙烏塗莫辨客怪而請問之曰彼先生華胥調此混沌譜也王子植曰真息即是真心若呼吸出入之息乃息之末流耳彬甫曰自古无不同之聖而有不同之時聖人者時之主也天地將闢必有人以開其先天地將閉必有人以禪其後謂人不能違時而一聼其權于代謝密移之運此庸衆人之所藉口不為聖人説也聖人无論時可為與不可為而无不引之為己任隨時之義之大隨此服牛乗馬引重致逺以利天下蓋取諸隨取此西山用亨與嚮晦宴息亦一義如春秋之不為唐虞時也即春秋而為唐虞則夫子隨時之亨與息也李仲魯曰衡石之為天下貴以其善隨昻隨重不任受徳低隨輕不任受怨裒隨多不任受盈益隨寡不任受縮若衡石自避于多寡輕重之外何物之程是為隨初官有渝之大㫖禮亨孰羶薌嘗而薦之非孝也養也君子之所謂孝也者國人稱願然曰幸哉有子如此所謂孝也已此蠱初之所謂有子曽子曰君子之所謂孝先意承志諭父母于道柔行巽入期父母之順于理而不期父母之從乎我此蠱初之所謂意承考從乾父坤母論六爻皆子從上要終而止論五爻皆子有子之分量獨在初初巽主能直要上止也蠱之取象于幹父幹母欲人知有子道隨之取象于係子係夫恐人淪為婦道先天巽位西南後天坤來居之一擔坤母之責任在巽先天艮位西北後天乾來居之一擔乾父之責任在艮艮任乾于上巽任坤于下乾上坤下則否是為父母之蠱之象六十二卦俱幹乾坤之事于蠱見例蠱元亨而天下治有乾元用九而天下治分量以巽艮論先以乾坤論後巽坤柔之所由入艮乾剛之所由止蠱遂兼得乾坤二元又能先後而為六日之甲也蠱二不可貞以幹母自貞何能出震以起止之敝隨五亨西山以失地為拘何能善動以亨五之業此蠱期于幹惟要上止而隨期于時惟主初動隨吝二三兩柔内係而失其所動有以渝二三之係便為隨時之善動蠱吝四五兩柔苟安而失其所止有以飭四五之止便為涉大川先後甲之有事隨戒初不出門震動之男欲其長世蠱尊上之髙尚艮老為乾子考即父成功不退又非所以厚終也巽兑隂卦坤純陰合為臨觀見于上經尊二陽爻為主也臨以下人為徳觀以則于人為道臨懼消以下體兑觀尚生以上體巽兑乃正秋巽則東南耳下人是何等虚懐二陽合并不啻有天地大生廣生之盛徳至于八月則忽變為秋氣之肅殺安得无凶臨曰剛浸而長言澤之浸長遯曰浸而長言山之浸長兑本柔卦故以剛爻言浸長艮本剛卦故以柔爻言浸長剛浸長而曰八月有凶剛長不專貴其浸也柔浸長而曰小利貞柔長猶取其浸矣彖易聖人下二浸字自别陰符説天地之道浸便謬月令八月水始涸地澤臨秋澤也八月之水也長以積漸消以倐忽是為八月有凶是為消不久復剛長有雷震之迅臨剛浸而長便如巨浸大澤之水殊未易頓長此皆是實理實象甘臨无攸利表記君子之接如水小人之接如醴君子淡以成小人甘以壊盜言孔甘亂是用餤君子不以口譽人口惠而實不至怨菑及其身君子不以色親人情䟽而貌親在小人則穿窬之盜也歟長育之以累年摧殘之以一旦積漸之以累年消涸之以一旦至使滿腔春生之意倐忽變為秋殺之氣臨之大亨以正之天道奚宜如是易蓋以浸長為難而驟消為戒示教思容保之君子知所從事故曰至于八月有凶耳八豈例為凶月哉臨彖消不久以兑陰遇坤升上消不富以巽隂遇坤泰小人道消以坤處乾外否君子道消以乾處坤外至于剝之消息在順而能止豐之消息在動不過中時刻俱在眼前竝不須向外摸索復一剛反滿局都是陽生之氣臨二剛浸長滿局都是陰消之氣震一剛為主一君二民君子之道兑二剛為主二君一民小人之道也復剛曰反曰長艮震皆剛卦以艮反震言反以震長子足以長五隂言長臨剛曰浸長兑柔卦以爻言剛言浸長復以剛卦言反與長反猶反手長无積漸臨以剛爻言浸長自復至臨浸以一月二剛方長得成浸長成兑乃八月月卦之體積漸成浸長之剛倐忽成頓消之體如為震之生出甚難為兑之收入甚易善端之充長甚難消亡甚易賢人君子之培養甚難摧折甚易教思容保之念引長之甚難斷絶之甚易不令人喜不令人怒為皥皥之臨甚難市私恩狥小惠爲驩虞之臨甚易故曰至于八月有凶故曰消不久臨曰剛浸而長遯曰浸而長或以没其柔字見聖人抑陰之意良是然震剛浸長為兑是剛長為柔反若以長得消故以有凶示戒巽柔浸長為艮是柔長為剛有長而不失其正之義故以小利貞示教震坎艮三剛周流坤爻從初至上皆不失其為剛巽離兑三柔周流乾爻從初至上皆不失其為柔既无長象寧有浸義惟震長一剛為兑巽長一柔為艮剛柔相易若從中積久漸漬得來故皆曰浸至于兑剛一長則為乾聖人于夬曰利有攸往曰剛長乃終艮柔一長則爲坤聖人于剥曰不利有攸往曰小人長夬欲以乾終剥期于順止夬審所尚剝本天行皆聖人繫易之精意遯之浸而長者柔曰小利貞柔浸不失巽順之意且是浸成剛止故以貞示利臨之浸而長者剛曰消不久剛浸非復震迅之義反欲浸成柔説故以消戒凶樂記孰亨而祀非達禮也得觀盥不薦之義省方觀民設教安城劉氏曰學惟无量故不厭教惟无方故不倦誠密修顯証登此身于无己之途隨方設教嘿載斯人于康莊之上印之大道似更渾成若昭昭然掲日而行懸鵠而射提單詞為宗驅天下從之則茫茫宇宙又若占一蹊徑而逐塊之士即法成魔者不盡无也夫風行地上執方則入而神无方者風也如劉氏言深得觀民設教之㫖小人无咎君子何可以小人自安闚觀女貞丈夫何可以女貞自處蘇氏曰大觀在上故四陰皆以尚賔為事初童而未仕者也急于用以自􅃷賈惟器小而夙成者為无咎二譬之女利貞而不利行如不待禮而闚以相求貞者之所醜也初六童觀潛谷鄧氏曰初柔在下逖于上徳髙下懸而莫之能覿也惟田爾田亦宅爾宅出作入息渇飲饑食明王之道何知焉是固民之質也小人道也二處中閨言不出梱行不踰閾惟壼政肅祗于外事何知焉是固王化之基也禮流視曰淫闚觀其有淫乎貞已上以其道為帝王師為天下師王躬君子王朝君子風于比屋君子无咎矣若猶未也后弗堯舜民不與被堯舜之澤若撻之市予過予謫志能平乎大人无己通天下為己即觀人觀己也可以為觀矣小畜初二從風而有君子之復觀初二從風而止為无咎之民利貞之女剛柔異質若此程子曰化天下只是一箇風如小畜中孚之五俱曰有孚攣如家人之五曰王假有家益五曰有孚惠心渙五曰渙汗其大號漸五曰婦三嵗不孕終莫之勝觀五曰觀我生凡皆如程子所謂化天下只是一箇風風如是則靡然无不向也易筌觀卦一爻勝于一爻所觀漸髙所見漸别又曰觀以四陰而逼二陽聖人却謂二陽在上為天下所仰翻作一段絶好境界其扶陽抑隂往往如此噬嗑足目俱到之學足到而目不到不合目到而足不到不合噬嗑明罰勅法豐折獄致刑俱以震為主刑罰皆以生人耳豈以􅆷人之生乎哉一小善不足以成君子之名君子之所以成名者小善之積也一小惡不足以滅小人之身小人之所以滅身者小惡之積也噬腊肉遇毒王肅注君子于味必思其毒于利必避其難噬嗑食也又噬市也嗑合也然則所云膚腊胏肉非日中纎膩之市利人所日厭而不足者乎此而不噬不嗑非以謀身而矧于天下乃有漁商人毫末之利開人主侈大之心如安石之于宋其流禍至今未巳也可勝歎哉賁中之坎得位噬中之坎不得位諸家謂噬四為間亦是或曰噬賁豐旅皆隂陽之間故皆以用獄言之噬嗑動而明則亨動稍不明諺一盲引衆盲相將入火坑噬初方滅趾噬上遂滅耳者此噬嗑亨利用獄只當下一步不敢妄動將小罪小惡根芽盡情精讞勿使遺漏直是快刀利斧必斷必絶方稱利用妙手龍門子厚味腊毒噬嗑遇毒亦實象易像鈔卷八
