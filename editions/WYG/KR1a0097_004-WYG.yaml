body:
  text: 易像鈔卷四明胡居仁撰乾坤丨乾坤天地定位屯蒙􅅀艮震坎需訟丨乾坎師比坤坎一陽為主居二五小畜履􅅀巽兌乾一陰為主居三四泰否丨坤乾天地正交同人大有離乾一隂為主居二五師比全變為同人大有謙豫􅅀艮震坤一陽為主居三四局先後泰否為首一小畜履全變為謙豫随蠱巽艮兌震坎離前五臨觀􅅀巽兌坤坎離前四噬嗑賁􅅀艮震離坎離前剝復􅅀艮震坤三无大妄畜􅅀艮震乾坎離前二頥大過巽艮兌震坎離前一坎離丨坎離水火不相射乾坤交之正中咸恒巽艮兌震坎離後一遯大壯􅅀艮震乾坎離後二臨觀全變為遯大壯晉明夷丨離坤坎離後三需訟全變為晉明夷家人暌􅅀巽兌離蹇解􅅀艮震坎坎離後四損益巽艮兌震坎離後五前十二卦後十二卦先咸恒之後坎離為中一大局反夬姤􅅀巽兌乾剥復全變為夬姤萃升􅅀巽兌坤大畜无妄全變為萃升困井􅅀巽兌坎噬嗑賁全變為困井革鼎􅅀巽兌離屯蒙全變為革鼎震艮􅅀艮震漸歸妹異艮兌震隨蠱之反豐旅􅅀艮震離巽兌􅅀巽兌渙節􅅀巽兌坎中小孚過巽艮兌震巽始小畜終中孚皆悔兌始履終中孚皆貞震原始屯之貞要終小過之悔艮原始蒙之悔要終小過之貞既未濟濟丨離坎水火正交乾坤合交之正中屯蒙震艮合坎需訟乾合坎師比坤合坎原始渙節巽兌合坎中孚小過既未離合坎要終雲行雨施品物流形雲行雨施天下平俱此三十六宫都是春字位過密無法显示乾泰否剝復咸恒夬姤豐旅坤同人有无大妄畜大遯壮大萃升巽兌屯䝉謙豫頥晉夷明困升渙節需訟随蠱大過家人暌革鼎中孚師比臨觀坎蹇解震艮小過小畜履噬嗑賁離損益漸妹既歸濟濟未字位過密無法显示三百八十四爻合之止成二百一十有六爻總分横竪惟人所立八卦不易者四變易者二共六卦六其六為三十有六重卦不易者八變易者二十八合之亦三十有六惟有不易是以能易惟有不變是以能變所以謂之易有太極所以謂之无極而太極太極本无極邵子耳目聰明男子身洪鈞賦予未為貧須探月窟方知物未躡天根豈識人乾遇巽時觀月窟地逢雷處見天根天根月窟閑來徃三十六宫都是春楊氏曰手探足躡日用不可湏臾離便是手足有所措不然即是手足无所措矣安足以識人知物而得稱為男子哉人心復姤之真幾純善无惡地逢雷太極動而生陽幾一動便是天根乾遇巽太極静而生隂幾一静便是月窟閑來往動而无動静而无静此豈言語思慮之所能及哉天根月窟乃人人日用尋常心體經世通變易上下經反復視之各十八卦若各為一卦則天地各用三十地多四卦以為體也以先天卦圖凖之上經用天之十七卦地之十三卦下經用天之十五卦地之十九卦又從地各用十三天多四以為體地從天各用十五地多四以為體又曰六十四卦反復視之而三十六者八正卦常存于五十六之中三十六為用則常有二十八不用太陽之䇿見少陽之䇿亦隐也雜卦乾坤坤坎合比師臨觀屯䝉序屯䝉雜易以師比序師比雜易以屯䝉震艮字位過密無法显示損益大畜妄无字位過密無法显示萃升謙豫噬嗑賁損益一變兌巽損益二變随蠱剝復上大有同人小畜履夬姤皆在下此剛柔上下之辨坤離合晉夷明井困咸恒渙節夫婦偕老損益五變解蹇暌人家字位過密無法显示否泰大壯遯乾離大合有人同革鼎小過中孚豐旅否㤗一變離字位過密無法显示坎小畜履乾坎合需訟坤坎合比師原始乾坎合需訟要終大過字位過密無法显示姤小人小人去君子甚易而君子去小人甚難固如此漸否泰二變反為歸妹頥既濟否泰三變反為未濟歸妹否泰四變未濟否泰五變夬文序三十六孔子雜之亦三十六以乾坤咸恒不易如序卦上下之分又以大過以下八卦反對止五卦上十六下二十合之亦三十六也然孔子明言暌外家人内暌以上合為二十卦家人以下合為二十卦𫝑若平分則兩之義自乾坤至随蠱為十三卦自剥復至中孚為十三卦自豐旅至夬為十三卦則列為三才之義又大過以下另為一局序不易者八反易者二十八雜不對者八正對者二十八六十四又似總以八為主以乾坤為上咸恒為下分如序者上主陽一陽五隂之卦𨽻乾坤後者六下主隂一隂五陽之卦𨽻咸恒後者六二陽四隂之卦十五𨽻乾坤後者十𨽻咸恒後者五二隂四陽之卦十五𨽻咸恒後者十一𨽻乾坤後者四自乾坤至困三十卦與上經之數相當而雜下經十二卦于其中自咸至夬三十四卦與下經之數相當而雜上經十二卦于其中又以六十四論上陽爻七十二隂一百八隂多于陽三十六下陽爻一百二十隂八十四陽多于隂亦三十六以三十六論上陽爻三十九隂五十七隂多于陽十八下陽爻六十九隂五十一陽多于隂亦十八或三十六或十八互為多少非特可見隂陽交易之妙而三十六宫之妙愈可見矣胡雲峰乾坤後比師始坤坎之合需訟終乾坎之合二分之咸恒居中咸恒前自比師至井困共十四卦咸恒後自渙節至需訟共十四卦首尾聯合皆以坎雜之以坎陷為憂蓋甚于序之以坎陷為憂云序泰否雜易以損益序損益雜易以泰否泰否天道之大運无天之非人損益人道之大權无人之非天邵子曰時有否泰事有損益聖人不知随時隂陽之道奚由知變之所為乎聖人不知随事損益之道奚由知權之所為乎此損益否泰相通序雜天人合一之義胡氏曰天地間剛柔每每相雜至若君子之為剛小人之為柔決不可使相雜故雜卦之末特分别君子小人之道言之然要終曰剛決柔原始曰乾剛坤柔君子小人之分别寧惟雜卦之末為然已首致嚴于雜卦之初而凡乾必剛凡剛必為君子凡坤必柔凡柔必為小人蓋无一卦一爻非分别君子小人之道也邵子君子多而去之者小人也小人多而去之者君子也小人去君子始姤終剝序雜皆逆列君子去小人始復終夬序雜皆順列雜更以夬終為君子難進而易退小人易進而難退自古然也姤小人巳為政遯二小人合為一否三小人合為一觀四小人合為一剝五小人合為一至于五小人合為一而君子欲不去得乎復君子已為政臨二君子合為一泰三君子合為一大壯四君子合為一夬五君子合為一至于五君子合為一而小人欲不去亦得乎君子小人之迭為消長固如此乃小人每多合而君子反多暌此所以為大過之顛此所以為未濟男之窮雜以大過以下另為一局而以夬要終其為天下後世君子謀至矣𧰼山先生與羅春伯書宇宙无際天地開闢本只一家來書乃謂自家屋裏人謂之自家不知孰為他家古人但問是非邪正不問自家他家君子之心未嘗不欲其去非而就是捨邪而適正其怙終不悛則當為夬之上六耳舜于四凶孔子于少正卯亦治其家人耳按宇宙一身天下一家卦有六十四皆一身一家事雜分睽外家人内若有内外之分然家内終于夬家外綂于乾終為合外内之道而曾不分為自家他家固如此劉苕溪曰夬以五君子決一小人不曰小人道消而曰道憂蓋上下交而志同如泰之時然後小人之道不行若以五君子臨一小人徒能使之憂而已惟其有憂將圖之无所不至故曰不利即戎朱子曰小人自是不可合之物一薰一蕕十年猶有臭雜以夬終蓋聖人不得已之意比一剛居五為主次臨次泰次大壯終夬所謂有是君有是臣有是政如陽剛之主不在尊位而欲君子彚征竝進以夬為終世必无之比後即受以臨臨後歴十六卦然後泰泰後即受以大壯大壯後歴十六卦然後夬君子或先不同心而欲輕為躁進終事于夬世亦无之鄧汝極曰易道尊一而夬姤重微故雜以比始以夬終大者過小者姤責在大者大止于内小巽于外止而巽動不窮是為漸之女歸待男行以大包小原始要終飬之于中是為頥之飬正既有漸之吉又有頥之正大小各得其位是為既濟之定有如小乗大柔乗剛女无歸妹之終而男有未濟之窮必終之以夬則君子之不得已而惟以變其窮耳君子何心決去小人如小人之必仇君子哉聖人于序之泰言君子道長小人道消于否言小人道長君子道消于雜之夬言君子道長小人道憂然初不于姤言小人道長君子道憂小人違天逆理故有憂君子樂天知命何憂之有惟消長不能違時耳章本清曰從古君子小人不容竝立曾有臯臯訿訿與兢兢業業者可竝用于朝堂之理哉後人欲為調停之術者計亦左矣瞿九思曰雜自乾至困為上截自咸至夬為下截上截坤比師臨觀萃升謙豫剝復晉明夷皆合坤其為坤者一十有三而其合乾者不過乾大畜无妄三卦下截否泰大壯遯大有同人小畜履需訟姤夬皆合乾其為乾者一十有二而其合坤者不過否泰二卦上陽而坤多陽卦多隂也下隂而乾多隂卦多陽也以乾始以夬終夬上六一變即純乾意在變柔為剛返坤于乾返後天于先天以寓返末世而登之上古之意又曰乾兑離震是先天上四卦巽坎艮坤是先天下四卦雜卦若不升兌于上而降巽于下升震于上而降艮于下升離于上而降坎于下便與先天兌離震在上巽坎艮在下之圖不合如何返得先天惟兑離震自當在上巽坎艮卦當在下故解蹇遯大壯大有同人比師大畜无妄井困暌家人小過中孚一十六卦自不得不從之而上者反下下者反上此六十四卦所以獨一十六卦上下顛倒與序卦不同又曰序泰先于否雜否先于泰天地同是自然定位然非用了許多經綸措置從後天反其類返過來如何便得自然定位孔子雜卦精藴全在反其𩔖句又曰用天數二十有五以成雜卦次第之圖第自乾數起歴二十五卦至剝而止為第一周又自復數起終而復始歴二十五卦至旅而止為第二周自離以後无不皆然第循序挨次排去不假一毫安排布置乃恰好至六十四周凡二十三轉以終于夬而乾之䇿二百一十有六之象自見如乾坤比四天數二十五乾䇿三十六天然相接毫髮不爽以至大過姤漸頥既濟歸妹未濟夬莫不皆然或以大過下八卦為有錯誤而欲序正之不知量甚矣制噐尚象十三卦離佃漁益耒耨噬嗑交易乾衣坤裳渙舟楫随服牛乘馬豫擊柝小過杵臼暌弧矢大壯棟宇大過棺槨夬書契鄭氏子噐曰益莫大于稼是以耒耜取諸益然離之佃漁噬嗑之交易必先于垂衣裳之乾坤明佃漁耒耜交易具然後君得垂衣裳而治之是君藉民一驗也市道興而不以通之則益者窮故為渙之舟楫随之服乗小過之杵臼以利用用之而有争奪故為豫之擊柝暌之弧矢以守貨守而𫉬安故為大壯之棟宇大過之棺槨以厚生然後張官置吏而為夬之書契則君道立是又官藉民一驗也田漁耒耜交易益之原舟楫服乗杵臼益之通擊柝弧矢益之守棟宇棺槨益之厚書契益之治雖謂諸卦皆益可聖人盡以其益厚下而已穆然澹然惟上衣下裳垂以臨之有損而已易言元亨而繼以利未嘗禁利且導之利程子曰人无利直是生不得王者盡人而導之利天下之利舍王者將安歸是又不為大利大益乎叔世不然朘削之事百方俱試所為佃漁舟車棟宇莫不𣙜之而離之益盡税履畆征鋤銚貸青苗而益之益盡酤荈有𣙜塩麫有額手實有斂市易有稽而噬嗑之益盡筭舟車賦戎馬而渙随之益盡藨席黄蘆鬻酒坊牙契㑹竹有監木有課而暌豫大壯小過大過之益盡所收之窠愈多所入之利愈纎而所出之用愈不足蓋至于夬不能治而乾坤亦幾于易位語曰善養生者如不欲食啖病火者啖彌多瘠彌甚啖不足以益肌火鑠之也以損為益何以異此大衍之數太陽一掛扐十三三竒為九動竒過揲三十六四九之數少隂二掛扐十七二竒一偶為八静偶過揲三十二四八之數少陽三掛扐廿一二偶一竒為七静竒過揲二十八四七之數太隂四掛扐廿五三偶為六動偶過揲二十四四六之數陽竒而隂偶是以掛扐之數老陽極少老隂極多而二少者一進一退而交于中陽實而隂虚是以過揲之數老陽極多老隂極少而二少者亦一進一退而交于中朱子曰以四乗掛扐之數必得過揲之䇿以四除過揲之䇿必得掛扐之數其自然之妙如牝牡之相銜如符契之相合可以相勝而不可以相无此為蓍之全數四十九䇿除掛一而為四十八以四約之為十二以十二約之為四數其揲之一變也一四為竒三分十二而得一也朱子曰凡四為竒是一個四也凡八為偶是兩個四也全氏曰書以五為中圖兼十為中五虚其天一而用四為竒十虛其地二而用八為偶也三個四加掛一為十三四個四加掛一為十七五個四加掛一為二十一六個四加掛一為二十五虚一太極之綂體有定掛一太極之流行各足不虚一則分兩者无所主宰不掛一則揲四者不能變動三個四五個四為竒四個四六個四為偶四個七四個九為竒四個六四個八為偶无往而非自然之數三個四為十二乃老陽掛扐之數凡掛扐壹是皆以老陽之數為凖而去取以成九八七六是為尊陽之義又以其備一歲周天之數全氏曰以四乗除一與三易三與一易一三為竒用九之象一與二易四與四易二四為偶用六之象又曰掛一者掛五中之一揲四者揲五中之四一餘九故陽用九四餘六故隂用六楊氏曰掛一以象三左陽象天右隂象地物生于天成于地天氣行于地中故從右隂地中掛一以此一合左陽右隂之二即三也故曰象三去掛一之蓍老陽竒數十二三個四䇿數三十六四九之數少隂竒數十六兩個四一個八隂為主䇿數三十二四八之數少陽竒數二十兩個八一個四陽為主䇿數二十八四七之數老隂竒數二十四三個八䇿數二十四四六之數揲數為陽合之七十有六餘掛一四數共七十二七十二候之數行􅁆為隂合之一百二十一周天之􅁆朱子曰沈氏筆談易象九為老陽七為少陽八為少隂六為老隂其九七八六之數皆有所從來凡歸餘之數有多有少以一約四多為隂如爻之偶少為陽如爻之竒三少乾也故曰老陽九揲而得之故其數九其䇿三十六兩多一少則一少為之主震坎艮也故皆謂之少陽少在初為震中為坎末為艮皆七揲而得之故其數七其䇿二十有八三多坤也故曰老隂六揲而得之故其數六其䇿二十有四兩少一多則一多為之主巽離兌也故皆謂之少隂多在初為巽中為離末為兌皆八揲而得之故其數八其䇿三十有二諸家揲蓍説惟筆談簡而盡朱子曰初一變得五者三得九者一故曰餘五九者五三而九一後二變得四者二得八者二故曰餘四八者四八皆二三變之後為老陽者十有二老隂者四故曰陽饒而隂乏少陽二十少隂二十八故曰陽少而隂多蔡元定曰五十之蓍虚一分二掛一揲四為竒者三為偶者二是天三地二自然之數而三揲之變老陽老隂之數本皆八合之得十六二老以陽之動為主故老隂以其四歸于老陽此老隂之數所以四老陽之數所以十二也少陽少隂之數本皆二十四合之得四十八二少以隂之静為主故少陽以其四歸于少隂此少陽之數所以二十少隂之數所以二十八也按老陽十二少陽二十合之為三十二老隂四少隂二十八合之亦三十二隂陽之分原適相等朱子曰四十九蓍虚一外止四十八分掛揲之餘為竒偶各二老陽老隂變數各八少隂少陽變數各二十四合為六十四八掛各得其八此乃竒偶對待加倍而得者體數也若天三地二衍而為五十者用數也蓋體數常均用數則陽饒而隂乏也此正造化之妙若隂陽同科老少一例是體數非用數蔡元定曰隂陽之體數常均用數則陽三而隂一玉齊胡氏曰用數陽三而隂一者于六十四變之中取其十六變為用又于十六變之中以四約之則老陽十二而用其三老隂四而用其一是一饒一乏為隂陽之用也邵子云天有四時一時四月一月四十日四四十六而各去其一是以一時三月一月三十日體雖具四而其一常不用亦此西山蔡氏曰四十九蓍去掛一之蓍則四十八以四約之為十二以十二約之為四四與十二十二與四宛轉相因為四十八故其數之成四與十二自然相為經緯如老陽竒數十二以十二約之得一則一之象以四約之得三則三之象老隂竒數二十四以十二約之得二則一之象以四約之得六則之象少陽竒數二十以十二約之得一餘八由老隂而息蓋陽之未成者以四約之得五則之象少隂竒數十六以十二約之得一餘四由老陽而消蓋隂之未成者以四約之得四則之象䇿數之以十二與四相因為進退亦如此十三十七二十一二十五俱掛一之一以為主數三個四合掛一為十三四個四合掛一為十七五個四合掛一為二十一六個四合掛一為二十五一有定主是為太極之流行十三揲過三十六四其九十七揲過三十二四其八二十一揲過二十八四其七二十五揲過二十四四其六四有定營是為隂陽之大分自老陽掛扐十二進一四則為少隂十六又進一四則為少陽二十又進一四則為老隂二十四自老陽過揲三十六退一四則為少隂三十二又退一四則為少陽二十八又退一四則為老隂二十四二老之間相距十二掛扐過揲皆以四遞為進退此亦四營成易之義學者相傳九為老陽七為少陽六為老隂八為少隂而卦爻止稱九六不稱七八以九六之數合之為萬有一千五百二十七八之數合之亦萬有一千五百二十少隂少陽之數原隐于老隂老陽之中也楊氏曰老少之别原所以生爻非所以名卦其實六爻之為隂陽者老少錯雜非乾坤獨老而六子皆少也子曰極數知來之謂占極數極天地之數極大衍之數數言極本之太極外天地之數外大衍之數无數數必本之太極无極纂言易以隂陽相易故名之曰易又曰包犧氏見天地萬物之性情形體一隂一陽而已于是作一竒以象陽作一偶以象隂見一隂一陽之互相易也故自一竒一偶相易而為四象八卦極于六十四卦是為卦畫之象又作揲蓍之法自一變而極于十有八變是為蓍數之𧰼凡初揲左手餘一餘二餘三皆為竒餘四為偶至再揲三揲則餘三者亦為偶故竒三而偶二三變成爻為七者二十四體卦為震坎艮為八者二十四體卦為巽離兑為九者八體卦為乾為六者八體卦為坤乾之䇿二百一十有六六其三十六坤之䇿百四十有四六其二十四凡三百有六十當期之日每期歳以二十四氣計則三百六十六日而不足以十二月朔計則三百五十四日而有餘折中之為三百六十日少陽之䇿一百六十八六其二十八少隂之䇿一百九十二六其三十二合之亦三百有六十聖人以蓍法教人明性命之理未分先必虚一有所以立之于儀象之先巳分又復掛一有所以行之于儀象之後是為立于太極之上和順道徳理義窮理盡性至命能事止于分揲掛扐之數而已者日用不知之百姓也掛扐全數老陽十二變數亦十二様少陽二十變數亦二十様老隂二十四變數乃止四様少隂十六變數乃有二十八様胡氏曰老陽少陽得竒䇿本數初无損益老隂以少陽之竒二十損之止得四少隂以老陽之竒十二益之乃得二十八陽君道隂臣道陽得制隂隂必從陽惟從陽故數多或為陽所損數少或為陽所益惟制隂故可以損隂之多而為少可以益隂之少而為多陽尊隂卑之義也子曰知變化之道者其知神之所為合乾坤之䇿凡三百有六十合六子之䇿亦各三百有六十此䇿凑手當得期之日而无一日架漏牽補當得萬物之數而无一物滲漏虧缺其于變化也幾乎三變成爻一爻由是一卦由是十有八變成卦一卦由是八卦由是自暴自棄下愚一變不能安望其有成爻成卦之能事四營成易纔于蓍䇿上分掛揲歸一次便已成易不待成爻成卦然後為易論語所謂欲仁仁至者此四十有九七七之陽數去掛一止四十八凡八卦之畫俱四十八乾四十八四分之計三十六畫陽十二畫隂是陽占四分之三内一分為隂所克也坤四十八四分之計三十六畫隂十二畫陽是隂占四分之三内一分為所克之陽也然則乾䇿三十六而坤䇿十二十二即老陽之竒數總之全體皆陽數以陽為主耳天道貴陽賤隂聖人扶陽抑隂亦何容心于其間哉巽離兑俱四十八陽二十八隂二十陽多于隂者八震坎艮俱四十八隂二十八陽二十隂多于陽者八一二三四五天地之生數也五中數故不用六七八九十天地之成數也十全數故不用而河圖洛書之全數亦无當于五與十焉故四象之畫成而以一二三四紀其次九八七六積其實揲蓍之法具而掛扐之五與四以一其四而為竒九與八以兩其四而為偶竒以象圓而徑一者其圍三故凡竒者其數三偶以象方而徑一者其圍四而用半故凡偶者其數二所謂參天兩地者也及其揲之三變則凡三竒者參其三而為九三偶者參其兩而為六此九六所以得數之實也至于兩竒一偶則亦參其兩竒以為六兩其一偶以為二而合之為八兩偶一竒則亦兩其兩偶以為四參其一竒以為三而合之為七此七八所以得數之實也是其老少雖有不同然其成𧰼之所自得數之所由則皆有從來而不可誣矣若專以一三五為九二四為六則雖合于積數之一端而于七八則有不可得而通者矣章本清就蓍法分來纔分便具足兩之儀四之象四九四三分為太陽九四七四五分為少陽七皆竒四六平分為太隂六四八四四分為少隂八皆偶易用九六不用七八九對六陽數多于隂君子綂小人便是治之𧰼八對七隂數多于陽小人勝君子便是亂之𧰼耳瞿九思曰大衍之數五十亦是序卦之法非必設蓍之法易筌則述陸秉曰此脱文也當云大衍之數五十有五其用四十有九者除六虚之位也古者卜筮先布六虚之位然後揲蓍而置六爻亦一説云然不知總天地之實數乃五十有五曰大衍則有未衍之五以超于數之先矣曰其用四十有九又有不用之一以立于用之外矣此等聖筆直是化工而可妄有測度于其間乎張行成曰積數以生卦者有定揲蓍以求卦者无常分二象兩掛一象三揲四象時再扐象閏三少為九三多為六兩少一多為八兩多一少為七四營成易十八變成卦此以蓍求卦法也陽進一進二隂退一退二虛張五分布十消前後一卦息前後一卦此以數生卦法也以蓍求卦卦自下而上者已往之卦也以數生卦卦自上而下者方來之卦也又曰太極太虚也太虛无物理為實義因理而有數因數而有𧰼因𧰼而有卦既有卦矣𧰼數乃藏于其中故曰知以藏往作易者于是為生蓍之法以探造化之原而求之因理以􅀝數因數以觀𧰼因𧰼以生爻積爻而成卦是故三四五六之􅀝䇿一𧰼見于上則六七八九之用䇿一爻生于下三揲既備一𧰼乃形十二變而四象具十八變而一卦成二十四變而八𧰼足一百四十有四變而八卦小成是謂知來又曰五十之用起于一者天也六十之用起于二者地也一无體而為體之全故五十先虚一一不用而為用之宗故七七又掛一餘四十八是為六八之用自體言之為十六之三則體中有用自用言之為十二之四則用中有體易像鈔卷四
