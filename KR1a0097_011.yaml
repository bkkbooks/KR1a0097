body:
  text: 易像鈔卷十一明胡居仁撰陸子曰但懲忿窒欲未是學問事便懲窒得全無也未是學學者須是明理然後説得懲窒知學問懲窒與常人懲窒不同然則損大象徑言懲窒未有備乎曰卦名損便都是學問况五言或益之十朋之龜弗克違此非天下之至明不與也損有時民猶説也損無時澤將竭矣然則下體兌中爻坤此水始涸時損有時也上體艮為冬春之交二前震為春此而損澤竭矣故聖人嚴之以弗損損初曰已事朱子曰天下甚麼事不關自家身已極而至於參天地贊化育都只是自家分內事自出震到説兌以兌説合艮成故損初便能認得為已如此天地男女絪緼構精之義聖人不以釋水火風雷之交而以釋山澤之交又不以釋咸而以釋損是為聖筆化工之合天地不絪緼無非戾氣男女不構精無非死氣泰正交咸正感以全體論損之絪緼構精男外女內以女為主似非正感故單以主父論而謂之一人行三人行則損一人大凡對人言説也只好一箇開口兩人齊説已難而况於三損三人以説上行初酌損二弗損三竟謂之損義可知矣一人行則得其友又全藉有上在上與三合志止之於五上故特稱友闕聖人過涉滅頂損一人此皆未可襲迹而為之者三人行則損一人以下二人陽剛之説為主而聽四五兩爻為之從一人行則得其友以上一人陽剛之止為主而已為之從所謂致一之義固如此一主也致一得所主也隂以陽為主女以男為主地以天為主俱致一之道記曰龜以為畜故人情不失損六五益六二曰十朋之龜損初九曰酌損皆龜以為畜之義或曰三人行則損一人損三為上也一人行指上也則得其友五得上為友也乃三上行而為上却不見上之下而為三又不見上之下而為三在損卦中幹甚勾當世間有此竒詫事損之初曰遄往四曰使遄初説而上行四止而下受初剛而四柔也益之上曰莫益三曰凶事三任益上任凶上剛而三柔耳又可見自下受之雨露霜雪無非教自上施之當為雨露無為霜雪子曰莫之與則傷之者至損下弗損枉巳未有能直人無害其為下益上莫益財聚未有不民散深害其為上此上下損益之辨也為人上者可以鑒矣損者損其有餘益者益其不足自卦象言之艮一陽二隂則陽不足兌二陽一隂則陽有餘故損下益上其道上行震一陽二隂則下不足矣巽一隂二陽則上有餘矣故損上益下民説無疆可見卦之名義皆實象章本􅀈序以泰否居首雜以損益代之懲忿窒欲遷善改過立人道之大端也人匪麗無明山澤風雷合而坤虗全體成麗於其中是為天下之至明故皆象以十朋之龜人無天下之至明欲有事於懲窒遷改俱不可得為上宜安止無為而以説下為元龜為下宜震動力作而以巽上為元龜少男少女以男下女則咸反則損説女情欲易動不可以為主也長男長女男外女內則恆反亦益震男奮勵有為內外惟其所有事也損益皆言十朋之龜范忠宣公奏議朋龜效靈庶職修舉朝廷獲多士之助近臣免尸素之譏朋龜獻兆庶績咸熙堯舜三代之治可不勞而成今按損五以上之止靜克受下之讜議益其光明篤實為朋龜益二以下之震動克受上之風勵益其恐懼修省為朋龜吉事凶事皆為益故曰雨露霜雪無非教進此而益之能事方備故曰告公用圭聖人所謂吉凶生大業吉凶與民同患之義全如此張氏采曰物不受變則材不成人不涉難則智不明故隕霜不殺者物之災也逸樂終身者非人之福也吕東萊曰天地之造化必有大凋落然後有大發生有大摧折然後有大成就損上無家一志在君似與三不可互為家以山澤分形難於轉徒益四遷國一志在民似與初可以互為國以雷風一氣有可變動泰否所以體乾坤之全損益所以用坎離之中損益存於家人暌蹇解之後損蹇暌下體之合益家人解上體之合皆合以用坎離之中者朋龜以十象坎一離九之合亦十也家語夫享所以昭德也不昭不如其已二簋用享損蓋以儉德昭天下耳損其疾使遄有喜蘇氏曰遄者初九也下之所損有限而上之求益無已此下之所病也我去是病則夫遄者喜我矣自初言之已事遄往則四之求我也寡故酌損之自四言之損其疾則初之從我也易故遄有喜蠱剛上而柔下咸柔上而剛下恆剛上而柔下以是例之損之為卦艮剛上兌柔下損下益上其為損柔益剛無疑乃彖又言損剛益柔有時何居曰益損上益下矣為下者單受上益一無所報夫豈成其為下乎損損下益上矣為上者單受下益一無所報又豈成其為上乎益之二曰或益之十朋之龜弗克違永貞吉王用享於帝吉此下受上益而為享上之報者也損之五固益之二也其為朋龜之益同則其為享下之心亦同益言於爻曰王用享於帝自民庶以至於為王由上帝視之王亦下也王特下民之為首者耳天生民立之王王為天下之歸往寵異之惟上帝帝天之命主於民心天視自我民視天聽自我民聽畏下民所以畏上帝益下民所以事上帝能為王者能享帝故曰王用享於帝吉損言於彖曰曷之用二簋可用享損而有孚至於元吉無咎可貞利有攸往損下益上損柔益剛之道備矣盡矣上剛亦何之而非是道為用乎二簋可用享以下言之玉帛可萬國筐篚可九州水陸之挽可車可航以上言之一壺一餐皆可養士瓠葉兔首皆可禮賢尺布斗粟皆可仁親以下言之壤有則賦有成共惟正此不論時故無時以上言之隨民之豐歉為補助且下益上者萬會為一少而為多上益下者一散為萬多而為少大損大益中損中益下損下益其出之也或巨萬其及之也惟升斗蓋有二簋而上下之志無不應矣亦惟儉損之時則有之豐登不必然故曰二簋應有時損剛益柔有時在益則無時不直截是益故曰凡益之道與時偕行在損則上下有時交相損益故曰損益盈虗與時偕行享帝惟王上益下下享上上不居惠本之帝王不抗帝夷之民民不瀆分首之王二簋用享曰曷之下益上上享下匹夫匹婦皆勝豫民視民聽皆明威天下合以益一人一人何以益天下民財易匱何以生之而不傷民力易竭何以節之而不困民事有一毫不迫身不成享民瘼有一毫不切己不成享身在皇堂心周蔀屋尊居密勿慮竟四海總無非一腔篤實真懇心為之潛注默輸於無外而貽民泰山四維之安兹之為享也原不在多儀故曰二簋曾無之非是故曰曷之也上益下上總不居功夫何以受下之報而所以事上帝之事所當盡故益二曰王用享於帝吉下益上上何可無報何可不成享當無之而非愛養樽節對答天下誠心實念之流注故損彖曰曷之用二簋可用享咸取女恆制義以艮震主兌巽乾道損上行益下下以兌巽承艮震坤道謂之雷風便象順布便象平寧常久世界雷聲動而外出時出而出無暴風氣巽而內入時入而入無疾為恆謂之風雷便象逆布便象轟烈震蕩世界撓萬物莫疾乎風風飛自天主施動萬物莫疾乎雷雷奮出地主生為益至於澤山為咸亦順布山澤為損亦逆布山主有澤澤自上零惟山有受惟澤亦聚曰咸山下有澤澤從下瀉山不克受澤亦易消曰損皆實象亦實義上之益下只須樹一個風聲以鼓動城中下之益上凡財力都屬膏脂須是實輸以灌注乎上又且每如土壤之於泰山下為錙銖之盡上為泥沙之視故益下非其無損而止言益益上亦有弗損而特言損損初曰已事山之為止自如而澤之為潤無已事固其心益上曰恆心雷或有時收聲而風無時息吹心亦其事十朋之龜龜者洛書即後天一圖竒偶俱朋為十而坤十全體具於損益中離一隂麗於二陽中為龜損益三隂麗於三陽中豈非天下之元龜龜象一損柔説上行剛止要終而二剛朋之以原始通體遂成篤實之光明益柔巽下下剛動原始而二剛朋之以要終通體遂成動變之光輝龜象二下説行上安止一涓一滴盡決江河凡以上受下者有此其為靈也孰如上風行下雷動萬户千門次第洞開凡以下受上者有此其為靈也孰知龜象三損初已事上曰無家藹然虗受之懷故為懲為窒亦非虗不能益上勿恆初曰大作儼然方立之操故為遷為改亦惟立乃克損澤益山翻咸為損原不失其為咸不然亦勿用取之女耳損風益雷翻恆為益原不失其為恆不然亦不從一終之婦耳為下無損必逋賦之亂民兌為毁折故而上止難安故以二簋教用享為上無益必殖貨之暴君巽為近利故而下震易動故以大川示利涉損懲窒要終絶去科臼故曰無家益遷改原始不得怠緩故曰大作咸恆損益總為泰否之變泰之內君子上一爻於小人上為損三上相易亦然其曰得臣無家若有終畜小人為臣終不與小人為家之意否之外君子下一爻於小人下為益四初相易亦然其曰利用為大作若有為大於小又有化小為大之意損以艮要終保泰君子已結果收成益以震原始傾否君子方從根撥轉耳若咸則否之內小人上一爻于君子上者而頰舌之咸終無改於小人之口若恆則泰之外小人下一爻於君子下者而始求以浚猶然小人求人之心是為君子小人之定辨君子待小人之道如天之無不覆在泰內則包荒若憫其飢而粒之食在否外則包桑若憫其寒而授之衣上之於泰上為損之有孚下之於否下為益之利涉以人惟萬物之靈欲盡人勿失其為靈是為十朋之龜之益泰否損益之道行令凡世之為小人為民衆既不至於凍餒有患又不至於冥頑弗靈夫是之謂天覆之度夫是之謂君子之用心頥有靈龜謂人無養正之吉言語有不慎飲食有不節者無之損益有十朋之龜謂人有不克懲窒不克遷改者無之艮止也止則終以止為終終而無始豈曰天行故凡艮居上卦下合乾亨為天衢下合震涉為大川下合坎利禦冦下兼山敦艮吉皆四剛卦之為蕩也至於下合坤為剝之碩果下合巽為蠱之高尚下合離成賁白下合兌無損家皆四柔卦之為蕩也而剝蠱損相蕩尤至剝變也柔變剛也以坤柔變艮剛由變而上果方碩如無剝但華不果雖果藐乎其小者耳蠱者事也蠱則飭也穀積久變為飛蠱蠱亦變也巽柔蠱艮剛由蠱而上事方無以尚方仞其高如無蠱絶頂之外遂無進步雖高而危抑有尚者耳損減也傷也貶也虧失也以兌柔損艮剛由損而上原弗損原為益之如無損莫為臣獨夫耳家於高危立崩之道政不如其無耳剝碩肌膚脫落盡惟有精華在隆寒窮隂常包一線之陽和蠱尚多病道心生多病於人未足憂狂風疾飈愈鞏四維之磐石至於損無家惟正共於萬邦富原藏之四海天下莫非其臣崇高一無所有剝碩不顯蠱尚亦泯如是而後為天下一家之能事象故明之曰大得志三人行則損一人三樣損法初與二陽剛有餘酌損之如酌盈濟虗之酌隨盈虗以為權量弗損益之三年有一年之餘九年有三年之餘曽弗自損其有但益之以所餘三隂柔不足有如益在其上必定損其在三故曰損一人一人行則得其友三損下益上主爻也同志為友相佐佑為友善兄弟為友三行與上易地為友初與四有不同志乎有不有無相為佐佑乎二與五有不同志乎有不有無相為佐佑乎分嚴上下情藹兄弟名為下損上益誼如朋友佐佑三人合為一人上下并無二心以下説要上止真是一團和氣布護於兩間一團説意流行充塞於宇宙胥自六三一人行得之故繫傳極言絪緼構精之化損初二如富民三如貧民富民終事好義易貧民終事好義難富民共輸纍千百非損貧民供輸才升斗亦損然亦損所當損一以説道行之略起貧富二見便是疑便説非其説故曰三則疑這一點説行意思自少發生要之艮成而止在咸男以止下女在損女以道説男故曰致一咸曰天地感而萬物化生聖人感人心而天下和平損曰天地絪緼萬物化醇男女構精萬物化生俱此隂陽惟一氣為升降上升即陽下降即隂兌象隂降之始至巽而下伏震象陽升之始至艮而上止此升降大義震原始艮要終陽生隂隂從陽此隂陽定分咸之情艮下宜上兌上宜下此交感而相與者也損則艮上適得要終之位不下兌以降隂居下或不上行以益艮窮矣惟上行然後通故不曰情而曰道上行恆之情雷動外出風巽內入此對待而方立者也益則震下適得原始之位不上巽以伏隂居上或不下下以益震窮矣惟下下然後光故亦不曰情而曰道大光以一卦陽饒隂乏論損下乏上饒損下益上也益上乏下饒損上益下也合二卦隂陽饒乏論損秋冬之交揫斂之時全體是損益春夏之交發生之時全體是益不止損下為損而益下為益人無損忿不懲欲不窒如當秋冬而無揫斂浮芥耳已人無益見善不遷有過不改如當春夏而無發生死梗耳已損以逺害人無損豈惟害人終必害己益以興利人有益豈惟利己亦必利人易筌損損三以益上者也而五受其益故曰自上祐益損四以益初者也而二受其益故曰自外來孔子讀易至損益喟然而歎子夏避席而問答曰夫自損者益自益者缺吾是以歎也又淮南子引孔子讀易至損益喟然而嘆曰或欲利之適足以害之或欲害之適足以利之利害禍福之門不可不察夬揚於王庭范氏以為內皆君子此賞罰明行之時鴂音決一名巧婦柔乘五剛巧佞莫甚易筌居德則忌言不居其德也夬揚於王庭朱子與臺端書伐木而翦其枝葉不若斧其根壅水而捍其波流不若塞其源鳴金鼓耀戈甲而噪呼以逐虎不若乘其方睡而斃之之速蓋此等小人有生以來自朝至暮無非罪惡不可殫數且又人主素以倡優奴僕畜之初不責其名撿而間者議臣乃復抉摘苛細而一一以陳之其不納則宜矣唯其日侍燕間逄迎縱臾使人主之心恬於逸欲而法家拂士之言不得以進狃於卑近而正大久逺之計不得以聞賄賂公行姦邪堵立凡所以為天下國家之紀綱者日傾月壞而上下相蒙莫敢以告是則此一二人之罪所以上通於天而深為今日膏肓之病者執事誠能深此為罪揚於王庭深贊聖王去邪勿疑之志又引同類之賢合謀并力以決去之則天下膏肓之病庶幾可去矣此書允可為揚於王庭注疏夬初壯於前趾往不勝為咎范忠宣公曰大輅與柴車較逐鸞凰與鴟梟爭食連城與瓦礫相觸君子與小人鬪力不惟不能勝兼亦不可勝不惟不可勝雖勝亦非也韓魏公曰君子不勝則奉身而退樂道無悶小人不勝則交結黨煽千岐萬輒必勝而後已小人復勝必肆毒於善良無所不為求天下無亂不可得已夬君子決小人之卦書契之作蓋取諸夬亦所以決去小人之偽而防其欺也往不勝或曰勝謂勝其任惟三五夬夬夬夬便是能勝夬任之象三夬夬以五先之五夬夬以三後之澤以説萬物水以潤萬物説與潤何以異凡火必燥凡水必潤常也曰膏澤曰福澤曰恩澤則若出於非常而物為説之矣故澤非異於水而説不止於潤又澤有二義上天下地之澤此地之瀦水也澤上於天之澤則天之露澤與雨澤矣噬上何校滅耳曰聰不明夬四聞言不信亦曰聰不明聰而明始乎坎終乎離坎化成離是為耳順是為固聰明逹天德而稱睿知之至聖否三包羞夬上無號此乃小人最毒最狠青狀易中兩言聰不明即既未濟鬼方之義象人只自聰已極而不求其所以明便如離日中天而反蔽之以黑雲南國文明而反淪入為幽都故以鬼方象也子夏傳莧陸水根草莖剛下柔上夲草莧有陸種皆屬隂或曰莧草昌陽也耳兼目聞兼見聰兼明明從聰出聰以明顯故聖人於離特曰聖人南面而聽天下嚮明而治又於噬嗑上夬四特有聰不明之戒六根互用於此可參四牽羊悔亡三為應上夬夬之爻四居三前才力不逮三宜安出三後以讓三之進夬為當而四非其人古今亦鮮見其人此聰明所以為絶德聖賢所以為絶學或曰牽者牽連而進四隨九五以進為牽周氏曰易於君子之合每致意焉人情於始交未有不固者也逮積安成疏耦俱生軋甘陵蜀洛之釁每動於羣賢極盛之時夬戒軋也故曰孚戒疏也故曰惕總之曰號易所謂號類詩所以怨呼而懼靡應也故用號疾呼而猶患弗聞也故類怨怨者慕君憂國至誠懇惻之極思號者意召聲求同寅協恭之要術天下同室也君臣僚友之屬同舟也誠以壓溺之禍非一手足所能為而衆亦均有責耳有孚號則天下之人羣合而國事濟矣乾巽相遇小畜稱妻稱婦姤乃勿取畜巽志在於應乾姤巽志在於消乾畜巽在外卦乾為主姤乾在外卦巽為主也應君子之小人小人不為主與之配合無不可長消君子之小人小人為主與之比附不為所嘻不已一失腳為千古恨如此闔戶謂之坤復則闢闢戶謂之乾姤則闔姤女壯勿用取女劉行簡曰天下之治衆君子成之而不足一小人敗之而有餘李常寧曰天下至大宗社至重百年成之而不足一日壞之而有餘邵子西晉吟有刀難剖公閭腹無木可梟元海頭禍在夕陽亭一語上東門嘯浪悠悠晉史賈充納女以壬辰劉曜陷長安以丙子相去才四十五年宋史賈妃之册以壬辰而禍亦以丙子遂與西晉同轍姦臣孽女之敗國家固如此鼎二妾初大過之二妻初姤曰勿用取女二於初不但不妻亦不妾井二鮒初曰射鮒微而土潛相附旅行不啻宵小之類射亦止於浥注之而已姤二魚初曰包魚為林林之生包更具有天度此井二姤二合坎合乾分量大小之别剝上碩果反為不逺之復夬上無號反為羸豕之孚君子無故而去有時乎復仍有引過自咎之心小人有故而去有時乎姤無非報復毒螫之意君子小人所存之不同固如此否初曰貞吉亨姤初曰貞吉從根上撥轉姤爻取象曰魚曰瓜最有意味最可警省魚爛瓜潰皆始自內而外初不覺也韓魏公謂小人不可求逺三家村中亦有一家當求處之之道知其為小人處之而已更不可校如校之則自小矣人有非毁但當反巳是不是巳是則是在我而罪在彼焉用計其何如姤之包有魚處之之道也包無魚逺之之道也澤上于地萃君子以除戎器戒不虞大抵人三為衆自三人以上便當有不虞之戒用大牲吉利有攸往祭統祭者澤之大者也是故上有大澤則惠必及下顧上先下後耳非上積重而下有凍餒之民也是故上有大澤則民夫人待於下流知惠之將至也由餕見之矣故曰可以觀政矣萃升假廟用禴困亨祀祭祀觀盥皆以巽兌象震陽巽兌隂震明巽兌幽精意巽説於幽隂而無不孚其孚至矣陽明不假言已冥升與虗邑一心一義冥升在上消不富是論南征大人用世事業至上也定須知退知亡知喪而矧其為富貴功名也者萃初若號號四以順升上冥升與三俱冥三或以明入上必以暗出使升二有南征之吉而更有冥飛之舉其貞為何如其利為何如牛僧虔注之不已則溢畜之不已則栗馳之不已則躓引之不已則逸冥豫冥升皆不可無以變其窮冥豫動體聖人教以渝無咎冥升順體聖人教以消貞各因其固有臨曰消不久升曰消不富姤言隕履言夬不論乾坤凡遇兌巽為內卦皆消體時消與消以消為用盛德大業便在此世人喜息惡消然卒不免於消其如消息之天行何困上有口不掩言之象故曰尚口乃窮雷水為解則澤水為困可知震為東方為明旦明有禮樂故解五曰君子有解兌為西方為幽夜幽有鬼神故困五曰利用祭祀又山水為蒙有止窒不流之意故以亨行澤水為困有揫斂不舒之意故貞大人吉朱彥修治一男子小便不通他醫治以利藥益甚彥修曰此積痰病也積痰在肺肺為上焦膀胱為下焦上焦閉則下焦塞譬如滴水之器必上竅通而後下竅之水出焉乃以方大吐之吐已病如失此通於困卦消息者君子以致命遂志陳氏曰志由己者也志回則禮從釋之志端則禮從節之志純摯則竭情歸質而自致於天自致於天也者天之所不得違也聖人所不得制也教之所不束也文之所不得傳也或閨閣而進於君子或章逢而非夫或荏苒而能遂或軒然自雄而易奪聖人之取舍宜何如哉雷水為解為春夏為陽氣發生之時令澤水為困為秋冬為隂凝寒沍之時令困五乃徐有説渙四匪夷所思不以小人之困可獨置而忍一物失所不以小人之思可獨忽而棄芻蕘弗詢此困五所以為中直渙四所以為光大困二征凶無咎與大過上凶無咎同義既利用亨祀幽可質鬼神明即有人非原無愧雖征行於凶禍之途夫何遇咎之有險以説不怨天盡所以對天不尤人盡所以宜人此便是利用亨祀利用祭祀之道困卦爻言大人言君子言亨祀言祭祀大人君子總以林總蒼生陷溺失所起念匹夫匹婦納溝為恥而曽不以一身一家之困窮為困窮紱蔽膝上古衣蔽前而已紱猶象之困二朱紱方來言可向明征進義五曰困於赤紱從二視五為朱為方來從五自視猶赤猶困未能來二赤兌本色以天子朱諸侯赤為辨乃另義困塞井通困上爻為兌止有外塞坎水之流之象井初爻為巽入有內通坎水之源之象無喪無得往來井井但有喪有得往井未必來井來井未必往井困到利祭祀方是相遇井到寒泉食方是通改邑不改井不得以坎為井巽為邑如是則上井下邑義不相屬卦象通六爻為井通六爻為邑下體巽坤居之上體坎進居坤全象俱穿坤土而成故曰改邑初泥二谷三泄四甃巽進既為中爻之兌兌又進居上坎之下一改而巽風皆澤水再改而止水皆流水才常泄而無泥常新而無舊常甃而無敝漏亦皆改義乃五之剛中之泉原隨地皆有隨取皆足初何待改夫是之謂改邑不改井井改邑徹內徹下徹始革改命徹外徹上徹終淮南子八方風至浚井取新泉四時皆服之管子杼井易水此改邑之井水也論語鑽燧改火此改命之革火也訟二其邑人比五邑人不誡泰上自邑告命謙上征邑國無妄三邑人之災晉上維用伐邑夬彖告自邑升三升虗邑井彖改邑邑象入卦俱取升虗邑井改邑皆巽巽為風風以神用旋轉八方運於無形巽德之制巽稱而隱巽以行權虗與改巽德之所尤備也井谷射鮒象曰無與非謂二五皆剛兩剛相敵則不相與如艮之上下敵應不相與若然五井何以冽五井之冽以二剛之巽也五二原是合德之與二無與政謂谷而射鮒則將不能成五之冽無與其為五耳巽水之主在初上水之主唯五二與五以剛合德為井泉宜上巽不宜下射谷戒詞二何以谷凡易之情近而不相得則凶或害之悔且吝二初近爻也二以巽水主初而委巳從初谷矣小魚相附旅行為鮒二初相附以巽射注惟鮒而已矣二四同功二谷則四甃不成甕亦不免敝且漏矣如是何以巽五而成洌故曰無與戒二不得為谷主乎初而不主初宜以剛直遂上巽之義若困四曰有與有二為與剝二曰未有與未有上為與俱與井二相發乾乾謙謙坎坎蹇蹇夬夬皆言於爻惟井井言於彖井井係之來往往井以上水言來井以巽水言有往無來井體不立有來無往井用不行舊井無禽橫渠先生嘗言義理有疑即濯去舊見以來新意朱子曰此説甚當最有理若不濯去舊見何處得新意來今學者有二種病一是主自家意思一是舊有先入之説雖欲擺脫亦被他來相尋井汔至踐阼篇武王井銘原泉滑滑連旱則絶取事有常賦斂有節井上六勿幕有孚則當不至汔而絶矣故元吉雷水解風水渙有出幽谷遷喬木之象解上射隼高墉之上血去惕出義可知矣水雷屯水風井有下喬木入幽谷之象屯初盤桓井初不食義可知矣井初雖巽水之主受從二視之鮒耳二如昵初何以上五而為天下食抱朴子蟭螟屯蚊眉之中而笑彌天之大鵬寸鮒遊轍迹之中不貴橫海之巨鱗困利用祭祀曰受福井求王明曰受福欲通幽明之故者於此考之凡人困不利祭祀是為窮困井不求王明終為泥井王明並受其福孟子曰守約而施博者善道也曰有是四端而自謂不能自賊者也謂其君不能賊其君者也曰惟大人為能格君心之非君仁莫不仁君義莫不義君正莫不正井三之泄委可用汲然何能以一人之泄遍及天下而使人無不汲但巽王而進之明使能以一人之泄及天下以一人之飬飬天下井是居其所底居其所便若人有分邑而不相通王家天下人中國無分邑故須改邑可用汲在三明在五五汲其泄以為天下養非三之泄而皆五之泄非王之泄而皆天下之人之泄人無不食之惻人成可汲之用三惟居其所五亦惟恭巳南靣而天下井井同風故曰並受其福也改邑不改井時乘六龍以御天雲行雨施天下平此聖人隨時平治天下之雲雨井德之地井居其所而遷此君子隨地飬民之原水井下體巽巽入也巽風也風有八方所入各巽巽水上水以成井惟一君子所入所居如風不同方而井飬之德惟一境改而心無改地異而心無異此身到處一泓寒泉可為人汲飬而不窮皆君子改邑不改井之德天生賢人君子原以利天下福蒼生不使其自為有餘故其為道非行即明非明即行明即其行行即其明不明即為不行不行即為不明行者行其道以利天下以福蒼生明者明其道以利天下以福蒼生明行雖無兩項窮逹各有地頭逹是行底地頭窮是明底地頭有如窮而不明又安望其逹而能行故困初以入幽谷為戒而井三以求王明為受福王者天下之歸往王明天下歸往之明中天日月照臨之明不然井蛙之見僅為坐井觀天之明與困初之入幽谷何以異澤無水困天無雨須是澤有水賢人君子道足以濟天下潤蒼生奚啻澤之為水澤無水國無仁賢便都是乾涸亢旱世界了普天率上於何潤澤故為困匪以君子一身之窮為困也君子處困雖徹底須是明須是覿朱紱赤紱行不在上明自在下上半或為暗世界下半自為明世界利用亨祀利用祭祀明或無禮樂幽自有鬼神此所以為君子之亨大人之貞言井兼言邑井是民居相生相養之所故曰井邑又曰廬井改邑爻有貴賤有小大無以小害大無以賤害貴井改邑所入之途異不改井所至之域同無喪原未分我所有無得殊不自以為功往井惟人所汲來井無時不甃汔至亦未繘井極深不以責人羸其瓶凶失仍歸已六十四德皆在身井居其所若不象隨身之物不知身之遷徙轉移靡定到處為邑到處有井邑在井在邑有改井無改井若改怎成邑故曰改邑不改井已日乃孚人到已日由甲歷戊主數既備其於南面而聽嚮明而治至理纎悉洞矚於文明朗日中是以革其可革而人無不孚暌二女同居其志不同行革二女同居其志不相得乃家人鼎中孚大過亦二女同居而俱反乎暌革以火澤異性風火與風澤俱一氣耳澤中有火革王邵曰周官四時變火以救民疾火不數變疾必興漢禮儀志日夏至浚井改水日冬至鑽燧改火人到口舌好大分已屬君子易之有革只是革變那兌口革去故另換一副口舌鼎取新重鑄一副肺腸豺虎狼豹皆殘殺之物乾虎革虎神武不殺虎與龍同皆可首出而為萬國主唐裴旻善劍舞常與幽州都督孫佺北伐為奚所圍旻舞刀立馬上矢四集皆迎創而斷奚大驚引去後以龍華軍使守北平北平多虎旻善射一日得虎三十休山下有老父曰此彪也稍北有真虎使將軍射之且敗旻不信怒馬趨之有虎出叢薄中小而猛據地大吼旻馬辟易弓矢皆墮自是不復射乾革皆以虎象革以變虎變豹象此命世神武之大人君子夫庸可射而得者語曰虎豹出於山則狐狸號矣革無虎豹之變將胥天下為狐狸而以希小人之革面無之復先王以至日閉關革君子以治厯明時吳晉明曰嵗十有二月三百六十日而朔虗六日氣盈五日四分日之一而置閏三年一閏八年三閏十九年七閏氣朔分齊謂之章四章為蔀二十蔀為紀三紀為元此其大略也天三百六十五度四分度之一猶有些微有餘之處天餘六十四杪半大歲三百六十五日四分日之一猶有些微不足之處嵗縮七十五杪而成嵗差嵗有差日有閏天行之數殆難得而定矣推步之法以冬至為始又曰厯元子正初刻冬至四百甲子而一會至甲分齊此厯家正法也天運自然不假安排莫能違矣然古之造厯者以鐘律以蓍策以測影銖銖而稱之至石必差寸寸而度之至丈必過但知逐年推步而不明厯數始終之運以至逐會有差二十二會以後差四十四刻訛傳之逺日用而不知可惜也夫又曰今之談天者類言元會運世元會運世之説不合厯法况洪荒開闢以來未必六萬餘年史外紀盤古三皇駕空鑿虗其不可為據明甚術數家以太乙求上古大齊甲子與厯法近而遼廓難尋且不明厯數始終之運余近測逺稽一凖厯法以冬至日躔求周天之轉圜以冬至晷刻求日朔之齊會若嵗差若閏法一一指掌無少滲漏間有校定本之天運考之先賢罔敢臆説不越一嵗之厯而宇宙一元之運了然目中矣孟子曰千嵗之日至可坐而得此之謂也又曰伏羲畫八卦大撓作甲子羲和治厯隂陽家言其來尚矣術家者流日用不知訛傳臆説大失作者之意余述一二以俟識者夫渾天甲子七政以日屬虗冬至日與天會於玄枵虗宿此厯元也降是漸差於女於牛於斗而今在箕矣厯家謂之嵗差何為其然哉曰周天三百六十五度四分度之一而日行晝夜不及天一度此次舍躔度所由起也日行南北陸而四時氣侯隨之約以三百六十五日四分日之一此分至啓閉所由起也然周天之度豈能截然整齊或有竒餘不盡之數一嵗之日亦豈能截然整齊或有竒欠不足之數郭守敬謂天餘七十五杪嵗縮七十五杪每嵗差一分五十杪六十六年有竒差一度此嵗差所由起也厯法十九年為章至朔會於一時四章為蔀七十六年至朔會於子時二十蔀為紀一千五百二十年至朔會於甲子日子時三紀為元至朔會於甲子嵗甲子日子時一元凡四千五百六十年黃帝八年作甲子迄嘉靖四十三年為第七十二甲子凡四千三百餘年苟求其故厯元可考而知也邵子元會運世之説虗而無據余謂堯時冬至日在玄枵女虗之交為子會漢元和冬至日在星紀斗二十一度梁大同在斗十二度為丑會唐開元冬至日在析木斗九度元授時厯在箕九度為寅會天垂象顯然示人矣國朝元統造大統厯以洪武十七年甲子為厯元迄今萬厯壬寅凡二百一十九年冬至日在箕四度嵗差漸多厯法不可不更定也今之術家類稱開禧授時夫宋寧宗開禧厯以開禧丁邜為厯元乃第六十六甲子元郭守敬授時厯以至元辛已為厯元乃第六十七甲子授時迄今壬寅越三百二十二年大統厯猶以為差而術者尚執開禧授時之説何居或曰海之尾閭名為焦釜之谷水入其中如沃焦釜消乾而無復有是為澤中有火之革象又曰天地間如洪罏何物不消爍火在下澤在上何能有不滅者耶鄭東卿以革為罏亦此歐陽文忠公曰事在天下其易差者莫如厯治厯明時毫忽微眇略不少差無時不治無時不明其於革也為庶幾矣巽而耳目聰明萬以忠曰惟巽乃能耳目聰明也蓋聰明人所自有只不巽便氣高心粗自用蔽塞耳巽便有巽順虗下意思學者常體此自養便是真火候又曰木本是助火者只一巽字便成妙用今耳目聰明之士加以意氣便是以薪助火我仇有疾四覆三革疾若在於三四而特繫之於五所以任用三四者五也不我能即慎所之之力量於是為見斯真無愧於有實之稱矣火在內巽風自外入而然之為家人曰父父子子兄兄弟弟夫夫婦婦火在外巽風自內入而然之為鼎曰享上帝養聖賢民非水火不生活徒養其形軀而已乎徒以自養而已乎鼎二言我仇有疾五以柔中麗於四上兩剛之間為正麗所重尤在上鉉匪上是麗而三四是合即有説非所説卑踰尊小間大而聰明倒置之患聖人象之以有疾垂萬世人君任人之炯戒旨甚明不我能即二能不為疾所即其實之堅定分量尤為可知非真有所入而有天下之定見定守者不能鼎折足丘靈鞠嘗詣禇淵淵不起曰比腳疾不能復起靈鞠曰腳疾亦是大事公為一代鼎臣不可復為覆餗巽而耳目聰明巽水原坎一之始巽火要離九之終鼎兼井之用也且月明外覢耳聰內藏月巽入微目化成耳明歸於聰故鼎五惟以黃耳象聖學期耳順貴朝聞俱此鼎黃耳中以為實五中虗以二為實如不以二為實乃空虗之虗耳豈成其為中乎陸子曰千虗不博一實吾平生學問無他只是一實又曰古人皆是明實理做實事又曰做得工夫實則所説即實事不説間話所指人病即實病又曰宇宙間自有實理所貴乎學者為能明此理耳此理苟明則自有實行實事又曰古人自得之故有其實言理則是實理言事則是實事德則實德行則實行又曰只説近易處著著就實無尚虗見無務高逺一是即皆是一明即皆明噬五得黃金鼎五黃耳金鉉這金原胎於震巽二木中又皆從烈火中煆就彖易聖人蓋以明罰勑法正位凝命雷電合章享上帝養聖賢示教異流竊之名九轉金液還丹蓋以離為九以九為金為火金火色皆赤為丹圖書七九互易故又假圖書名為還丹遂使羲文周孔之教夷為𣆀喜鐘呂之術惜哉邵曰夫聖賢之所美莫美於聰明聰明之所貴莫貴於知人知人誠智則衆材得其序而庶績之業興矣是故堯以克明俊德為稱舜以登用二人為功湯以扶有莘之賢為名文王以舉渭濵之叟為治由是論之聖人之為治孰不勞聰明於求人獲安逸於任使是為鼎五上金鉉玉鉉之義象易像鈔卷十一
