body:
  text: 易像鈔卷十二明胡居仁撰人心戒懼斯言笑皆中天則象故曰後有則朱子曰陽氣發處金石亦透觀震二之億喪貝躋于九陵金石之透且不足言矣人即百行全萬善備三千三百一無滲漏而侈然自有則地位不勝凡近卑下只喚做下達只喚做入淵與喪貝躋陵之義全反此無他只為無夜半之聲而帝不出震故億喪貝無施伐之盡躋于九陵地位直是峻絶億喪貝一物無有躋于九陵此身如在太虛空裡勿逐七日得貝原故吾九陵之躋不懸空只是平地陽明隂暗七九皆成明之用故九躋而七得用九見羣龍無首此是陽明之極致趙氏曰恐懼畏心也修省改過也厲患害也貝貨利也以此思震震可知矣震初虩虩啞啞巽初進退艮上敦兌上引此剛柔原始要終之别虩虩啞啞震體即説體孚剝有厲説體即震體巽五貞要于庚震二厲躋于九陵皆通身盡為翻轉之能事故曰吾弗能已蓋世功勞當不得一箇矜字矜即有其善之謂有其善者兢兢然持之不啻以為無盡寶藏此正喪厥善者耳震二億喪貝良是不有其善不有其善乃是不喪厥善故曰勿逐七日得初震來自來二震來來初之來五震往來震初方往震四洊來合初與四俱來如此乎其有事不止可言萬無一失便要之萬萬而無一失故曰億無喪有事蘇蘇蘇而又蘇震怖而死之象索索索而又索矍矍矍而又矍絞急驚眩之象三非二之位上無五之中故至此震原始健行之事然須由坎厯艮到萬萬無失方喚做有事若艮已要成終之事故艮上止曰敦巽原始順承之事然須由離厯兌庚庚有實資斧湊手方喚做有終若兌已居西成之位故兑上止曰引引止前導而敦乃為主此又艮剛兑柔之辨震要坎艮如不喪匕鬯坎也躋于九陵艮也巽要離兌如武貞史巫三品先後庚資斧皆離與兌也震不于其躬于其鄰正是幾先之震索索矍矍無先幾故至此或曰五上之鄰矣于卦何如曰先止思動未入慮出皆于鄰之義若因説生憂或朝迎日夕致月舉頭才知天措足才知地皆病于于躬之晚者也聖人每言何有與無能無知聖人心體時時震初何有可名其次則顔子亦願無伐無施蓋已見善勞在已不啻貨貝之多而歉于未之易喪矣億無喪有事十萬曰億又萬萬曰億萬無一失已密之極而况萬萬無失乎聖學成始成終以一敬做成朱子謂忽然夜半一聲雷萬户千門次第開以此震三言眚上言矍矍電發雷隨原是合章之物震坎艮皆乾健分體而震艮又合離巽離兌皆坤順分體而巽兌又合坎觀雷電合章艮光眀水澤一體風雨俱稱潤可見震陽以動隂而隂不可以動陽故四有泥巽隂以入陽而陽非隂之所入故四曰有獲艮陽以止隂而隂不可以止陽故三有限兑隂以説陽而陽非隂之所可説故三來則凶震躋九陵以震始以艮終巽要六庚以巽始以兑終億喪貝與商旅不行躋于九陵與后不省方勿逐七日得與七日來復俱一脈上下敵應不相與不消應不消相與夫是之謂各止其所艮其背即背是身何為又獲其身行其庭何人非已何為又見其人艮背通六爻言止如一身故不獲其身行庭三人自行三人自止分六爻言止行止不同亦如一人故不見其人三止上止止之止不必行止兼獲兩有所得是為艮其背不獲其身之象三行上止行之止不必又起人己兩見是為行其庭不見其人之象艮背行庭人身面陽背隂面離背坎面南背北庭者宫中又為直與平艮中爻坎即背與庭之象林氏曰心之火易然也有順吾情者輒動心而隨之以喜此是火然而心不能止其所有逆吾情者輒動心而隨之以怒此亦火然而心不能止其所始則旦晝牿亡終則夜氣不存夫至于夜氣不存豈曰然之云乎而燎原之勢殆有不可得而撲滅矣眀道先生曰人心必有所止無止則聽于物必有所止艮其背也聽于物將所獲無非身所見無非人矣兼山艮君子以思不出其位念菴先生曰未發之中思之位也思有萬變而位未嘗出時止則止時行則行常止也動亦定靜亦定常定也常止而定是天下之至靜而非杳也亦天下之至動而非賾也吾未嘗無作止語默往來進退而未嘗有所謂作止語默往來進退者以撓乎其微而搖乎其精如是而作止如是而往來進退是靜為之主也非吾主乎靜也非不思也是心官之思是無思也又曰至靜而無思者思之位也如是而思思則得之或曰位者山之止也立于此不遷于彼易方焉則失位矣艮為止止乃光明徐用中曰水止故泥沙定而清者存心止則物欲息而天理見故光明孫聞斯曰思不出位便是艮其背的真像周元公謂讀一部華嚴經不如看一艮卦又謂一部法華經只消一艮卦可了元公之深于易固如此吾道自足何事他求固如此朱子曰心在羣妄自然退聽豈惟羣妄四肢百骸雖非妄動有一未退聽心亦不稱在艮二艮其腓不拯其隨其心不快象明未退聽以此思一于理理外無思便喚做思不出其位便喚做止卦德無偏就艮震分説動中原有止止中原有動只為學者易偏執故震四言泥艮三言薰常示以靈丹一粒咸艮皆以人身取象大象于咸曰虛以受人于艮曰思不出位此皆聖人開關啓鍵之玉匙也艮其腓趾腓聨趾便是隨了不拯便亦有身可獲而心幾于不為主安得快艮四艮其身身伸也伸而上非己之伸而三是伸三反上便為震時行則行行而止也象又明其止諸躬屈而下非己之屈而三是屈三向下仍為艮時止則止止而止也伸則行而止屈則止而止屈伸皆勿失其止總以三為中止之主震四之泥與艮三之限同震何泥兩震相重四居洊震之間故有泥艮何限兩艮相重三居兼艮之間故有限震是以陽動隂本動二隂于上而四下又有二隂若反為下二隂所動豈成震主泥如執泥之泥務動隂而不動于隂恐懼作于心修省見于事略不寬鬆毫無假借是為震四之泥有四之泥而上下四隂爻皆合初而無不來矣艮是以陽止隂本止二隂於下而三上又有二隂若反為上二隂所止豈成止主限如限制之限務止隂而不止于隂下二隂止於內令其不出上二隂止于外令其不入內外既有限三又如脊梁竪立四五分列兩邉如背肉左者列於左無混于右右者列于右無混於左左右又有列既限又列其介甚嚴為厲調劑在心為薰薰如薰風之薰大立小從心和體康自然及物而能各止其所是為艮三之限有三之限而上下四柔爻皆合上而無不敦矣艮其輔以中正也止進于五便是中正了厲薰心西山經浮山有草名薰麻葉而芳莖赤華而黑實臭如麋蕪可以已厲能去惡臭令身香故古之祓除以此草薰之因謂之薰草王逸云菌薰也葉曰蕙根曰薰陳藏器亦云薰一名蕙草今或訓薰為熏謂為危厲熏心不安之甚何居彖言心唯坎爻則明夷六四以坤益九五上九以巽井九三亦以巽旅九四以離與艮之六二九三象言思唯艮與既濟爻則咸九四以兌渙六四以巽惟乾震未見乾心君震恐體不假言也卦以人身取象唯咸與艮然乾首坤腹等原合八卦為一身如蒙躬比首小畜目噬嗑趾膚鼻耳賁趾剝足大過頂離首大壯趾明夷股腹睽膚蹇躬解拇夬頄姤臀革面鼎耳豐肱渙躬既未首尾等之散見種種皆身象蓋以咸艮為例耳艮其腓不拯其隨其心不快腓脛端一曰足肚二聨初而止艮其腓也拯上舉又救與援二亦止中而主在三止于三下則上舉或非其時亦救援不及隨如隨風之隨趾腓相隨而止有以柔危用事而不受三限不肯聽命于心之象其心安得為快象故曰未退聽艮以人身為象咸相向艮相背三正如背上如後腦四柔如後身彖傳解曰艮其止止其所凡一身之主總在心心者人之神明無方所者也既無方所如何得止如何言止心之包絡繫于背背若心所然艮其背便如心得所止之象也心得所止全身都是神明之用而非形骸之用有何形骸之身之可獲艮以門闕為象三正如庭全艮俱止三反上為震又象行三止二初于下上止五四于上以其俱為止主象兩人三為心絡之背時止而止即心即身即身即心既無身之可獲三為門闕之庭時行而行即三即上即上即三又何人之可見不獲其身都是神用而非形用不見其人天下一家中國一人震從下動初四為主初震二三者四震五上者乃四在震中處二三之上假使二三得以動四又烏成其為震主遂初震方來而四震繼至泥能勿為二三所動而更有以善二三之動與初通為一震初所謂虩虩啞啞政此艮從上止上三為主上止五四者三止二初者乃三在艮中處五四之下假使五四得以止三又烏成其為止主艮其限能限二初于下使勿出亦能限五四于上使勿入孫聞斯曰內外限也隂陽限也理欲亦限也最得其旨列其寅寅背脊正中聯屬上下之大維絡列行次也位序也陳也布也上下聨屬脈絡分明屈伸以時是之謂列既限又列強力堅持為厲調劑其心上通下暢為薰能勿為五四所止而更有以善于五四之止與上通為一止上所謂敦政此凡人六腑不和生癰五藏不調生疽名為發背艮其背無不調不和之患可知薰香草一名蘼蕪上行頭目下行血海之藥艮從上止以上止下單下止不上行上亢于上三欎于中鮮有不成偏戾心疾癰疽發背俱由此生薰上行則有以補下止之偏心得其理止得其主自然百體各止其所故彖言艮背是無病心爻言薰心是背底對症治未病方艮其背諺誰人背後無人説又前點心後點背人到背與面一般背後更無人説得更無人指點得則其人之通體光明不待言矣艮二陽如面四隂如背二陽主止四隂從所止徹面徹背背如其面是為艮其背之象人惟背面有兩樣面前是一身背後又一身當面是一身轉背又一身是以隨處有失則隨處要獲今背面如一只有一團天理别無兩副形軀夫有失則有獲無失又何獲是之謂不獲其身庭凡中庭明廷大廷皆謂之廷三主止於中反艮為震時止也是這個人時行也是這個人屋漏也是這個人行庭也是這個人行之於家庭父子篤兄弟睦夫婦和行之於朝廷君臣正朋友信都是一體都無人己二見是之謂不見其人尋常人破面為不善者不足道即有飭躬厲行者苟其背地裏有纎毫未慊亦但是艮而以言乎艮背猶千里到艮背才是人之歸宿處故曰艮止也漸之進或曰三主漸三止體也之謂往進猶逆必三往以逆四女四女乃為之歸故曰之進故曰女歸如是則吉易筌居賢德善俗謂居於賢德善俗之間以漸摩而成其學即里仁為美之意漸朱子曰今若有人在山腳下便能一躍在山頂上何幸如之政恐不由山腳終不可以上山頂耳范忠宣公奏議道逺者理當馴致事大者不可速成人才不可以急求積弊不可以頓革道不馴致則有揠苖之患事欲速成則有不達之憂人急求則才佞進而巧偽生弊頓革則人情擾而憤怨作所以景帝削七國而鼂錯受戮東漢疾橫議而黨錮大興宋襄急于求霸以致喪師唐文宗切于除姦而訓注禍作人才以長育而成功德以積纍而大亦深得居賢德善俗之意義鴻漸于陸九三南陸為水落南翔之陸入于人中多患上九北陸為氷泮北歸之陸超于天外無患或欲改上陸作逵殊失繫易聖人精意一隂一陽之謂道世之作聰明而不思禮卑法地者皆夫征不復者也任才質而不思知崇效天者皆婦孕不育者也飲食男女人之大欲存焉玩頥卦常如泰山一座壓于雷上雷不能震飲食其有不節乎玩漸卦常如泰山一座峙于風中風不能搖夫婦其有不相保寇其有不禦乎漸初于干干犯也初在下惟恐于在上者有干犯也故厲而言乃無咎二于磐龍未升天謂之蟠通作盤二盤旋未能髙飛者故衎衎乃吉三于陸高平地也諺平地上多吃跌故重以征不復孕不育示寇教四于木鴻南翔乃木落時于木有惜時零落意得桷又有為大於小辭大任小意易筌此時回翔木杪其飛漸高或得平柯猶暫為棲息可進而不遽進為漸之最善之象五于陵尊髙在我雖易事在我人可為婦而終不敢以夫亢天下故三嵗不孕終莫之勝人惟婦而我非夫要終何以自勝故吉上于陸終始圖難于易三為夫有征不復之患三為婦有孕不育之患無所適而不亂至上羽可為儀幾于夫夫婦婦正家而天下定故吉漸五巽體要終以順道率天下單稱婦人惟婦我不敢夫我惟婦亦不至以人為夫故至于三嵗而不孕為其已在崇高嚴峻之位不難為夫而難為婦不難以夫道率天下而難以婦道率天下又不患其不勝而惟患其能勝終莫之勝有以自勝永無陵下之患故吉夫道專在乾故曰首出庶物然且曰不可為首婦道專在漸兩岐則有不復不育之患其曰利禦寇曰順相保是單以巽順明婦義其取象於隨陽鳥以此家人利女貞漸女歸吉觀利女貞小畜婦貞厲外體皆巽九卦終于巽以行權天理于是為爛熟矣歸妹人之終始倪氏女後魏涇州人許嫁彭生家貧常出谷汲水以養母生往犯之不從生曰汝終不為吾婦耶女曰女道正終婦道正始禮未及成何得相辱幽人多為超世絶俗之行以自高然曰幽人貞吉曰利幽人之貞貞在幽即幽為明未嘗不吉且利也惟入于幽谷為不可耳歸妹卦義以下女歸上男何敝之有以少女歸長男終之有敝不可勝言矣故夫子之翼歸妹直斷之曰君子以永終知敝易筌凡説而動皆不正之事以長男慕少女未有不為禍者所謂征凶無攸利也歸妹以須反歸以娣三初易位為恆象故曰以恆愆期之志有待而行待是對待歸妹之四無與對待故愆蹇初宜待亦為四連三不與初作對待之故豐鄉射禮設豐燕禮有豐注豐形似豆而卑三禮圖云罰爵作人形豐國名也坐酒亡國戴盂戒酒崔駰酒針豐侯沈酒荷罌負缶自戮于世圖形戒後李尤豐侯銘豐侯醉亂乃象其形豐外體震謂象荷罌負缶戒盈戒是亦得之學者知雖旬無咎之義世上福只享三分便已當虞其過方言誚人多謂不照又多謂不濟常照與濟天下之能事備矣豐之有蔀與噬嗑之有膚臘胏肉同義豐五來章有慶譽大動自大明而出安得無慶安得無譽抱朴子騏騄追風不能近其迹鴻鵠奮翅不能卑其飛黃河之激不能局其流雷霆之駭不能細其聲豐其蔀日中見斗五無以來明動之章自為斗也罪在君明動不合以為五用則君之為斗臣下實蒙蔽以成之罪在臣風雷益傳曰積風成雷雷電噬嗑雷電皆至豐埤雅曰隂陽暴格分爭激射有火生焉其光為電其聲為雷然月令二月雷乃發聲後五日始電則雷電固有不合而章亦有不皆至者惟合而章乃成噬嗑惟皆至乃成豐耳旅老萊子曰人生于天地之間寄也吳語越王告吳王曰民生于地上寓也古詩人生忽如寄説而應乎乾為履柔得位得中而應乎乾為同人人無此二應一步且必失足一人不可與處説而麗乎明為睽止而麗乎明為旅人無此二麗無之而不張弧載鬼無之而不瑣瑣取災旅四得其資斧我心不快武王鋒銘忍之須臾乃全汝軀刀銘刀利磑磑無為汝開韓魏公明足以照人之姦未嘗形諸詞色四得其資斧我心不快明觸物也上焚巢明極而為燥火也五射雉惟柔中是用不用其明乃所以為明夫是之謂旅貞耳噬嗑上旅上鼎五皆目也噬曰滅耳鼎曰黃耳旅曰終莫之聞可見坎為耳離亦為耳震為馬巽亦為馬艮為虎兑亦為虎乾為龍坤亦為龍而陽以主隂隂唯陽用之義俱可類見噬嗑上何校滅耳曰聰不明旅上喪牛于易曰終莫之聞或曰噬旅上九皆離離為牛牛有耳而無竅本以鼻聽噬二滅鼻旅三焚次故噬上極于滅耳旅上終莫之聞旅上鳥焚其巢漢人釋之曰王者處民上如鳥之處巢不顧恤百姓百姓畔而去之若鳥之自焚也雖先快意悅笑其後必號咷而無及也百姓喪其君若牛亡其毛也故稱凶意儘暢但謂牛亡其毛則蛇足耳旅五射雉雉有力健鬬其羽文明一名華蟲旅卦象上離下艮合而成旅以下言貴以止而麗上之明以上言貴以得中之柔而順下之剛五有其明性或喜鬬文止外華便非所謂以柔順剛射雉不有其明惟柔惟中惟順之義一矢亡一日克復之義如是下止麗以成明人可即以為次無之而不得所止者象矣故曰終以譽命象故曰上逮解二得黃矢坎中陽畫象矢故云得旅五一矢亡離中虛故云亡皆實象朱子言人只有一箇公私天下只有一箇邪正直拔判決者震也巽有進退之疑故劈頭須武貞以治要終貴資斧以斷凡陽剛是􅅀畫進則進退則退無疑隂柔是􅄲畫便有兩端故巽初進退曰志疑又巽入也內也入而內安忘危治忘亂存忘亡甚多故利武人之貞曰志治二用史巫前巫後史謂用初而俾之麗于內為史用四而俾之説于外為巫可四有離兌二雜聞史巫俱用四可總皆剛巽得中之能事是以吉崔仲鳬曰學莫善于巽莫不善于伐故增高者卑者也內流者下者也崒嵂之形抔土不居滔涌之浸涓流難入夫心易實而難虛氣易揚而難抑自視為有則眇人如無自聰之極則聽言如醉又曰巽者伏也從明之謂伏成業隳于一矜素履敗于頃肆瞻物亢而賢者避言任雄而君子哂故有善不巽是奔善也得是義而巽之大旨了然矣坤西南得朋具見母之能事統乎三女巽田獲三品亦見長女之能事兼乎中少恆四田無禽巽初為主震四出而田襲之自外也巽四田獲三品四即初主人以為出原非外騖又不求盈也二用史巫史記事從又持中記事主于中者巫祝能齊肅事神明者男陽有兩稱曰巫曰覡女隂不變直名巫無覡稱禮王前巫而後史皆剛巽中正之義象故明得中巽入也入乎理順乎剛也欲入理先去欲欲順剛先克柔故巽初利武貞曰志治巽四田獲三品曰有功陽文隂武武貞隂無不正矣陽生隂殺三品俱獲殺無不正功及生民矣甲庚三日注甲主仁先後皆以寬令示之庚主義先後皆以嚴令示之睽三無初有終睽不自三為初而合睽則須終之自三巽五無初有終巽不自五為初而成巽則須終之自五蠱言甲艮反則震陽全之能事巽言庚巽反則兌隂半之能事先甲後甲貞而元冬而春晦而朔亥而子先庚後庚東南而西苖而實花而果巽入也而曰柔皆順乎剛離麗也而曰畜牝牛兌説也而曰順天應人雖有入麗説之分而順義則一兌與艮俱要終事兌五曰孚于剝可見與艮無異惟巽是柔伏之體不有六日之庚無初是矣無終奚貴于巽巽無初有終坤無成有終一義巽四田而獲自內而外入有所入兑三來而凶自外而內説非其説此所以相反孚兌吉崔仲鳬曰待匪人之道孚而止矣説以先民民忘其勞説以犯難民忘其死兩剛君上也有以下民而惟民之視聽以為主使之説也勞之亦説也生之説也殺之亦説也直使民至於忘勞忘死此説道所以為大巽柔兌柔同一柔也以巽四居於上下四剛之中曰悔亡田獲三品以兌三居於上下四剛之中曰來兌凶位之當不當所繫有如此聖人繫兑之辭簡或曰兌為不言之説言貴簡也夫乾始坤生始雖在乾而生實在坤坤之德行乃恆簡者兌坤道所自始也咸之彖曰天地感而萬物化生損之傳曰天地絪緼萬物化醇男女搆精萬物化生觀此則知乾坤化生根柢尤在艮兌二少而兌尤首得坤簡以為簡如枝幹托始惟一初萌果蓏從生惟一方蕊嗣續由傳惟一少女方其為初萌為方蕊為少女固不待多為形容而亦豈必他有擬議乎觀兌上惟繫一引引之為言長也廷也導也大傳所謂引而伸之觸類而長之天下能事備矣便俱備此一引中又水胎於金兌者金行金之所成木之所胎引兌而曰未光以方引其端若光則既竟其施矣孟子言樂則生生則惡可已朱子言中心喜悅其進自不能已天地萬物造端托始生機全根柢一兌但為三來不有上引便喚做剝剝爛也焦芽腐種也孚于剝皆生芽活種矣君子小人之分一曰坦蕩蕩一曰長戚戚戚戚一念兌之剝也坦坦一念兌初之和二五之孚上之引也兌不尚言在心浹洽説體本簡繫辭亦簡所從來矣兌三來兌凶兌剛中而柔外三柔宜往外却來內是內荏之為耳故凶乾自強坤載物坎常德行離照四方震恐懼修省巽申命行事艮思不出位兌朋友講習凡乾道皆全體之立以自治為主凡坤道皆大用之行兼以治人為事幹蠱之幹與幹事之幹和兌之和與和義之和俱一脈君子以朋友講習朱子跋胡文定與吕尚書帖曰朋友之交責善所以盡吾誠取善所以益吾德非以相為賜也各盡其道而無所苟焉則麗澤之益自有不能已者讀此帖使人凛然起敬若嚴師畏友之在其左右前後也嗚呼是數君子者其可謂盡朋友之道而無所苟矣其卓然有以自立于當年而遺風餘烈可傳于世者豈徒然哉按孚兌和兌或責善或取善皆盡朋友之道而一無所苟者才來與引便是苟魏莊渠先生曰後世口説身不行却是把講字代習字羊説羣之物君子如不以朋友講習于兌是一羊之不若矣孚于剝有厲與孚號有厲同義凡坤定須承乾凡柔定須從剛凡隂定須順陽皆往道無來理况兌以剛中柔外為德兑三不外而內外剛內柔已非君子之道在説尤是諂媚諛佞一路麗澤兌澤是聚水江湖河海是澤江湖河海之水無不通流是麗一有不麗江自江湖自湖河自河海自海不免都做斷流絶港死水去如人身血脈不通流便都成病痛如何説傳習是師弟事講習是朋友事總之師友俱朋友也當得師來可稱傳當不得師來惟有講習是源頭洊至之水有不傳有不講任你聚得水多如那汪洋大澤也都要做死水去夬履孚剝其正當同而操術異以履三志于和五兌三且欲入五履三之主説無兩而兌三之主説有偶故履五以夬為正兌五以孚為正也介疾孚剝朱子曰人未説為善先須疾惡能疾惡然後能為善今人見不好事都只恁不管他民之秉彞好是懿德不知這秉彝之良心做那裏去也是可怪凡聽商如離羣羊商兌離三不可合三不可故未寧千門萬户洞開在霹地一聲千紅萬紫發榮在説意一點故震初言來而兌上言引中庸首言戒懼震之來也論語首言學習兑之引也隨五孚于嘉吉象曰位正中兌五孚于剝有厲象曰位正當聖人贊易謹嚴嘗在一字間乾坤主乎六子者也坎離之中又用乎四子之偏者也故坎離自出頭面曰水洊至曰明兩作與天行地勢同若雷風山澤則曰洊曰兼曰隨曰麗若有從來皆非其自為之矣洊雷兼山取中乎坎用坎之中而根乎離隨風麗澤取中乎離用離之中而根乎坎坎為險為加憂人之氣憂則結喜則散結如氷之凝沍散如水之泮渙憂患渙散而亨通故曰渙亨又坎水凝沍于下得巽風而流散為渙坎水流動於上得兌澤而底定為節此俱俞氏琰説易旨處渙初用拯馬壯自已略無窠座二奔機一滴散為萬點無非天下慿倚之具三渙躬斯民也三代之所以直道而行别無事於委屈俯僂享帝立廟詎曰功德不敢忘即木本水源亦何敢忘是以雖窮冬沍寒滴水皆氷而實無堅不泮無寒氷不春水所以謂之渙也萃與渙俱有假廟之象萃有求諸隂之義渙有求諸陽之義朱子曰聖人教人子孫常常祭祀也是要去聚得他不教便散了又曰人死雖是魂魄各自飛散要之魄又較定須是招魂來復這魄要他相合所以安聚他魂魄不散便散推此萃之兌隂在坤上魄之較定者也渙之坎陽在巽下魂之常飛者也故順以求乎兌隂之魄為萃之假巽以求乎坎陽之魂為渙之假存立廟之心九族只是一身矣存享帝之心宇宙民物只是一身矣將置身于險得乎澤水困水始涸始氷水澤腹堅風水渙便是東風解凍也渙其躬渙有丘渙王居俱雜艮撰止之象若不謂徒作飄風之揚散而已又水歸山下為返源渙只作離散説三聖人無此渙其躬不為坎險之躬而為艮止之躬無為風靡無為波流是以無悔隆山李氏曰夫人之所以膠執蔽固終不能自脫於險者有我而已六三雖不中正而高出坎險之上於是釋然消散其有我之私而志在於外自然無悔矣渙其血去逖出如所謂去盡風波止存水世間何事不能平是謂渙之極范文正公淮上遇風詩一棹危于葉傍觀欲損神他年在平地無忽險中人渙其躬象曰志在外己在平地也師王三錫命比王用三驅履履帝位而不疚泰帝乙歸妹大有公用亨于天子自天祐之豫殷薦之上帝隨王用亨于西山大畜何天之衢離王用出征家人王假有家益王用享于帝吉萃王假有廟升王用享于岐山井王明豐王假之渙王假有廟王居無咎程子曰詩書中凡有箇主宰底意思皆言帝有一箇包涵遍覆底意思則言天有一箇公共無私底意思則言王上下千百嵗中若合符契乾南坤北體之正離南坎北用之中凡言中正如姤五井五以中正如需訟五豫晉二艮五直舉其體用合一之德曰位正中如比五巽五隨五曰位在中如妹五曰居位中如節五德既正中聖人之大寶曰位更有貴于位矣曰位正當如履五否五兌五中孚五曰正位如渙五俱以位言當言正而中正之德有不待言也王惟理曰蹇渙二卦易之善言朋也蹇之言連也先躬之匪真見夫臣之耳目心思無一不當輸之王非匪其躬則往者不來連何由集渙之言羣也先躬之渙真見夫國之爵譽謀猷無一可執之于己非渙其躬則羣者不散大何由成漢唐諸君子有大蹇必反之思而莫得來連之助則其躬未匪也有宋君子當小羣既渙之後而莫收有丘之益則其躬未渙也人臣而以人事君也其可有已乎哉同人之初出門南面嚮明直達天德之門隨初出門震兌相函春秋出入日月運行之門節二不出門庭止為秋冬閉塞之門去隨時之門殊逺象故曰失時極君子以制數度議德行君子之德行於何而議總不出於數度有制中世蓋未有淆其多寡之數踰其隆殺之度而復有德行可議者苦節不可貞苦節貞凶凡節非出於心之所安與其心之所甘未有久而不渝者也四安安于初之剛正之説五甘甘於二之剛中之説節從剛陽中正心髓中流出故安故甘而反是者無有不入於上之苦一身之門户在口故節初貴其不出一身之根基在足故九卦首履而曰德之基魏莊渠先生曰此心若走作耳目口體皆其透漏之路而口之透漏為多又曰此心之放皆緣境而生才舉念時便已著境暗處透漏與明處透漏亦總一般易筌儒者率以實訓誠獨中庸以天道為誠以不思不勉為天道思勉不行浮華盡剝此虛之至也虛則誠不虛則不誠觀中孚卦體尤為較著按中孚柔在內而剛得中説而巽孚蓋以得中之剛孚在內兩柔為孚初不以在內兩柔為虛體而多為中孚若以思勉不行浮華盡剝為虛亦并失中庸之旨玩中庸得中二字此豈如浮雲之馳空漚花之泛水電影之逐風睡酣之幽夢之類哉毫釐千里之辨固在此聖學不得大明亦在此是不可以不辨金罍子中孚豚魚吉夫子傳之謂吉不在豚魚也人之信能如豚魚則吉耳中孚十一月之卦豚魚生江海其出有時率以冬至後應期而來信物也世解遂以為人之孚信能感及豚魚故吉則違其本矣物之無知獨豚魚耶且于中孚奚取一説豚魚知風唐人詩江豚吹浪夜還風故舟人呼為風信然則孚人者不如風之及豚魚孚于人者亦不及豚魚之知風可乎豚魚謂為兩物遍卦爻並無兩物堆垜一處為象者中孚取象雖以中兩柔未易孚而從兩剛中為孚實則孚以暗不以的孚以中不以外如初吉而上凶亦初內而上外也士君子忽其居室而徴應于千里其皆登天之翰音曾得為在隂之鳴鶴乎乘木舟虛白居易感興只見火光燒潤屋不聞風浪覆虛舟鶴以感秋警露鳴鶴鳴燕去中孚之初二五之虞也故以不燕象攣象孚虞四時在澤燕春來秋去此虞燕之别鳴鶴志暗翰音意的此初上之别鳴鶴在隂韓文公雀鳴朝營食鳩鳴暮覔羣獨有知時鶴雖鳴不緣身喑蟬終不鳴有抱不列陳蛙黽鳴無謂閣閣祗亂人風土記鶴性警至八月白露降即髙鳴相警移徙所宿處慮有變害白居易雞贈鶴一聲警露君能薄五德司晨我用多此即登天之喻位不當履三臨三睽三歸妹彖中孚三皆兌之三爻與來兌同萃四亦兌體否三豫三晉三皆坤噬嗑三大壯五震三豐四小過四皆震而未濟之三則坎云我有好爵困學紀聞鳯凰雄鳴曰節節雌鳴曰足足即鳯凰飲器象爵亦取其鳴節節足足之義若鳥雀之通為爵特鳥之淫者耳翰音登于天貞凶牝雞之晨惟家之索亦此中孚六三得敵或鼓或罷或泣或歌鼓罷風氣之作止主四以孚三泣歌澤流之湍夷主三以孚四兩不相下兩不相當故未孚而為敵惟敵乃成孚艮上下敵應不相與應之宜敵者中孚得敵敵之宜得者豚魚爾雅以為䲅一名嗔魚其出有時率以冬至後來中孚十一月冬至之卦此魚應之而來是信之著或以為即此物然不如江豚吹浪夜還風更似的大抵魚類之來多有信如䲅以冬至至鯊以正月至次鯉至次鱖至如三月桃花水至而鱖肥是鮪亦以三月遡河上龍門鯼一名石首其來以春名春來至秋化為冠鳬鮆與石首皆以三月八月出故江賦云鯼鮆順時而往還又水經言海鰌穴居海底入穴則海溢為潮出穴則潮退出入有節故潮水有期又鯨出則潮下入則潮上其出入有節故鯨潮有期而江賦亦云介鯨乘潮以出入八卦成列並無低昻輕重只看時位如何有宜相摩者有宜相蕩者有宜相推者有宜相易者有宜相薄者有宜相雜者有宜相攻者有宜相取者有宜相感者有宜相得者孚三得敵則相攻之謂耳卦言利涉大川者六需曰往有功同人曰乾行大畜曰應乎天益曰木道乃行渙曰乘水有功中孚曰乘木舟虛有問陳瑩中以當世之務者瑩中曰請以所乘舟為喻偏重可行乎移左置右其偏一也明此則可行矣救小者之過惟有防遇兩途救大者之過亦惟有藉涉兩法小過六二得中進上過四遇五不為上逆退下不及三遇二適為下順此所以無咎小過用過乎儉古語奢者富不足儉者貧有餘奢者心常貧儉者心常富季元衡儉説貪叨以招辱不若儉而守廉干請以犯義不若儉而全節侵牟以聚仇不若儉而養福放肆以逐欲不若儉而安性大過大者過也曰剛過而中小過小者過也曰柔得中是以小事吉其所謂闕如獨立遁世等事小成其小如過恭過哀過儉等事初不是過剛過柔更不是過中故大過之後受之以坎離之中小過之後受之以既未濟之中君子以天下與世論須是大過以家與身論須是小過大過以剛大有餘為用剛中之能事小過以柔小有餘為用柔中之能事剛中又巽兌之柔之用柔中又震艮之剛之用都不是過中之過又匪專以坎為剛中離為柔中故隨小大而皆亨分隂分陽迭用剛柔用柔小事用剛大事柔而大事不得剛而小事不得小事宜柔大事宜剛小事而剛不可大事而柔不可既濟六二婦喪其茀與家人六二無攸遂同義小人勿用一繫於師上一繫于既三以行師之際或以貪詐可使既濟之時或以小人易與又可化為君子此而勿用見無時可用聖人之于用人其嚴如此睽初喪馬勿逐震二喪貝勿逐既濟之二喪茀勿逐前人詩分明一座上天梯手手扳援步步躋今日恍然天上坐却嫌一向被梯迷又却嫌一向被梯迷不用扳援不用躋自是從來天上坐何嘗間隔一毫絲此睽初所以言自復而震既皆言七日得睽止轉却目睛震亦去其目眚既則去疑去亂還其正明遂言得耳坎終係置比終無首屯終泣血井終勿幕需終入穴節終苦蹇終碩既終濡首俱陷義了手能事泰二朋亡初如無遺三貞用永而惟五中是尚既二喪茀後挽初輪前推三轂而惟五福是禔後世大臣知此義者鮮矣既二婦五之道盡付東西兩鄰而不必其自已為東鄰離體而雜撰則為坎之中西鄰坎體而雜撰則為離之中東鄰剛正位當而以柔克西鄰柔正位當而以剛克是二人者皆從透底大中至正學問得來易嚴小人勿用之戒惟是坎之乘剛上爻解獲狐射非為狐為隼皆此乘剛之小人勿用斷不為用其他小人或決之使行流或孚之使退消或外之使勿內逺之使勿近止之使為輿包之使為瓜為魚畜之使為臣為妾便是處法師上既三小人勿用陽剛方在陷隂柔又下石而乘之兹其所以必為小人必亂邦惟師上柔正極順既三剛正極眀之君子能蚤辨而勿用默消亂於將來此師上既三用人之功不後於師中之功而有加於伐逺之功也屯四求初以動五蹇四連三以濟五坎四納二以牖五屯五非初無動蹇五非三無止坎五非二無平若井四欲冽五泉在甃初泥節四欲劑五甘在安三嗟既四故禔五福在袽二繻剛柔爻主之有辨固如此後世近臣有知此義其於以人事君思過半矣坎上爻處卦終應乾九三象三人來應艮九三象來厲應巽九三象井收應離九三乃象濡首水上火下以水克火恐終無以受人也其諸無剛爻為應如比無首節苦坎係叢棘屯泣血易重剛德君子為應與無如此既濟即是患君子是以思而豫防未濟恆以方君子是以慎辨而居日沒不周西月出丹淵中陽精蔽不見隂光代為雄既上濡首之厲亦此小人勿用聖人繫之師上與既三師外順內險伏戈矛於至順之中既下明上險肆很毒於強明之外天下惟此二項為亂邦小人其餘皆所謂庸惡陋劣小人至於泰否之分别君子小人如三箇陽明剛正之人做一羣同心而共事即不純君子其為君子之道勿問而知矣小人反是是為品隲人羣之大法井汔至不勝內涸四十八之衍數俱虛未汔濟不勝外燔六十四之終事竟絶善學者於兹二汔尤宜亟省履四訴訴終吉否四有命無咎睽四交孚無咎未濟四貞吉悔亡皆曰志行履否健志得行睽未濟明志得行升彖南征吉曰志行巽東南坤西南合而南征明在其中勿問之矣易像鈔卷十二
